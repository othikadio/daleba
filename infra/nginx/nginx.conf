# ─────────────────────────────────────────────────────────────
# DALEBA — Nginx Load Balancer + Failover interne
# Répartit entre app-a:3000 et app-b:3000
# Si app-a est DOWN → 100% vers app-b automatiquement
# ─────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" instance=$upstream_addr';

  access_log /var/log/nginx/access.log main;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 50M;

  # ── Gzip ────────────────────────────────────────────────────
  gzip on;
  gzip_types text/plain application/json application/javascript text/css;

  # ── Upstream DALEBA (failover automatique) ──────────────────
  upstream daleba_backend {
    # max_fails=2: après 2 erreurs, instance exclue pendant 10s
    server app-a:3000 max_fails=2 fail_timeout=10s;
    server app-b:3000 max_fails=2 fail_timeout=10s backup;
    keepalive 32;
  }

  # ── Rate limiting anti-DDoS ──────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=webhook:10m rate=120r/m;

  # ── HTTP → HTTPS redirect ────────────────────────────────────
  server {
    listen 80;
    server_name _;
    # Cloudflare healthcheck sur HTTP/80
    location /api/status {
      proxy_pass http://daleba_backend;
      proxy_set_header Host $host;
      access_log off;
    }
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS principal ──────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── API routes ─────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://daleba_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_connect_timeout 5s;
      proxy_read_timeout 60s;
    }

    # ── Webhooks Twilio / Square / Stripe (plus permissifs) ────
    location ~* ^/api/webhook/ {
      limit_req zone=webhook burst=50 nodelay;
      proxy_pass http://daleba_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_connect_timeout 5s;
      proxy_read_timeout 30s;
    }

    # ── SSE (Server-Sent Events HUD) ───────────────────────────
    location /api/events {
      proxy_pass http://daleba_backend;
      proxy_http_version 1.1;
      proxy_set_header Connection '';
      proxy_set_header Cache-Control 'no-cache';
      proxy_set_header X-Accel-Buffering no;
      proxy_buffering off;
      proxy_read_timeout 86400s;
      chunked_transfer_encoding on;
    }

    # ── HUD Admin (fichiers statiques) ─────────────────────────
    location /admin {
      proxy_pass http://daleba_backend;
      proxy_set_header Host $host;
    }

    # ── Healthcheck Cloudflare (pas de log) ────────────────────
    location /api/status {
      proxy_pass http://daleba_backend;
      proxy_set_header Host $host;
      access_log off;
    }

    location / {
      proxy_pass http://daleba_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }
  }
}
