<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kadio Coiffure — Mon Espace</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --terracotta: #C4622D;
      --sage:       #7A9E6E;
      --cream:      #FAF6F0;
      --dark:       #2D1B0E;
      --muted:      #8C7B6B;
      --border:     #E2D8CE;
    }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: var(--cream);
      min-height: 100vh;
      color: var(--dark);
    }

    header {
      padding: 1.5rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-title {
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--terracotta);
    }

    .btn-logout {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
    }

    .btn-logout:hover { color: var(--dark); }

    .main {
      padding: 1.5rem;
      max-width: 480px;
      margin: 0 auto;
    }

    .welcome {
      margin-bottom: 1.5rem;
    }

    .welcome-greeting {
      font-size: 1.5rem;
      color: var(--dark);
      margin-bottom: 0.25rem;
    }

    .welcome-sub {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .subscription-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .sub-label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }

    .sub-type {
      font-size: 1.1rem;
      color: var(--terracotta);
      margin-bottom: 0.5rem;
    }

    .sub-expiry {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .sub-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 0.75rem;
    }

    .sub-badge.active { background: #DCFCE7; color: #166534; }
    .sub-badge.none   { background: #FEF2F2; color: #991B1B; }

    /* QR code section */
    .qr-section {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.5rem;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .qr-section-title {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    #qrImg {
      width: 200px;
      height: 200px;
      border: 1px solid var(--border);
      border-radius: 3px;
      display: block;
      margin: 0 auto 0.75rem;
    }

    .qr-countdown {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .qr-no-sub {
      color: var(--muted);
      font-size: 0.85rem;
      padding: 1rem 0;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .btn-action {
      display: block;
      width: 100%;
      padding: 0.9rem 1rem;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: #fff;
      color: var(--dark);
      font-family: inherit;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-action:hover {
      background: var(--cream);
      border-color: var(--terracotta);
    }

    .btn-action.primary {
      background: var(--terracotta);
      color: #fff;
      border-color: var(--terracotta);
    }

    .btn-action.primary:hover { background: #a84f24; }

    #noSubMsg {
      display: none;
      background: #FEF9F6;
      border: 1px solid #F4C9B3;
      border-radius: 4px;
      padding: 1rem 1.2rem;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>
<header>
  <div class="header-title">Kadio Coiffure</div>
  <button class="btn-logout" onclick="logout()">Déconnexion</button>
</header>

<div class="main">

  <div class="welcome">
    <div class="welcome-greeting" id="greetingName">Bonjour</div>
    <div class="welcome-sub" id="greetingPhone"></div>
  </div>

  <div class="subscription-card" id="subCard" style="display:none;">
    <div class="sub-label">Votre abonnement</div>
    <div class="sub-type" id="subType"></div>
    <div class="sub-expiry" id="subExpiry"></div>
    <div class="sub-badge active">Actif</div>
  </div>

  <div id="noSubMsg">
    Vous n'avez pas d'abonnement actif. Contactez le salon pour souscrire.
  </div>

  <div class="qr-section" id="qrSection" style="display:none;">
    <div class="qr-section-title">Mon code d'acces</div>
    <img id="qrImg" src="" alt="QR Code">
    <div class="qr-countdown" id="qrCountdown">Actualisation automatique...</div>
  </div>

  <div class="actions">
    <a href="/reservation" class="btn-action primary">Prendre rendez-vous</a>
    <a href="/noter-service" class="btn-action">Mon historique</a>
  </div>

</div>

<script>
  const API   = '';
  const token = localStorage.getItem('daleba_token');
  const phone = localStorage.getItem('daleba_phone') || '';
  const name  = localStorage.getItem('daleba_name')  || '';

  // Auth guard
  if (!token) window.location.href = '/login.html';

  // Greeting
  document.getElementById('greetingName').textContent =
    name ? 'Bonjour, ' + name : 'Bonjour';
  document.getElementById('greetingPhone').textContent = phone;

  // QR refresh
  let qrInterval = null;
  let countdown  = 30;

  async function loadQR() {
    try {
      const r = await fetch(API + '/api/qr/generate', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (!r.ok) {
        if (r.status === 403) showNoSub();
        return;
      }
      const data = await r.json();

      // Afficher la carte abonnement
      document.getElementById('subCard').style.display = 'block';
      document.getElementById('noSubMsg').style.display = 'none';
      document.getElementById('subType').textContent   = data.subscriptionType || 'Abonnement';
      document.getElementById('subExpiry').textContent = data.validUntil
        ? 'Valide jusqu\'au ' + new Date(data.validUntil).toLocaleDateString('fr-CA')
        : '';

      // Afficher le QR
      document.getElementById('qrSection').style.display = 'block';
      document.getElementById('qrImg').src = data.qrDataUrl;

      countdown = data.ttlSeconds || 30;
      startCountdown();
    } catch (_) {}
  }

  function showNoSub() {
    document.getElementById('noSubMsg').style.display = 'block';
    document.getElementById('qrSection').style.display  = 'none';
    document.getElementById('subCard').style.display    = 'none';
  }

  function startCountdown() {
    clearInterval(qrInterval);
    const el = document.getElementById('qrCountdown');
    el.textContent = 'Actualisation dans ' + countdown + 's';
    qrInterval = setInterval(() => {
      countdown--;
      if (countdown <= 0) {
        clearInterval(qrInterval);
        loadQR();
      } else {
        el.textContent = 'Actualisation dans ' + countdown + 's';
      }
    }, 1000);
  }

  function logout() {
    localStorage.removeItem('daleba_token');
    localStorage.removeItem('daleba_role');
    localStorage.removeItem('daleba_phone');
    localStorage.removeItem('daleba_name');
    window.location.href = '/login.html';
  }

  // Init
  loadQR();
</script>
</body>
</html>
