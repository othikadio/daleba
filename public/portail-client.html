<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kadio Coiffure — Mon Espace</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --terracotta: #C4622D;
      --sage:       #7A9E6E;
      --cream:      #FAF6F0;
      --dark:       #2D1B0E;
      --muted:      #8C7B6B;
      --border:     #E2D8CE;
    }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: var(--cream);
      min-height: 100vh;
      color: var(--dark);
    }

    header {
      padding: 1.5rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-title {
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--terracotta);
    }

    .btn-logout {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
    }

    .btn-logout:hover { color: var(--dark); }

    .main {
      padding: 1.5rem;
      max-width: 480px;
      margin: 0 auto;
    }

    .welcome {
      margin-bottom: 1.5rem;
    }

    .welcome-greeting {
      font-size: 1.5rem;
      color: var(--dark);
      margin-bottom: 0.25rem;
    }

    .welcome-sub {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .subscription-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .sub-label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }

    .sub-type {
      font-size: 1.1rem;
      color: var(--terracotta);
      margin-bottom: 0.5rem;
    }

    .sub-expiry {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .sub-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 0.75rem;
    }

    .sub-badge.active { background: #DCFCE7; color: #166534; }
    .sub-badge.none   { background: #FEF2F2; color: #991B1B; }

    /* QR code section */
    .qr-section {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.5rem;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .qr-section-title {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    #qrImg {
      width: 200px;
      height: 200px;
      border: 1px solid var(--border);
      border-radius: 3px;
      display: block;
      margin: 0 auto 0.75rem;
    }

    .qr-countdown {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .qr-no-sub {
      color: var(--muted);
      font-size: 0.85rem;
      padding: 1rem 0;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .btn-action {
      display: block;
      width: 100%;
      padding: 0.9rem 1rem;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: #fff;
      color: var(--dark);
      font-family: inherit;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-action:hover {
      background: var(--cream);
      border-color: var(--terracotta);
    }

    .btn-action.primary {
      background: var(--terracotta);
      color: #fff;
      border-color: var(--terracotta);
    }

    .btn-action.primary:hover { background: #a84f24; }

    #noSubMsg {
      display: none;
      background: #FEF9F6;
      border: 1px solid #F4C9B3;
      border-radius: 4px;
      padding: 1rem 1.2rem;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>
<header>
  <div class="header-title">Kadio Coiffure</div>
  <button class="btn-logout" onclick="logout()">Déconnexion</button>
</header>

<div class="main">

  <div class="welcome">
    <div class="welcome-greeting" id="greetingName">Bonjour</div>
    <div class="welcome-sub" id="greetingPhone"></div>
  </div>

  <div class="subscription-card" id="subCard" style="display:none;">
    <div class="sub-label">Votre abonnement</div>
    <div class="sub-type" id="subType"></div>
    <div class="sub-expiry" id="subExpiry"></div>
    <div class="sub-badge active">Actif</div>
  </div>

  <div id="noSubMsg">
    Vous n'avez pas d'abonnement actif. Contactez le salon pour souscrire.
  </div>

  <div class="qr-section" id="qrSection" style="display:none;">
    <div class="qr-section-title">Mon code d'acces</div>
    <img id="qrImg" src="" alt="QR Code">
    <div class="qr-countdown" id="qrCountdown">Actualisation automatique...</div>
  </div>

  <div class="actions">
    <a href="/reservation" class="btn-action primary">Prendre rendez-vous</a>
    <a href="/noter-service" class="btn-action">Mon historique</a>
  </div>

</div>

<script>
  const API   = '';
  const token = localStorage.getItem('daleba_token');
  const phone = localStorage.getItem('daleba_phone') || '';
  const name  = localStorage.getItem('daleba_name')  || '';

  // ── Mode Notation (lien SMS close-appointment) ────────────────────────────────
  (function detectRatingMode() {
    const urlParams = new URLSearchParams(window.location.search);
    const ratingToken = urlParams.get('token');
    if (!ratingToken) return; // mode normal

    // Décoder le payload JWT sans vérification (côté client - display only)
    function decodePayload(jwt) {
      try {
        return JSON.parse(atob(jwt.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
      } catch(e) { return null; }
    }

    const payload = decodePayload(ratingToken);
    if (!payload || !payload.appointmentId) return;

    // Afficher l'interface de notation à la place du portail
    document.body.innerHTML = `
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Votre avis — Kadio Coiffure</title>
<link rel="stylesheet" href="/assets/css/salon.css"/>
<style>
  .rating-wrap{max-width:420px;margin:3rem auto;padding:2rem;background:#fff;border-radius:10px;box-shadow:0 2px 20px rgba(0,0,0,0.08);text-align:center;}
  .salon-badge{font-family:'Playfair Display',Georgia,serif;font-size:1rem;color:#C4622D;letter-spacing:.15em;text-transform:uppercase;margin-bottom:.5rem;}
  .rating-title{font-family:'Playfair Display',Georgia,serif;font-size:1.4rem;color:#2C1810;margin-bottom:.5rem;}
  .rating-staff{font-size:.85rem;color:#888;margin-bottom:1.5rem;}
  .stars-row{display:flex;justify-content:center;gap:.5rem;margin-bottom:1rem;}
  .star-btn{background:none;border:none;cursor:pointer;color:#E0D0C0;font-size:0;transition:color .15s;}
  .star-btn svg{pointer-events:none;}
  .star-btn.lit{color:#C4622D;}
  .rating-label{font-size:.9rem;color:#888;min-height:1.4rem;margin-bottom:1rem;}
  .comment-box{width:100%;box-sizing:border-box;padding:.75rem;border:1px solid #ddd;border-radius:6px;font-family:inherit;font-size:.9rem;resize:vertical;margin-bottom:1rem;}
  .comment-box:focus{outline:none;border-color:#C4622D;}
  .submit-btn{background:#C4622D;color:#fff;border:none;border-radius:6px;padding:.85rem 2.5rem;font-size:.95rem;font-weight:700;cursor:pointer;letter-spacing:.04em;width:100%;}
  .submit-btn:disabled{opacity:.5;cursor:default;}
  .thankyou{display:none;padding:1.5rem 0;}
  .thankyou-icon{margin-bottom:1rem;}
  .google-link-box{background:#FAF6F0;border:1px solid #E8D5C8;border-radius:8px;padding:1.25rem;margin-top:1rem;}
  .google-link-btn{display:inline-block;margin-top:.75rem;background:#C4622D;color:#fff;padding:.7rem 1.5rem;border-radius:6px;text-decoration:none;font-weight:700;font-size:.9rem;}
  .google-link-btn:hover{background:#A8511F;}
  .block-msg{background:#FAF6F0;border-radius:8px;padding:1.25rem;margin-top:1rem;color:#555;font-size:.9rem;line-height:1.6;}
</style>
</head>
<body style="background:#FAF6F0;min-height:100vh;">
<div class="rating-wrap">
  <div class="salon-badge">Kadio Coiffure & Esthétique</div>
  <h2 class="rating-title" id="rTitle">Comment s'est passée votre prestation ?</h2>
  <p class="rating-staff" id="rStaff"></p>

  <div id="ratingForm">
    <div class="stars-row" id="starsRow">
      ${[1,2,3,4,5].map(v=>`
      <button class="star-btn" data-v="${v}" type="button" aria-label="${v} étoile${v>1?'s':''}">
        <svg width="44" height="44" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z" fill="currentColor"/></svg>
      </button>`).join('')}
    </div>
    <div class="rating-label" id="rLabel">Sélectionnez votre note</div>
    <textarea class="comment-box" id="rComment" rows="3" placeholder="Un commentaire ? (optionnel)"></textarea>
    <button class="submit-btn" id="rSubmit" disabled type="button">Envoyer mon avis</button>
  </div>

  <div class="thankyou" id="rThankyou">
    <div class="thankyou-icon">
      <svg width="60" height="60" viewBox="0 0 60 60" fill="none">
        <circle cx="30" cy="30" r="28" fill="#7A9E6E"/>
        <path d="M18 30l9 9 15-15" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h3 style="font-family:'Playfair Display',Georgia,serif;color:#2C1810;">Merci pour votre confiance !</h3>
    <div id="rFollowup"></div>
  </div>
</div>

<script>
  const GOOGLE_LINK = 'https://g.page/r/CwVGb0-S7xEAAAQvFbH8bg/review';
  const labels = ['','Pas satisfait(e)','Peut mieux faire','Correct','Bien','Excellent !'];
  let currentRating = 0;

  const stars = document.querySelectorAll('.star-btn');
  stars.forEach(s => {
    s.addEventListener('mouseover', () => {
      const v = parseInt(s.dataset.v);
      stars.forEach(x => x.classList.toggle('lit', parseInt(x.dataset.v) <= v));
      document.getElementById('rLabel').textContent = labels[v];
    });
    s.addEventListener('click', () => {
      currentRating = parseInt(s.dataset.v);
      stars.forEach(x => x.classList.toggle('lit', parseInt(x.dataset.v) <= currentRating));
      document.getElementById('rLabel').textContent = labels[currentRating];
      document.getElementById('rSubmit').disabled = false;
    });
  });

  document.getElementById('starsRow').addEventListener('mouseleave', () => {
    stars.forEach(x => x.classList.toggle('lit', parseInt(x.dataset.v) <= currentRating));
    document.getElementById('rLabel').textContent = currentRating ? labels[currentRating] : 'Sélectionnez votre note';
  });

  document.getElementById('rSubmit').addEventListener('click', async () => {
    if (!currentRating) return;
    const btn = document.getElementById('rSubmit');
    btn.textContent = 'Envoi...'; btn.disabled = true;

    const payload = ${JSON.stringify(payload)};

    try {
      await fetch('/api/salon/rate-service', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          appointmentId: payload.appointmentId,
          clientPhone:   payload.clientPhone,
          clientName:    payload.clientName,
          staffName:     payload.staffName,
          rating:        currentRating,
          comment:       document.getElementById('rComment').value || null,
        }),
      });
    } catch(e) {}

    document.getElementById('ratingForm').style.display = 'none';
    document.getElementById('rThankyou').style.display = 'block';

    if (currentRating >= 4) {
      document.getElementById('rFollowup').innerHTML = \`
        <div class="google-link-box">
          <p style="font-size:.9rem;color:#555;line-height:1.6;">Votre satisfaction nous touche profondément.<br>Partagez votre expérience pour aider d'autres clients à nous trouver.</p>
          <a class="google-link-btn" href="\${GOOGLE_LINK}" target="_blank" rel="noopener">Laisser un avis Google</a>
        </div>\`;
    } else {
      document.getElementById('rFollowup').innerHTML = \`
        <div class="block-msg">
          Nous sommes sincèrement désolés que cette visite n'ait pas été à la hauteur de vos attentes.<br><br>
          Notre responsable a été informé et vous contactera personnellement pour améliorer votre prochaine expérience.
        </div>\`;
    }
  });

  // Init
  if (${JSON.stringify(payload.staffName)}) {
    document.getElementById('rStaff').textContent = 'Prestation avec ' + ${JSON.stringify(payload.staffName)};
  }
  if (${JSON.stringify(payload.clientName)}) {
    document.getElementById('rTitle').textContent = 'Bonjour ' + ${JSON.stringify(payload.clientName).replace(/['"]/g, '')} + ' — Comment s\'était votre prestation ?';
  }
<\/script>
</body>
</html>`;

    document.open(); document.write(document.body.innerHTML); document.close();
  })();

  // Auth guard (mode normal seulement)
  if (!token) window.location.href = '/login.html';

  // Greeting
  document.getElementById('greetingName').textContent =
    name ? 'Bonjour, ' + name : 'Bonjour';
  document.getElementById('greetingPhone').textContent = phone;

  // QR refresh
  let qrInterval = null;
  let countdown  = 30;

  async function loadQR() {
    try {
      const r = await fetch(API + '/api/qr/generate', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (!r.ok) {
        if (r.status === 403) showNoSub();
        return;
      }
      const data = await r.json();

      // Afficher la carte abonnement
      document.getElementById('subCard').style.display = 'block';
      document.getElementById('noSubMsg').style.display = 'none';
      document.getElementById('subType').textContent   = data.subscriptionType || 'Abonnement';
      document.getElementById('subExpiry').textContent = data.validUntil
        ? 'Valide jusqu\'au ' + new Date(data.validUntil).toLocaleDateString('fr-CA')
        : '';

      // Afficher le QR
      document.getElementById('qrSection').style.display = 'block';
      document.getElementById('qrImg').src = data.qrDataUrl;

      countdown = data.ttlSeconds || 30;
      startCountdown();
    } catch (_) {}
  }

  function showNoSub() {
    document.getElementById('noSubMsg').style.display = 'block';
    document.getElementById('qrSection').style.display  = 'none';
    document.getElementById('subCard').style.display    = 'none';
  }

  function startCountdown() {
    clearInterval(qrInterval);
    const el = document.getElementById('qrCountdown');
    el.textContent = 'Actualisation dans ' + countdown + 's';
    qrInterval = setInterval(() => {
      countdown--;
      if (countdown <= 0) {
        clearInterval(qrInterval);
        loadQR();
      } else {
        el.textContent = 'Actualisation dans ' + countdown + 's';
      }
    }, 1000);
  }

  function logout() {
    localStorage.removeItem('daleba_token');
    localStorage.removeItem('daleba_role');
    localStorage.removeItem('daleba_phone');
    localStorage.removeItem('daleba_name');
    window.location.href = '/login.html';
  }

  // Init
  loadQR();
</script>
</body>
</html>
