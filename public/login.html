<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kadio Coiffure — Connexion</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --terracotta: #C4622D;
      --sage:       #7A9E6E;
      --cream:      #FAF6F0;
      --dark:       #2D1B0E;
      --muted:      #8C7B6B;
      --border:     #E2D8CE;
    }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--dark);
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 2rem 1.5rem;
    }

    .logo {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo-title {
      font-size: 1.6rem;
      font-weight: normal;
      letter-spacing: 0.12em;
      color: var(--terracotta);
      text-transform: uppercase;
    }

    .logo-sub {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 0.3rem;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--terracotta);
      margin: 1rem auto;
    }

    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2.5rem 2rem;
    }

    .step { display: none; }
    .step.active { display: block; }

    .step-title {
      font-size: 1rem;
      font-weight: normal;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--dark);
      margin-bottom: 0.5rem;
    }

    .step-desc {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1.8rem;
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    input[type="tel"],
    input[type="text"] {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 1px solid var(--border);
      border-radius: 3px;
      font-family: inherit;
      font-size: 1rem;
      color: var(--dark);
      background: var(--cream);
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--terracotta);
    }

    .otp-group {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      margin: 0.5rem 0;
    }

    .otp-digit {
      width: 64px;
      height: 64px;
      text-align: center;
      font-size: 1.6rem;
      letter-spacing: 0;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--cream);
      color: var(--dark);
      font-family: 'Georgia', serif;
      outline: none;
      transition: border-color 0.2s;
    }

    .otp-digit:focus {
      border-color: var(--terracotta);
    }

    .btn-primary {
      width: 100%;
      padding: 0.9rem 1rem;
      margin-top: 1.5rem;
      background: var(--terracotta);
      color: #fff;
      border: none;
      border-radius: 3px;
      font-family: inherit;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary:hover { background: #a84f24; }
    .btn-primary:disabled { background: var(--muted); cursor: default; }

    .btn-back {
      background: none;
      border: none;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 1rem;
      display: block;
      text-align: center;
      width: 100%;
      padding: 0.5rem;
    }

    .btn-back:hover { color: var(--dark); }

    .error-msg {
      color: #C0392B;
      font-size: 0.8rem;
      margin-top: 0.75rem;
      text-align: center;
      min-height: 1.2em;
    }

    .success-icon {
      text-align: center;
      margin-bottom: 1rem;
    }

    .dot-indicator {
      display: flex;
      justify-content: center;
      gap: 0.4rem;
      margin-bottom: 1.5rem;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
    }

    .dot.active { background: var(--terracotta); }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-title">Kadio Coiffure</div>
    <div class="divider"></div>
    <div class="logo-sub">Coiffure &amp; Esthétique</div>
  </div>

  <div class="card">
    <div class="dot-indicator">
      <div class="dot active" id="dot1"></div>
      <div class="dot" id="dot2"></div>
    </div>

    <!-- Étape 1 : Numéro de téléphone -->
    <div class="step active" id="step1">
      <div class="step-title">Connexion</div>
      <div class="step-desc">Entrez votre numéro de téléphone pour recevoir un code de vérification.</div>
      <label for="phone">Numéro de téléphone</label>
      <input type="tel" id="phone" placeholder="+1 514 000 0000" autocomplete="tel">
      <div class="error-msg" id="error1"></div>
      <button class="btn-primary" id="btnSend" onclick="requestOTP()">Recevoir mon code</button>
    </div>

    <!-- Étape 2 : Code OTP -->
    <div class="step" id="step2">
      <div class="step-title">Vérification</div>
      <div class="step-desc">Entrez le code à 4 chiffres envoyé au <strong id="phoneDisplay"></strong>.</div>
      <label>Code de vérification</label>
      <div class="otp-group">
        <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" id="d1">
        <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" id="d2">
        <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" id="d3">
        <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" id="d4">
      </div>
      <div class="error-msg" id="error2"></div>
      <button class="btn-primary" id="btnVerify" onclick="verifyOTP()">Confirmer</button>
      <button class="btn-back" onclick="goBack()">Modifier le numéro</button>
    </div>
  </div>
</div>

<script>
  const API = '';

  function setError(id, msg) {
    document.getElementById(id).textContent = msg || '';
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    if (loading) {
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Envoi...';
    } else {
      btn.disabled = false;
      btn.innerHTML = btn.id === 'btnSend' ? 'Recevoir mon code' : 'Confirmer';
    }
  }

  function setStep(n) {
    document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
    document.getElementById('step' + n).classList.add('active');
    document.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i < n);
    });
  }

  // OTP digit auto-focus
  document.querySelectorAll('.otp-digit').forEach((inp, idx, all) => {
    inp.addEventListener('input', (e) => {
      const val = e.target.value.replace(/[^0-9]/g, '');
      e.target.value = val.slice(-1);
      if (val && idx < all.length - 1) all[idx + 1].focus();
    });
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !e.target.value && idx > 0) {
        all[idx - 1].focus();
      }
    });
    inp.addEventListener('paste', (e) => {
      const text = e.clipboardData.getData('text').replace(/\D/g, '');
      all.forEach((el, i) => { el.value = text[i] || ''; });
      const last = Math.min(text.length, all.length) - 1;
      all[last]?.focus();
      e.preventDefault();
    });
  });

  function normalizePhone(raw) {
    // Normalise en E.164 pour le Canada/États-Unis
    let p = raw.replace(/[\s\-().]/g, '');
    if (/^[2-9]\d{9}$/.test(p))  p = '+1' + p;        // 10 chiffres sans indicatif
    if (/^1[2-9]\d{9}$/.test(p)) p = '+' + p;         // 11 chiffres avec 1 préfixe
    if (!/^\+/.test(p))           p = '+1' + p.replace(/^0+/, ''); // fallback
    return p;
  }

  async function requestOTP() {
    const raw = document.getElementById('phone').value.trim();
    if (!raw) { setError('error1', 'Entrez votre numéro de téléphone.'); return; }
    const phone = normalizePhone(raw);
    document.getElementById('phone').value = phone; // Affiche format normalisé
    setError('error1', '');
    setLoading('btnSend', true);

    try {
      const r = await fetch(API + '/api/auth/request-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone }),
      });
      const data = await r.json();
      if (!r.ok || !data.success) throw new Error(data.error || 'Erreur serveur');

      document.getElementById('phoneDisplay').textContent = phone;
      setStep(2);
      setTimeout(() => document.getElementById('d1').focus(), 100);
    } catch (e) {
      setError('error1', e.message);
    } finally {
      setLoading('btnSend', false);
    }
  }

  async function verifyOTP() {
    const phone = document.getElementById('phone').value.trim();
    const code  = ['d1','d2','d3','d4'].map(id => document.getElementById(id).value).join('');

    if (code.length < 4) { setError('error2', 'Entrez les 4 chiffres de votre code.'); return; }
    setError('error2', '');
    setLoading('btnVerify', true);

    try {
      const r = await fetch(API + '/api/auth/verify-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, code }),
      });
      const data = await r.json();
      if (!r.ok || !data.success) throw new Error(data.error || 'Code incorrect');

      localStorage.setItem('daleba_token', data.token);
      localStorage.setItem('daleba_role',  data.role);
      localStorage.setItem('daleba_phone', phone);
      if (data.profile?.name) localStorage.setItem('daleba_name', data.profile.name);

      switch (data.role) {
        case 'owner': window.location.href = '/admin-dashboard.html'; break;
        case 'staff':  window.location.href = '/portail-staff.html';   break;
        default:       window.location.href = '/portail-client.html';  break;
      }
    } catch (e) {
      setError('error2', e.message);
      setLoading('btnVerify', false);
    }
  }

  function goBack() {
    setStep(1);
    setError('error2', '');
    ['d1','d2','d3','d4'].forEach(id => document.getElementById(id).value = '');
  }

  document.getElementById('phone').addEventListener('keydown', e => {
    if (e.key === 'Enter') requestOTP();
  });
</script>
</body>
</html>
