<!-- ERREUR FATALE visible à l'écran -->
<script>
window.onerror=function(m,s,l){
  var d=document.getElementById('err')||document.createElement('div');
  d.id='err';d.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:99999;background:#000;border:2px solid #f44;border-radius:8px;padding:20px 26px;max-width:88vw;font-family:monospace;text-align:center;color:#f88';
  d.innerHTML='<b>ERREUR V10</b><br><small>'+String(m)+'</small><br><small style="color:#666">'+s+':'+l+'</small>';
  if(document.body)document.body.appendChild(d);
  return false;
};
window.addEventListener('unhandledrejection',function(e){window.onerror('Promise: '+(e.reason&&e.reason.message||e.reason),'async',0);});
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--em:#00FF9F;--cy:#00D4FF;--bg:#000010;--border:rgba(0,255,159,.15);--dim:rgba(0,255,159,.28);--mono:'Courier New',monospace}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:#c8f0dc;font-family:Arial,sans-serif;touch-action:none}
#shell{display:flex;flex-direction:column;width:100vw;height:100vh}

/* HEADER */
#hdr{flex-shrink:0;height:50px;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid var(--border);background:rgba(0,0,15,.9)}
.logo{font-family:var(--mono);font-size:.88rem;font-weight:700;color:var(--em);letter-spacing:.2em}
.dot{width:7px;height:7px;border-radius:50%;background:var(--em);box-shadow:0 0 8px var(--em);display:inline-block;margin-right:6px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.stxt{font-family:var(--mono);font-size:.62rem;color:var(--em);letter-spacing:.1em}
.navl a{font-family:var(--mono);font-size:.58rem;color:rgba(0,255,159,.4);text-decoration:none;margin-left:12px;transition:color .2s}
.navl a:hover{color:var(--em)}
#badge{font-family:var(--mono);font-size:.58rem;color:rgba(0,255,159,.4);padding:2px 9px;border:1px solid var(--border);border-radius:20px;margin-left:10px}
#badge.live{color:var(--em);border-color:var(--dim)}

/* SCENE */
#scene{flex:1;position:relative;width:100%;overflow:hidden}
#planet{display:block;position:absolute;top:0;left:0;cursor:grab;touch-action:none}
#planet:active{cursor:grabbing}

/* WIDGETS — position absolue fixe, z-index 999 */
.w{
  position:absolute;z-index:999;width:174px;
  padding:10px 12px;
  background:rgba(0,3,18,.82);
  border:1px solid var(--border);
  border-radius:6px;
  backdrop-filter:blur(14px);
  opacity:0;
  /* PAS de transform variable — transition simple sur opacity */
  transition:opacity .5s ease, transform .5s cubic-bezier(.22,1,.36,1);
  transform:scale(0.1);
  pointer-events:none;
}
.w.open{opacity:1;transform:scale(1);pointer-events:auto}

/* Positions fixes des widgets */
#w1{top:14px;left:14px}
#w2{top:14px;right:14px}
#w3{bottom:58px;left:14px}
#w4{bottom:58px;right:14px}

.wt{font-family:var(--mono);font-size:.56rem;font-weight:700;color:var(--em);letter-spacing:.14em;text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:5px;margin-bottom:6px}
.wr{display:flex;justify-content:space-between;margin-bottom:3px}
.wl{font-family:var(--mono);font-size:.53rem;color:rgba(255,255,255,.3)}
.wv{font-family:var(--mono);font-size:.55rem;color:var(--em)}

/* REFLECTION */
#reflex{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:60;text-align:center;pointer-events:none;opacity:0;transition:opacity .3s}
#reflex.on{opacity:1}
.rtxt{font-family:var(--mono);font-size:.7rem;color:var(--em);letter-spacing:.22em;text-transform:uppercase;animation:flk 1.1s infinite}
@keyframes flk{0%,100%{opacity:1}48%{opacity:.3}50%{opacity:.1}52%{opacity:.8}}

/* RIPPLE ONDE DE CHOC */
.ripple{position:absolute;border:2px solid rgba(0,255,159,.8);border-radius:50%;pointer-events:none;z-index:70;width:50px;height:50px;animation:ripout .7s ease-out forwards}
@keyframes ripout{0%{transform:translate(-50%,-50%) scale(0);opacity:1}100%{transform:translate(-50%,-50%) scale(7);opacity:0}}

/* CHAT */
#chat{position:absolute;bottom:56px;right:0;width:300px;max-height:54%;overflow-y:auto;z-index:200;padding:9px;display:flex;flex-direction:column;gap:6px}
#chat::-webkit-scrollbar{width:2px}#chat::-webkit-scrollbar-thumb{background:var(--dim)}
.bub{max-width:93%;padding:7px 10px;border-radius:5px;font-family:var(--mono);font-size:.67rem;line-height:1.5;animation:bub .22s ease}
@keyframes bub{from{opacity:0;transform:translateY(3px)}to{opacity:1}}
.bub.user{align-self:flex-end;background:rgba(0,255,159,.07);border:1px solid rgba(0,255,159,.16);color:#d8ffd8}
.bub.daleba{align-self:flex-start;background:rgba(0,0,28,.8);border:1px solid var(--border);color:var(--em)}
.bub.daleba::before{content:'DALEBA › ';font-weight:700}
.dots{align-self:flex-start;font-family:var(--mono);font-size:.64rem;color:var(--dim);padding:4px 8px}
.dots span{animation:td 1s infinite}.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes td{0%,80%,100%{opacity:.1}40%{opacity:1}}
@media(max-width:560px){#chat{width:100%}.w{width:138px}.wt{font-size:.5rem}.wv,.wl{font-size:.48rem}}
@media(max-width:380px){.w{display:none}}

/* INPUT */
#bar{flex-shrink:0;height:52px;z-index:100;display:flex;align-items:center;gap:8px;padding:0 15px;border-top:1px solid var(--border);background:rgba(0,0,18,.9)}
.prompt{font-family:var(--mono);font-size:1.05rem;color:var(--em);flex-shrink:0}
#msg{flex:1;background:transparent;border:none;outline:none;color:#d0ffd8;font-family:var(--mono);font-size:.8rem;caret-color:var(--em)}
#msg::placeholder{color:rgba(0,255,159,.17)}
#send{background:none;border:1px solid var(--dim);color:var(--em);font-family:var(--mono);font-size:.72rem;padding:5px 12px;border-radius:4px;cursor:pointer;flex-shrink:0;transition:background .2s}
#send:hover,#send:active{background:rgba(0,255,159,.12)}
</style>
</head>
<body>
<div id="shell">

  <div id="hdr">
    <span class="logo">DALEBA OS</span>
    <div style="display:flex;align-items:center"><span class="dot"></span><span class="stxt">ZENITH V10</span></div>
    <div style="display:flex;align-items:center">
      <div class="navl"><a href="/">← Accueil</a><a href="/reservation">RDV</a><a href="/dashboard">Board</a></div>
      <span id="badge">INIT</span>
    </div>
  </div>

  <div id="scene">
    <canvas id="planet"></canvas>

    <!-- 4 Widgets holographiques — z-index 999 -->
    <div class="w" id="w1">
      <div class="wt">📅 Salon Live</div>
      <div class="wr"><span class="wl">RDV aujourd'hui</span><span class="wv" id="w-rdv">0</span></div>

    </div>

    <button id="send">↑ SEND</button>
  </div>
</div>

<script src="/js/three.min.js"></script>

<script>
/* ================================================================
   DALEBA ZENITH V10
   Fixes critiques vs V9 :
   - Widgets ouverts automatiquement après 1.5s (pas besoin de tap)
   - click event séparé du drag sur le canvas
   - transforms CSS sans variables (transform:scale fixe)
   - Audio entièrement dans try/catch, non-bloquant
   - Drag inertie via pointermove, tap via click event distinct
================================================================ */

/* ─── ÉTAT GLOBAL ─────────────────────────────────────── */
var scene, camera, renderer, clock;
var particles, lineSegs, ring;
var rotY=0, rotX=0, velY=0, velX=0;
var inReflect=false, waveActive=false, waveT=0;
var panelsOpen=false;
var msgCount=0;
var sessionId='z10_'+Date.now().toString(36);
var chatEl, msgEl, chatHistory=[];

/* ─── AUDIO — entièrement non-bloquant ────────────────── */
var _AC=null;
function _audio(){
  /* Tente de créer/reprendre le contexte audio */
  if(!_AC){try{_AC=new(window.AudioContext||window.webkitAudioContext)();}catch(_){return null;}}
  if(_AC.state==='suspended'){try{_AC.resume();}catch(_){}}
  return _AC.state==='running'?_AC:null;
}
function _tone(freq,dur,vol,type){
  try{
    var ac=_audio(); if(!ac) return;
    var o=ac.createOscillator(), g=ac.createGain();
    o.type=type||'sine'; o.frequency.value=freq;
    g.gain.setValueAtTime(vol||.08,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+dur);
    o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+dur);
  }catch(_){}
}
function sndPing(){  _tone(880,.22,.1,'sine'); setTimeout(function(){_tone(1320,.14,.05,'sine');},60); }
function sndTick(){  _tone(440,.07,.04,'square'); }
function sndBlip(){  _tone(660,.14,.07,'triangle'); }
function sndWhoosh(){
  try{
    var ac=_audio(); if(!ac) return;
    var b=ac.createBuffer(1,ac.sampleRate*.38,ac.sampleRate);
    var d=b.getChannelData(0);
    for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*6)*.13;
    var s=ac.createBufferSource(); s.buffer=b;
    var f=ac.createBiquadFilter(); f.type='bandpass'; f.frequency.value=400; f.Q.value=.5;
    s.connect(f);f.connect(ac.destination);s.start();
  }catch(_){}
}

/* ─── BOOT ────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded',function(){
  chatEl=document.getElementById('chat');
  msgEl =document.getElementById('msg');
  tick();

  /* Restaurer l'historique chat */
  try{var sv=localStorage.getItem('z10');if(sv){chatHistory=JSON.parse(sv).slice(-20);chatHistory.forEach(function(m){addBubble(m.r,m.t,false);});}}catch(_){}

  /* Déverrouiller audio dès le premier geste */
  document.addEventListener('pointerdown',_audio,{once:true,passive:true});
  document.addEventListener('keydown',_audio,{once:true,passive:true});

  /* Attendre layout (2 rAF) puis lancer */
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      boot3D();
      initInput();
      startPolling();
      /* Ouvrir les panels automatiquement après 1.5s */
      setTimeout(function(){ openPanels(); setLog('Modules activés'); },1500);
    });
  });
});

/* ─── BOOT 3D ─────────────────────────────────────────── */
function boot3D(){
  var se=document.getElementById('scene');
  var W=Math.floor(se.getBoundingClientRect().width||window.innerWidth);
  var H=Math.floor(se.getBoundingClientRect().height||(window.innerHeight-102));
  setLog('Canvas '+W+'×'+H);

  /* Tester WebGL sur un canvas de test (pas toucher au canvas principal) */
  var ok=false;
  try{
    var t=document.createElement('canvas');
    var ctx=t.getContext('webgl')||t.getContext('experimental-webgl');
    if(ctx&&typeof THREE!=='undefined') ok=true;
  }catch(_){}

  var c=document.getElementById('planet');
  c.width=W; c.height=H;
  c.style.width=W+'px'; c.style.height=H+'px';

  if(ok){
    try{
      init3(c,W,H);
      badge('3D ●',true);
      setTimeout(sndWhoosh,600);
      setLog('THREE.js ● LIVE');
    }catch(e){
      setLog('3D err:'+e.message);
      init2D(c,W,H);
    }
  } else {
    setLog('WebGL absent → 2D');
    init2D(c,W,H);
  }

  /* ─── CLICK séparé du drag ─── */
  /* On utilise 'click' natif sur le canvas — 100% indépendant du drag */
  var moved=false;
  c.addEventListener('pointerdown',function(){moved=false;},{passive:true});
  c.addEventListener('pointermove',function(){moved=true;},{passive:true});
  c.addEventListener('click',function(e){
    if(moved) return; /* drag → pas un tap */
    _audio(); sndPing();
    ripple(e.clientX, e.clientY - se.getBoundingClientRect().top);
    shockwave();
    togglePanels();
  });
}

/* ─── THREE.JS ────────────────────────────────────────── */
function init3(c,W,H){
  scene=new THREE.Scene();
  clock=new THREE.Clock();
  camera=new THREE.PerspectiveCamera(50,W/H,.1,100);
  camera.position.set(0,0,5.5);

  renderer=new THREE.WebGLRenderer({canvas:c,antialias:true,alpha:false});
  renderer.setSize(W,H,false);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
  renderer.setClearColor(0x000010,1);

  /* Lumières */
  scene.add(new THREE.AmbientLight(0x002208,2));
  var dl=new THREE.DirectionalLight(0x00ffbf,2.5); dl.position.set(5,6,4); scene.add(dl);
  var pl=new THREE.PointLight(0x00d4ff,4,20);  pl.position.set(-3,2,3);  scene.add(pl);
  var pl2=new THREE.PointLight(0x50c878,3,16); pl2.position.set(3,-3,-2); scene.add(pl2);

  /* Particules Fibonacci */
  var N=900,R=1.85;
  var pos=new Float32Array(N*3),col=new Float32Array(N*3),orig=new Float32Array(N*3);
  for(var i=0;i<N;i++){
    var phi=Math.acos(1-2*(i+.5)/N), th2=Math.PI*(1+Math.sqrt(5))*i;
    var x=R*Math.sin(phi)*Math.cos(th2), y=R*Math.sin(phi)*Math.sin(th2), z=R*Math.cos(phi);
    pos[i*3]=orig[i*3]=x; pos[i*3+1]=orig[i*3+1]=y; pos[i*3+2]=orig[i*3+2]=z;
    var t=(y/R+1)/2;
    col[i*3]=(1-t)*.31; col[i*3+1]=(1-t)*.78+t*.83; col[i*3+2]=(1-t)*.47+t;
  }
  var geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',   new THREE.BufferAttribute(col,3));
  geo._orig=orig;
  particles=new THREE.Points(geo,new THREE.PointsMaterial({size:.06,vertexColors:true,sizeAttenuation:true,transparent:true,opacity:1}));
  scene.add(particles);

  buildLines(pos,N);

  ring=new THREE.Mesh(
    new THREE.TorusGeometry(R*1.32,.007,6,100),
    new THREE.MeshBasicMaterial({color:0x00ff9f,transparent:true,opacity:.22})
  );
  ring.rotation.x=Math.PI/2.6;
  scene.add(ring);

  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(R*1.13,32,32),
    new THREE.MeshBasicMaterial({color:0x00ff9f,transparent:true,opacity:.03,side:THREE.BackSide})
  ));

  /* Drag via pointer events — séparé du click */
  setupDrag(c);
  window.addEventListener('resize',onResize);
  animate();
}

/* ─── LIGNES ──────────────────────────────────────────── */
function buildLines(pos,N){
  if(lineSegs){scene.remove(lineSegs);lineSegs.geometry.dispose();}
  var v=[],D2=.7*.7;
  for(var i=0;i<N;i++) for(var j=i+1;j<N;j++){
    var dx=pos[i*3]-pos[j*3],dy=pos[i*3+1]-pos[j*3+1],dz=pos[i*3+2]-pos[j*3+2];
    if(dx*dx+dy*dy+dz*dz<D2)v.push(pos[i*3],pos[i*3+1],pos[i*3+2],pos[j*3],pos[j*3+1],pos[j*3+2]);
  }
  var lg=new THREE.BufferGeometry();
  lg.setAttribute('position',new THREE.BufferAttribute(new Float32Array(v),3));
  lineSegs=new THREE.LineSegments(lg,new THREE.LineBasicMaterial({color:0x00ff9f,transparent:true,opacity:.1}));
  scene.add(lineSegs);
}

/* ─── ANIMATE ─────────────────────────────────────────── */
function animate(){
  requestAnimationFrame(animate);
  if(!renderer||!particles) return;
  var dt=clock.getDelta(), t=clock.getElapsedTime();

  /* Inertie */
  velY*=.9; velX*=.9; rotY+=velY; rotX+=velX;
  /* Auto-rotation */
  rotY+=inReflect?.006:.0012;
  particles.rotation.y=rotY; particles.rotation.x=rotX;
  if(ring){ring.rotation.z=rotY*.35; ring.rotation.y=rotX*.2;}

  /* Pulsation */
  var gp=particles.geometry,p=gp.attributes.position.array,o=gp._orig;
  if(o){
    var pulse=1+Math.sin(t*1.1)*.018;
    if(waveActive){
      waveT+=dt*(inReflect?6:3.5);
      for(var i=0;i<p.length/3;i++){
        var d=Math.sqrt(o[i*3]*o[i*3]+o[i*3+1]*o[i*3+1]+o[i*3+2]*o[i*3+2]);
        var w=Math.sin(d*3.5-waveT)*(inReflect?.18:.1);
        p[i*3]=o[i*3]*(pulse+w);p[i*3+1]=o[i*3+1]*(pulse+w);p[i*3+2]=o[i*3+2]*(pulse+w);
      }
      if(waveT>Math.PI*2){waveActive=false;waveT=0;}
    } else {
      for(var j=0;j<p.length;j++) p[j]=o[j]*pulse;
    }
    gp.attributes.position.needsUpdate=true;
  }

  /* Mode réflexion : couleurs cyan pulsées */
  if(inReflect&&gp.attributes.color){
    var c=gp.attributes.color.array,cp=.5+Math.abs(Math.sin(t*6))*.5;
    for(var k=0;k<c.length;k+=3){c[k+2]=cp;}
    gp.attributes.color.needsUpdate=true;
  }
  particles.material.opacity=inReflect?.4+Math.abs(Math.sin(t*5))*.55:1;
  renderer.render(scene,camera);
}

/* ─── DRAG (pointer events, SANS interférer avec click) ── */
var _drag=false,_px=0,_py=0;
function setupDrag(c){
  c.addEventListener('pointerdown',function(e){
    _drag=true; _px=e.clientX; _py=e.clientY;
    try{c.setPointerCapture(e.pointerId);}catch(_){}
  },{passive:true});
  c.addEventListener('pointermove',function(e){
    if(!_drag||!particles) return;
    var dx=e.clientX-_px, dy=e.clientY-_py;
    velY=dx*.008; velX=dy*.006;
    rotY+=dx*.008; rotX+=dy*.006;
    particles.rotation.y=rotY; particles.rotation.x=rotX;
    if(Math.abs(dx)>2) sndTick();
    _px=e.clientX; _py=e.clientY;
  },{passive:true});
  c.addEventListener('pointerup',  function(){_drag=false;},{passive:true});
  c.addEventListener('pointercancel',function(){_drag=false;},{passive:true});
}

/* ─── RESIZE ──────────────────────────────────────────── */
function onResize(){
  if(!renderer) return;
  var se=document.getElementById('scene');
  var W=Math.floor(se.getBoundingClientRect().width||window.innerWidth);
  var H=Math.floor(se.getBoundingClientRect().height||(window.innerHeight-102));
  var c=renderer.domElement;
  c.width=W;c.height=H;c.style.width=W+'px';c.style.height=H+'px';
  camera.aspect=W/H;camera.updateProjectionMatrix();renderer.setSize(W,H,false);
}

/* ─── FALLBACK CANVAS 2D ──────────────────────────────── */
function init2D(c,W,H){
  badge('2D ●',true);
  c.width=W;c.height=H;c.style.width=W+'px';c.style.height=H+'px';
  var ctx=c.getContext('2d');if(!ctx)return;
  var N=160,R=Math.min(W,H)*.27,cx=W/2,cy=H/2,ang=0;
  var pts=[];
  for(var i=0;i<N;i++){
    var ph=Math.acos(1-2*(i+.5)/N),th=Math.PI*(1+Math.sqrt(5))*i;
    pts.push({ox:Math.sin(ph)*Math.cos(th),oy:Math.sin(ph)*Math.sin(th),oz:Math.cos(ph)});
  }
  function d2(){
    requestAnimationFrame(d2);ctx.clearRect(0,0,W,H);ang+=.009;
    var ca=Math.cos(ang),sa=Math.sin(ang);
    var pr=pts.map(function(p){
      var rx=p.ox*ca-p.oz*sa,rz=p.ox*sa+p.oz*ca,sc=(rz+2)/3;
      return{sx:cx+rx*R*sc,sy:cy+p.oy*R*sc,z:rz,sc:sc};
    }).sort(function(a,b){return a.z-b.z;});
    var g=ctx.createRadialGradient(cx,cy,0,cx,cy,R*1.4);
    g.addColorStop(0,'rgba(0,255,159,.07)');g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    ctx.lineWidth=.7;
    for(var i=0;i<pr.length;i++)for(var j=i+1;j<pr.length;j++){
      var dx=pr[i].sx-pr[j].sx,dy=pr[i].sy-pr[j].sy;
      if(dx*dx+dy*dy<(R*.36)*(R*.36)){
        ctx.strokeStyle='rgba(0,255,159,'+(.04+pr[i].sc*.08)+')';
        ctx.beginPath();ctx.moveTo(pr[i].sx,pr[i].sy);ctx.lineTo(pr[j].sx,pr[j].sy);ctx.stroke();
      }
    }
    ctx.shadowBlur=8;ctx.shadowColor='#00FF9F';
    pr.forEach(function(p){
      ctx.beginPath();ctx.arc(p.sx,p.sy,1.4+p.sc*2.1,0,Math.PI*2);
      ctx.fillStyle='rgba(0,255,159,'+(0.28+p.sc*.65)+')';ctx.fill();
    });
    ctx.shadowBlur=0;
  }
  d2();
}

/* ─── PANELS ──────────────────────────────────────────── */
function openPanels(){
  panelsOpen=true;
  ['w1','w2','w3','w4'].forEach(function(id,i){
    setTimeout(function(){
      var el=document.getElementById(id);
      if(el) el.classList.add('open');
    }, i*90);
  });
}
function closePanels(){
  panelsOpen=false;
  ['w1','w2','w3','w4'].forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.classList.remove('open');
  });
}
function togglePanels(){
  if(panelsOpen) closePanels(); else openPanels();
  sndBlip();
  setLog(panelsOpen?'Modules ouverts':'Modules fermés');
}

/* ─── SHOCKWAVE ──────────────────────────────────────── */
function shockwave(){
  waveActive=true; waveT=0;
  var old=.0012; velY+=.008;
  setTimeout(function(){velY*=.3;},800);
}

/* ─── RIPPLE VISUEL ───────────────────────────────────── */
function ripple(x,y){
  var se=document.getElementById('scene');
  var r=document.createElement('div'); r.className='ripple';
  r.style.left=x+'px'; r.style.top=y+'px';
  se.appendChild(r);
  setTimeout(function(){if(r.parentNode)r.parentNode.removeChild(r);},800);
}

/* ─── REFLECTION MODE ─────────────────────────────────── */
function startReflect(){
  inReflect=true;
  document.getElementById('reflex').classList.add('on');
  shockwave();
}
function stopReflect(){
  inReflect=false;
  document.getElementById('reflex').classList.remove('on');
  if(particles&&particles.geometry.attributes.color){
    var c=particles.geometry.attributes.color.array,o=particles.geometry._orig;
    if(o)for(var i=0;i<c.length/3;i++){
      var t=(o[i*3+1]/1.85+1)/2;
      c[i*3]=(1-t)*.31;c[i*3+1]=(1-t)*.78+t*.83;c[i*3+2]=(1-t)*.47+t;
    }
    particles.geometry.attributes.color.needsUpdate=true;
  }
}

/* ─── INPUT ───────────────────────────────────────────── */
function initInput(){
  if(msgEl)msgEl.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();send();}});
  var btn=document.getElementById('send');
  if(btn)btn.addEventListener('click',send);
}

function send(){
  var txt=(msgEl?msgEl.value:'').trim();
  if(!txt)return;
  if(msgEl)msgEl.value='';
  _audio(); sndPing();

  /* Commandes locales */
  var cmd=txt.toLowerCase();
  if(cmd==='panels'||cmd==='open'||cmd==='ouvrir'||cmd==='modules'){
    openPanels(); addBubble('daleba','Modules holographiques activés ✓',true); return;
  }
  if(cmd==='close'||cmd==='fermer'||cmd==='hide'){
    closePanels(); addBubble('daleba','Modules rétractés.',true); return;
  }

  msgCount++;
  var wm=document.getElementById('w-msgs');if(wm)wm.textContent=msgCount;
  addBubble('user',txt,true);
  startReflect();

  var dots=document.createElement('div'); dots.className='dots';
  dots.innerHTML='<span>●</span><span>●</span><span>●</span>';
  if(chatEl){chatEl.appendChild(dots);scrollChat();}

  fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:txt,sessionId:sessionId})})
  .then(function(r){return r.json();})
  .then(function(d){
    if(chatEl&&dots.parentNode)chatEl.removeChild(dots);
    stopReflect(); sndBlip();
    addBubble('daleba',d.response||d.message||'Je suis là.',true);
    setLog('Réponse reçue ✓');
  })
  .catch(function(){
    if(chatEl&&dots.parentNode)chatEl.removeChild(dots);
    stopReflect();
    addBubble('daleba','Recalibration… Réessaie. 🔄',true);
  });
}

function addBubble(role,txt,save){
  if(!chatEl)return;
  var b=document.createElement('div');b.className='bub '+role;b.textContent=txt;
  chatEl.appendChild(b);scrollChat();
  if(save){
    chatHistory.push({r:role,t:txt});
    if(chatHistory.length>30)chatHistory=chatHistory.slice(-30);
    try{localStorage.setItem('z10',JSON.stringify(chatHistory));}catch(_){}
  }
}
function scrollChat(){if(chatEl)chatEl.scrollTop=chatEl.scrollHeight;}

/* ─── POLLING HTTP ────────────────────────────────────── */
function startPolling(){
  badge('HTTP ●',true);
  fetch('/health').then(function(r){return r.json();}).then(function(d){if(d.status==='online')setLog('Serveur ● en ligne');}).catch(function(){});
  setInterval(function(){
    fetch('/health').then(function(r){return r.json();}).then(function(d){badge(d.status==='online'?'HTTP ●':'ERR',d.status==='online');}).catch(function(){badge('OFFLINE',false);});
  },30000);
}

/* ─── UTILS ───────────────────────────────────────────── */
function tick(){var el=document.getElementById('w-time');if(el)el.textContent=new Date().toLocaleTimeString('fr-CA');}
function setLog(m){var el=document.getElementById('w-log');if(el)el.textContent=m;tick();}
function badge(t,live){var b=document.getElementById('badge');if(b){b.textContent=t;b.className=live?'live':'';}}
</script>
