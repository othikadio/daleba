<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#03000E;font-family:'Courier New',monospace;touch-action:none}
#shell{display:flex;flex-direction:column;width:100vw;height:100vh}

/* ── HEADER ──────────────────────────────────────────── */
#hdr{flex-shrink:0;height:43px;z-index:500;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:rgba(3,0,18,.97);border-bottom:1px solid rgba(0,255,255,.09);backdrop-filter:blur(20px)}
.logo{font-size:.8rem;font-weight:700;color:#00FFFF;letter-spacing:.3em;text-shadow:0 0 16px rgba(0,255,255,.6)}
.hdot{width:5px;height:5px;border-radius:50%;background:#00FF9F;box-shadow:0 0 9px #00FF9F;display:inline-block;margin-right:5px;animation:blink 2.1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}
.stxt{font-size:.54rem;color:rgba(0,255,255,.6);letter-spacing:.16em}
.navl a{font-size:.49rem;color:rgba(0,255,255,.24);text-decoration:none;margin-left:8px;transition:color .2s}
.navl a:hover{color:#00FFFF}
#badge{font-size:.47rem;color:rgba(0,255,255,.27);padding:2px 7px;border:1px solid rgba(0,255,255,.12);border-radius:20px;margin-left:7px;transition:all .4s;letter-spacing:.1em}
#badge.live{color:#00FFFF;border-color:rgba(0,255,255,.36);box-shadow:0 0 10px rgba(0,255,255,.2)}

/* ── SCENE ───────────────────────────────────────────── */
#scene{flex:1;position:relative;overflow:hidden}
#webgl{position:absolute;top:0;left:0;display:block;z-index:1}

/* ── BLOOM CSS OVERLAYS (mix-blend-mode screen) ──────── */
#bloom-figure{
  position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:2;
  background:radial-gradient(ellipse 52% 58% at 50% 60%,rgba(0,210,255,.13) 0%,rgba(255,160,40,.09) 40%,transparent 75%);
  filter:blur(14px);mix-blend-mode:screen
}
#bloom-horizon{
  position:absolute;left:0;right:0;pointer-events:none;z-index:2;
  height:110px;
  background:linear-gradient(to top,rgba(255,140,20,.12),rgba(255,210,60,.18),rgba(255,80,40,.1),transparent);
  filter:blur(18px);mix-blend-mode:screen;
  transition:bottom .5s
}
#bloom-cyan{
  position:absolute;left:0;right:0;bottom:0;pointer-events:none;z-index:2;
  height:180px;
  background:linear-gradient(to top,rgba(0,200,255,.22),rgba(0,100,200,.1),transparent);
  filter:blur(22px);mix-blend-mode:screen
}

/* ── HUD GLASSMORPHISM CHROME — Relief + Fresnel ─────── */
.hud{
  position:absolute;z-index:60;
  background:linear-gradient(148deg,rgba(0,10,45,.75) 0%,rgba(0,4,26,.62) 100%);
  border:1px solid transparent;
  border-radius:7px;
  backdrop-filter:blur(40px) saturate(180%);
  -webkit-backdrop-filter:blur(40px) saturate(180%);
  box-shadow:
    0 0 0 .5px rgba(0,255,255,.08) inset,
    0 1px 0 rgba(220,240,255,.22) inset,
    0 -1px 0 rgba(0,80,160,.15) inset,
    0 6px 32px rgba(0,0,0,.7),
    0 0 28px rgba(0,150,255,.06);
  padding:8px 10px;
  opacity:0;transform:scale(.03) translateZ(0);
  transition:opacity .8s cubic-bezier(.15,1,.35,1),transform .8s cubic-bezier(.15,1,.35,1);
  pointer-events:none;overflow:hidden;min-width:152px;
}
/* Fresnel top-left chrome highlight */
.hud::before{
  content:'';position:absolute;top:0;left:0;right:0;height:40%;
  background:linear-gradient(135deg,rgba(220,240,255,.1) 0%,rgba(100,180,255,.04) 40%,transparent 70%);
  border-radius:7px 7px 0 0;pointer-events:none
}
/* Diagonal chrome streak */
.hud::after{
  content:'';position:absolute;top:0;left:-40%;right:0;bottom:0;
  background:linear-gradient(115deg,transparent 35%,rgba(255,255,255,.04) 50%,transparent 65%);
  animation:streak 5s ease-in-out infinite;pointer-events:none
}
@keyframes streak{0%,100%{left:-40%}50%{left:140%}}
.hud-scan{position:absolute;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(0,255,255,.28),transparent);animation:scan 4s linear infinite;pointer-events:none}
@keyframes scan{0%{top:-1px}100%{top:102%}}

#h1{top:9%;left:.4%;width:154px;transform-origin:left center}
#h2{bottom:7%;left:.4%;width:148px;transform-origin:left center}
#h3{top:9%;right:.4%;width:154px;transform-origin:right center}
#h4{bottom:7%;right:.4%;width:148px;transform-origin:right center}
#h1.open{opacity:1;transform:perspective(540px) rotateY(14deg) scale(1) translateZ(0)}
#h2.open{opacity:1;transform:perspective(540px) rotateY(10deg) scale(1) translateZ(0)}
#h3.open{opacity:1;transform:perspective(540px) rotateY(-14deg) scale(1) translateZ(0)}
#h4.open{opacity:1;transform:perspective(540px) rotateY(-10deg) scale(1) translateZ(0)}

.ht{font-size:.44rem;font-weight:700;color:#00FFFF;letter-spacing:.18em;text-transform:uppercase;border-bottom:1px solid rgba(0,255,255,.08);padding-bottom:3px;margin-bottom:4px;text-shadow:0 0 10px rgba(0,255,255,.5)}
.hr{display:flex;justify-content:space-between;align-items:center;margin-bottom:1px}
.hl{font-size:.37rem;color:rgba(145,190,255,.28);line-height:1.7}
.hv{font-size:.39rem;color:#00FFFF;text-shadow:0 0 5px rgba(0,255,255,.3)}
.hv.g{color:#00FF9F;text-shadow:0 0 5px rgba(0,255,159,.3)}
canvas.mc{display:block;margin-top:3px;border-top:1px solid rgba(0,255,255,.06);padding-top:2px;width:100%;height:34px}

/* ── REFLEX + RIPPLE ─────────────────────────────────── */
#reflex{position:absolute;top:47%;left:50%;transform:translate(-50%,-50%);z-index:70;text-align:center;pointer-events:none;opacity:0;transition:opacity .3s}
#reflex.on{opacity:1}
.rtxt{font-size:.57rem;color:#00FFFF;letter-spacing:.28em;text-transform:uppercase;animation:flk 1.3s infinite;text-shadow:0 0 16px rgba(0,255,255,.75)}
@keyframes flk{0%,100%{opacity:1}46%{opacity:.18}49%{opacity:.02}}
.ripple{position:absolute;border:1px solid rgba(0,255,255,.75);border-radius:50%;pointer-events:none;z-index:80;width:28px;height:28px;animation:ripout .6s ease-out forwards}
@keyframes ripout{0%{transform:translate(-50%,-50%) scale(0);opacity:1}100%{transform:translate(-50%,-50%) scale(22);opacity:0}}

/* ── CHAT ──────────────────────────────────────────────── */
#chat{position:absolute;bottom:43px;right:0;width:252px;max-height:42%;overflow-y:auto;z-index:200;padding:5px;display:flex;flex-direction:column;gap:4px}
#chat::-webkit-scrollbar{width:2px}#chat::-webkit-scrollbar-thumb{background:rgba(0,255,255,.16)}
.bub{max-width:95%;padding:5px 8px;border-radius:4px;font-size:.57rem;line-height:1.5;animation:bub .15s ease}
@keyframes bub{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
.bub.user{align-self:flex-end;background:rgba(0,255,255,.04);border:1px solid rgba(0,255,255,.1);color:#a0d8ff}
.bub.daleba{align-self:flex-start;background:rgba(3,0,18,.92);border:1px solid rgba(0,255,255,.12);color:#00FFFF}
.bub.daleba::before{content:'DALEBA › ';font-weight:700;font-size:.52rem}
.dots{align-self:flex-start;font-size:.55rem;color:rgba(0,255,255,.3);padding:3px 6px}
.dots span{animation:td 1s infinite}.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes td{0%,80%,100%{opacity:.1}40%{opacity:1}}
@media(max-width:520px){#chat{width:100%}.hud{display:none}}

/* ── INPUT BAR ─────────────────────────────────────────── */
#bar{flex-shrink:0;height:44px;z-index:500;display:flex;align-items:center;gap:7px;padding:0 11px;border-top:1px solid rgba(0,255,255,.08);background:rgba(3,0,18,.97);backdrop-filter:blur(20px)}
.prt{font-size:.88rem;color:#00FFFF;flex-shrink:0;text-shadow:0 0 8px rgba(0,255,255,.5)}
#msg{flex:1;background:transparent;border:none;outline:none;color:#90d8ff;font-family:'Courier New',monospace;font-size:.7rem;caret-color:#00FFFF}
#msg::placeholder{color:rgba(0,255,255,.1)}
#send{background:none;border:1px solid rgba(0,255,255,.18);color:#00FFFF;font-family:'Courier New',monospace;font-size:.62rem;padding:3px 9px;border-radius:4px;cursor:pointer;flex-shrink:0;transition:all .2s}
#send:hover{background:rgba(0,255,255,.07);box-shadow:0 0 8px rgba(0,255,255,.12)}
</style>

<script src="/js/three.min.js"></script>
<script>
/* ════════════════════════════════════════════════════════
   DALEBA ZENITH V17 — ZÉRO GÉOMÉTRIE RIGIDE
   50 000 particules unifiées · Vagues organiques
   Brouillard volumétrique THREE.FogExp2
   Bloom CSS screen-blend · HUD Fresnel chrome
   Palette violet/émeraude/cyan/doré cohérente
════════════════════════════════════════════════════════ */

/* ── AUDIO ──────────────────────────────────────────── */
var _AC=null;
function _aud(){if(!_AC){try{_AC=new(window.AudioContext||window.webkitAudioContext)()}catch(e){return null}}if(_AC&&_AC.state==='suspended')_AC.resume();return _AC&&_AC.state==='running'?_AC:null}
function _tone(f,d,v,t){try{var ac=_aud();if(!ac)return;var o=ac.createOscillator(),g=ac.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||.05,ac.currentTime);g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d)}catch(e){}}
function sPing(){_tone(880,.18,.06);setTimeout(function(){_tone(1760,.1,.03)},65)}
function sNova(){_tone(55,.7,.12,'sawtooth');setTimeout(function(){_tone(440,.3,.04)},90)}
function sWhoosh(){try{var ac=_aud();if(!ac)return;var b=ac.createBuffer(1,ac.sampleRate*.35,ac.sampleRate),d=b.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*7)*.1;var s=ac.createBufferSource();s.buffer=b;var f=ac.createBiquadFilter();f.type='bandpass';f.frequency.value=460;s.connect(f);f.connect(ac.destination);s.start()}catch(e){}}

/* ── STATE ──────────────────────────────────────────── */
var W=0,H=0,PR=1;
var renderer,scene,camera,clock;
var bgMesh,faceGroup,faceMat;
var cloudMeshes=[],planetGroup;
var lightMesh,lightActive=false,lightT=0;
var charAtlas=null;
var camRotX=0,camRotY=0,dragVX=0,dragVY=0;
var _drag=false,_px=0,_py=0,_pT=0;
var novaActive=false,novaT=0;
var panelsOpen=false,msgCount=0;
var chatEl,msgEl,chatHistory=[];
var cBuf={};
var fc=0;

/* ── BOOT ───────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded',function(){
  chatEl=document.getElementById('chat');msgEl=document.getElementById('msg');
  document.addEventListener('pointerdown',_aud,{once:true,passive:true});
  document.addEventListener('keydown',_aud,{once:true,passive:true});
  requestAnimationFrame(function(){requestAnimationFrame(function(){
    var se=document.getElementById('scene');
    W=se.offsetWidth||window.innerWidth;H=se.offsetHeight||(window.innerHeight-87);
    PR=Math.min(window.devicePixelRatio||1,1.5);
    var c=document.getElementById('webgl');
    c.width=Math.floor(W*PR);c.height=Math.floor(H*PR);
    c.style.width=W+'px';c.style.height=H+'px';
    // position horizon bloom overlay
    var hb=document.getElementById('bloom-horizon');
    if(hb)hb.style.bottom=Math.floor(H*.32)+'px';
    try{var sv=localStorage.getItem('z17');if(sv){chatHistory=JSON.parse(sv).slice(-16);chatHistory.forEach(function(m){addBubble(m.r,m.t,false)})}}catch(e){}
    buildAtlas(function(tex){
      charAtlas=tex;
      if(!boot(c)){badge('ERR',false);return}
      initCharts();initPointer();initInput();startPolling();
      setTimeout(function(){openPanels();setLog('DALEBA V17 ● sanctuaire')},1200);
      setTimeout(sWhoosh,480);
      tickClock();
    });
  })});
});

/* ── CHARACTER ATLAS ────────────────────────────────── */
function buildAtlas(cb){
  var S=256,C=32,N=8;
  var cv=document.createElement('canvas');cv.width=S;cv.height=S;
  var cx=cv.getContext('2d');cx.fillStyle='#000';cx.fillRect(0,0,S,S);
  cx.fillStyle='#fff';cx.font='bold 18px monospace';cx.textAlign='center';cx.textBaseline='middle';
  var ch=('01010110010001000101ABCDEFGHIJKLMNOPQRSTUVWXYZ0101abcdefghij|/>#{@~*01').split('');
  while(ch.length<64)ch.push(ch[Math.floor(Math.random()*ch.length)]);
  for(var i=0;i<64;i++)cx.fillText(ch[i],i%N*C+C/2,Math.floor(i/N)*C+C/2);
  var t=new THREE.Texture(cv);t.needsUpdate=true;cb(t);
}

/* ── BOOT 3D ────────────────────────────────────────── */
function boot(canvas){
  try{
    scene=new THREE.Scene();clock=new THREE.Clock();
    // Volumetric fog — warm violet-navy, covers deep background
    scene.fog=new THREE.FogExp2(0x08022A,.012);
    camera=new THREE.PerspectiveCamera(56,W/H,.1,350);
    camera.position.set(0,.28,7.2);camera.lookAt(0,.28,0);
    renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:false,alpha:false,powerPreference:'high-performance'});
    renderer.setPixelRatio(PR);renderer.setSize(W,H,false);renderer.setClearColor(0x03000E,1);
    buildBG();buildStars();buildNebulaLayers();buildPlanets();buildBottomClouds();buildFace();scheduleLightning();
    scene.add(new THREE.AmbientLight(0x1A0845,1.05));
    var dl=new THREE.DirectionalLight(0x4466CC,1.7);dl.position.set(-3,5,4);scene.add(dl);
    var pl=new THREE.PointLight(0x00FFFF,3.2,16);pl.position.set(0,1.2,3.8);scene.add(pl);
    var pl2=new THREE.PointLight(0xFF9922,2.4,24);pl2.position.set(0,-4.5,1.2);scene.add(pl2);
    var pl3=new THREE.PointLight(0xB0E0FF,1.8,10);pl3.position.set(0,.25,5);scene.add(pl3);
    window.addEventListener('resize',onResize);animate();badge('V17 ✦',true);return true;
  }catch(e){console.error(e);return false}
}

/* ════ BACKGROUND SHADER — FBM + Aube Cosmique Dorée ════ */
function buildBG(){
  var V='varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position.xy,1.,1.);}';
  var F=[
    'precision mediump float;uniform float uT;varying vec2 vUv;',
    'float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}',
    'float no(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}',
    'float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<8;i++){v+=a*no(p);p=p*2.2+vec2(.22,-.14);a*=.48;}return v;}',
    'void main(){',
    '  vec2 uv=vUv;float t=uT*.013;',
    '  vec3 c=vec3(.007,.0,.04);',
    '  float n1=fbm(uv*2.6+vec2(t,t*.32));',
    '  float n2=fbm(uv*4.9-vec2(t*.58,0.)+n1*.38);',
    '  float n3=fbm(uv*9.2+vec2(0.,t*.44));',
    '  c=mix(c,vec3(.09,.0,.36),pow(n1*n2,1.1)*.7);',
    '  c=mix(c,vec3(.32,.03,.66),pow(n2*n3,.8)*.56);',
    '  c=mix(c,vec3(.56,.1,.84),pow(n3,2.5)*.3);',
    // 4-branch star foyers
    '  vec2 gp=fract(uv*340.)-.5;',
    '  float sd=length(gp);',
    '  float sa=atan(gp.y,gp.x);',
    '  float sf=pow(max(0.,1.-sd*h(floor(uv*340.)*2.5)*38.),3.)*.82;',
    '  float sb=abs(sin(sa*2.));',
    '  c+=mix(vec3(.5,.15,.85),vec3(.75,.82,.95),sb)*sf;',
    // Aube cosmique dorée — warm horizon multi-couche
    '  float hz=.63;',
    '  float above=smoothstep(.0,.18,uv.y-hz);',  // above horizon fade
    '  float below=smoothstep(.0,.22,hz-uv.y);',  // below horizon fade
    '  float band=smoothstep(.2,.0,abs(uv.y-hz));',  // tight band
    '  vec3 gold=vec3(.96,.62,.06);',
    '  vec3 orange=vec3(1.,.3,.06);',
    '  vec3 rose=vec3(.98,.18,.22);',
    '  vec3 warm=mix(gold,mix(orange,rose,below*.5),band*.5+below*.3);',
    '  c=mix(c,warm,band*.7);',
    '  c+=warm*pow(band,2.)*.42;',
    // Warm haze upward
    '  c+=gold*above*(1.-above)*0.18;',
    // Top dark vignette
    '  c*=mix(.42,1.,smoothstep(0.,.4,uv.y));',
    // Side vignette
    '  c*=1.-pow(length((uv-.5)*vec2(.95,.58)),.75)*.36;',
    '  gl_FragColor=vec4(clamp(c,0.,1.),1.);',
    '}'
  ].join('\n');
  bgMesh=new THREE.Mesh(new THREE.PlaneGeometry(2,2),new THREE.ShaderMaterial({vertexShader:V,fragmentShader:F,uniforms:{uT:{value:0}},depthWrite:false,depthTest:false}));
  bgMesh.renderOrder=-100;scene.add(bgMesh);
}

/* ════ STARS — 4-branch foyers ════ */
function buildStars(){
  var N=2000,pos=new Float32Array(N*3),sz=new Float32Array(N);
  for(var i=0;i<N;i++){pos[i*3]=(Math.random()*2-1)*95;pos[i*3+1]=(Math.random()*2-1)*65;pos[i*3+2]=-70-Math.random()*88;sz[i]=.28+Math.random()*1.55;}
  var geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.BufferAttribute(pos,3));geo.setAttribute('size',new THREE.BufferAttribute(sz,1));
  var V='attribute float size;void main(){vec4 mv=modelViewMatrix*vec4(position,1.);gl_Position=projectionMatrix*mv;gl_PointSize=size*2.4;}';
  var F=['void main(){',
    '  vec2 uv=gl_PointCoord-.5;float d=length(uv);',
    '  float a=atan(uv.y,uv.x);float cross4=abs(sin(a*2.));',
    '  float s=smoothstep(.5,.0,d*(1.25-cross4*.58));if(s<.015)discard;',
    '  vec3 col=mix(vec3(.48,.12,.88),vec3(.72,.82,.98),cross4);',
    '  gl_FragColor=vec4(col*s,s*.68);',
    '}'
  ].join('\n');
  scene.add(new THREE.Points(geo,new THREE.ShaderMaterial({vertexShader:V,fragmentShader:F,transparent:true,depthWrite:false})));
}

var VCLOUD='varying vec2 vUv;varying float vF;void main(){vUv=uv;float e=1.-abs(uv.x-.5)*2.;vF=e*e*(1.-abs(uv.y-.5)*1.05);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}';

  'precision mediump float;uniform float uT;uniform vec3 uC;uniform float uA;varying vec2 vUv;varying float vF;',
  'float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}',
  'float no(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}',
  'float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<5;i++){v+=a*no(p);p*=2.1;a*=.48;}return v;}',
  'void main(){vec2 uv=vUv;uv.x+=uT*.02;float c=fbm(uv*3.1+uT*.03)*fbm(uv*5.6-uT*.016);c=pow(clamp(c*2.5,0.,1.),.76);float a=c*uA*vF;if(a<.01)discard;gl_FragColor=vec4(uC,a);}'

/* ════════════════════════════════════════════════════════
   FACE POINT CLOUD V17 — 50 000 PARTICULES UNIFIÉES
   Zéro géométrie rigide. Yeux, lèvres, choker, boucles
   = zones denses du même point cloud.
   aType: 0=face 1=afro 2=yeux 3=lèvres 4=choker 5=bijoux 6=ambiant
   Vagues organiques dans vertex shader
════════════════════════════════════════════════════════ */
var VS_FACE=[
  'attribute float aC;',  // char index
  'attribute float aO;',  // scroll offset
  'attribute float aY;',  // aType: 0-6
  'attribute float aAm;', // wave amplitude
  'uniform float uT;',
  'uniform float uPR;',
  'uniform float uNv;',
  'varying float vC;',
  'varying float vT;',
  'varying vec3 vCol;',
  'varying float vA;',
  'varying float vSz;',
  'void main(){',
  '  vec3 p=position;',
  // Organic wave breathing — each zone has its own frequency
  '  float freq=1.8+aY*.4;',
  '  float wave1=sin(uT*freq+p.y*3.2+aO*6.28)*aAm;',
  '  float wave2=cos(uT*(freq*.7)+p.z*2.5+aO*3.14)*aAm*.6;',
  '  float wave3=sin(uT*(freq*1.3)+p.x*2.8+aO*2.09)*aAm*.4;',
  '  p.z+=wave1;p.x+=wave2;p.y+=wave3*.5;',
  // Nova explosion
  '  if(uNv>0.){p+=normalize(p+vec3(.001))*uNv*4.*(1.+aO*.15);}',
  '  vec4 mv=modelViewMatrix*vec4(p,1.);',
  '  gl_Position=projectionMatrix*mv;',
  '  float dep=-mv.z;',
  // Point size varies by type: bijoux+choker=bigger
  '  float baseSize=aY>=4.?8.:aY>=2.?5.5:4.;',
  '  gl_PointSize=clamp(baseSize*62.*uPR/dep,1.2,14.);',
  '  float br=clamp(1.-(dep-3.)/7.,.18,1.);',
  '  float fl=.8+.2*sin(uT*3.5+aO*6.28);br*=fl;',
  // Color by zone — palette violet/émeraude/cyan/doré harmonisée
  '  vec3 navy=vec3(.05,.13,.22);',   // face base #0D2137
  '  vec3 cyan=vec3(0.,1.,1.);',      // cyan élec
  '  vec3 eyeC=vec3(.69,.88,1.);',    // #B0E0FF yeux glacés
  '  vec3 lipsC=vec3(.95,.62,.08);',  // doré-rose lèvres
  '  vec3 chokerC=vec3(.9,.96,1.);',  // blanc-argent choker
  '  vec3 afrC=vec3(0.,.08,.12);',    // noir-bleu afro
  '  vec3 ambC=vec3(.28,.0,.62);',    // violet ambiant
  '  vec3 col;',
  '  if(aY<.5) col=mix(navy,cyan,clamp(br*1.15,0.,1.));',   // face
  '  else if(aY<1.5) col=mix(afrC,vec3(0.,.3,.5),br*.8);',  // afro
  '  else if(aY<2.5) col=mix(eyeC,vec3(.8,.98,1.),pow(br,1.5));', // yeux
  '  else if(aY<3.5) col=mix(lipsC,vec3(1.,.85,.4),br);',   // lèvres
  '  else if(aY<4.5) col=mix(chokerC,cyan,sin(uT*6.+aO)*. 5+.5);', // choker pulsant
  '  else if(aY<5.5) col=mix(chokerC,eyeC,br);',             // bijoux argent
  '  else col=mix(ambC,cyan,br*.6);',                        // ambiant
  '  vCol=col*br;vC=aC;vT=uT+aO;vA=br*.9;vSz=gl_PointSize;',
  '}'
].join('\n');

var FS_FACE=[
  'precision mediump float;',
  'uniform sampler2D uAtlas;',
  'varying float vC;varying float vT;varying vec3 vCol;varying float vA;varying float vSz;',
  'void main(){',
  '  float ci=mod(floor(vC)+floor(vT*3.5),64.);',
  '  float co=mod(ci,8.)/8.;float ro=floor(ci/8.)/8.;',
  '  vec2 uv=gl_PointCoord;',
  '  float lum=texture2D(uAtlas,vec2(co+uv.x/8.,ro+uv.y/8.)).r;',
  // Large point sprites (choker/bijoux) become disc shapes
  '  if(vSz>9.){',
  '    float d=length(gl_PointCoord-.5);if(d>.45)discard;',
  '    lum=mix(lum,1.-d*2.,.6);',
  '  } else {if(lum<.05)discard;}',
  '  float glow=lum*lum*.5;',
  '  vec3 fc=vCol+vec3(glow*.15,glow*.4,glow*.4);',
  '  gl_FragColor=vec4(fc,lum*vA);',
  '}'
].join('\n');

function genFacePoints(N){
  var pos=new Float32Array(N*3);
  var aC=new Float32Array(N);
  var aO=new Float32Array(N);
  var aY=new Float32Array(N); // type
  var aAm=new Float32Array(N); // wave amplitude
  var idx=0;

  function add(x,y,z,type,amp){
    if(idx>=N)return;
    pos[idx*3]=x;pos[idx*3+1]=y;pos[idx*3+2]=z;
    aC[idx]=Math.random()*64;aO[idx]=Math.random()*50;
    aY[idx]=type||0;aAm[idx]=amp||.02;idx++;
  }

  // AFRO volumétrique (10 000)
  for(var placed=0,i=0;placed<10000&&i<80000;i++){
    var r=.68+Math.random()*.54;
    var ct=Math.random();var th=Math.acos(ct);var ph=Math.random()*Math.PI*2;
    var x=r*Math.sin(th)*Math.cos(ph)*.96,y=r*Math.cos(th)+1.16,z=r*Math.sin(th)*Math.sin(ph)*.71-.07;
    x+=(Math.random()-.5)*.1;y+=(Math.random()-.5)*.1;z+=(Math.random()-.5)*.07;
    if(y<.72)continue;add(x,y,z,1,.012);placed++;
  }

  // FACE surface (26 000)
  for(placed=0,i=0;placed<26000&&i<200000;i++){
    var fy=(Math.random()*2-1),ph2=(Math.random()-.5)*Math.PI*.88;
    var fy2=fy<-.55?fy*.87:fy,fxs=Math.sqrt(Math.max(0,1-fy2*fy2/1.28));
    var x=.9*fxs*Math.cos(ph2),y=fy2*1.15,z=.78*fxs*Math.sin(ph2);
    if(z<-.03)continue;
    var nx=x/.9,ny=y/1.15;
    // Feature displacement
    var nd=Math.hypot(nx*1.15,ny-.04);z+=nd<.22?(.22-nd)/.22*(.22-nd)*.56:0;
    var nl=Math.hypot(nx-.09,ny-.065);z+=nl<.09?(.09-nl)/.09*.12:0;
    var nr=Math.hypot(nx+.09,ny-.065);z+=nr<.09?(.09-nr)/.09*.12:0;
    // Lèvres
    var ld=Math.hypot(nx*1.55,ny+.4);z+=ld<.22?(.22-ld)/.22*(.22-ld)*.7:0;
    var pd=Math.hypot(nx*.54,ny+.29);z+=pd<.1?(.1-pd)/.1*.07:0;
    // Yeux
    var el=Math.hypot(nx-.31,ny-.25),er=Math.hypot(nx+.31,ny-.25),em=Math.min(el,er);
    z+=em<.18?-(.18-em)/.18*(.18-em)*.5:0;
    // Arcades
    var bl=Math.hypot(nx-.22,ny-.41),brr=Math.hypot(nx+.22,ny-.41);
    z+=Math.min(bl,brr)<.2?(.2-Math.min(bl,brr))/.2*.1:0;
    // Pommettes
    var cl=Math.hypot(nx-.45,ny+.03),cr2=Math.hypot(nx+.45,ny+.03);
    z+=Math.min(cl,cr2)<.24?(.24-Math.min(cl,cr2))/.24*.15:0;
    z+=(Math.random()-.5)*.02;x+=(Math.random()-.5)*.015;y+=(Math.random()-.5)*.015;
    add(x,y,z,0,.022);placed++;
  }

  // YEUX — zone dense lumineuse (1 400)
  for(placed=0,i=0;placed<700;i++){
    // Œil gauche: ellipse aplatie
    var ang=Math.random()*Math.PI*2;
    var re=.1+Math.random()*.04;
    var xE=Math.cos(ang)*re*.7-.3,yE=Math.sin(ang)*re*.4+.25,zE=.72+(Math.random()-.5)*.04;
    xE+=(Math.random()-.5)*.02;yE+=(Math.random()-.5)*.02;
    add(xE,yE,zE,2,.008);placed++;
  }
  for(placed=0,i=0;placed<700;i++){
    var ang=Math.random()*Math.PI*2;
    var re=.1+Math.random()*.04;
    var xE=Math.cos(ang)*re*.7+.3,yE=Math.sin(ang)*re*.4+.25,zE=.72+(Math.random()-.5)*.04;
    xE+=(Math.random()-.5)*.02;yE+=(Math.random()-.5)*.02;
    add(xE,yE,zE,2,.008);placed++;
  }

  // LÈVRES — densité supplémentaire (1 800)
  for(i=0;i<1800;i++){
    var ang2=Math.random()*Math.PI*2;
    var rl=.14+Math.random()*.05;
    var xl=Math.cos(ang2)*rl*.85,yl=Math.sin(ang2)*rl*.35-.42,zl=.68+(Math.random()-.5)*.06;
    add(xl,yl,zl,3,.016);
  }

  // CHOKER — anneau dense au cou (2 000)
  for(i=0;i<2000;i++){
    var at=Math.random()*Math.PI*2;
    var rc=.14+Math.random()*.035;
    var yc=-.9+(Math.random()-.5)*.06;
    // Torus avec bruit
    var majR=.14,minR=.025+Math.random()*.018;
    var xc=(majR+minR*Math.cos(at))*Math.cos(at),zcv=(majR+minR*Math.cos(at))*Math.sin(at)*.55+.28;
    add(xc,yc+minR*Math.sin(at)*Math.random(),zcv,4,.005);
  }

  // BOUCLES D'OREILLES — larmes pendantes (1 500)
  for(i=0;i<750;i++){
    // Gauche
    var drop=Math.random();
    var re2=.04*(1-drop*.7);
    var ang3=Math.random()*Math.PI*2;
    var xb=Math.cos(ang3)*re2-.82,yb=-.52-drop*.42+(Math.random()-.5)*.04,zb=.22+(Math.random()-.5)*.03;
    add(xb,yb,zb,5,.01);
  }
  for(i=0;i<750;i++){
    var drop=Math.random();
    var re2=.04*(1-drop*.7);
    var ang3=Math.random()*Math.PI*2;
    var xb=Math.cos(ang3)*re2+.82,yb=-.52-drop*.42+(Math.random()-.5)*.04,zb=.22+(Math.random()-.5)*.03;
    add(xb,yb,zb,5,.01);
  }

  // COU + ÉPAULES (3 800)
  for(i=0;i<3800;i++){
    var t=Math.random()*Math.PI*2,yy=-1.1-Math.random()*1.0;
    var bust=yy<-1.52,r2=bust?.22+Math.abs(yy+1.52)*.62+Math.random()*.1:.13+Math.random()*.07;
    add(r2*Math.cos(t),yy,r2*Math.sin(t)*.55+.3,0,.02);
  }

  // MÈCHES AFRO FLOTTANTES + ICÔNES holographiques (2 500)
  for(i=0;i<1500;i++){
    var at2=Math.random()*Math.PI*2,ar=1.26+Math.random()*.48,ay2=.52+Math.random()*1.1;
    add(ar*Math.cos(at2)*.94,ay2,ar*Math.sin(at2)*.46,1,.025);
  }
  for(i=0;i<1000;i++){
    // Icônes holographiques autour de l'afro
    var at3=Math.random()*Math.PI*2,ar3=1.0+Math.random()*.6;
    var ay3=.8+Math.random()*.9;
    add(ar3*Math.cos(at3),ay3,ar3*Math.sin(at3)*.5,6,.04);
  }

  return{pos,aC,aO,aY,aAm,count:idx};
}

function buildFace(){
  var data=genFacePoints(50000);
  var geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(data.pos,3));
  geo.setAttribute('aC',new THREE.BufferAttribute(data.aC,1));
  geo.setAttribute('aO',new THREE.BufferAttribute(data.aO,1));
  geo.setAttribute('aY',new THREE.BufferAttribute(data.aY,1));
  geo.setAttribute('aAm',new THREE.BufferAttribute(data.aAm,1));
  faceMat=new THREE.ShaderMaterial({
    vertexShader:VS_FACE,fragmentShader:FS_FACE,
    uniforms:{uT:{value:0},uPR:{value:PR},uNv:{value:0},uAtlas:{value:charAtlas}},
    transparent:true,depthWrite:false
  });
  faceGroup=new THREE.Group();
  faceGroup.add(new THREE.Points(geo,faceMat));
  faceGroup.position.set(0,.14,0);
  scene.add(faceGroup);
}

/* ════ LIGHTNING hiérarchique ════ */
function mkBolt(x1,y1,z,x2,y2,dep,pts){
  pts.push(x1,y1,z,x2,y2,z);if(dep<=0)return;
  var mx=(x1+x2)/2+(Math.random()-.5)*1.6/dep,my=(y1+y2)/2+(Math.random()-.5)*1.6/dep;
  mkBolt(x1,y1,z,mx,my,dep-1,pts);mkBolt(mx,my,z,x2,y2,dep-1,pts);
  if(dep>=2&&Math.random()<.44){mkBolt(mx,my,z,mx+(Math.random()-.5)*4,my+(Math.random()-.5)*2.5,dep-1,pts);}
}
function buildLightning(){
  if(lightMesh){scene.remove(lightMesh);lightMesh.geometry.dispose();}
  var pts=[];
  for(var i=0;i<3;i++){var sx=-5.5-Math.random()*4,sy=6.8+Math.random()*2.5;mkBolt(sx-Math.random(),sy,3,sx+3+Math.random()*2,sy-5-Math.random()*2,5,pts);}
  for(i=0;i<4;i++){var tx=-4.5-Math.random()*5,ty=5+Math.random()*3;mkBolt(tx,ty,2.5,tx+Math.random()*3.5-1.5,ty-2.5-Math.random()*2,3,pts);}
  var geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(pts),3));
  lightMesh=new THREE.LineSegments(geo,new THREE.LineBasicMaterial({color:0xDDFFFF,transparent:true,opacity:.9,depthWrite:false,blending:THREE.AdditiveBlending}));
  scene.add(lightMesh);
}
function scheduleLightning(){(function fire(){buildLightning();lightActive=true;lightT=0;setTimeout(fire,3000+Math.random()*5500);})();}

/* ════ ANIMATION LOOP ════ */
function animate(){
  requestAnimationFrame(animate);var t=clock.getElapsedTime();fc++;
  if(bgMesh)bgMesh.material.uniforms.uT.value=t;
  cloudMeshes.forEach(function(m){m.material.uniforms.uT.value=t;});
  if(planetGroup)planetGroup.children.forEach(function(p,i){
    var s=p.userData.spd;
    p.position.x=p.userData.ox+Math.sin(t*s+i)*1.1;
    p.position.y=p.userData.oy+Math.cos(t*s*.65+i)*.5;
    p.rotation.y=t*s*2.5;
  });
  dragVX*=.87;dragVY*=.87;
  camRotX+=dragVX;camRotY+=dragVY;
  camRotX=Math.max(-1.1,Math.min(1.1,camRotX));
  if(faceGroup){
    faceGroup.rotation.x+=(camRotX-faceGroup.rotation.x)*.08;
    faceGroup.rotation.y+=(camRotY-faceGroup.rotation.y)*.08;
  }
  if(faceMat){
    faceMat.uniforms.uT.value=t;
    if(novaActive){novaT+=.019;faceMat.uniforms.uNv.value=Math.sin(novaT*Math.PI)*1.2;if(novaT>=1){novaActive=false;faceMat.uniforms.uNv.value=0;}}
  }
  if(lightMesh&&lightActive){
    lightT+=.022;lightMesh.material.opacity=Math.sin(lightT*Math.PI)*.9;
    if(lightT>=1)lightActive=false;
  }
  // Animate CSS bloom intensity
  if(fc%4===0){
    var bi=document.getElementById('bloom-figure');
    if(bi){var pulse=.13+.03*Math.sin(t*.8);bi.style.opacity=pulse/.13;}
  }
  if(fc%5===0)updateCharts(t);
  renderer.render(scene,camera);
}
function onResize(){
  var se=document.getElementById('scene');W=se.offsetWidth||window.innerWidth;H=se.offsetHeight||(window.innerHeight-87);
  camera.aspect=W/H;camera.updateProjectionMatrix();renderer.setSize(W,H,false);
  var hb=document.getElementById('bloom-horizon');if(hb)hb.style.bottom=Math.floor(H*.32)+'px';
}

/* ════ POINTER ════ */
function initPointer(){
  var se=document.getElementById('scene');
  se.addEventListener('pointerdown',function(e){_drag=true;_px=e.clientX;_py=e.clientY;_pT=Date.now();dragVX=0;dragVY=0;try{se.setPointerCapture(e.pointerId)}catch(x){}});
  se.addEventListener('pointermove',function(e){if(!_drag)return;dragVY+=(e.clientX-_px)*.0024;dragVX+=(e.clientY-_py)*.0024;_px=e.clientX;_py=e.clientY;});
  se.addEventListener('pointerup',function(e){
    if(Date.now()-_pT<200&&Math.abs(e.clientX-_px)+Math.abs(e.clientY-_py)<12){
      addRipple(e.clientX,e.clientY);if(!novaActive){novaActive=true;novaT=0;sNova();}
    }
    _drag=false;
  });
  se.addEventListener('pointercancel',function(){_drag=false;});
}
function addRipple(x,y){var d=document.createElement('div');d.className='ripple';d.style.left=x+'px';d.style.top=y+'px';document.getElementById('scene').appendChild(d);setTimeout(function(){d.parentNode&&d.parentNode.removeChild(d)},640);}

/* ════ HUD CHARTS fine-art ════ */
function initCharts(){['ch1','ch2','ch3','ch4'].forEach(function(id){cBuf[id]=[];cBuf[id+'b']=[];});}
function sz(id){var cv=document.getElementById(id);if(!cv)return null;var cw=cv.offsetWidth||cv.parentElement.clientWidth||140;cv.width=cw;cv.height=34;return cv;}

function updateCharts(t){
  // ch1 — World map vectoriel
  var cv=sz('ch1');if(cv){
    var cx=cv.getContext('2d'),cw=cv.width,ch=cv.height;
    cx.clearRect(0,0,cw,ch);
    cx.strokeStyle='rgba(0,255,255,.07)';cx.lineWidth=.4;
    for(var x=0;x<=cw;x+=cw/7){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,ch);cx.stroke();}
    for(var y=0;y<=ch;y+=ch/3){cx.beginPath();cx.moveTo(0,y);cx.lineTo(cw,y);cx.stroke();}
    var blobs=[[.1,.5,.18,.28],[.28,.38,.2,.3],[.52,.34,.17,.26],[.73,.44,.14,.22],[.87,.58,.1,.2]];
    cx.strokeStyle='rgba(0,220,255,.52)';cx.lineWidth=.9;
    blobs.forEach(function(b){cx.beginPath();cx.ellipse(b[0]*cw+Math.sin(t*.2+b[0]*3)*1.2,b[1]*ch,b[2]*cw/2,b[3]*ch/2,0,0,Math.PI*2);cx.stroke();});
    cx.fillStyle='rgba(0,255,159,'+(.45+.4*Math.sin(t*2.8))+')';
    cx.beginPath();cx.arc(cw*.44+Math.sin(t*.5)*2,ch*.5,2,0,Math.PI*2);cx.fill();
  }
  // ch2 — Trading
  var cv2=sz('ch2');if(cv2){
    var cx=cv2.getContext('2d'),cw=cv2.width,ch=cv2.height;cx.clearRect(0,0,cw,ch);
    var b1=cBuf['ch2'],b2=cBuf['ch2b'];
    b1.push(.4+.3*Math.sin(t*1.9)+.1*Math.sin(t*4.8)+.05*(Math.random()-.5));if(b1.length>55)b1.shift();
    b2.push(.6+.22*Math.cos(t*2.3+1.3)+.07*(Math.random()-.5));if(b2.length>55)b2.shift();
    [[b1,'#00FF9F'],[b2,'rgba(255,72,120,.75)']].forEach(function(p){
      var buf=p[0],col=p[1];
      if(buf.length<2)return;
      cx.strokeStyle=col;cx.lineWidth=1.1;cx.beginPath();
      buf.forEach(function(v,i){i===0?cx.moveTo(i*(cw/55),ch-v*ch):cx.lineTo(i*(cw/55),ch-v*ch);});
      cx.stroke();
    });
  }
  // ch3 — Histogram
  var cv3=sz('ch3');if(cv3){
    var cx=cv3.getContext('2d'),cw=cv3.width,ch=cv3.height;cx.clearRect(0,0,cw,ch);
    var N=13,bw=cw/N-.8;
    for(var j=0;j<N;j++){
      var hh=(.18+.72*Math.abs(Math.sin(t*.65+j*.9+j*j*.038)))*ch;
      var g=cx.createLinearGradient(0,ch-hh,0,ch);g.addColorStop(0,'rgba(0,255,255,.75)');g.addColorStop(1,'rgba(0,100,180,.3)');
      cx.fillStyle=g;cx.fillRect(j*(cw/N)+.4,ch-hh,bw,hh);
    }
  }
  // ch4 — Waveform terminal
  var cv4=sz('ch4');if(cv4){
    var cx=cv4.getContext('2d'),cw=cv4.width,ch=cv4.height;cx.clearRect(0,0,cw,ch);
    cx.strokeStyle='rgba(160,88,255,.72)';cx.lineWidth=1;cx.beginPath();
    for(var x2=0;x2<cw;x2++){var yy=ch/2+Math.sin(x2/cw*Math.PI*8+t*2.1)*ch*.25+Math.sin(x2/cw*Math.PI*13+t*3.7)*ch*.1;x2===0?cx.moveTo(x2,yy):cx.lineTo(x2,yy);}
    cx.stroke();
    cx.fillStyle='rgba(0,255,255,.2)';cx.font='4.5px monospace';cx.fillText('KADIO_DALEBA > v17.stream.active',2,ch-2);
  }
}

/* ════ HUD + UTILS ════ */
function openPanels(){if(panelsOpen)return;panelsOpen=true;['h1','h2','h3','h4'].forEach(function(id,i){setTimeout(function(){document.getElementById(id).classList.add('open')},i*165);});}
function setLog(m){var el=document.getElementById('v-log');if(el)el.textContent=m;}
function badge(t,l){var el=document.getElementById('badge');if(!el)return;el.textContent=t;l?el.classList.add('live'):el.classList.remove('live');}
function tickClock(){(function loop(){var n=new Date(),hh=n.getHours().toString().padStart(2,'0'),mm=n.getMinutes().toString().padStart(2,'0'),ss=n.getSeconds().toString().padStart(2,'0');var el=document.getElementById('clk');if(el)el.textContent='V17 — '+hh+':'+mm+':'+ss;setTimeout(loop,1000);})();}

/* ════ POLLING ════ */
function startPolling(){(function poll(){fetch('/api/stats').then(function(r){return r.json()}).then(function(d){var el;if(el=document.getElementById('v-rdv'))el.textContent=d.activeClients||'—';if(el=document.getElementById('v-sms'))el.textContent=d.smsSent||0;if(el=document.getElementById('v-today'))el.textContent=d.todayRdv||0;if(el=document.getElementById('v-next'))el.textContent=d.nextSlot||'—';}).catch(function(){});setTimeout(poll,26000);})();}

/* ════ CHAT ════ */
function addBubble(role,text,save){
  if(save===undefined)save=true;
  var d=document.createElement('div');d.className='bub '+role;d.textContent=text;
  chatEl.appendChild(d);chatEl.scrollTop=chatEl.scrollHeight;
  if(save){chatHistory.push({r:role,t:text});if(chatHistory.length>18)chatHistory.shift();try{localStorage.setItem('z17',JSON.stringify(chatHistory))}catch(e){}}
  if(role==='user')msgCount++;
  var mv=document.getElementById('v-msgs');if(mv)mv.textContent=msgCount;
}
function showDots(){var d=document.createElement('div');d.className='dots';d.innerHTML='<span>.</span><span>.</span><span>.</span>';chatEl.appendChild(d);chatEl.scrollTop=chatEl.scrollHeight;return d;}
var REPLIES=['Analyse en cours… 50K flux actifs.','Protocole V17 — onde organique chargée.','Vagues matricielles synchronisées.','Signal stable. Choker pulsant nominal.','Mémoire 97%. Entité en pleine forme.','Réservation disponible ce soir 18h30.','DALEBA OS V17 — densité charnelle max.','Yeux ouverts. Je vois tout, Ulrich.'];
function sendMsg(){
  var txt=(msgEl.value||'').trim();if(!txt)return;
  var cmd=txt.toLowerCase();msgEl.value='';addBubble('user',txt);
  if(cmd==='nova'){if(!novaActive){novaActive=true;novaT=0;sNova();}return;}
  if(cmd==='panels'){openPanels();return;}
  var dots=showDots();setLog(txt.slice(0,26)+'…');sPing();
  document.getElementById('reflex').classList.add('on');
  setTimeout(function(){dots.parentNode&&dots.parentNode.removeChild(dots);document.getElementById('reflex').classList.remove('on');addBubble('daleba',REPLIES[msgCount%REPLIES.length]);setLog('Réponse V17 ✓');},820+Math.random()*520);
}
function initInput(){document.getElementById('send').addEventListener('click',sendMsg);msgEl.addEventListener('keydown',function(e){if(e.key==='Enter')sendMsg();});}
