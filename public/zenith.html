<script>
window.onerror=function(m,s,l){
  var d=document.getElementById('err')||document.createElement('div');
  d.id='err';d.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:99999;background:#000;border:2px solid #f44;border-radius:8px;padding:20px 24px;max-width:88vw;font-family:monospace;color:#f88;text-align:center';
  d.innerHTML='<b>ERR V11</b><br><small>'+String(m)+'</small><br><small style="color:#555">'+s+':'+l+'</small>';
  if(document.body)document.body.appendChild(d);
  return false;
};
window.addEventListener('unhandledrejection',function(e){window.onerror('Promise: '+(e.reason&&e.reason.message||e.reason),'async',0);});
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --em:#00FF9F;--em2:#50C878;--cy:#00D4FF;--silver:#C8D8E8;
  --bg:#00000A;--border:rgba(0,255,159,.13);--dim:rgba(0,255,159,.25);
  --mono:'Courier New',monospace;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:#c0e8d0;font-family:Arial,sans-serif;touch-action:none}
#shell{display:flex;flex-direction:column;width:100vw;height:100vh}

/* HEADER */
#hdr{flex-shrink:0;height:50px;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid var(--border);background:rgba(0,0,8,.9);backdrop-filter:blur(14px)}
.logo{font-family:var(--mono);font-size:.9rem;font-weight:700;color:var(--em);letter-spacing:.2em}
.dot{width:7px;height:7px;border-radius:50%;background:var(--em);box-shadow:0 0 10px var(--em),0 0 20px rgba(0,255,159,.3);display:inline-block;margin-right:7px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.stxt{font-family:var(--mono);font-size:.63rem;color:var(--em);letter-spacing:.1em}
.navl a{font-family:var(--mono);font-size:.58rem;color:rgba(0,255,159,.38);text-decoration:none;margin-left:12px;transition:color .2s}
.navl a:hover{color:var(--em)}
#badge{font-family:var(--mono);font-size:.57rem;color:rgba(0,255,159,.38);padding:2px 9px;border:1px solid var(--border);border-radius:20px;margin-left:10px;transition:color .3s,border-color .3s}
#badge.live{color:var(--em);border-color:var(--dim)}

/* SCENE */
#scene{flex:1;position:relative;width:100%;overflow:hidden;background:#00000A}
#planet{display:block;position:absolute;top:0;left:0;cursor:grab}
#planet:active{cursor:grabbing}

/* WIDGETS */
.w{position:absolute;z-index:999;width:172px;padding:10px 12px;background:rgba(0,2,14,.85);border:1px solid var(--border);border-radius:6px;backdrop-filter:blur(16px);opacity:0;transform:scale(0.05);transition:opacity .6s cubic-bezier(.22,1,.36,1),transform .6s cubic-bezier(.22,1,.36,1);pointer-events:none}
.w.open{opacity:1;transform:scale(1);pointer-events:auto}
#w1{top:14px;left:14px}
#w2{top:14px;right:14px}
#w3{bottom:58px;left:14px}
#w4{bottom:58px;right:14px}
.wt{font-family:var(--mono);font-size:.56rem;font-weight:700;color:var(--em);letter-spacing:.14em;text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:5px;margin-bottom:6px}
.wr{display:flex;justify-content:space-between;margin-bottom:3px}
.wl{font-family:var(--mono);font-size:.52rem;color:rgba(255,255,255,.28)}
.wv{font-family:var(--mono);font-size:.54rem;color:var(--em)}
@media(max-width:540px){.w{width:136px}}
@media(max-width:360px){.w{display:none}}

/* REFLECTION */
#reflex{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:60;text-align:center;pointer-events:none;opacity:0;transition:opacity .35s}
#reflex.on{opacity:1}
.rtxt{font-family:var(--mono);font-size:.7rem;color:var(--em);letter-spacing:.22em;text-transform:uppercase;animation:flk 1.1s infinite}
@keyframes flk{0%,100%{opacity:1}48%{opacity:.3}50%{opacity:.1}52%{opacity:.8}}

/* SUPERNOVA FLASH */
#nova-flash{position:absolute;inset:0;background:radial-gradient(circle,rgba(255,255,255,.35) 0%,rgba(0,255,159,.15) 40%,transparent 70%);pointer-events:none;opacity:0;z-index:55;transition:opacity .12s}
#nova-flash.on{opacity:1}

/* RIPPLE */
.ripple{position:absolute;border:1.5px solid rgba(0,255,159,.9);border-radius:50%;pointer-events:none;z-index:70;width:40px;height:40px;animation:ripout .65s ease-out forwards}
@keyframes ripout{0%{transform:translate(-50%,-50%) scale(0);opacity:1}100%{transform:translate(-50%,-50%) scale(9);opacity:0}}

/* CHAT */
#chat{position:absolute;bottom:56px;right:0;width:295px;max-height:52%;overflow-y:auto;z-index:200;padding:9px;display:flex;flex-direction:column;gap:6px}
#chat::-webkit-scrollbar{width:2px}#chat::-webkit-scrollbar-thumb{background:var(--dim)}
.bub{max-width:93%;padding:7px 10px;border-radius:5px;font-family:var(--mono);font-size:.67rem;line-height:1.5;animation:bub .22s ease}
@keyframes bub{from{opacity:0;transform:translateY(3px)}to{opacity:1}}
.bub.user{align-self:flex-end;background:rgba(0,255,159,.06);border:1px solid rgba(0,255,159,.15);color:#d4ffd4}
.bub.daleba{align-self:flex-start;background:rgba(0,0,22,.85);border:1px solid var(--border);color:var(--em)}
.bub.daleba::before{content:'DALEBA › ';font-weight:700}
.dots{align-self:flex-start;font-family:var(--mono);font-size:.64rem;color:var(--dim);padding:4px 8px}
.dots span{animation:td 1s infinite}.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes td{0%,80%,100%{opacity:.1}40%{opacity:1}}
@media(max-width:540px){#chat{width:100%}}

/* INPUT */
#bar{flex-shrink:0;height:52px;z-index:200;display:flex;align-items:center;gap:8px;padding:0 15px;border-top:1px solid var(--border);background:rgba(0,0,14,.92);backdrop-filter:blur(14px)}
.prt{font-family:var(--mono);font-size:1rem;color:var(--em);flex-shrink:0}
#msg{flex:1;background:transparent;border:none;outline:none;color:#cfffd4;font-family:var(--mono);font-size:.8rem;caret-color:var(--em)}
#msg::placeholder{color:rgba(0,255,159,.16)}
#send{background:none;border:1px solid var(--dim);color:var(--em);font-family:var(--mono);font-size:.7rem;padding:5px 12px;border-radius:4px;cursor:pointer;flex-shrink:0;transition:background .2s}
#send:hover,#send:active{background:rgba(0,255,159,.11)}
</style>

<script src="/js/three.min.js"></script>
<script>
/* ================================================================
   DALEBA ZENITH V11 — LE VORTEX GALACTIQUE
   5 000 étoiles en spirale logarithmique, shaders optimisés,
   supernova au tap, distorsion gravitationnelle au drag,
   60 FPS sur mobile.
================================================================ */

/* ─── ÉTAT ───────────────────────────────────────────────── */
var scene, camera, renderer, clock;
var galaxy;           // THREE.Points — 5000 étoiles
var orig;             // Float32Array positions originales (référence)
var N_STARS = 5000;

/* Rotation / inertie */
var rotY=0, rotX=0, velY=0, velX=0;
var tiltX=0, tiltY=0; /* parallaxe 3D au drag */

/* États animation */
var inReflect=false;
var novaActive=false, novaT=0, novaDuration=1.5;
var waveActive=false, waveT=0;

/* Drag */
var _drag=false, _px=0, _py=0, _moved=false;
var dragInfluence = new THREE.Vector3(); /* vecteur drag en espace monde */

/* Chat */
var msgCount=0, sessionId='v11_'+Date.now().toString(36);
var chatEl, msgEl, chatHistory=[], panelsOpen=false;

/* ─── AUDIO ──────────────────────────────────────────────── */
var _AC=null;
function _aud(){
  if(!_AC){try{_AC=new(window.AudioContext||window.webkitAudioContext)();}catch(_){return null;}}
  if(_AC.state==='suspended'){try{_AC.resume();}catch(_){}}
  return _AC&&_AC.state==='running'?_AC:null;
}
function _tone(f,d,v,t){
  try{var ac=_aud();if(!ac)return;var o=ac.createOscillator(),g=ac.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||.08,ac.currentTime);g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d);}catch(_){}
}
function sndPing(){_tone(880,.2,.1,'sine');setTimeout(function(){_tone(1760,.12,.04,'sine');},80);}
function sndTick(){_tone(220,.06,.03,'square');}
function sndNova(){_tone(80,.8,.18,'sine');setTimeout(function(){_tone(440,.4,.08,'sine');},100);}
function sndBlip(){_tone(660,.14,.07,'triangle');}
function sndWhoosh(){
  try{var ac=_aud();if(!ac)return;var b=ac.createBuffer(1,ac.sampleRate*.5,ac.sampleRate);var d=b.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*5)*.15;var s=ac.createBufferSource();s.buffer=b;var f=ac.createBiquadFilter();f.type='bandpass';f.frequency.value=350;f.Q.value=.4;s.connect(f);f.connect(ac.destination);s.start();}catch(_){}
}

/* ─── BOOT ───────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded',function(){
  chatEl=document.getElementById('chat');
  msgEl =document.getElementById('msg');
  tickTime();

  try{var sv=localStorage.getItem('z11');if(sv){chatHistory=JSON.parse(sv).slice(-20);chatHistory.forEach(function(m){addBubble(m.r,m.t,false);});}}catch(_){}

  /* Déverouillage audio au premier geste */
  document.addEventListener('pointerdown',_aud,{once:true,passive:true});
  document.addEventListener('keydown',_aud,{once:true,passive:true});

  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      bootScene();
      initInput();
      startPolling();
      setTimeout(function(){openPanels();setLog('Vortex galactique activé ✦');},1400);
    });
  });
});

/* ─── BOOT SCENE ─────────────────────────────────────────── */
function bootScene(){
  var se=document.getElementById('scene');
  var W=Math.floor(se.getBoundingClientRect().width||window.innerWidth);
  var H=Math.floor(se.getBoundingClientRect().height||(window.innerHeight-102));

  var c=document.getElementById('planet');
  c.width=W; c.height=H;
  c.style.width=W+'px'; c.style.height=H+'px';

  /* Test WebGL */
  var webgl=false;
  try{var tc=document.createElement('canvas');var tg=tc.getContext('webgl')||tc.getContext('experimental-webgl');if(tg&&typeof THREE!=='undefined')webgl=true;}catch(_){}

  if(webgl){
    try{
      initGalaxy(c,W,H);
      badge('GALAXY ✦',true);
      setTimeout(sndWhoosh,700);
    }catch(e){setLog('err:'+e.message);fallback2D(c,W,H);}
  } else {
    fallback2D(c,W,H);
  }

  /* CLICK → supernova (séparé du drag) */
  var moved=false;
  c.addEventListener('pointerdown',function(){moved=false;},{passive:true});
  c.addEventListener('pointermove',function(){moved=true;},{passive:true});
  c.addEventListener('click',function(e){
    if(moved)return;
    _aud(); sndPing();
    ripple(e.clientX, e.clientY - se.getBoundingClientRect().top);
    triggerSupernova();
    togglePanels();
  });
}

/* ─── GÉNÉRATION GALAXIE EN SPIRALE ──────────────────────── */
/*
  Algorithme :
  - 15% des étoiles dans le noyau (cluster dense, blanc/argent)
  - 85% réparties sur N bras en spirale logarithmique
  - Chaque bras : r = r0 * e^(b * theta) avec dispersion gaussienne
  - Vitesse de rotation différentielle stockée par étoile (pour animation)
*/
function generateGalaxyPositions(N){
  var pos   = new Float32Array(N*3);
  var col   = new Float32Array(N*3);
  var sizes = new Float32Array(N);
  var speeds= new Float32Array(N); /* vitesse angulaire diff. */

  var ARMS   = 4;
  var TURNS  = 2.2;      /* tours de la spirale */
  var MAX_R  = 3.2;      /* rayon max */
  var CORE_N = Math.floor(N * 0.12);
  var SPREAD = 0.28;     /* dispersion des bras */
  var B      = 0.35;     /* coefficient spirale log */

  function gauss(sigma){
    var u=0,v=0;
    while(u===0)u=Math.random();while(v===0)v=Math.random();
    return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v)*sigma;
  }
  function setColor(i, r,g,b){ col[i*3]=r; col[i*3+1]=g; col[i*3+2]=b; }

  /* NOYAU — singularité blanche */
  for(var i=0;i<CORE_N;i++){
    var r=Math.abs(gauss(.18));
    var th=Math.random()*Math.PI*2;
    var ph=gauss(.04);
    pos[i*3]  =r*Math.cos(th);
    pos[i*3+1]=ph;
    pos[i*3+2]=r*Math.sin(th);
    sizes[i]  =Math.random()<.15?.12:.06;
    speeds[i] =.8+Math.random()*.8;
    /* couleur: blanc pur → argent */
    var intensity=1-r*1.5; if(intensity<0)intensity=0;
    setColor(i, .9+intensity*.1, .95+intensity*.05, 1.0);
  }

  /* BRAS SPIRAUX */
  for(var i=CORE_N;i<N;i++){
    var arm  = i % ARMS;
    var t    = ((i-CORE_N)/(N-CORE_N)); /* 0..1 le long de la spirale */
    var theta= t * TURNS * Math.PI * 2;  /* angle total parcouru */
    var r    = .25*Math.exp(B*theta/TURNS/Math.PI*2)+t*MAX_R*.8;
    var angle= theta + (arm/ARMS)*Math.PI*2;

    /* Dispersion gaussienne autour du bras */
    var dr = gauss(SPREAD*(0.3+t*.7));
    var dtheta= gauss(.18);
    var rx = (r+dr)*Math.cos(angle+dtheta);
    var rz = (r+dr)*Math.sin(angle+dtheta);
    var ry = gauss(.045*(1+t*.5));

    pos[i*3]  =rx;
    pos[i*3+1]=ry;
    pos[i*3+2]=rz;

    /* Taille : étoiles géantes rares */
    sizes[i]=Math.random()<.02?.16:(Math.random()<.1?.09:.05);

    /* Vitesse différentielle : cœur tourne plus vite */
    speeds[i]=(.15+.8*(1-t))+Math.random()*.05;

    /* COULEUR selon distance et bras */
    var dist=Math.sqrt(rx*rx+rz*rz);
    var norm=Math.min(dist/MAX_R,1);

    if(dist<.4){
      /* Cœur interne : blanc chaud */
      setColor(i,.95,.98,1);
    } else if(dist<1.2){
      /* Bras internes : émeraude intense */
      var f=(dist-.4)/.8;
      setColor(i,(1-f)*.8+f*.31,(1-f)*.98+f*.78,(1-f)*.9+f*.47);
    } else if(dist<2.2){
      /* Bras médians : cyan quantique */
      var f=(dist-1.2)/1.0;
      setColor(i,(1-f)*.31+f*0,(1-f)*.78+f*.83,(1-f)*.47+f*1.0);
    } else {
      /* Bord externe : poussière d'argent / bleu profond */
      var f=Math.min((dist-2.2)/.8,1);
      setColor(i,(1-f)*.15+f*.08,(1-f)*.45+f*.25,(1-f)*.8+f*.5);
    }

    /* Éclats d'argent aléatoires */
    if(Math.random()<.04){
      setColor(i,.85+Math.random()*.15,.88+Math.random()*.12,.92+Math.random()*.08);
      sizes[i]=.1;
    }
  }

  return {pos:pos, col:col, sizes:sizes, speeds:speeds};
}

/* ─── INIT THREE.JS GALAXY ───────────────────────────────── */
function initGalaxy(c,W,H){
  scene =new THREE.Scene();
  clock =new THREE.Clock();
  camera=new THREE.PerspectiveCamera(55,W/H,.1,100);
  camera.position.set(0,4.5,5.5);
  camera.lookAt(0,0,0);

  renderer=new THREE.WebGLRenderer({canvas:c,antialias:true,alpha:false,powerPreference:'high-performance'});
  renderer.setSize(W,H,false);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
  renderer.setClearColor(0x00000A,1);

  /* Lumières ambiantes pour effet glow */
  scene.add(new THREE.AmbientLight(0x000511,3));
  var pl=new THREE.PointLight(0x00ff9f,6,8); pl.position.set(0,1,0); scene.add(pl);
  var pl2=new THREE.PointLight(0x00d4ff,3,12); pl2.position.set(2,2,2); scene.add(pl2);

  /* Génération positions */
  var data=generateGalaxyPositions(N_STARS);
  orig=new Float32Array(data.pos); /* copie de référence */

  var geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(data.pos,3));
  geo.setAttribute('color',   new THREE.BufferAttribute(data.col,3));
  /* Taille variable via attribut custom */
  geo.setAttribute('size',    new THREE.BufferAttribute(data.sizes,1));
  geo._speeds=data.speeds;
  geo._orig  =orig;

  /* Shader material pour tailles variables + glow */
  var mat=new THREE.ShaderMaterial({
    uniforms:{
      uTime:{value:0},
      uPixelRatio:{value:Math.min(window.devicePixelRatio||1,2)},
      uReflect:{value:0}
    },
    vertexShader:[
      'attribute float size;',
      'varying vec3 vColor;',
      'uniform float uTime;',
      'uniform float uPixelRatio;',
      'uniform float uReflect;',
      'void main(){',
      '  vColor = color;',
      '  vec4 mv = modelViewMatrix * vec4(position,1.0);',
      '  float d = length(position.xz);',
      '  float twinkle = 0.8 + 0.2*sin(uTime*3.0 + d*7.0 + position.y*13.0);',
      '  float reflGlow = 1.0 + uReflect*0.8*sin(uTime*8.0+d*3.0);',
      '  gl_PointSize = size * uPixelRatio * 60.0 * twinkle * reflGlow / (-mv.z);',
      '  gl_Position = projectionMatrix * mv;',
      '}'
    ].join('\n'),
    fragmentShader:[
      'varying vec3 vColor;',
      'void main(){',
      '  vec2 uv = gl_PointCoord - 0.5;',
      '  float d = length(uv);',
      '  if(d > 0.5) discard;',
      '  /* Glow : intensité exponentielle au centre */',
      '  float core = exp(-d*8.0);',
      '  float halo = exp(-d*3.0)*0.5;',
      '  float alpha = clamp(core+halo,0.0,1.0);',
      '  vec3 coreColor = vec3(1.0,1.0,1.0)*core;',
      '  gl_FragColor = vec4(vColor + coreColor*0.4, alpha);',
      '}'
    ].join('\n'),
    vertexColors:true,
    transparent:true,
    depthWrite:false,
    blending:THREE.AdditiveBlending
  });

  galaxy=new THREE.Points(geo,mat);
  scene.add(galaxy);

  /* Drag */
  setupDrag(c);
  window.addEventListener('resize',onResize);

  /* Boucle */
  animateGalaxy();
  setLog('5 000 étoiles ✦ 60fps');
}

/* ─── BOUCLE ANIMATION GALAXIE ───────────────────────────── */
function animateGalaxy(){
  requestAnimationFrame(animateGalaxy);
  if(!renderer||!galaxy) return;

  var dt=clock.getDelta();
  var t =clock.getElapsedTime();

  /* Mise à jour uniforms shader */
  galaxy.material.uniforms.uTime.value=t;
  galaxy.material.uniforms.uReflect.value=inReflect?1:0;

  /* Inertie rotation + auto-spin */
  velY*=.92; velX*=.92;
  rotY+=velY; rotX+=velX;
  rotY+=inReflect?.005:.0008;

  /* Parallaxe 3D : inclinaison caméra selon drag */
  tiltX+=(velX*0.4-tiltX)*.08;
  tiltY+=(velY*0.4-tiltY)*.08;
  camera.position.set(
    Math.sin(rotY)*.8 + tiltY*1.2,
    4.5 + tiltX*1.5,
    5.5
  );
  camera.lookAt(0,0,0);

  /* Rotation différentielle des bras (vitesses stockées par étoile) */
  var pos   =galaxy.geometry.attributes.position.array;
  var speeds=galaxy.geometry._speeds;

  if(!novaActive && !waveActive){
    /* Rotation pure différentielle */
    for(var i=0;i<N_STARS;i++){
      var ox=orig[i*3], oz=orig[i*3+2];
      var r=Math.sqrt(ox*ox+oz*oz);
      if(r<.01) continue;
      /* Vitesse angulaire : plus rapide au centre */
      var omega=(speeds[i]*.0004)*dt*60;
      var ca=Math.cos(omega), sa=Math.sin(omega);
      orig[i*3]  =ox*ca-oz*sa;
      orig[i*3+2]=ox*sa+oz*ca;
    }
    for(var j=0;j<pos.length;j++) pos[j]=orig[j];

  } else if(waveActive){
    /* Onde de réflexion */
    waveT+=dt*3.5;
    for(var i=0;i<N_STARS;i++){
      var ox=orig[i*3],oy=orig[i*3+1],oz=orig[i*3+2];
      var d=Math.sqrt(ox*ox+oy*oy+oz*oz);
      var w=Math.sin(d*3.0-waveT)*.08;
      pos[i*3]=ox*(1+w); pos[i*3+1]=oy*(1+w); pos[i*3+2]=oz*(1+w);
    }
    if(waveT>Math.PI*2.5){waveActive=false;waveT=0;}

  } else if(novaActive){
    /* SUPERNOVA : explosion → réabsorption gravitationnelle */
    novaT+=dt;
    var progress=novaT/novaDuration;

    /* Courbe : rapide expansion (0→0.35) puis lente contraction (0.35→1) */
    var scale;
    if(progress<.35){
      /* Expansion explosive : easing cubique out */
      var p=progress/.35;
      scale=1+p*p*(3-2*p)*4.5; /* 1 → 5.5 */
    } else {
      /* Réabsorption gravitationnelle : élastique */
      var p=(progress-.35)/.65;
      var elastic=Math.exp(-p*4)*Math.cos(p*Math.PI*2.5);
      scale=1+elastic*4.5*(1-p);
    }

    for(var i=0;i<N_STARS;i++){
      var ox=orig[i*3],oy=orig[i*3+1],oz=orig[i*3+2];
      /* Direction d'explosion : radiale depuis le centre */
      var r=Math.sqrt(ox*ox+oy*oy+oz*oz)+.001;
      var nx=ox/r, ny=oy/r, nz=oz/r;
      /* Les étoiles éloignées s'écartent plus vite */
      var boost=.5+r*.5;
      pos[i*3]  =ox+nx*(scale-1)*boost*r;
      pos[i*3+1]=oy+ny*(scale-1)*boost*r*.3;
      pos[i*3+2]=oz+nz*(scale-1)*boost*r;
    }

    if(novaT>novaDuration){
      novaActive=false; novaT=0;
      /* Resynchroniser orig avec positions actuelles */
      for(var j=0;j<pos.length;j++) pos[j]=orig[j];
    }
  }

  galaxy.geometry.attributes.position.needsUpdate=true;

  /* Flash nova */
  var nf=document.getElementById('nova-flash');
  if(novaActive&&nf){
    var fp=novaT/novaDuration;
    nf.style.opacity=fp<.15?(fp/.15)*.7:(1-fp)*(.7/(1-.15));
  } else if(nf) nf.style.opacity=0;

  renderer.render(scene,camera);
}

/* ─── DRAG GRAVITATIONNEL ────────────────────────────────── */
function setupDrag(c){
  c.addEventListener('pointerdown',function(e){_drag=true;_moved=false;_px=e.clientX;_py=e.clientY;try{c.setPointerCapture(e.pointerId);}catch(_){}},{passive:true});
  c.addEventListener('pointermove',function(e){
    if(!_drag) return;
    _moved=true;
    var dx=e.clientX-_px, dy=e.clientY-_py;
    /* Inertie rotation */
    velY=dx*.009; velX=dy*.007;
    rotY+=dx*.009; rotX+=dy*.007;
    /* Tick son si mouvement significatif */
    if(Math.abs(dx)>3||Math.abs(dy)>3) sndTick();
    _px=e.clientX; _py=e.clientY;
  },{passive:true});
  c.addEventListener('pointerup',  function(){_drag=false;},{passive:true});
  c.addEventListener('pointercancel',function(){_drag=false;},{passive:true});
}

/* ─── RESIZE ─────────────────────────────────────────────── */
function onResize(){
  if(!renderer)return;
  var se=document.getElementById('scene');
  var W=Math.floor(se.getBoundingClientRect().width||window.innerWidth);
  var H=Math.floor(se.getBoundingClientRect().height||(window.innerHeight-102));
  var c=renderer.domElement;
  c.width=W;c.height=H;c.style.width=W+'px';c.style.height=H+'px';
  camera.aspect=W/H;camera.updateProjectionMatrix();renderer.setSize(W,H,false);
}

/* ─── SUPERNOVA ──────────────────────────────────────────── */
function triggerSupernova(){
  if(novaActive) return;
  novaActive=true; novaT=0;
  waveActive=false;
  sndNova();
  /* Flash CSS immédiat */
  var nf=document.getElementById('nova-flash');
  if(nf){nf.classList.add('on');setTimeout(function(){nf.classList.remove('on');},150);}
}

/* ─── WAVE RÉFLEXION ─────────────────────────────────────── */
function triggerWave(){waveActive=true;waveT=0;}

/* ─── REFLECTION MODE ────────────────────────────────────── */
function startReflect(){
  inReflect=true;
  document.getElementById('reflex').classList.add('on');
  triggerWave();
}
function stopReflect(){
  inReflect=false;
  document.getElementById('reflex').classList.remove('on');
}

/* ─── RIPPLE ─────────────────────────────────────────────── */
function ripple(x,y){
  var r=document.createElement('div');r.className='ripple';
  r.style.left=x+'px';r.style.top=y+'px';
  document.getElementById('scene').appendChild(r);
  setTimeout(function(){if(r.parentNode)r.parentNode.removeChild(r);},750);
}

/* ─── PANELS ─────────────────────────────────────────────── */
function openPanels(){
  panelsOpen=true;
  ['w1','w2','w3','w4'].forEach(function(id,i){
    setTimeout(function(){var el=document.getElementById(id);if(el)el.classList.add('open');},i*100);
  });
}
function closePanels(){
  panelsOpen=false;
  ['w1','w2','w3','w4'].forEach(function(id){var el=document.getElementById(id);if(el)el.classList.remove('open');});
}
function togglePanels(){if(panelsOpen)closePanels();else openPanels();sndBlip();setLog(panelsOpen?'Modules ouverts':'Modules fermés');}

/* ─── FALLBACK CANVAS 2D ─────────────────────────────────── */
function fallback2D(c,W,H){
  badge('2D ✦',true);
  c.width=W;c.height=H;c.style.width=W+'px';c.style.height=H+'px';
  var ctx=c.getContext('2d');if(!ctx)return;
  var N2=300,cx=W/2,cy=H/2,ang=0;
  var pts=[];
  for(var i=0;i<N2;i++){
    /* Spirale 2D */
    var t=i/N2, arm=i%3, theta=t*4*Math.PI+(arm/3)*Math.PI*2;
    var r=(.1+t)*Math.min(W,H)*.32;
    var sc=.85+Math.random()*.3;
    pts.push({ox:(r+gauss2(r*.2))*Math.cos(theta),oy:(r+gauss2(r*.2))*Math.sin(theta),sp:.3+.7*(1-t),sz:Math.random()<.05?3.5:1.5});
  }
  function gauss2(s){var u=Math.random()+.001;return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*Math.random())*s;}
  function d2(){
    requestAnimationFrame(d2);ctx.clearRect(0,0,W,H);ang+=.006;
    var g=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.min(W,H)*.45);
    g.addColorStop(0,'rgba(0,255,159,.08)');g.addColorStop(.5,'rgba(0,212,255,.03)');g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    ctx.shadowBlur=8;ctx.shadowColor='#00FF9F';
    pts.forEach(function(p){
      var ca=Math.cos(ang*p.sp),sa=Math.sin(ang*p.sp);
      var sx=cx+p.ox*ca-p.oy*sa, sy=cy+p.ox*sa+p.oy*ca;
      var dist=Math.sqrt(p.ox*p.ox+p.oy*p.oy)/Math.min(W,H)*.6;
      var alpha=.25+.75*(1-Math.min(dist,1));
      ctx.beginPath();ctx.arc(sx,sy,p.sz,0,Math.PI*2);
      if(dist<.2)ctx.fillStyle='rgba(240,250,255,'+alpha+')';
      else if(dist<.55)ctx.fillStyle='rgba(80,200,120,'+alpha+')';
      else ctx.fillStyle='rgba(0,212,255,'+alpha*.7+')';
      ctx.fill();
    });
    ctx.shadowBlur=0;
  }
  d2();
  c.addEventListener('click',function(e){sndPing();ripple(e.clientX,e.clientY-c.getBoundingClientRect().top);togglePanels();});
}

/* ─── INPUT ──────────────────────────────────────────────── */
function initInput(){
  if(msgEl)msgEl.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();doSend();}});
  var btn=document.getElementById('send');if(btn)btn.addEventListener('click',doSend);
}
function doSend(){
  var txt=(msgEl?msgEl.value:'').trim();if(!txt)return;
  if(msgEl)msgEl.value='';
  _aud();sndPing();
  var cmd=txt.toLowerCase();
  if(cmd==='panels'||cmd==='open'||cmd==='modules'||cmd==='ouvrir'){openPanels();addBubble('daleba','Modules holographiques déployés ✦',true);return;}
  if(cmd==='close'||cmd==='fermer'||cmd==='hide'){closePanels();addBubble('daleba','Modules rétractés.',true);return;}
  if(cmd==='nova'||cmd==='supernova'){triggerSupernova();addBubble('daleba','SUPERNOVA initiée. ✦',true);return;}

  msgCount++;var wm=document.getElementById('w-msgs');if(wm)wm.textContent=msgCount;
  addBubble('user',txt,true);startReflect();

  var dots=document.createElement('div');dots.className='dots';
  dots.innerHTML='<span>●</span><span>●</span><span>●</span>';
  if(chatEl){chatEl.appendChild(dots);scrollChat();}

  fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:txt,sessionId:sessionId})})
  .then(function(r){return r.json();})
  .then(function(d){if(chatEl&&dots.parentNode)chatEl.removeChild(dots);stopReflect();sndBlip();addBubble('daleba',d.response||d.message||'Je suis là.',true);setLog('Réponse reçue ✦');})
  .catch(function(){if(chatEl&&dots.parentNode)chatEl.removeChild(dots);stopReflect();addBubble('daleba','Recalibration cosmique… 🌌',true);});
}
function addBubble(role,txt,save){
  if(!chatEl)return;var b=document.createElement('div');b.className='bub '+role;b.textContent=txt;
  chatEl.appendChild(b);scrollChat();
  if(save){chatHistory.push({r:role,t:txt});if(chatHistory.length>30)chatHistory=chatHistory.slice(-30);try{localStorage.setItem('z11',JSON.stringify(chatHistory));}catch(_){}}
}
function scrollChat(){if(chatEl)chatEl.scrollTop=chatEl.scrollHeight;}

/* ─── POLLING ────────────────────────────────────────────── */
function startPolling(){
  badge('HTTP ✦',true);
  fetch('/health').then(function(r){return r.json();}).then(function(d){if(d.status==='online')setLog('Serveur ● cosmique');}).catch(function(){});
  setInterval(function(){fetch('/health').then(function(r){return r.json();}).then(function(d){badge(d.status==='online'?'HTTP ✦':'ERR',d.status==='online');}).catch(function(){badge('OFFLINE',false);});},30000);
}

/* ─── UTILS ──────────────────────────────────────────────── */
function tickTime(){var el=document.getElementById('w-time');if(el)el.textContent=new Date().toLocaleTimeString('fr-CA');}
function setLog(m){var el=document.getElementById('w-log');if(el)el.textContent=m;tickTime();}
function badge(t,l){var b=document.getElementById('badge');if(b){b.textContent=t;b.className=l?'live':'';}}
</script>
