<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>DALEBA OS — ZENITH V13</title>
<script>
window.onerror=function(m,s,l){
  var d=document.createElement('div');
  d.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:99999;background:#000;border:2px solid #f44;border-radius:8px;padding:18px 22px;max-width:88vw;font-family:monospace;color:#f88;text-align:center';
  d.innerHTML='<b>ERR V13</b><br><small>'+m+'</small><br><small style="color:#555">'+s+':'+l+'</small>';
  if(document.body)document.body.appendChild(d);return false;
};
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0A0520;--violet:#6B21A8;--blue:#1D4ED8;
  --cy:#00D4FF;--em:#00FF9F;--white-cloud:#C7D9F5;
  --border:rgba(0,212,255,.18);--mono:'Courier New',monospace;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:Arial,sans-serif;touch-action:none}
#shell{display:flex;flex-direction:column;width:100vw;height:100vh}

/* ── HEADER ─────────────────────────────────────────────── */
#hdr{flex-shrink:0;height:46px;z-index:400;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(10,5,32,.95);border-bottom:1px solid var(--border);backdrop-filter:blur(14px)}
.logo{font-family:var(--mono);font-size:.85rem;font-weight:700;color:var(--cy);letter-spacing:.22em}
.hdot{width:6px;height:6px;border-radius:50%;background:var(--em);box-shadow:0 0 8px var(--em);display:inline-block;margin-right:6px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.stxt{font-family:var(--mono);font-size:.6rem;color:var(--cy);letter-spacing:.1em}
.navl a{font-family:var(--mono);font-size:.55rem;color:rgba(0,212,255,.38);text-decoration:none;margin-left:10px;transition:color .2s}
.navl a:hover{color:var(--cy)}
#badge{font-family:var(--mono);font-size:.54rem;color:rgba(0,212,255,.35);padding:2px 8px;border:1px solid var(--border);border-radius:20px;margin-left:9px;transition:all .3s}
#badge.live{color:var(--cy);border-color:rgba(0,212,255,.45)}

/* ── SCENE ───────────────────────────────────────────────── */
#scene{flex:1;position:relative;overflow:hidden}

/* Couches canvas — ordre d'empilement */
canvas.layer{position:absolute;top:0;left:0;display:block}
#c-cosmos{z-index:1}   /* étoiles + nébuleuses + planètes + éclairs */
#c-clouds{z-index:2}   /* nuages volumétriques + bloom */
#c-avatar{z-index:3}   /* DALEBA */

/* ── HUD PANELS ─────────────────────────────────────────── */
.hud{
  position:absolute;z-index:50;
  background:rgba(5,0,28,.72);
  border:1px solid rgba(0,212,255,.22);
  border-radius:5px;backdrop-filter:blur(18px);
  padding:8px 10px;
  opacity:0;transform:scale(.06);
  transition:opacity .55s cubic-bezier(.22,1,.36,1),transform .55s cubic-bezier(.22,1,.36,1);
  pointer-events:none;
}
.hud.open{opacity:1;transform:scale(1);pointer-events:auto}

/* Positions exactes calquées sur l'image */
#h1{top:22%;left:1%;width:160px;transform-origin:left center}  /* haut gauche */
#h2{top:52%;left:0%;width:152px;transform-origin:left center}  /* bas gauche */
#h3{top:20%;right:1%;width:158px;transform-origin:right center}/* haut droite */
#h4{top:52%;right:0%;width:152px;transform-origin:right center}/* bas droite */
#h1.open{transform:perspective(600px) rotateY(8deg) scale(1)}
#h2.open{transform:perspective(600px) rotateY(8deg) scale(1)}
#h3.open{transform:perspective(600px) rotateY(-8deg) scale(1)}
#h4.open{transform:perspective(600px) rotateY(-8deg) scale(1)}

.ht{font-family:var(--mono);font-size:.5rem;font-weight:700;color:var(--cy);letter-spacing:.12em;text-transform:uppercase;border-bottom:1px solid rgba(0,212,255,.15);padding-bottom:4px;margin-bottom:5px}
.hr{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.hl{font-family:var(--mono);font-size:.46rem;color:rgba(180,210,255,.28);line-height:1.4}
.hv{font-family:var(--mono);font-size:.48rem;color:var(--cy)}
.hv.g{color:#00FF9F}.hv.r{color:#ff4466}
canvas.mc{display:block;margin-top:4px;border-top:1px solid rgba(0,212,255,.08);padding-top:3px}

/* ── REFLECTION ──────────────────────────────────────────── */
#reflex{position:absolute;top:46%;left:50%;transform:translate(-50%,-50%);z-index:60;text-align:center;pointer-events:none;opacity:0;transition:opacity .3s}
#reflex.on{opacity:1}
.rtxt{font-family:var(--mono);font-size:.65rem;color:var(--cy);letter-spacing:.22em;text-transform:uppercase;animation:flk 1.1s infinite}
@keyframes flk{0%,100%{opacity:1}48%{opacity:.3}50%{opacity:.05}52%{opacity:.8}}

/* ── RIPPLE ──────────────────────────────────────────────── */
.ripple{position:absolute;border:1.5px solid rgba(0,212,255,.85);border-radius:50%;pointer-events:none;z-index:70;width:36px;height:36px;animation:ripout .7s ease-out forwards}
@keyframes ripout{0%{transform:translate(-50%,-50%) scale(0);opacity:1}100%{transform:translate(-50%,-50%) scale(12);opacity:0}}

/* ── CHAT ────────────────────────────────────────────────── */
#chat{position:absolute;bottom:50px;right:0;width:275px;max-height:48%;overflow-y:auto;z-index:200;padding:7px;display:flex;flex-direction:column;gap:5px}
#chat::-webkit-scrollbar{width:2px}#chat::-webkit-scrollbar-thumb{background:rgba(0,212,255,.3)}
.bub{max-width:93%;padding:6px 9px;border-radius:5px;font-family:var(--mono);font-size:.63rem;line-height:1.5;animation:bub .2s ease}
@keyframes bub{from{opacity:0;transform:translateY(3px)}to{opacity:1}}
.bub.user{align-self:flex-end;background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.14);color:#bce0ff}
.bub.daleba{align-self:flex-start;background:rgba(10,5,32,.9);border:1px solid var(--border);color:var(--cy)}
.bub.daleba::before{content:'DALEBA › ';font-weight:700}
.dots{align-self:flex-start;font-family:var(--mono);font-size:.6rem;color:rgba(0,212,255,.4);padding:3px 7px}
.dots span{animation:td 1s infinite}.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes td{0%,80%,100%{opacity:.1}40%{opacity:1}}
@media(max-width:520px){#chat{width:100%}.hud{display:none}}

/* ── INPUT ───────────────────────────────────────────────── */
#bar{flex-shrink:0;height:48px;z-index:400;display:flex;align-items:center;gap:8px;padding:0 13px;border-top:1px solid var(--border);background:rgba(8,2,22,.96);backdrop-filter:blur(14px)}
.prt{font-family:var(--mono);font-size:.92rem;color:var(--cy);flex-shrink:0}
#msg{flex:1;background:transparent;border:none;outline:none;color:#a8d8ff;font-family:var(--mono);font-size:.76rem;caret-color:var(--cy)}
#msg::placeholder{color:rgba(0,212,255,.15)}
#send{background:none;border:1px solid rgba(0,212,255,.28);color:var(--cy);font-family:var(--mono);font-size:.67rem;padding:4px 11px;border-radius:4px;cursor:pointer;flex-shrink:0;transition:background .2s}
#send:hover,#send:active{background:rgba(0,212,255,.1)}
</style>
</head>

  <div id="hdr">
    <span class="logo">DALEBA OS</span>
    <div style="display:flex;align-items:center"><span class="hdot"></span><span class="stxt">ZENITH V13</span></div>

<script src="/js/three.min.js"></script>
<script>
/* ================================================================
   DALEBA ZENITH V13 — SANCTUAIRE AFROFUTURISTE
   Reconstruction fidèle de l'image de référence :
   - Couleurs exactes analysées (#0A0520, #6B21A8, #1D4ED8…)
   - 6 planètes aux positions précises de l'image
   - Éclairs blancs/cyan au-dessus de la tête (zone 35-55%, 5-25%)
   - Nuages volumétriques bas + bloom cyan central
   - Avatar DALEBA : afro volumineuse, code matrix #00FFFF, yeux #B0E0FF
   - HUD 4 panneaux perspective 3D
================================================================ */

/* ─── AUDIO ─────────────────────────────────────────────── */
var _AC=null;
function _aud(){if(!_AC){try{_AC=new(window.AudioContext||window.webkitAudioContext)();}catch(_){return null;}}try{if(_AC.state==='suspended')_AC.resume();}catch(_){}return _AC&&_AC.state==='running'?_AC:null;}
function _t(f,d,v,t){try{var ac=_aud();if(!ac)return;var o=ac.createOscillator(),g=ac.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||.08,ac.currentTime);g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d);}catch(_){}}
function sPing(){_t(880,.2,.1,'sine');setTimeout(function(){_t(1760,.12,.04,'sine');},80);}
function sBlip(){_t(660,.13,.07,'triangle');}
function sTick(){_t(200,.06,.025,'square');}
function sNova(){_t(55,.9,.2,'sine');setTimeout(function(){_t(440,.5,.08,'sine');},110);}
function sWhoosh(){try{var ac=_aud();if(!ac)return;var b=ac.createBuffer(1,ac.sampleRate*.5,ac.sampleRate),d=b.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*5)*.15;var s=ac.createBufferSource();s.buffer=b;var f=ac.createBiquadFilter();f.type='bandpass';f.frequency.value=380;f.Q.value=.4;s.connect(f);f.connect(ac.destination);s.start();}catch(_){}}

/* ─── STATE ──────────────────────────────────────────────── */
var W=0,H=0;
var cosmosR, cosmosS, cosmosC, cosmosClock;
var _planets=[], _nebulas=[], _stars;
var _lightLines=[], _lightActive=false, _lightT=0;
var camDX=0, camDY=0, dragVX=0, dragVY=0;
var _drag=false, _px=0, _py=0;
var inReflect=false, panelsOpen=false;
var novaActive=false, novaT=0;
var mouthOpen=0, mouthTarget=0, eyePulse=0;
var msgCount=0, sessionId='v13_'+Date.now().toString(36);
var chatEl, msgEl, chatHistory=[];
var avatarCtx, cloudCtx;
var codeColumns=[];
var chartData={};
var iconAngles=[0,0,0,0,0,0];

/* ─── BOOT ───────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded',function(){
  chatEl=document.getElementById('chat');
  msgEl=document.getElementById('msg');

  var se=document.getElementById('scene');
  W=se.offsetWidth||window.innerWidth;
  H=se.offsetHeight||(window.innerHeight-94);

  /* Sizing toutes les couches */
  ['c-cosmos','c-clouds','c-avatar'].forEach(function(id){
    var c=document.getElementById(id);
    c.width=W;c.height=H;c.style.width=W+'px';c.style.height=H+'px';
  });

  try{var sv=localStorage.getItem('z13');if(sv){chatHistory=JSON.parse(sv).slice(-20);chatHistory.forEach(function(m){addBubble(m.r,m.t,false);});}}catch(_){}
  document.addEventListener('pointerdown',_aud,{once:true,passive:true});
  document.addEventListener('keydown',_aud,{once:true,passive:true});

  requestAnimationFrame(function(){requestAnimationFrame(function(){
    initCosmos();
    initClouds();
    initAvatar();
    initCharts();
    initPointer();
    initInput();
    startPolling();
    setTimeout(function(){openPanels();setLog('Sanctuaire V13 ● actif');},1100);
    setTimeout(sWhoosh,700);
    tickTime();
  });});
});

/* ══════════════════════════════════════════════════════════
   I. COSMOS WebGL — #0A0520, violet, blue
══════════════════════════════════════════════════════════ */
function initCosmos(){
  var c=document.getElementById('c-cosmos');
  var webgl=false;
  try{var tc=document.createElement('canvas');if((tc.getContext('webgl')||tc.getContext('experimental-webgl'))&&typeof THREE!=='undefined')webgl=true;}catch(_){}
  if(!webgl){badge('2D',false);return;}

  cosmosS=new THREE.Scene();
  cosmosClock=new THREE.Clock();
  cosmosC=new THREE.PerspectiveCamera(70,W/H,.1,300);
  cosmosC.position.set(0,0,18);

  cosmosR=new THREE.WebGLRenderer({canvas:c,antialias:false,alpha:false,powerPreference:'high-performance'});
  cosmosR.setSize(W,H,false);
  cosmosR.setPixelRatio(Math.min(window.devicePixelRatio||1,1.5));
  cosmosR.setClearColor(0x0A0520,1);

  buildStars();
  buildNebulae();
  buildPlanets();
  scheduleLightning();

  /* Lumières scène */
  cosmosS.add(new THREE.AmbientLight(0x221144,.8));
  var sl=new THREE.DirectionalLight(0x4488FF,1.2);sl.position.set(-4,6,8);cosmosS.add(sl);

  window.addEventListener('resize',onResize);
  animCosmos();
  badge('V13 ✦',true);
}

function buildStars(){
  var N=1800,pos=new Float32Array(N*3),col=new Float32Array(N*3);
  for(var i=0;i<N;i++){
    pos[i*3]=(Math.random()-.5)*200;
    pos[i*3+1]=(Math.random()-.5)*120;
    pos[i*3+2]=(Math.random()-.5)*80-30;
    var r=Math.random();
    if(r<.08){col[i*3]=.7;col[i*3+1]=.9;col[i*3+2]=1;}
    else if(r<.2){col[i*3]=.5;col[i*3+1]=.6;col[i*3+2]=1;}
    else{col[i*3]=1;col[i*3+1]=1;col[i*3+2]=1;}
  }
  var g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  g.setAttribute('color',   new THREE.BufferAttribute(col,3));
  _stars=new THREE.Points(g,new THREE.PointsMaterial({size:.055,vertexColors:true,transparent:true,opacity:.8}));
  cosmosS.add(_stars);
}

function buildNebulae(){
  /* Violet haut gauche + bleu haut droite + bleu-violet centre */
  var cfgs=[
    {N:200,x:-9, y: 8,z:-22,sx:10,sy:6, r:.42,g:.13,b:.66,a:.22},
    {N:160,x: 8, y: 7,z:-24,sx:9, sy:5, r:.11,g:.31,b:.86,a:.18},
    {N:140,x:-2, y:10,z:-26,sx:11,sy:5, r:.22,g:.05,b:.58,a:.15},
    {N:120,x: 3, y:-6,z:-20,sx:8, sy:4, r:.08,g:.27,b:.78,a:.12},
  ];
  cfgs.forEach(function(cfg){
    var pos=new Float32Array(cfg.N*3);
    for(var i=0;i<cfg.N;i++){
      pos[i*3]=cfg.x+(Math.random()-.5)*cfg.sx;
      pos[i*3+1]=cfg.y+(Math.random()-.5)*cfg.sy;
      pos[i*3+2]=cfg.z+(Math.random()-.5)*3;
    }
    var g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.BufferAttribute(pos,3));
    var neb=new THREE.Points(g,new THREE.PointsMaterial({size:2.8+Math.random()*.5,color:new THREE.Color(cfg.r,cfg.g,cfg.b),transparent:true,opacity:cfg.a,sizeAttenuation:true,blending:THREE.AdditiveBlending,depthWrite:false}));
    neb.userData={bx:cfg.x,by:cfg.y,ph:Math.random()*Math.PI*2};
    cosmosS.add(neb);_nebulas.push(neb);
  });
}

/* Planètes aux positions exactes de l'image analysée */
function buildPlanets(){
  /*
    Conversion image% → espace 3D :
    xImg = 0..100% → x3D = (xImg-50)/50 * 14
    yImg = 0..100% → y3D = (50-yImg)/50 * 9
    (origin centré, y positif = haut)
  */
  var defs=[
    /* Grande Saturne-like centre haut */
    {xI:48,yI:8,  z:-28,r:2.2, rings:true, c1:0x4A28AA,c2:0x7B3FCC,speed:.0008},
    /* Moyenne bleue gauche */
    {xI:20,yI:35, z:-24,r:1.1, rings:false,c1:0x1E3A8A,c2:0x2563EB,speed:.001},
    /* Petite gauche milieu */
    {xI:15,yI:62, z:-20,r:.7,  rings:false,c1:0x1A3A5C,c2:0x2E5F9A,speed:.0015},
    /* Moyenne droite */
    {xI:72,yI:55, z:-22,r:1.0, rings:false,c1:0x1D4ED8,c2:0x3B82F6,speed:.0012},
    /* Petite orange/rouge */
    {xI:55,yI:72, z:-18,r:.45, rings:false,c1:0x8B3A1A,c2:0xC4622D,speed:.002},
    /* Petite bleue douce bas */
    {xI:45,yI:78, z:-16,r:.4,  rings:false,c1:0x1E4080,c2:0x2B6CB0,speed:.0018},
  ];
  defs.forEach(function(d){
    var x3=(d.xI-50)/50*14, y3=(50-d.yI)/50*9;

    /* Texture procédurale */
    var tc=document.createElement('canvas');tc.width=256;tc.height=128;
    var tx=tc.getContext('2d');
    var gd=tx.createLinearGradient(0,0,256,128);
    gd.addColorStop(0,'#'+d.c1.toString(16).padStart(6,'0'));
    gd.addColorStop(.6,'#'+d.c2.toString(16).padStart(6,'0'));
    gd.addColorStop(1,'#'+d.c1.toString(16).padStart(6,'0'));
    tx.fillStyle=gd;tx.fillRect(0,0,256,128);
    for(var j=0;j<5;j++){var yy=Math.random()*128;tx.fillStyle='rgba(255,255,255,.035)';tx.fillRect(0,yy,256,Math.random()*6+2);}

    var mat=new THREE.MeshPhongMaterial({map:new THREE.CanvasTexture(tc),shininess:35,emissive:new THREE.Color(d.c1).multiplyScalar(.14)});
    var mesh=new THREE.Mesh(new THREE.SphereGeometry(d.r,28,28),mat);
    mesh.position.set(x3,y3,d.z);mesh.userData.speed=d.speed;
    cosmosS.add(mesh);_planets.push(mesh);

    if(d.rings){
      var rm=new THREE.Mesh(new THREE.TorusGeometry(d.r*1.55,.07,6,80),new THREE.MeshBasicMaterial({color:0x8855CC,transparent:true,opacity:.35,side:THREE.DoubleSide}));
      rm.position.copy(mesh.position);rm.rotation.x=Math.PI/2.4;cosmosS.add(rm);
    }
    /* Point light planète */
    var pl=new THREE.PointLight(new THREE.Color(d.c2),1.2,d.r*7);
    pl.position.set(x3,y3,d.z+2);cosmosS.add(pl);
  });
}

/* Éclairs : zone (35-55% x, 5-25% y) = x3D: -2..+0.7, y3D: 3.8..6.8 */
function scheduleLightning(){
  (function loop(){setTimeout(function(){fireLightning();loop();},3500+Math.random()*5000);})();
}
function fireLightning(){
  if(_lightActive)return;
  _lightActive=true;_lightT=0;
  var sx=-1+Math.random()*1.5, sy=5.5+Math.random()*1.2;
  /* Trait principal : blanc pur */
  var pts=[new THREE.Vector3(sx,sy,-14)];
  for(var i=0;i<6;i++){sx+=(Math.random()-.35)*.6;sy-=.7+Math.random()*.5;pts.push(new THREE.Vector3(sx,sy,-14));}
  var g1=new THREE.BufferGeometry().setFromPoints(pts);
  var l1=new THREE.Line(g1,new THREE.LineBasicMaterial({color:0xFFFFFF,transparent:true,opacity:1,linewidth:3}));
  cosmosS.add(l1);_lightLines.push(l1);
  /* Branche secondaire cyan */
  var mid=pts[2].clone();
  var pts2=[mid];
  for(var j=0;j<3;j++)pts2.push(new THREE.Vector3(mid.x+(.4+Math.random()*.5)*(j+1),mid.y-(.3+Math.random()*.3)*(j+1),-14));
  var g2=new THREE.BufferGeometry().setFromPoints(pts2);
  var l2=new THREE.Line(g2,new THREE.LineBasicMaterial({color:0x00CFFF,transparent:true,opacity:.8}));
  cosmosS.add(l2);_lightLines.push(l2);
}

function animCosmos(){
  requestAnimationFrame(animCosmos);
  if(!cosmosR)return;
  var dt=cosmosClock.getDelta(),t=cosmosClock.getElapsedTime();

  /* Parallaxe caméra */
  dragVX*=.9;dragVY*=.9;
  camDX+=(dragVX*.9-camDX)*.06;
  camDY+=(dragVY*.6-camDY)*.06;
  cosmosC.position.set(camDX*3.5,camDY*2,18);
  cosmosC.lookAt(camDX*.4,camDY*.25,0);

  /* Nébuleuses ondulent */
  _nebulas.forEach(function(n){
    var ph=n.userData.ph;
    n.position.x=n.userData.bx+Math.sin(t*.2+ph)*.4;
    n.position.y=n.userData.by+Math.cos(t*.15+ph)*.25;
    n.material.opacity=n.userData.baseA||(n.userData.baseA=n.material.opacity);
    n.material.opacity=n.userData.baseA*(.7+.3*Math.sin(t*.4+ph));
  });

  /* Rotation planètes */
  _planets.forEach(function(p){p.rotation.y+=p.userData.speed;});

  /* Éclairs */
  if(_lightActive){
    _lightT+=dt;
    var vis=_lightT<.07||(_lightT>.11&&_lightT<.17)||(_lightT>.20&&_lightT<.23);
    _lightLines.forEach(function(l){l.material.opacity=vis?.95:0;});
    if(_lightT>.3){
      _lightLines.forEach(function(l){cosmosS.remove(l);l.geometry.dispose();l.material.dispose();});
      _lightLines=[];_lightActive=false;
    }
  }

  /* Étoiles scintillent */
  if(_stars)_stars.material.opacity=.65+.2*Math.sin(t*.9);

  cosmosR.render(cosmosS,cosmosC);
}

function onResize(){
  var se=document.getElementById('scene');
  W=se.offsetWidth||window.innerWidth;
  H=se.offsetHeight||(window.innerHeight-94);
  ['c-cosmos','c-clouds','c-avatar'].forEach(function(id){
    var c=document.getElementById(id);
    c.width=W;c.height=H;c.style.width=W+'px';c.style.height=H+'px';
  });
  if(cosmosR){cosmosR.setSize(W,H,false);cosmosC.aspect=W/H;cosmosC.updateProjectionMatrix();}
}

/* ══════════════════════════════════════════════════════════
   II. NUAGES + BLOOM (canvas 2D)
══════════════════════════════════════════════════════════ */
var cloudFrame=0;
function initClouds(){
  cloudCtx=document.getElementById('c-clouds').getContext('2d');
  animClouds();
}
function animClouds(){
  requestAnimationFrame(animClouds);
  if(!cloudCtx||cloudFrame++%2!==0)return; /* 30fps max */
  var ctx=cloudCtx,t=Date.now()/1000;
  ctx.clearRect(0,0,W,H);

  /* ── BLOOM central derrière la tête (y≈25%, x=50%) ── */
  var bx=W*.5, by=H*.24;
  var bloom=ctx.createRadialGradient(bx,by,0,bx,by,W*.28);
  bloom.addColorStop(0,'rgba(180,220,255,.22)');
  bloom.addColorStop(.3,'rgba(0,212,255,.1)');
  bloom.addColorStop(.7,'rgba(100,50,200,.06)');
  bloom.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=bloom;ctx.fillRect(0,0,W,H);

  /* ── NUAGES BAS (y=55%→100%) — #E8F0FF éclairés cyan ── */
  for(var layer=0;layer<4;layer++){
    var yBase=H*(.58+layer*.07);
    var scroll=Math.sin(t*.06+layer*1.4)*.012;
    var cloudGrad=ctx.createLinearGradient(0,yBase-H*.06,0,H);
    if(layer===0){
      cloudGrad.addColorStop(0,'rgba(0,0,0,0)');
      cloudGrad.addColorStop(.2,'rgba(80,120,200,.12)');/* lueur cyan dessous */
      cloudGrad.addColorStop(.5,'rgba(199,217,245,.55)');/* blanc froid */
      cloudGrad.addColorStop(1,'rgba(199,217,245,.85)');
    } else {
      cloudGrad.addColorStop(0,'rgba(0,0,0,0)');
      cloudGrad.addColorStop(.3,'rgba(180,200,240,'+(0.2+layer*.08)+')');
      cloudGrad.addColorStop(1,'rgba(210,225,255,'+(0.5+layer*.1)+')');
    }
    /* Formes de nuages via ellipses flottantes */
    ctx.fillStyle=cloudGrad;
    ctx.beginPath();
    /* Nuage gauche */
    ctx.ellipse(W*(.1+scroll),yBase+H*.02,W*.22,H*.055,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();
    ctx.ellipse(W*(.28+scroll*.5),yBase-H*.01,W*.18,H*.04,0,0,Math.PI*2);ctx.fill();
    /* Nuage centre */
    ctx.beginPath();
    ctx.ellipse(W*(.5+scroll*.3),yBase+H*.015,W*.2,H*.05,0,0,Math.PI*2);ctx.fill();
    /* Nuage droite */
    ctx.beginPath();
    ctx.ellipse(W*(.75+scroll*.7),yBase+H*.02,W*.22,H*.055,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();
    ctx.ellipse(W*(.9+scroll*.4),yBase-H*.01,W*.16,H*.04,0,0,Math.PI*2);ctx.fill();
  }

  /* Lueur cyan sur les nuages (émise depuis le bas de l'avatar) */
  var cyGlow=ctx.createRadialGradient(W*.5,H*.66,0,W*.5,H*.66,W*.35);
  cyGlow.addColorStop(0,'rgba(0,212,255,.12)');
  cyGlow.addColorStop(.5,'rgba(0,100,200,.06)');
  cyGlow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=cyGlow;ctx.fillRect(0,0,W,H);

  /* ── Horizon chaud orange/rose (y≈65%) ── */
  var hz=ctx.createLinearGradient(0,H*.62,0,H*.72);
  hz.addColorStop(0,'rgba(0,0,0,0)');
  hz.addColorStop(.5,'rgba(255,160,80,.07)');
  hz.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=hz;ctx.fillRect(0,0,W,H);
}

/* ══════════════════════════════════════════════════════════
   III. AVATAR DALEBA (canvas 2D - couche 3)
══════════════════════════════════════════════════════════ */
var codeStr='010110001101アイウDALEBA∂∞≡01110100';
function initAvatar(){
  avatarCtx=document.getElementById('c-avatar').getContext('2d');
  /* Colonnes de code défilant */
  var cols=Math.floor(W/9);
  for(var i=0;i<cols;i++)codeColumns.push({x:i*9+4,y:Math.random()*H,sp:1.2+Math.random()*2.5,a:.15+Math.random()*.4});
  animAvatar();
}
function animAvatar(){
  requestAnimationFrame(animAvatar);
  if(!avatarCtx)return;
  var ctx=avatarCtx,t=Date.now()/1000;
  ctx.clearRect(0,0,W,H);

  /* Centre avatar */
  var cx=W*.5, headTop=H*.06, afroH=H*.26, faceTop=H*.22, faceH=H*.2;
  var shoulderY=H*.64;

  /* ── Silhouette masque ── */
  ctx.save();
  buildAvaSilhouette(ctx,cx,headTop,afroH,faceTop,faceH,shoulderY);
  ctx.clip();

  /* Peau : #1A3A5C → #0D2137 */
  var skinGrad=ctx.createLinearGradient(cx,headTop,cx,shoulderY);
  skinGrad.addColorStop(0,'#102A48');
  skinGrad.addColorStop(.45,'#1A3A5C');
  skinGrad.addColorStop(1,'#0D1F35');
  ctx.fillStyle=skinGrad;
  ctx.fillRect(0,0,W,H);

  /* Code matrix sur la peau */
  drawFaceCode(ctx,cx,headTop,shoulderY,t);

  /* Lignes de circuit */
  drawCircuits(ctx,cx,faceTop,faceH,shoulderY,t);

  /* Lueur corporelle cyan */
  var bodyGlow=ctx.createRadialGradient(cx,faceTop+faceH*.5,0,cx,faceTop+faceH*.5,W*.22);
  bodyGlow.addColorStop(0,'rgba(0,212,255,.1)');
  bodyGlow.addColorStop(.5,'rgba(0,100,220,.05)');
  bodyGlow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=bodyGlow;ctx.fillRect(0,0,W,H);

  ctx.restore();

  /* ── Contour lumineux cyan ── */
  ctx.save();
  ctx.strokeStyle='rgba(0,212,255,.5)';ctx.lineWidth=1.2;
  ctx.shadowColor='#00D4FF';ctx.shadowBlur=18;
  buildAvaSilhouette(ctx,cx,headTop,afroH,faceTop,faceH,shoulderY);
  ctx.stroke();
  ctx.restore();

  /* ── YEUX : #B0E0FF ── */
  eyePulse=.65+.35*Math.sin(t*2.8);
  var eyeY=faceTop+faceH*.42;
  drawEye(ctx,cx-W*.076,eyeY,eyePulse,t);
  drawEye(ctx,cx+W*.076,eyeY,eyePulse,t);

  /* ── BOUCHE animée ── */
  mouthOpen+=(mouthTarget-mouthOpen)*.09;
  drawMouth(ctx,cx,faceTop+faceH*.72,mouthOpen,t);

  /* ── HALO afro ── */
  var ah=ctx.createRadialGradient(cx,headTop+afroH*.4,W*.1,cx,headTop+afroH*.4,W*.35);
  ah.addColorStop(0,'rgba(0,212,255,0)');
  ah.addColorStop(.7,'rgba(50,30,120,.06)');
  ah.addColorStop(1,'rgba(80,20,160,.12)');
  ctx.fillStyle=ah;
  ctx.beginPath();ctx.ellipse(cx,headTop+afroH*.4,W*.35,H*.23,0,0,Math.PI*2);ctx.fill();

  /* ── Icônes neon autour de l'afro ── */
  var icons=['⚡','◈','✦','⊕','∞','◉','⌬','⋯'];
  icons.forEach(function(ic,i){
    iconAngles[i]=(iconAngles[i]||0)+.004;
    var ang=iconAngles[i]+i*(Math.PI*2/icons.length);
    var ir=W*.27,icx=cx+Math.cos(ang)*ir,icy=headTop+afroH*.4+Math.sin(ang)*ir*.55;
    ctx.save();
    ctx.font='11px Arial';
    ctx.fillStyle='rgba(0,212,255,'+(0.28+.18*Math.sin(t+i))+')';
    ctx.shadowColor='#00D4FF';ctx.shadowBlur=7;
    ctx.fillText(ic,icx-5,icy+4);
    ctx.restore();
  });

  /* Fade du bas vers les nuages (blend avec clouds) */
  var fadeGrad=ctx.createLinearGradient(0,shoulderY-H*.08,0,H);
  fadeGrad.addColorStop(0,'rgba(0,0,0,0)');
  fadeGrad.addColorStop(1,'rgba(10,5,32,1)');
  ctx.fillStyle=fadeGrad;ctx.fillRect(0,shoulderY-H*.08,W,H);
}

function buildAvaSilhouette(ctx,cx,headTop,afroH,faceTop,faceH,shoulderY){
  /* Afro volumineuse */
  ctx.beginPath();
  ctx.ellipse(cx,headTop+afroH*.42,W*.27,afroH*.52,0,0,Math.PI*2);
  ctx.closePath();
  /* Visage */
  ctx.ellipse(cx,faceTop+faceH*.5,W*.145,faceH*.56,0,0,Math.PI*2);
  ctx.closePath();
  /* Cou */
  ctx.rect(cx-W*.045,faceTop+faceH*.88,W*.09,H*.07);
  /* Buste émergeant */
  ctx.moveTo(cx-W*.45,shoulderY+H*.05);
  ctx.quadraticCurveTo(cx-W*.2,faceTop+faceH*.95,cx-W*.055,faceTop+faceH*.94);
  ctx.lineTo(cx+W*.055,faceTop+faceH*.94);
  ctx.quadraticCurveTo(cx+W*.2,faceTop+faceH*.95,cx+W*.45,shoulderY+H*.05);
  ctx.closePath();
}

function drawFaceCode(ctx,cx,headTop,shoulderY,t){
  ctx.save();
  ctx.font='6px "Courier New",monospace';
  var faceX0=cx-W*.14, faceW=W*.28;
  var fcols=Math.floor(faceW/7);
  for(var i=0;i<fcols;i++){
    var xx=faceX0+i*7;
    var rows=Math.floor((shoulderY-headTop)/10);
    for(var r=0;r<rows;r++){
      var yy=headTop+r*10+(Math.sin(t*1.5+i*.4)*3);
      var ch=Math.random()<.5?'0':'1';
      if(Math.random()<.05)ch=codeStr[Math.floor(Math.random()*codeStr.length)];
      var alpha=.15+.15*Math.sin(t*2+i+r*.5);
      ctx.fillStyle='rgba(0,255,255,'+alpha+')';
      ctx.fillText(ch,xx,yy);
    }
  }
  ctx.restore();
}

function drawCircuits(ctx,cx,faceTop,faceH,shoulderY,t){
  ctx.save();ctx.strokeStyle='rgba(0,180,120,.15)';ctx.lineWidth=.7;
  var circuits=[
    [[cx-W*.08,faceTop+faceH*.2],[cx-W*.14,faceTop+faceH*.2],[cx-W*.14,faceTop+faceH*.35],[cx-W*.11,faceTop+faceH*.35]],
    [[cx+W*.08,faceTop+faceH*.2],[cx+W*.14,faceTop+faceH*.2],[cx+W*.14,faceTop+faceH*.35],[cx+W*.11,faceTop+faceH*.35]],
    [[cx-W*.05,faceTop+faceH*.85],[cx-W*.05,shoulderY-H*.04],[cx-W*.1,shoulderY-H*.04]],
    [[cx+W*.05,faceTop+faceH*.85],[cx+W*.05,shoulderY-H*.04],[cx+W*.1,shoulderY-H*.04]],
  ];
  circuits.forEach(function(pts){
    ctx.beginPath();pts.forEach(function(p,i){i===0?ctx.moveTo(p[0],p[1]):ctx.lineTo(p[0],p[1]);});ctx.stroke();
    var last=pts[pts.length-1];
    ctx.beginPath();ctx.arc(last[0],last[1],2,0,Math.PI*2);
    ctx.fillStyle='rgba(0,212,255,.35)';ctx.fill();
  });
  ctx.restore();
}

function drawEye(ctx,ex,ey,pulse,t){
  ctx.save();
  /* Fond de l'œil */
  ctx.beginPath();ctx.ellipse(ex,ey,W*.04,H*.018,0,0,Math.PI*2);
  ctx.fillStyle='rgba(5,10,30,.92)';ctx.fill();
  /* Iris #B0E0FF */
  var ir=ctx.createRadialGradient(ex,ey,0,ex,ey,W*.028);
  ir.addColorStop(0,'rgba(255,255,255,.95)');
  ir.addColorStop(.2,'rgba(176,224,255,1)');
  ir.addColorStop(.6,'rgba(0,130,220,.85)');
  ir.addColorStop(1,'rgba(0,20,80,.7)');
  ctx.beginPath();ctx.arc(ex,ey,W*.022,0,Math.PI*2);
  ctx.fillStyle=ir;ctx.fill();
  /* Pupille */
  ctx.beginPath();ctx.arc(ex,ey,W*.009,0,Math.PI*2);
  ctx.fillStyle='#000820';ctx.fill();
  /* Glow cyan */
  ctx.shadowColor='#B0E0FF';ctx.shadowBlur=20*pulse;
  ctx.beginPath();ctx.arc(ex,ey,W*.022,0,Math.PI*2);
  ctx.strokeStyle='rgba(176,224,255,'+(0.5*pulse)+')';ctx.lineWidth=1.5;ctx.stroke();
  /* Reflet */
  ctx.shadowBlur=0;
  ctx.beginPath();ctx.arc(ex-W*.006,ey-H*.006,W*.006,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.75)';ctx.fill();
  ctx.restore();
}

function drawMouth(ctx,mx,my,mo,t){
  ctx.save();
  var w=W*.1,h=Math.abs(mo)*H*.02+1;
  /* Lèvres */
  ctx.beginPath();
  ctx.moveTo(mx-w*.9,my);
  ctx.quadraticCurveTo(mx-w*.4,my+h*.5,mx,my+h*.3);
  ctx.quadraticCurveTo(mx+w*.4,my+h*.5,mx+w*.9,my);
  if(mo>0.05){
    ctx.quadraticCurveTo(mx+w*.4,my+h*2,mx,my+h*2.5);
    ctx.quadraticCurveTo(mx-w*.4,my+h*2,mx-w*.9,my);
  }
  ctx.fillStyle='rgba(0,8,30,.95)';if(mo>0.05)ctx.fill();
  ctx.strokeStyle='rgba(0,212,255,.5)';ctx.lineWidth=1.1;
  ctx.shadowColor='#00D4FF';ctx.shadowBlur=8;ctx.stroke();
  ctx.restore();
}

/* ══════════════════════════════════════════════════════════
   IV. MINI CHARTS
══════════════════════════════════════════════════════════ */
function initCharts(){
  ['ch1','ch2','ch3','ch4'].forEach(function(id){
    chartData[id]=[];for(var i=0;i<24;i++)chartData[id].push(.2+Math.random()*.6);
    drawChart(id);
  });
  setInterval(function(){
    ['ch1','ch2','ch3','ch4'].forEach(function(id){
      var last=chartData[id][chartData[id].length-1];
      chartData[id].push(Math.min(.95,Math.max(.05,last+(.5-Math.random())*.2)));
      if(chartData[id].length>30)chartData[id].shift();
      drawChart(id);
    });
  },1400);
}
function drawChart(id){
  var c=document.getElementById(id);if(!c)return;
  var ctx=c.getContext('2d'),CW=c.width,CH=c.height,d=chartData[id];
  ctx.clearRect(0,0,CW,CH);if(d.length<2)return;
  var step=CW/(d.length-1);
  ctx.beginPath();ctx.moveTo(0,CH);
  d.forEach(function(v,i){ctx.lineTo(i*step,CH-v*(CH-3)-2);});
  ctx.lineTo(CW,CH);ctx.closePath();
  var fill=ctx.createLinearGradient(0,0,0,CH);
  fill.addColorStop(0,'rgba(0,212,255,.3)');fill.addColorStop(1,'rgba(0,212,255,.02)');
  ctx.fillStyle=fill;ctx.fill();
  ctx.beginPath();ctx.moveTo(0,CH-d[0]*(CH-3)-2);
  d.forEach(function(v,i){ctx.lineTo(i*step,CH-v*(CH-3)-2);});
  ctx.strokeStyle='rgba(0,212,255,.8)';ctx.lineWidth=1.3;ctx.stroke();
}

/* ══════════════════════════════════════════════════════════
   V. POINTER / DRAG
══════════════════════════════════════════════════════════ */
function initPointer(){
  var se=document.getElementById('scene'),moved=false;
  se.addEventListener('pointerdown',function(e){_drag=true;_px=e.clientX;_py=e.clientY;moved=false;},{passive:true});
  se.addEventListener('pointermove',function(e){
    if(!_drag)return;moved=true;
    var dx=e.clientX-_px,dy=e.clientY-_py;
    dragVX=dx*.012;dragVY=dy*.009;
    if(Math.abs(dx)>3)sTick();
    _px=e.clientX;_py=e.clientY;
  },{passive:true});
  se.addEventListener('pointerup',function(){_drag=false;},{passive:true});
  se.addEventListener('pointercancel',function(){_drag=false;},{passive:true});
  se.addEventListener('click',function(e){
    if(moved)return;
    _aud();sPing();
    ripple(e.clientX,e.clientY-se.getBoundingClientRect().top);
    triggerSupernova();
    togglePanels();
  });
}

/* ── Supernova ── */
function triggerSupernova(){
  if(novaActive)return;
  sNova();novaActive=true;novaT=0;
  /* Bloom flash */
  var c=document.getElementById('c-clouds'),ctx=cloudCtx;
  setTimeout(function(){novaActive=false;},1600);
}
function ripple(x,y){
  var r=document.createElement('div');r.className='ripple';r.style.left=x+'px';r.style.top=y+'px';
  document.getElementById('scene').appendChild(r);
  setTimeout(function(){if(r.parentNode)r.parentNode.removeChild(r);},800);
}

/* ── Panels ── */
function openPanels(){
  panelsOpen=true;
  ['h1','h2','h3','h4'].forEach(function(id,i){
    setTimeout(function(){var el=document.getElementById(id);if(el)el.classList.add('open');},i*100);
  });
}
function closePanels(){
  panelsOpen=false;
  ['h1','h2','h3','h4'].forEach(function(id){var el=document.getElementById(id);if(el)el.classList.remove('open');});
}
function togglePanels(){if(panelsOpen)closePanels();else openPanels();sBlip();setLog(panelsOpen?'HUD actif':'HUD rétracté');}

/* ── Reflection ── */
function startReflect(){inReflect=true;mouthTarget=1;document.getElementById('reflex').classList.add('on');}
function stopReflect(){inReflect=false;mouthTarget=0;document.getElementById('reflex').classList.remove('on');}

/* ══════════════════════════════════════════════════════════
   VI. CHAT
══════════════════════════════════════════════════════════ */
function initInput(){
  if(msgEl)msgEl.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();doSend();}});
  var btn=document.getElementById('send');if(btn)btn.addEventListener('click',doSend);
}
function doSend(){
  var txt=(msgEl?msgEl.value:'').trim();if(!txt)return;
  if(msgEl)msgEl.value='';_aud();sPing();
  var cmd=txt.toLowerCase();
  if(cmd==='panels'||cmd==='open'||cmd==='modules'){openPanels();addBubble('daleba','HUD holographique déployé ✦',true);return;}
  if(cmd==='close'||cmd==='fermer'){closePanels();addBubble('daleba','HUD rétracté.',true);return;}
  if(cmd==='nova'||cmd==='supernova'){triggerSupernova();addBubble('daleba','SUPERNOVA ✦',true);return;}

  msgCount++;var wm=document.getElementById('h-msgs');if(wm)wm.textContent=msgCount;
  addBubble('user',txt,true);startReflect();

  var dots=document.createElement('div');dots.className='dots';dots.innerHTML='<span>●</span><span>●</span><span>●</span>';
  if(chatEl){chatEl.appendChild(dots);scrollChat();}

  fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:txt,sessionId:sessionId})})
  .then(function(r){return r.json();})
  .then(function(d){if(chatEl&&dots.parentNode)chatEl.removeChild(dots);stopReflect();sBlip();addBubble('daleba',d.response||d.message||'Je suis là, Ulrich.',true);setLog('Réponse ✦');})
  .catch(function(){if(chatEl&&dots.parentNode)chatEl.removeChild(dots);stopReflect();addBubble('daleba','Recalibration… 🌌',true);});
}
function addBubble(r,t,save){
  if(!chatEl)return;var b=document.createElement('div');b.className='bub '+r;b.textContent=t;
  chatEl.appendChild(b);scrollChat();
  if(save){chatHistory.push({r:r,t:t});if(chatHistory.length>30)chatHistory=chatHistory.slice(-30);try{localStorage.setItem('z13',JSON.stringify(chatHistory));}catch(_){}}
}
function scrollChat(){if(chatEl)chatEl.scrollTop=chatEl.scrollHeight;}

/* ── Polling ── */
function startPolling(){
  badge('V13 ✦',true);
  fetch('/health').then(function(r){return r.json();}).then(function(d){if(d.status==='online')setLog('Sanctuaire ● live');}).catch(function(){});
  setInterval(function(){fetch('/health').then(function(r){return r.json();}).then(function(d){badge(d.status==='online'?'V13 ✦':'ERR',d.status==='online');}).catch(function(){badge('OFFLINE',false);});},30000);
}

/* ── Utils ── */
function tickTime(){var el=document.getElementById('h-time');if(el)el.textContent=new Date().toLocaleTimeString('fr-CA');}
function setLog(m){var el=document.getElementById('h-log');if(el)el.textContent=m;tickTime();}
function badge(t,l){var b=document.getElementById('badge');if(b){b.textContent=t;b.className=l?'live':'';}}
</script>
</body>
