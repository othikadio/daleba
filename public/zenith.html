<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>DALEBA OS — ZENITH</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --em:#00FF9F;
  --em2:#50C878;
  --cy:#00D4FF;
  --terra:#C4622D;
  --bg:#000;
  --txt:#D0F0E0;
  --dim:rgba(0,255,159,0.35);
  --border:rgba(0,255,159,0.18);
  --mono:'JetBrains Mono',monospace;
  --ui:'Space Grotesk',sans-serif;
}

html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:#000;
  color:var(--txt);
  font-family:var(--ui);
}

/* ── LAYOUT ──────────────────────────────────────── */
#shell{
  display:flex;
  flex-direction:column;
  width:100vw;
  height:100vh;
  position:relative;
  overflow:hidden;
}

/* ── HEADER ──────────────────────────────────────── */
#hdr{
  position:relative;
  z-index:200;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 24px;
  height:50px;
  border-bottom:1px solid var(--border);
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(16px);
  flex-shrink:0;
}
.logo{font-family:var(--mono);font-size:.9rem;font-weight:700;color:var(--em);letter-spacing:.18em}
.ver{font-family:var(--mono);font-size:.58rem;color:rgba(0,255,159,.4);margin-left:8px}
.online-dot{width:7px;height:7px;border-radius:50%;background:var(--em);box-shadow:0 0 10px var(--em);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.online-lbl{font-family:var(--mono);font-size:.65rem;color:var(--em);letter-spacing:.12em;margin-left:6px}
.nav-links{display:flex;gap:16px}
.nav-links a{font-family:var(--mono);font-size:.62rem;color:rgba(0,255,159,.5);text-decoration:none;transition:color .2s}
.nav-links a:hover{color:var(--em)}
.ws-badge{font-family:var(--mono);font-size:.6rem;padding:3px 10px;border:1px solid var(--border);border-radius:20px;color:rgba(0,255,159,.5)}
.ws-badge.live{color:var(--em);border-color:var(--dim)}

/* ── SCENE (full remaining height) ──────────────── */
#scene{
  position:relative;
  flex:1;
  width:100%;
  overflow:hidden;
}

/* Canvas THREE.JS — dimensions forcées via JS */
#planet{
  display:block;
  position:absolute;
  top:0;left:0;
  /* width/height set by JS */
}

/* ── WIDGETS ──────────────────────────────────────── */
.w{
  position:absolute;
  z-index:50;
  width:188px;
  background:rgba(0,0,0,0.55);
  border:1px solid var(--border);
  border-radius:6px;
  padding:12px 14px;
  backdrop-filter:blur(12px);
  animation:wfade .8s ease forwards;
  opacity:0;
}
@keyframes wfade{to{opacity:1;transform:translateY(0)}from{opacity:0;transform:translateY(6px)}}
#w1{top:16px;left:16px;animation-delay:.4s}
#w2{top:16px;right:16px;animation-delay:.6s}
#w3{bottom:72px;left:16px;animation-delay:.8s}
#w4{bottom:72px;right:16px;animation-delay:1s}
.wt{font-family:var(--mono);font-size:.6rem;font-weight:700;color:var(--em);letter-spacing:.15em;text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:8px}
.wr{display:flex;justify-content:space-between;margin-bottom:4px}
.wl{font-family:var(--mono);font-size:.58rem;color:rgba(255,255,255,.4)}
.wv{font-family:var(--mono);font-size:.6rem;color:var(--em)}
@media(max-width:640px){.w{display:none}}

/* ── REFLECTION OVERLAY ──────────────────────────── */
#reflex{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:60;
  text-align:center;
  pointer-events:none;
  opacity:0;
  transition:opacity .3s;
}
#reflex.on{opacity:1}
.rtxt{font-family:var(--mono);font-size:.75rem;color:var(--em);letter-spacing:.25em;text-transform:uppercase;animation:flk 1.2s infinite}
@keyframes flk{0%,100%{opacity:1}45%{opacity:.5}50%{opacity:.2}55%{opacity:.8}}

/* ── INPUT BAR ────────────────────────────────────── */
#bar{
  position:relative;
  z-index:200;
  flex-shrink:0;
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 20px;
  height:54px;
  border-top:1px solid var(--border);
  background:rgba(0,0,0,0.8);
  backdrop-filter:blur(16px);
}
.prompt{font-family:var(--mono);font-size:1rem;color:var(--em);flex-shrink:0}
#msg{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  color:var(--txt);
  font-family:var(--mono);
  font-size:.85rem;
  caret-color:var(--em);
}
#msg::placeholder{color:rgba(0,255,159,.25)}
#send{
  background:none;
  border:1px solid var(--dim);
  color:var(--em);
  font-family:var(--mono);
  font-size:.8rem;
  padding:5px 14px;
  border-radius:4px;
  cursor:pointer;
  transition:all .2s;
  flex-shrink:0;
}
#send:hover{background:rgba(0,255,159,.1)}

/* ── CHAT PANEL ──────────────────────────────────── */
#chat{
  position:absolute;
  bottom:60px;right:0;
  width:340px;
  max-height:calc(100% - 130px);
  overflow-y:auto;
  z-index:100;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
#chat::-webkit-scrollbar{width:3px}
#chat::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
.bubble{
  max-width:90%;
  padding:8px 12px;
  border-radius:6px;
  font-family:var(--mono);
  font-size:.72rem;
  line-height:1.5;
  animation:bub .3s ease;
}
@keyframes bub{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.bubble.user{align-self:flex-end;background:rgba(0,255,159,.08);border:1px solid rgba(0,255,159,.2);color:#fff}
.bubble.daleba{align-self:flex-start;background:rgba(0,0,0,.5);border:1px solid var(--border);color:var(--em)}
.bubble.daleba::before{content:'DALEBA › ';font-weight:700;letter-spacing:.05em}
.typing{align-self:flex-start;font-family:var(--mono);font-size:.7rem;color:var(--dim);padding:4px 8px}
.typing span{animation:dots 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes dots{0%,80%,100%{opacity:.2}40%{opacity:1}}
@media(max-width:640px){#chat{width:100%}}
</style>
</head>
<body>
<div id="shell">

  <!-- HEADER -->
  <div id="hdr">
    <div style="display:flex;align-items:center">
      <span class="logo">DALEBA</span>
      <span class="ver">OS v2.0</span>
    </div>
    <div style="display:flex;align-items:center">
      <div class="online-dot"></div>
      <span class="online-lbl">ONLINE</span>
    </div>
    <div style="display:flex;align-items:center;gap:16px">
      <div class="nav-links">
        <a href="/">← Accueil</a>
        <a href="/reservation">Réserver</a>
        <a href="/dashboard">Dashboard</a>
      </div>
      <span class="ws-badge" id="wsbadge">HTTP ●</span>
    </div>
  </div>

  <!-- SCENE 3D -->
  <div id="scene">
    <canvas id="planet"></canvas>

    <!-- Floating widgets -->
    <div class="w" id="w1">
      <div class="wt">📅 Salon Live</div>
      <div class="wr"><span class="wl">RDV aujourd'hui</span><span class="wv" id="w-rdv">0</span></div>
      <div class="wr"><span class="wl">Prochain RDV</span><span class="wv">--</span></div>
      <div class="wr"><span class="wl">Coiffeurs actifs</span><span class="wv">3</span></div>
    </div>
    <div class="w" id="w2">
      <div class="wt">⚡ Système</div>
      <div class="wr"><span class="wl">Latence</span><span class="wv">&lt;120ms</span></div>
      <div class="wr"><span class="wl">Modèle IA</span><span class="wv">Claude</span></div>
      <div class="wr"><span class="wl">Status</span><span class="wv">● ONLINE</span></div>
    </div>
    <div class="w" id="w3">
      <div class="wt">📊 Activité</div>
      <div class="wr"><span class="wl">Messages</span><span class="wv" id="w-msgs">0</span></div>
      <div class="wr"><span class="wl">SMS envoyés</span><span class="wv">0</span></div>
      <div class="wr"><span class="wl">RDV créés</span><span class="wv">0</span></div>
    </div>
    <div class="w" id="w4">
      <div class="wt">🔄 Dernier log</div>
      <div class="wr"><span class="wl" id="w-log" style="color:var(--em);font-size:.58rem">Système initialisé</span></div>
      <div class="wr"><span class="wl" id="w-time" style="font-size:.55rem"></span></div>
    </div>

    <!-- Reflection overlay -->
    <div id="reflex"><div class="rtxt">DALEBA calcule…</div></div>

    <!-- Chat panel -->
    <div id="chat"></div>
  </div>

  <!-- INPUT BAR -->
  <div id="bar">
    <span class="prompt">›</span>
    <input id="msg" type="text" placeholder="Parle à DALEBA… (entrée pour envoyer)" autocomplete="off" autocorrect="off" spellcheck="false"/>
    <button id="send">↑ ENVOYER</button>
  </div>

</div>

<!-- THREE.JS via UNPKG (fallback si cdnjs échoue) -->
<script>
(function(){
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js';
  s.onerror=function(){
    var s2=document.createElement('script');
    s2.src='https://unpkg.com/three@0.134.0/build/three.min.js';
    s2.onload=bootZenith;
    s2.onerror=function(){ window._THREE_FAILED=true; bootZenith(); };
    document.head.appendChild(s2);
  };
  s.onload=bootZenith;
  document.head.appendChild(s);
})();
</script>

<script>
/* ============================================================
   DALEBA ZENITH — Moteur principal
   Ordre d'exécution :
   1. Three.js chargé → bootZenith()
   2. bootZenith() → initPlanet() → initThree() ou canvas2DFallback()
   3. animate() loop → requestAnimationFrame infini
   4. initChat() → input + API
   5. connectHTTP() → polling /health toutes les 30s
============================================================ */

// ── GLOBALS ──────────────────────────────────────────────
var scene, camera, renderer, clock;
var particleSystem, lineSegments;
var rotSpeed = 0.0015, targetRot = 0.0015;
var waveActive = false, waveTime = 0;
var reflectionMode = false;
var msgCount = 0;
var sessionId = 'z-' + Math.random().toString(36).slice(2,10);
var chatEl, msgEl, chatHistory = [];

// ── ENTRY POINT ──────────────────────────────────────────
function bootZenith() {
  // Mettre à jour l'heure widget
  var wt = document.getElementById('w-time');
  if(wt) wt.textContent = new Date().toLocaleString('fr-CA');

  chatEl  = document.getElementById('chat');
  msgEl   = document.getElementById('msg');

  // Restore history
  try {
    var saved = localStorage.getItem('daleba-chat');
    if(saved) {
      chatHistory = JSON.parse(saved).slice(-20);
      chatHistory.forEach(function(m){ addBubble(m.role, m.text, false); });
    }
  } catch(_){}

  // Init planète
  initPlanet();

  // Input
  initInput();

  // Polling HTTP (serverless-friendly, pas de WS)
  connectHTTP();
}

// ── PLANET INIT ──────────────────────────────────────────
function initPlanet() {
  if(window._THREE_FAILED || typeof THREE === 'undefined') {
    canvas2DFallback();
    return;
  }

  var canvas = document.getElementById('planet');
  var scene_el = document.getElementById('scene');

  // FORCER les dimensions avec window.innerWidth/Height
  // (canvas.offsetWidth est 0 si le layout n'est pas encore rendu)
  var W = scene_el.clientWidth  || window.innerWidth;
  var H = scene_el.clientHeight || (window.innerHeight - 104); // header(50) + bar(54)

  if(W < 10 || H < 10) {
    W = window.innerWidth;
    H = window.innerHeight - 104;
  }

  // Appliquer les dimensions au canvas AVANT de créer le renderer
  canvas.width  = W;
  canvas.height = H;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';

  try {
    initThree(canvas, W, H);
  } catch(e) {
    console.warn('[ZENITH] Three.js error:', e.message);
    canvas2DFallback();
  }
}

// ── THREE.JS INIT ─────────────────────────────────────────
function initThree(canvas, W, H) {
  scene  = new THREE.Scene();
  clock  = new THREE.Clock();
  camera = new THREE.PerspectiveCamera(55, W/H, 0.1, 100);
  camera.position.set(0, 0, 5.5);

  // Renderer — test WebGL explicitement d'abord
  var testCtx = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if(!testCtx) throw new Error('No WebGL context');

  renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true, context: testCtx });
  renderer.setSize(W, H, false); // false = ne pas modifier le style CSS
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setClearColor(0x000000, 0);

  // ── LUMIÈRES ──
  scene.add(new THREE.AmbientLight(0x003311, 2.0));
  var dlight = new THREE.DirectionalLight(0x00ff9f, 1.5);
  dlight.position.set(5, 5, 5);
  scene.add(dlight);
  var plight = new THREE.PointLight(0x00d4ff, 2.0, 20);
  plight.position.set(-3, 2, 4);
  scene.add(plight);

  // ── PLANÈTE DE PARTICULES ──
  var N = 900;
  var R = 2.0;
  var positions = new Float32Array(N * 3);
  var colors    = new Float32Array(N * 3);
  var origPos   = new Float32Array(N * 3);

  for(var i = 0; i < N; i++) {
    // Distribution Fibonacci (uniforme sur la sphère)
    var phi   = Math.acos(1 - 2*(i+0.5)/N);
    var theta = Math.PI*(1+Math.sqrt(5))*i;
    var x = R * Math.sin(phi) * Math.cos(theta);
    var y = R * Math.sin(phi) * Math.sin(theta);
    var z = R * Math.cos(phi);
    positions[i*3]   = origPos[i*3]   = x;
    positions[i*3+1] = origPos[i*3+1] = y;
    positions[i*3+2] = origPos[i*3+2] = z;
    // Couleur : émeraude (#50C878) → cyan (#00D4FF) selon latitude
    var t = (y/R + 1) / 2;
    colors[i*3]   = (1-t)*0.31 + t*0.0;   // R
    colors[i*3+1] = (1-t)*0.78 + t*0.83;  // G
    colors[i*3+2] = (1-t)*0.47 + t*1.0;   // B
  }

  particleSystem = window._particles = new THREE.Points(
    Object.assign(new THREE.BufferGeometry(), {
      _orig: origPos
    }),
    new THREE.PointsMaterial({ size: 0.055, vertexColors: true, sizeAttenuation: true, transparent: true, opacity: 1.0 })
  );
  particleSystem.geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  particleSystem.geometry.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
  scene.add(particleSystem);

  // ── LIGNES DE CONNEXION ──
  buildLines(positions, N, R);

  // ── ANNEAU ORBITAL ──
  var ringGeo = new THREE.TorusGeometry(R * 1.35, 0.006, 6, 120);
  var ringMat = new THREE.MeshBasicMaterial({ color: 0x00ff9f, transparent: true, opacity: 0.25 });
  var ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 2.8;
  scene.add(ring);
  window._ring = ring;

  // ── HALO GLOW (sphère large, faces internes) ──
  var haloGeo = new THREE.SphereGeometry(R * 1.15, 32, 32);
  var haloMat = new THREE.MeshBasicMaterial({ color: 0x00ff9f, transparent: true, opacity: 0.04, side: THREE.BackSide });
  scene.add(new THREE.Mesh(haloGeo, haloMat));

  // ── RESIZE ──
  window.addEventListener('resize', function() {
    var se = document.getElementById('scene');
    var nW = se.clientWidth  || window.innerWidth;
    var nH = se.clientHeight || (window.innerHeight - 104);
    canvas.width  = nW; canvas.height  = nH;
    canvas.style.width  = nW+'px'; canvas.style.height = nH+'px';
    camera.aspect = nW/nH;
    camera.updateProjectionMatrix();
    renderer.setSize(nW, nH, false);
  });

  // ── DRAG ORBIT ──
  setupDrag(canvas);

  // ── LANCER LA BOUCLE ──
  animate();

  // Son de démarrage
  playWhoosh();
}

// ── LIGNES DE CONNEXION ──────────────────────────────────
function buildLines(positions, N, R) {
  if(lineSegments) { scene.remove(lineSegments); lineSegments.geometry.dispose(); }
  var verts = [];
  var DIST2 = 0.75 * 0.75;
  for(var i = 0; i < N; i++) {
    for(var j = i+1; j < N; j++) {
      var dx = positions[i*3]   - positions[j*3];
      var dy = positions[i*3+1] - positions[j*3+1];
      var dz = positions[i*3+2] - positions[j*3+2];
      if(dx*dx+dy*dy+dz*dz < DIST2) {
        verts.push(positions[i*3], positions[i*3+1], positions[i*3+2]);
        verts.push(positions[j*3], positions[j*3+1], positions[j*3+2]);
      }
    }
  }
  var lGeo = new THREE.BufferGeometry();
  lGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(verts), 3));
  lineSegments = new THREE.LineSegments(lGeo, new THREE.LineBasicMaterial({ color: 0x00ff9f, transparent: true, opacity: 0.12 }));
  scene.add(lineSegments);
}

// ── BOUCLE D'ANIMATION ────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  if(!renderer || !scene || !camera) return;

  var dt = clock.getDelta();
  var t  = clock.getElapsedTime();

  // Rotation planète
  rotSpeed += (targetRot - rotSpeed) * 0.05;
  if(particleSystem) {
    particleSystem.rotation.y += rotSpeed;
    if(window._ring) window._ring.rotation.z += rotSpeed * 0.4;
  }

  // Pulsation des particules
  if(particleSystem) {
    var pos = particleSystem.geometry.attributes.position.array;
    var orig = particleSystem.geometry._orig;
    if(orig) {
      var pulse = 1 + Math.sin(t * 1.2) * 0.015;
      for(var i = 0; i < pos.length; i++) pos[i] = orig[i] * pulse;
      particleSystem.geometry.attributes.position.needsUpdate = true;
    }
    // Opacité en mode réflexion
    particleSystem.material.opacity = reflectionMode ? 0.5 + Math.sin(t*4)*0.3 : 1.0;
  }

  // Onde sur frappe
  if(waveActive) {
    waveTime += dt * 3;
    if(particleSystem) {
      var pos2 = particleSystem.geometry.attributes.position.array;
      var orig2 = particleSystem.geometry._orig;
      if(orig2) {
        for(var k = 0; k < pos2.length/3; k++) {
          var dist = Math.sqrt(orig2[k*3]*orig2[k*3] + orig2[k*3+1]*orig2[k*3+1] + orig2[k*3+2]*orig2[k*3+2]);
          var wave = Math.sin(dist * 3 - waveTime) * 0.08;
          pos2[k*3]   = orig2[k*3]   * (1 + wave);
          pos2[k*3+1] = orig2[k*3+1] * (1 + wave);
          pos2[k*3+2] = orig2[k*3+2] * (1 + wave);
        }
        particleSystem.geometry.attributes.position.needsUpdate = true;
      }
    }
    if(waveTime > Math.PI * 2) waveActive = false;
  }

  renderer.render(scene, camera);
}

// ── FALLBACK CANVAS 2D (si WebGL échoue) ─────────────────
function canvas2DFallback() {
  var canvas = document.getElementById('planet');
  var se = document.getElementById('scene');
  var W = se.clientWidth  || window.innerWidth;
  var H = se.clientHeight || (window.innerHeight - 104);
  canvas.width = W; canvas.height = H;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';

  var ctx = canvas.getContext('2d');
  var cx = W/2, cy = H/2;
  var points = [];
  // Générer 200 points sur sphère projetée
  for(var i = 0; i < 200; i++) {
    var phi = Math.acos(1 - 2*(i+0.5)/200);
    var theta = Math.PI*(1+Math.sqrt(5))*i;
    var x = Math.sin(phi)*Math.cos(theta);
    var y = Math.sin(phi)*Math.sin(theta);
    var z = Math.cos(phi);
    points.push({x:x,y:y,z:z, ox:x, oy:y, oz:z});
  }

  var angle = 0;
  var R = Math.min(W,H) * 0.3;

  function draw2D() {
    requestAnimationFrame(draw2D);
    ctx.clearRect(0,0,W,H);
    angle += 0.008;

    // Fond radial
    var grad = ctx.createRadialGradient(cx,cy,0,cx,cy,R*1.3);
    grad.addColorStop(0, 'rgba(0,255,159,0.06)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);

    // Projeter et dessiner les points avec rotation Y
    var cos = Math.cos(angle), sin = Math.sin(angle);
    var projected = points.map(function(p) {
      var rx = p.ox*cos - p.oz*sin;
      var ry = p.oy;
      var rz = p.ox*sin + p.oz*cos;
      var scale = (rz + 2) / 3;
      return { sx: cx + rx*R*scale, sy: cy + ry*R*scale, z: rz, s: scale };
    }).sort(function(a,b){ return a.z-b.z; });

    // Lignes entre proches
    ctx.strokeStyle = 'rgba(0,255,159,0.12)';
    ctx.lineWidth = 0.8;
    for(var i = 0; i < projected.length; i++) {
      for(var j = i+1; j < projected.length; j++) {
        var dx = projected[i].sx - projected[j].sx;
        var dy = projected[i].sy - projected[j].sy;
        if(dx*dx+dy*dy < (R*0.35)*(R*0.35)) {
          ctx.beginPath();
          ctx.moveTo(projected[i].sx, projected[i].sy);
          ctx.lineTo(projected[j].sx, projected[j].sy);
          ctx.stroke();
        }
      }
    }

    // Points
    projected.forEach(function(p) {
      var alpha = 0.4 + p.s * 0.6;
      var size  = 1.5 + p.s * 2;
      ctx.beginPath();
      ctx.arc(p.sx, p.sy, size, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(0,255,159,' + alpha + ')';
      ctx.shadowBlur = 8;
      ctx.shadowColor = '#00FF9F';
      ctx.fill();
    });

    // Halo central
    var g2 = ctx.createRadialGradient(cx,cy,0,cx,cy,R*0.5);
    g2.addColorStop(0,'rgba(0,255,159,0.15)');
    g2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = g2;
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(cx,cy,R*0.5,0,Math.PI*2);
    ctx.fill();
  }
  draw2D();
  document.getElementById('wsbadge').textContent = '2D ●';
}

// ── DRAG ORBIT ─────────────────────────────────────────────
function setupDrag(canvas) {
  var dragging = false, lastX = 0, lastY = 0;
  canvas.addEventListener('mousedown', function(e){ dragging=true; lastX=e.clientX; lastY=e.clientY; });
  window.addEventListener('mouseup',   function(){ dragging=false; });
  window.addEventListener('mousemove', function(e){
    if(!dragging || !particleSystem) return;
    var dx = (e.clientX-lastX)*0.008;
    var dy = (e.clientY-lastY)*0.008;
    particleSystem.rotation.y += dx;
    particleSystem.rotation.x += dy;
    if(window._ring){ window._ring.rotation.y += dx; }
    lastX=e.clientX; lastY=e.clientY;
  });
  canvas.addEventListener('touchstart', function(e){ dragging=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; },{passive:true});
  window.addEventListener('touchend',   function(){ dragging=false; });
  window.addEventListener('touchmove',  function(e){
    if(!dragging || !particleSystem) return;
    var dx = (e.touches[0].clientX-lastX)*0.008;
    particleSystem.rotation.y += dx;
    if(window._ring) window._ring.rotation.y += dx;
    lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  },{passive:true});
}

// ── REFLECTION MODE ─────────────────────────────────────────
function enterReflection() {
  reflectionMode = true;
  targetRot = 0.006;
  var r = document.getElementById('reflex');
  if(r) r.classList.add('on');
}
function exitReflection() {
  reflectionMode = false;
  targetRot = 0.0015;
  var r = document.getElementById('reflex');
  if(r) r.classList.remove('on');
}

// ── CHAT ───────────────────────────────────────────────────
function initInput() {
  var sendBtn = document.getElementById('send');
  if(!msgEl || !sendBtn) return;
  sendBtn.addEventListener('click', sendMsg);
  msgEl.addEventListener('keydown', function(e){ if(e.key==='Enter') sendMsg(); });
}

function sendMsg() {
  if(!msgEl) return;
  var txt = msgEl.value.trim();
  if(!txt) return;
  msgEl.value = '';
  msgCount++;
  var wm = document.getElementById('w-msgs');
  if(wm) wm.textContent = msgCount;

  addBubble('user', txt, true);
  triggerWave();
  enterReflection();

  // Typing indicator
  var typing = document.createElement('div');
  typing.className = 'typing';
  typing.innerHTML = '<span>●</span><span>●</span><span>●</span>';
  if(chatEl) chatEl.appendChild(typing);
  scrollChat();

  fetch('/api/chat', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ message: txt, sessionId: sessionId })
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    if(chatEl && typing.parentNode) chatEl.removeChild(typing);
    exitReflection();
    addBubble('daleba', d.response || d.message || 'Daleba est en ligne.', true);
    var wl = document.getElementById('w-log');
    if(wl) wl.textContent = 'Message reçu ✓';
  })
  .catch(function(){
    if(chatEl && typing.parentNode) chatEl.removeChild(typing);
    exitReflection();
    addBubble('daleba', 'Recalibration en cours… Réessaie dans un instant. 🔄', true);
  });
}

function addBubble(role, text, save) {
  if(!chatEl) return;
  var b = document.createElement('div');
  b.className = 'bubble ' + role;
  b.textContent = text;
  chatEl.appendChild(b);
  scrollChat();
  if(save) {
    chatHistory.push({ role: role, text: text });
    if(chatHistory.length > 30) chatHistory = chatHistory.slice(-30);
    try { localStorage.setItem('daleba-chat', JSON.stringify(chatHistory)); } catch(_){}
  }
}

function scrollChat() {
  if(chatEl) chatEl.scrollTop = chatEl.scrollHeight;
}

function triggerWave() {
  waveActive = true; waveTime = 0;
  if(particleSystem) { targetRot = 0.004; setTimeout(function(){ targetRot = 0.0015; }, 1500); }
}

// ── SON (Web Audio API) ────────────────────────────────────
function playWhoosh() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var buf = ctx.createBuffer(1, ctx.sampleRate*0.4, ctx.sampleRate);
    var d = buf.getChannelData(0);
    for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*6)*0.15;
    var src = ctx.createBufferSource();
    src.buffer = buf;
    var f = ctx.createBiquadFilter();
    f.type='bandpass'; f.frequency.value=400; f.Q.value=0.5;
    src.connect(f); f.connect(ctx.destination);
    src.start();
  } catch(_){}
}

// ── HTTP POLLING (serverless-compatible) ──────────────────
function connectHTTP() {
  var badge = document.getElementById('wsbadge');
  if(badge){ badge.textContent='HTTP ●'; badge.className='ws-badge live'; }

  setInterval(function() {
    fetch('/health')
      .then(function(r){ return r.json(); })
      .then(function(d){
        if(badge) badge.textContent = d.status==='online' ? 'HTTP ●' : 'ERR';
      })
      .catch(function(){
        if(badge){ badge.textContent='OFFLINE'; badge.className='ws-badge'; }
      });
  }, 30000);
}
