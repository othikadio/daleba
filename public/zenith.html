<style>

<script>
/* ═══════════════════════════════════════════════════════════
   DALEBA ZENITH V16 — CAHIER DES CHARGES ABSOLU
   Peau #0D2137 + cyan matrix · Choker · Yeux #B0E0FF
   Aube dorée 65% · Cumulonimbus blanc-bleu · Saturne 45°
   Foudre hiérarchique · Étoiles 4 branches · HUD fine-art
═══════════════════════════════════════════════════════════ */

/* ── AUDIO ───────────────────────────────────────────── */
var _AC=null;
function _aud(){if(!_AC){try{_AC=new(window.AudioContext||window.webkitAudioContext)()}catch(e){return null}}if(_AC&&_AC.state==='suspended')_AC.resume();return _AC&&_AC.state==='running'?_AC:null}
function _tone(f,d,v,t){try{var ac=_aud();if(!ac)return;var o=ac.createOscillator(),g=ac.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||.05,ac.currentTime);g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d)}catch(e){}}
function sPing(){_tone(880,.18,.06);setTimeout(function(){_tone(1760,.1,.03)},65)}
function sNova(){_tone(55,.7,.12,'sawtooth');setTimeout(function(){_tone(440,.3,.04)},90)}
function sWhoosh(){try{var ac=_aud();if(!ac)return;var b=ac.createBuffer(1,ac.sampleRate*.35,ac.sampleRate),d=b.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*7)*.1;var s=ac.createBufferSource();s.buffer=b;var f=ac.createBiquadFilter();f.type='bandpass';f.frequency.value=460;s.connect(f);f.connect(ac.destination);s.start()}catch(e){}}

/* ── STATE ───────────────────────────────────────────── */
var W=0,H=0,PR=1;
var renderer,scene,camera,clock;
var bgMesh,faceGroup,faceMat,faceSolid;
var cloudMeshes=[],planetGroup;
var lightningMesh,lightActive=false,lightT=0;
var charAtlas=null;
var camRotX=0,camRotY=0,dragVX=0,dragVY=0;
var _drag=false,_px=0,_py=0,_pT=0;
var novaActive=false,novaT=0;
var panelsOpen=false,msgCount=0;
var chatEl,msgEl,chatHistory=[];
var chartBuf={};
var fc=0;

/* ── BOOT ────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded',function(){
  chatEl=document.getElementById('chat');msgEl=document.getElementById('msg');
  document.addEventListener('pointerdown',_aud,{once:true,passive:true});
  document.addEventListener('keydown',_aud,{once:true,passive:true});
  requestAnimationFrame(function(){requestAnimationFrame(function(){
    var se=document.getElementById('scene');
    W=se.offsetWidth||window.innerWidth;H=se.offsetHeight||(window.innerHeight-87);
    PR=Math.min(window.devicePixelRatio||1,1.5);
    var c=document.getElementById('webgl');
    c.width=Math.floor(W*PR);c.height=Math.floor(H*PR);
    c.style.width=W+'px';c.style.height=H+'px';
    try{var sv=localStorage.getItem('z16');if(sv){chatHistory=JSON.parse(sv).slice(-16);chatHistory.forEach(function(m){addBubble(m.r,m.t,false)})}}catch(e){}
    buildAtlas(function(tex){
      charAtlas=tex;
      if(!boot(c)){badge('ERR',false);return}
      initCharts();initPointer();initInput();startPolling();
      setTimeout(function(){openPanels();setLog('DALEBA V16 ● sanctuaire actif')},1200);
      setTimeout(sWhoosh,500);
      tickClock();
    });
  })});
});

/* ── ATLAS ───────────────────────────────────────────── */
function buildAtlas(cb){
  var S=256,C=32,N=8;
  var cv=document.createElement('canvas');cv.width=S;cv.height=S;
  var cx=cv.getContext('2d');cx.fillStyle='#000';cx.fillRect(0,0,S,S);
  cx.fillStyle='#fff';cx.font='bold 18px monospace';cx.textAlign='center';cx.textBaseline='middle';
  var ch='01010110010001000101ABCDEFGHIJKLMNOPQRSTUVWXYZ0101abcdefghij|/>#{@~*01'.split('');
  while(ch.length<64)ch.push(ch[fc++%ch.length]);
  for(var i=0;i<64;i++)cx.fillText(ch[i],i%N*C+C/2,Math.floor(i/N)*C+C/2);
  var t=new THREE.Texture(cv);t.needsUpdate=true;cb(t);
}

/* ── BOOT 3D ─────────────────────────────────────────── */
function boot(canvas){
  try{
    scene=new THREE.Scene();clock=new THREE.Clock();
    camera=new THREE.PerspectiveCamera(57,W/H,.1,350);
    camera.position.set(0,.3,7);camera.lookAt(0,.3,0);
    renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:false,alpha:false,powerPreference:'high-performance'});
    renderer.setPixelRatio(PR);renderer.setSize(W,H,false);renderer.setClearColor(0x03000E,1);
    buildBG();buildStars();buildNebulaLayers();buildPlanets();buildBottomClouds();buildFace();scheduleLightning();
    scene.add(new THREE.AmbientLight(0x1A0845,1.1));
    var dl=new THREE.DirectionalLight(0x5577DD,1.6);dl.position.set(-3,5,4);scene.add(dl);
    var pl=new THREE.PointLight(0x00FFFF,3,14);pl.position.set(0,1.5,3.5);scene.add(pl);
    var pl2=new THREE.PointLight(0xFF9933,2.2,22);pl2.position.set(0,-5,1);scene.add(pl2);
    window.addEventListener('resize',onResize);animate();badge('V16 ✦',true);return true;
  }catch(e){console.error(e);return false}
}

/* ═══ BACKGROUND SHADER — FBM Nébuleuse + Aube Dorée ═══ */
function buildBG(){
  var V='varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position.xy,1.,1.);}';
  var F=[
    'precision mediump float;uniform float uT;varying vec2 vUv;',
    'float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}',
    'float no(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}',
    'float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<8;i++){v+=a*no(p);p=p*2.2+vec2(.22,-.14);a*=.48;}return v;}',
    'void main(){',
    '  vec2 uv=vUv;float t=uT*.014;',
    '  vec3 base=vec3(.007,.0,.042);',
    '  float n1=fbm(uv*2.7+vec2(t,t*.3));',
    '  float n2=fbm(uv*4.9-vec2(t*.6,0.)+n1*.35);',
    '  float n3=fbm(uv*9.+vec2(0.,t*.45));',
    '  vec3 c=mix(base,vec3(.09,.0,.38),pow(n1*n2,1.1)*.72);',
    '  c=mix(c,vec3(.34,.04,.68),pow(n2*n3,.82)*.58);',
    '  c=mix(c,vec3(.58,.1,.86),pow(n3,2.4)*.32);',
    // 4-branch star foyers
    '  float sf=pow(max(0.,1.-abs(h(floor(uv*340.)*2.5)-.5)*44.),3.)*.85;',
    '  float sa=atan(fract(uv.y*340.)-.5,fract(uv.x*340.)-.5);',
    '  float sb=abs(sin(sa*2.));',
    '  c+=vec3(sf*.4,sf*.45*sb,sf)*mix(.7,1.,sb);',
    // === AUBE COSMIQUE DORÉE — transition tranchée à 65% ===
    '  float hz=.65;',
    '  float hd=abs(uv.y-hz);',
    '  float hs=smoothstep(.12,.0,hd);',
    '  float hup=smoothstep(0.,.08,uv.y-hz);',
    '  float hdn=smoothstep(0.,.08,hz-uv.y);',
    '  vec3 gold=vec3(.95,.62,.08);',
    '  vec3 rose=vec3(1.,.28,.12);',
    '  vec3 warm=mix(gold,rose,hdn*.6);',
    '  c=mix(c,warm,hs*.68);',
    '  c+=warm*pow(hs,2.)*.38;',
    // Vignette
    '  c*=1.-pow(length((uv-.5)*vec2(.95,.58)),.75)*.38;',
    '  c*=mix(.44,1.,smoothstep(0.,.38,uv.y));',
    '  gl_FragColor=vec4(clamp(c,0.,1.),1.);',
    '}'
  ].join('\n');
  bgMesh=new THREE.Mesh(new THREE.PlaneGeometry(2,2),new THREE.ShaderMaterial({vertexShader:V,fragmentShader:F,uniforms:{uT:{value:0}},depthWrite:false,depthTest:false}));
  bgMesh.renderOrder=-100;scene.add(bgMesh);
}

/* ═══ STARS ═══ */
function buildStars(){
  var N=1900,pos=new Float32Array(N*3),sz=new Float32Array(N);
  for(var i=0;i<N;i++){pos[i*3]=(Math.random()*2-1)*95;pos[i*3+1]=(Math.random()*2-1)*65;pos[i*3+2]=-72-Math.random()*88;sz[i]=.3+Math.random()*1.6;}
  var geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.BufferAttribute(pos,3));geo.setAttribute('size',new THREE.BufferAttribute(sz,1));
  // 4-branch star foyer in fragment shader
  var V='attribute float size;void main(){vec4 mv=modelViewMatrix*vec4(position,1.);gl_Position=projectionMatrix*mv;gl_PointSize=size*2.;}';
  var F=[
    'void main(){',
    '  vec2 uv=gl_PointCoord-.5;',
    '  float d=length(uv);',
    '  float a=atan(uv.y,uv.x);',
    '  float cross4=abs(sin(a*2.));',
    '  float s=smoothstep(.5,.0,d*(1.2-cross4*.55));',
    '  if(s<.02)discard;',
    '  vec3 col=mix(vec3(.55,.18,.9),vec3(.8,.86,1.),cross4);',
    '  gl_FragColor=vec4(col*s,s*.72);',
    '}'
  ].join('\n');
  scene.add(new THREE.Points(geo,new THREE.ShaderMaterial({vertexShader:V,fragmentShader:F,transparent:true,depthWrite:false})));
}

/* ═══ NEBULA CLOUD LAYERS ═══ */
var VCLOUD='varying vec2 vUv;varying float vF;void main(){vUv=uv;float e=1.-abs(uv.x-.5)*2.;vF=e*e*(1.-abs(uv.y-.5)*1.1);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}';
var FCLOUD=[
  'precision mediump float;uniform float uT;uniform vec3 uC;uniform float uA;varying vec2 vUv;varying float vF;',
  'float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}',
  'float no(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}',
  'float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<5;i++){v+=a*no(p);p*=2.1;a*=.48;}return v;}',
  'void main(){vec2 uv=vUv;uv.x+=uT*.022;float c=fbm(uv*3.2+uT*.035)*fbm(uv*5.8-uT*.018);c=pow(clamp(c*2.6,0.,1.),.78);float a=c*uA*vF;if(a<.01)discard;gl_FragColor=vec4(uC,a);}'
].join('\n');
function buildNebulaLayers(){
  [{y:3.5,z:-22,w:85,h:32,c:new THREE.Color(.26,.03,.52),a:.25},{y:-1.5,z:-28,w:95,h:28,c:new THREE.Color(.16,.01,.4),a:.2},{y:7,z:-18,w:62,h:22,c:new THREE.Color(.32,.06,.64),a:.18}].forEach(function(l){
    var m=new THREE.Mesh(new THREE.PlaneGeometry(l.w,l.h),new THREE.ShaderMaterial({vertexShader:VCLOUD,fragmentShader:FCLOUD,uniforms:{uT:{value:0},uC:{value:l.c},uA:{value:l.a}},transparent:true,depthWrite:false,side:THREE.DoubleSide}));
    m.position.set(0,l.y,l.z);cloudMeshes.push(m);scene.add(m);
  });
}

/* ═══ BOTTOM CLOUDS — Cumulonimbus blanc-bleu volumétriques ═══ */
var FBTM=[
  'precision mediump float;uniform float uT;uniform float uA;varying vec2 vUv;varying float vF;',
  'float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}',
  'float no(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}',
  'float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<7;i++){v+=a*no(p);p*=2.15;a*=.46;}return v;}',
  'void main(){',
  '  vec2 uv=vUv;uv.x+=uT*.016;',
  '  float n=fbm(uv*2.2+uT*.025);',
  '  float n2=fbm(uv*4.8+vec2(n*.38,-uT*.02));',
  '  float c=pow(clamp(n*n2*3.5,0.,1.),.68);',
  // Denser at bottom
  '  c*=pow(max(0.,1.-uv.y*1.05),1.5);',
  // Color layers: white-blue core, cyan bloom, warm orange at horizon
  '  vec3 core=vec3(.88,.96,1.);',
  '  vec3 cyan=vec3(.0,.88,.98);',
  '  vec3 outer=vec3(.08,.04,.38);',
  '  vec3 warm=vec3(.85,.42,.04);',
  '  vec3 col=mix(outer,cyan,c);',
  '  col=mix(col,core,pow(c,2.2)*.85);',
  '  float wz=smoothstep(.5,.0,uv.y);',
  '  col=mix(col,warm,wz*c*.45);',
  '  float a=c*uA*vF;if(a<.01)discard;',
  '  gl_FragColor=vec4(col,a);',
  '}'
].join('\n');
function buildBottomClouds(){
  [{y:-4.2,z:0,w:20,h:5,a:.95},{y:-5,z:-2,w:26,h:6,a:.8},{y:-5.8,z:-4,w:34,h:7.5,a:.62},{y:-3.5,z:.8,w:16,h:3.5,a:.7}].forEach(function(l,i){

/* ═══ FACE POINT CLOUD — Peau #0D2137 + Matrix Cyan ═══ */
var VS_FACE=[
  'attribute float aC;attribute float aO;attribute float aW;',
  'uniform float uT;uniform float uPR;uniform float uNv;',
  'varying float vC;varying float vT;varying vec3 vCol;varying float vA;',
  'void main(){',
  '  vec3 p=position;',
  '  if(uNv>0.){p+=normalize(p+vec3(.01))*uNv*3.8*(1.+aO*.18);}',
  '  vec4 mv=modelViewMatrix*vec4(p,1.);',
  '  gl_Position=projectionMatrix*mv;',
  '  float dep=-mv.z;',
  '  gl_PointSize=clamp(65.*uPR/dep,1.5,11.);',
  '  float br=clamp(1.-(dep-3.5)/6.,.22,1.);',
  '  float fl=.82+.18*sin(uT*3.8+aO*6.28);',
  '  br*=fl;',
  // Color blend: #0D2137 navy → #00FFFF cyan, warmth tint
  '  vec3 navy=vec3(.05,.13,.22);',
  '  vec3 cyan=vec3(0.,1.,1.);',
  '  vec3 warm=vec3(1.,.55,.06);',
  '  vec3 base=mix(navy,cyan,clamp(br*1.2,0.,1.));',
  '  vCol=mix(base,warm,aW*.4)*br;',
  '  vC=aC;vT=uT+aO;vA=br*.92;',
  '}'
].join('\n');
var FS_FACE=[
  'precision mediump float;',
  'uniform sampler2D uAtlas;',
  'varying float vC;varying float vT;varying vec3 vCol;varying float vA;',
  'void main(){',
  '  float ci=mod(floor(vC)+floor(vT*3.8),64.);',
  '  float co=mod(ci,8.)/8.;float ro=floor(ci/8.)/8.;',
  '  vec2 uv=gl_PointCoord;',
  '  float lum=texture2D(uAtlas,vec2(co+uv.x/8.,ro+uv.y/8.)).r;',
  '  if(lum<.05)discard;',
  '  vec3 fc=vCol+vec3(0.,lum*lum*.45,lum*lum*.45);',
  '  gl_FragColor=vec4(fc,lum*vA);',
  '}'
].join('\n');

function genFacePoints(N){
  var pos=new Float32Array(N*3),aC=new Float32Array(N),aO=new Float32Array(N),aW=new Float32Array(N);
  var idx=0;
  function add(x,y,z,w){if(idx>=N)return;pos[idx*3]=x;pos[idx*3+1]=y;pos[idx*3+2]=z;aC[idx]=Math.random()*64;aO[idx]=Math.random()*50;aW[idx]=w||0;idx++;}
  // AFRO volumétrique (7200)
  for(var placed=0,i=0;placed<7200&&i<55000;i++){
    var r=.7+Math.random()*.52,ct=Math.random(),th=Math.acos(ct),ph=Math.random()*Math.PI*2;
    var x=r*Math.sin(th)*Math.cos(ph)*.97,y=r*Math.cos(th)+1.16,z=r*Math.sin(th)*Math.sin(ph)*.72-.07;
    x+=(Math.random()-.5)*.09;y+=(Math.random()-.5)*.09;z+=(Math.random()-.5)*.06;
    if(y<.74)continue;add(x,y,z,0);placed++;
  }
  // FACE surface (17500)
  for(placed=0,i=0;placed<17500&&i<140000;i++){
    var fy=(Math.random()*2-1),ph2=(Math.random()-.5)*Math.PI*.88;
    var fy2=fy<-.55?fy*.88:fy,fxs=Math.sqrt(Math.max(0,1-fy2*fy2/1.28));
    var x=.9*fxs*Math.cos(ph2),y=fy2*1.14,z=.78*fxs*Math.sin(ph2);
    if(z<-.03)continue;
    var nx=x/.9,ny=y/1.14;
    // Nose
    var nd=Math.hypot(nx*1.15,ny-.05);
    z+=nd<.22?(.22-nd)/.22*(.22-nd)*.58:0;
    var nl=Math.hypot(nx-.09,ny-.07);z+=nl<.09?(.09-nl)/.09*.13:0;
    var nr=Math.hypot(nx+.09,ny-.07);z+=nr<.09?(.09-nr)/.09*.13:0;
    // Lips (épaisses, expressives)
    var ld=Math.hypot(nx*1.55,ny+.4);
    z+=ld<.22?(.22-ld)/.22*(.22-ld)*.72:0;
    // Philtrum
    var pd=Math.hypot(nx*.55,ny+.29);z+=pd<.1?(.1-pd)/.1*.07:0;
    // Eye sockets
    var el=Math.hypot(nx-.31,ny-.25),er=Math.hypot(nx+.31,ny-.25),em=Math.min(el,er);
    z+=em<.18?-(.18-em)/.18*(.18-em)*.52:0;
    // Brow ridges
    var bl=Math.hypot(nx-.22,ny-.4),br2=Math.hypot(nx+.22,ny-.4);
    z+=Math.min(bl,br2)<.2?(.2-Math.min(bl,br2))/.2*.11:0;
    // Cheekbones
    var cl=Math.hypot(nx-.46,ny+.03),cr2=Math.hypot(nx+.46,ny+.03);
    z+=Math.min(cl,cr2)<.24?(.24-Math.min(cl,cr2))/.24*.16:0;
    // Organic noise
    z+=(Math.random()-.5)*.022;x+=(Math.random()-.5)*.016;y+=(Math.random()-.5)*.016;
    var warm=Math.max(0,-ny*.48);add(x,y,z,warm);placed++;
  }
  // NECK + SHOULDERS (3800)
  for(i=0;i<3800;i++){
    var t=Math.random()*Math.PI*2,yy=-1.08-Math.random()*1.05;
    var bust=yy<-1.5,r2=bust?.2+Math.abs(yy+1.5)*.6+Math.random()*.12:.13+Math.random()*.065;
    var warm2=Math.min(1,Math.abs(yy)/2.1);
    add(r2*Math.cos(t),yy,r2*Math.sin(t)*.55+.28,warm2);
  }
  // CHOKER geometry (ring at neck junction y≈-0.9)
  for(i=0;i<800;i++){
    var ang=Math.random()*Math.PI*2;
    var ri=.14+Math.random()*.04;
    var yc=-.9+(Math.random()-.5)*.06;
    add(ri*Math.cos(ang),yc,ri*Math.sin(ang)*.6+.28,.1);
  }
  // AFRO floating wisps (1000)
  for(i=0;i<1000;i++){
    var at=Math.random()*Math.PI*2,ar=1.28+Math.random()*.45,ay=.55+Math.random()*1.05;
    add(ar*Math.cos(at)*.92,ay,ar*Math.sin(at)*.48,0);
  }
  return{pos,aC,aO,aW,count:idx};
}

function buildFace(){
  // Solid base — peau #0D2137 navy blue
  var sgeo=new THREE.SphereGeometry(.9,32,22);
  sgeo.scale(.95,1.14,.78);
  var smat=new THREE.MeshPhongMaterial({color:0x0D2137,emissive:0x041222,shininess:18,transparent:true,opacity:.82});
  faceSolid=new THREE.Mesh(sgeo,smat);
  // Afro solid
  var ageo=new THREE.SphereGeometry(.92,24,16);
  ageo.scale(1,.88,.72);
  var am=new THREE.MeshPhongMaterial({color:0x080810,shininess:5,transparent:true,opacity:.9});
  var afroMesh=new THREE.Mesh(ageo,am);afroMesh.position.set(0,1.18,-.07);

  // Eye glow meshes
  var eg=new THREE.SphereGeometry(.058,8,6);
  var em=new THREE.MeshBasicMaterial({color:0xB0E0FF,transparent:true,opacity:.85});
  var eL=new THREE.Mesh(eg,em);eL.position.set(-.28,.25,.62);
  var eR=new THREE.Mesh(eg,em.clone());eR.position.set(.28,.25,.62);

  // Earrings (teardrop = cone + sphere)
  var earMat=new THREE.MeshPhongMaterial({color:0xAADDFF,emissive:0x4499BB,shininess:80,transparent:true,opacity:.9});
  var earGeo=new THREE.ConeGeometry(.045,.28,8);
  var earL=new THREE.Mesh(earGeo,earMat);earL.position.set(-.82,-.62,.18);earL.rotation.z=Math.PI;
  var earR=new THREE.Mesh(earGeo,earMat.clone());earR.position.set(.82,-.62,.18);earR.rotation.z=Math.PI;

  // Point cloud
  var data=genFacePoints(30000);
  var geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(data.pos,3));
  geo.setAttribute('aC',new THREE.BufferAttribute(data.aC,1));
  geo.setAttribute('aO',new THREE.BufferAttribute(data.aO,1));
  geo.setAttribute('aW',new THREE.BufferAttribute(data.aW,1));
  faceMat=new THREE.ShaderMaterial({vertexShader:VS_FACE,fragmentShader:FS_FACE,uniforms:{uT:{value:0},uPR:{value:PR},uNv:{value:0},uAtlas:{value:charAtlas}},transparent:true,depthWrite:false});
  var facePts=new THREE.Points(geo,faceMat);

  faceGroup=new THREE.Group();
  faceGroup.add(faceSolid,afroMesh,facePts,eL,eR,earL,earR);
  faceGroup.position.set(0,.14,0);
  scene.add(faceGroup);
}

/* ═══ LIGHTNING — Hiérarchique ramifié ═══ */
function makeBolt(x1,y1,z,x2,y2,depth,pts){
  pts.push(x1,y1,z,x2,y2,z);
  if(depth<=0)return;
  var mx=(x1+x2)/2+(Math.random()-.5)*1.4/depth;
  var my=(y1+y2)/2+(Math.random()-.5)*1.4/depth;
  makeBolt(x1,y1,z,mx,my,depth-1,pts);
  makeBolt(mx,my,z,x2,y2,depth-1,pts);
  if(depth>=2&&Math.random()<.42){
    var bx=mx+(Math.random()-.5)*3.5,by=my+(Math.random()-.5)*2;
    makeBolt(mx,my,z,bx,by,depth-1,pts);
  }
}
function buildLightning(){
  if(lightningMesh){scene.remove(lightningMesh);lightningMesh.geometry.dispose();}
  var pts=[];
  // 3 massive bolts + fine tendrils
  for(var i=0;i<3;i++){
    var sx=-5-Math.random()*4.5,sy=6.5+Math.random()*2.5;
    makeBolt(sx-Math.random(),sy,2.5,sx+2.8+Math.random()*2,sy-4.5-Math.random()*2,5,pts);
  }
  // Fine secondary tendrils
  for(i=0;i<5;i++){
    var tx=-4-Math.random()*5,ty=5+Math.random()*3;
    makeBolt(tx,ty,2,tx+Math.random()*3-1.5,ty-2-Math.random()*2,3,pts);
  }
  var geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(pts),3));
  lightningMesh=new THREE.LineSegments(geo,new THREE.LineBasicMaterial({color:0xDDFFFF,transparent:true,opacity:.9,depthWrite:false,blending:THREE.AdditiveBlending}));
  scene.add(lightningMesh);
}
function scheduleLightning(){
  (function fire(){buildLightning();lightActive=true;lightT=0;setTimeout(fire,3200+Math.random()*5500);})();
}

/* ═══ ANIMATION LOOP ═══ */
function animate(){
  requestAnimationFrame(animate);
  var t=clock.getElapsedTime();fc++;
  if(bgMesh)bgMesh.material.uniforms.uT.value=t;
  cloudMeshes.forEach(function(m){m.material.uniforms.uT.value=t});
  if(planetGroup){
    planetGroup.children.forEach(function(p,i){
      var s=p.userData.spd;
      p.position.x=p.userData.ox+Math.sin(t*s+i)*1.1;
      p.position.y=p.userData.oy+Math.cos(t*s*.65+i)*.5;
      p.rotation.y=t*s*2.5;
    });
  }
  // Camera inertia
  dragVX*=.87;dragVY*=.87;
  camRotX+=dragVX;camRotY+=dragVY;
  camRotX=Math.max(-1.1,Math.min(1.1,camRotX));
  if(faceGroup){
    faceGroup.rotation.x+=(camRotX-faceGroup.rotation.x)*.08;
    faceGroup.rotation.y+=(camRotY-faceGroup.rotation.y)*.08;
    // Subtle breathing
    var breath=.007*Math.sin(t*.8);
    faceGroup.scale.set(1+breath,1+breath,1+breath);
  }
  if(faceMat){
    faceMat.uniforms.uT.value=t;
    if(novaActive){novaT+=.02;faceMat.uniforms.uNv.value=Math.sin(novaT*Math.PI)*1.15;if(novaT>=1){novaActive=false;faceMat.uniforms.uNv.value=0;}}
  }
  if(lightningMesh&&lightActive){
    lightT+=.024;
    lightningMesh.material.opacity=Math.sin(lightT*Math.PI)*.88;
    if(lightT>=1)lightActive=false;
  }
  if(fc%5===0)updateCharts(t);
  renderer.render(scene,camera);
}

function onResize(){
  var se=document.getElementById('scene');W=se.offsetWidth||window.innerWidth;H=se.offsetHeight||(window.innerHeight-87);
  camera.aspect=W/H;camera.updateProjectionMatrix();renderer.setSize(W,H,false);
}

/* ═══ POINTER + DRAG ═══ */
function initPointer(){
  var se=document.getElementById('scene');
  se.addEventListener('pointerdown',function(e){_drag=true;_px=e.clientX;_py=e.clientY;_pT=Date.now();dragVX=0;dragVY=0;try{se.setPointerCapture(e.pointerId)}catch(x){}});
  se.addEventListener('pointermove',function(e){if(!_drag)return;dragVY+=(e.clientX-_px)*.0025;dragVX+=(e.clientY-_py)*.0025;_px=e.clientX;_py=e.clientY;});
  se.addEventListener('pointerup',function(e){
    if(Date.now()-_pT<200&&Math.abs(e.clientX-_px)+Math.abs(e.clientY-_py)<12){
      addRipple(e.clientX,e.clientY);if(!novaActive){novaActive=true;novaT=0;sNova();}
    }
    _drag=false;
  });
  se.addEventListener('pointercancel',function(){_drag=false;});
}
function addRipple(x,y){var d=document.createElement('div');d.className='ripple';d.style.left=x+'px';d.style.top=y+'px';document.getElementById('scene').appendChild(d);setTimeout(function(){d.parentNode&&d.parentNode.removeChild(d)},650);}

/* ═══ HUD CHARTS — Fine-Art (maps, trading, histograms) ═══ */
function initCharts(){['ch1','ch2','ch3','ch4'].forEach(function(id){chartBuf[id]=[]});}

function updateCharts(t){
  // ch1 — World map vectoriel rétroéclairé
  drawWorldMap('ch1',t);
  // ch2 — Trading sine curves vert émeraude + rouge/rose
  drawTrading('ch2',t);
  // ch3 — Histogram bars
  drawHistogram('ch3',t);
  // ch4 — Terminal waveform
  drawWaveform('ch4',t);
}

function drawWorldMap(id,t){
  var cv=document.getElementById(id);if(!cv)return;
  var cw=cv.offsetWidth||cv.width||136,ch=cv.offsetHeight||32;
  cv.width=cw;cv.height=ch;
  var cx=cv.getContext('2d');cx.clearRect(0,0,cw,ch);
  // Grid
  cx.strokeStyle='rgba(0,255,255,.08)';cx.lineWidth=.4;
  for(var x2=0;x2<=cw;x2+=cw/6){cx.beginPath();cx.moveTo(x2,0);cx.lineTo(x2,ch);cx.stroke();}
  for(var y2=0;y2<=ch;y2+=ch/3){cx.beginPath();cx.moveTo(0,y2);cx.lineTo(cw,y2);cx.stroke();}
  // Simplified continent blobs (retro-lit)
  cx.strokeStyle='rgba(0,220,255,.55)';cx.lineWidth=.8;
  var blobs=[[.12,.5,.16,.25],[.3,.4,.22,.3],[.55,.35,.18,.28],[.75,.45,.14,.22],[.88,.6,.1,.2]];
  blobs.forEach(function(b){
    cx.beginPath();
    var bx=b[0]*cw+Math.sin(t*.2+b[0])*1.5,by=b[1]*ch;
    var bw=b[2]*cw,bh=b[3]*ch;
    cx.ellipse(bx,by,bw/2,bh/2,0,0,Math.PI*2);cx.stroke();
  });
  // Pulse dot
  cx.fillStyle='rgba(0,255,159,'+(.5+.4*Math.sin(t*3))+')';
  cx.beginPath();cx.arc(cw*.42+Math.sin(t*.4)*3,ch*.5,2,0,Math.PI*2);cx.fill();
}

function drawTrading(id,t){
  var cv=document.getElementById(id);if(!cv)return;
  var cw=cv.offsetWidth||cv.width||130,ch=cv.offsetHeight||32;
  cv.width=cw;cv.height=ch;
  var cx=cv.getContext('2d');cx.clearRect(0,0,cw,ch);
  var buf=chartBuf[id]||[];
  buf.push(.4+.32*Math.sin(t*1.8)+.12*Math.sin(t*4.5)+.06*(Math.random()-.5));
  if(buf.length>60)buf.shift();chartBuf[id]=buf;
  // Green line
  if(buf.length>1){
    cx.strokeStyle='#00FF9F';cx.lineWidth=1.2;cx.beginPath();
    buf.forEach(function(v,i){i===0?cx.moveTo(i*(cw/60),ch-(v*ch)):cx.lineTo(i*(cw/60),ch-(v*ch));});
    cx.stroke();
    var g=cx.createLinearGradient(0,0,0,ch);g.addColorStop(0,'rgba(0,255,159,.18)');g.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=g;cx.lineTo(cw,ch);cx.lineTo(0,ch);cx.fill();
  }
  // Red line (second curve)
  var buf2=chartBuf[id+'b']||[];
  buf2.push(.55+.25*Math.cos(t*2.2+1.2)+.08*(Math.random()-.5));
  if(buf2.length>60)buf2.shift();chartBuf[id+'b']=buf2;
  if(buf2.length>1){
    cx.strokeStyle='rgba(255,80,130,.75)';cx.lineWidth=.9;cx.beginPath();
    buf2.forEach(function(v,i){i===0?cx.moveTo(i*(cw/60),ch-(v*ch)):cx.lineTo(i*(cw/60),ch-(v*ch));});
    cx.stroke();
  }
}

function drawHistogram(id,t){
  var cv=document.getElementById(id);if(!cv)return;
  var cw=cv.offsetWidth||cv.width||136,ch=cv.offsetHeight||32;
  cv.width=cw;cv.height=ch;
  var cx=cv.getContext('2d');cx.clearRect(0,0,cw,ch);
  var N=12,bw=cw/N-.8;
  for(var i=0;i<N;i++){
    var h2=(.2+.7*Math.abs(Math.sin(t*.7+i*.88+i*i*.04)))*ch;
    var col=h2>ch*.6?'rgba(0,255,255,.7)':'rgba(0,180,220,.45)';
    cx.fillStyle=col;cx.fillRect(i*(cw/N)+.4,ch-h2,bw,h2);
  }
}

function drawWaveform(id,t){
  var cv=document.getElementById(id);if(!cv)return;
  var cw=cv.offsetWidth||cv.width||130,ch=cv.offsetHeight||32;
  cv.width=cw;cv.height=ch;
  var cx=cv.getContext('2d');cx.clearRect(0,0,cw,ch);
  cx.strokeStyle='rgba(160,100,255,.7)';cx.lineWidth=1.1;cx.beginPath();
  for(var x=0;x<cw;x++){
    var y=ch/2+Math.sin(x/cw*Math.PI*8+t*2)*ch*.28+Math.sin(x/cw*Math.PI*14+t*3.5)*ch*.12;
    x===0?cx.moveTo(x,y):cx.lineTo(x,y);
  }
  cx.stroke();
  // Terminal text
  cx.fillStyle='rgba(0,255,255,.25)';cx.font='5px monospace';
  cx.fillText('KADIO_DALEBA > stream_v16.active',2,ch-3);
}

/* ═══ HUD OPEN ═══ */
function openPanels(){
  if(panelsOpen)return;panelsOpen=true;
  ['h1','h2','h3','h4'].forEach(function(id,i){setTimeout(function(){document.getElementById(id).classList.add('open')},i*160)});
}

/* ═══ POLLING API ═══ */
function startPolling(){
  (function poll(){
    fetch('/api/stats').then(function(r){return r.json()}).then(function(d){
      var el;
      if(el=document.getElementById('v-rdv'))el.textContent=d.activeClients||'—';
      if(el=document.getElementById('v-sms'))el.textContent=d.smsSent||0;
      if(el=document.getElementById('v-today'))el.textContent=d.todayRdv||0;
      if(el=document.getElementById('v-next'))el.textContent=d.nextSlot||'—';
    }).catch(function(){});
    setTimeout(poll,25000);
  })();
}

/* ═══ CLOCK ═══ */
function tickClock(){
  (function loop(){
    var n=new Date(),hh=n.getHours().toString().padStart(2,'0'),mm=n.getMinutes().toString().padStart(2,'0'),ss=n.getSeconds().toString().padStart(2,'0');
    var el=document.getElementById('clock');if(el)el.textContent='V16 — '+hh+':'+mm+':'+ss;
    setTimeout(loop,1000);
  })();
}

/* ═══ UTILS ═══ */
function setLog(m){var el=document.getElementById('v-log');if(el)el.textContent=m;}
function badge(t,l){var el=document.getElementById('badge');if(!el)return;el.textContent=t;l?el.classList.add('live'):el.classList.remove('live');}

/* ═══ CHAT ═══ */
function addBubble(role,text,save){
  if(save===undefined)save=true;
  var d=document.createElement('div');d.className='bub '+role;d.textContent=text;
  chatEl.appendChild(d);chatEl.scrollTop=chatEl.scrollHeight;
  if(save){chatHistory.push({r:role,t:text});if(chatHistory.length>18)chatHistory.shift();try{localStorage.setItem('z16',JSON.stringify(chatHistory))}catch(e){}}
  if(role==='user')msgCount++;
  var mv=document.getElementById('v-msgs');if(mv)mv.textContent=msgCount;
}
function showDots(){var d=document.createElement('div');d.className='dots';d.innerHTML='<span>.</span><span>.</span><span>.</span>';chatEl.appendChild(d);chatEl.scrollTop=chatEl.scrollHeight;return d;}

var REPLIES=['Analyse en cours… Pilier II actif.','Protocole Kadio-Alpha V16 chargé.','Calendrier synchronisé. 3 coiffeurs dispos.','WhatsApp stable. Aucun message en attente.','Mémoire matricielle 94%. Tout nominal.','Réservation possible ce soir à 18h30.','DALEBA OS V16 — Sanctuaire holographique actif.','Signal reçu. Traitement en temps réel.'];

function sendMsg(){
  var txt=(msgEl.value||'').trim();if(!txt)return;
  var cmd=txt.toLowerCase();msgEl.value='';
  addBubble('user',txt);
  if(cmd==='nova'){if(!novaActive){novaActive=true;novaT=0;sNova();}return;}
  if(cmd==='panels'){openPanels();return;}
  var dots=showDots();setLog(txt.slice(0,26)+'…');sPing();
  document.getElementById('reflex').classList.add('on');
  setTimeout(function(){
    dots.parentNode&&dots.parentNode.removeChild(dots);
    document.getElementById('reflex').classList.remove('on');
    addBubble('daleba',REPLIES[msgCount%REPLIES.length]);
    setLog('Réponse envoyée ✓');
  },850+Math.random()*550);
}
function initInput(){
  document.getElementById('send').addEventListener('click',sendMsg);
  msgEl.addEventListener('keydown',function(e){if(e.key==='Enter')sendMsg();});
}
</script>
