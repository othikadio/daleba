<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#030012;font-family:'Courier New',monospace;touch-action:none}
#shell{display:flex;flex-direction:column;width:100vw;height:100vh}

/* ── HEADER ──────────────────────────────────────────── */
#hdr{
  flex-shrink:0;height:44px;z-index:500;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  background:rgba(3,0,18,.95);
  border-bottom:1px solid rgba(0,255,255,.12);
  backdrop-filter:blur(20px);
}
.logo{font-size:.82rem;font-weight:700;color:#00FFFF;letter-spacing:.28em;text-shadow:0 0 14px rgba(0,255,255,.5)}
.hdot{width:5px;height:5px;border-radius:50%;background:#00FF9F;box-shadow:0 0 8px #00FF9F;display:inline-block;margin-right:5px;animation:blink 2.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}
.stxt{font-size:.56rem;color:rgba(0,255,255,.6);letter-spacing:.15em}
.navl a{font-size:.5rem;color:rgba(0,255,255,.28);text-decoration:none;margin-left:9px;transition:color .2s}
.navl a:hover{color:#00FFFF}
#badge{font-size:.5rem;color:rgba(0,255,255,.3);padding:2px 7px;border:1px solid rgba(0,255,255,.15);border-radius:20px;margin-left:8px;transition:all .4s;letter-spacing:.08em}
#badge.live{color:#00FFFF;border-color:rgba(0,255,255,.4);box-shadow:0 0 8px rgba(0,255,255,.2)}

/* ── SCENE ───────────────────────────────────────────── */
#scene{flex:1;position:relative;overflow:hidden}
#webgl{position:absolute;top:0;left:0;display:block;z-index:1}

/* ── HUD GLASSMORPHISM CHROME ─────────────────────────── */
.hud{
  position:absolute;z-index:60;
  background:linear-gradient(145deg,rgba(0,8,40,.72) 0%,rgba(0,3,22,.60) 100%);
  border:1px solid rgba(180,215,255,.14);
  border-top-color:rgba(220,240,255,.30);
  border-left-color:rgba(200,230,255,.22);
  border-radius:7px;
  backdrop-filter:blur(28px) saturate(160%);
  -webkit-backdrop-filter:blur(28px) saturate(160%);
  box-shadow:
    0 0 0 .5px rgba(0,255,255,.08) inset,
    0 4px 24px rgba(0,0,0,.6),
    0 0 20px rgba(0,200,255,.05);
  padding:9px 11px 8px;
  opacity:0;transform:scale(.04) translateZ(0);
  transition:opacity .7s cubic-bezier(.16,1,.36,1),transform .7s cubic-bezier(.16,1,.36,1);
  pointer-events:none;overflow:hidden;
  min-width:150px;
}
.hud::before{
  content:'';position:absolute;top:0;left:0;right:0;height:30%;
  background:linear-gradient(to bottom,rgba(180,220,255,.06),transparent);
  border-radius:7px 7px 0 0;pointer-events:none
}
.hud::after{
  content:'';position:absolute;bottom:0;left:8%;right:8%;height:1px;
  background:linear-gradient(to right,transparent,rgba(0,255,255,.18),transparent)
}
.hud-scan{position:absolute;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(0,255,255,.35),transparent);animation:scan 3.5s linear infinite;pointer-events:none}
@keyframes scan{0%{top:-1px}100%{top:102%}}

/* HUD positions + perspective tilt */
#h1{top:12%;left:.5%;width:160px;transform-origin:left center}
#h2{bottom:10%;left:.5%;width:155px;transform-origin:left center}
#h3{top:12%;right:.5%;width:160px;transform-origin:right center}
#h4{bottom:10%;right:.5%;width:155px;transform-origin:right center}
#h1.open{opacity:1;transform:perspective(600px) rotateY(12deg) scale(1) translateZ(0)}
#h2.open{opacity:1;transform:perspective(600px) rotateY(8deg) scale(1) translateZ(0)}
#h3.open{opacity:1;transform:perspective(600px) rotateY(-12deg) scale(1) translateZ(0)}
#h4.open{opacity:1;transform:perspective(600px) rotateY(-8deg) scale(1) translateZ(0)}

.ht{font-size:.46rem;font-weight:700;color:#00FFFF;letter-spacing:.16em;text-transform:uppercase;border-bottom:1px solid rgba(0,255,255,.1);padding-bottom:4px;margin-bottom:5px;text-shadow:0 0 10px rgba(0,255,255,.45)}
.hr{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5px}
.hl{font-size:.4rem;color:rgba(160,200,255,.32);line-height:1.5}
.hv{font-size:.42rem;color:#00FFFF;text-shadow:0 0 5px rgba(0,255,255,.35)}
.hv.g{color:#00FF9F;text-shadow:0 0 5px rgba(0,255,159,.35)}
.hv.r{color:#ff4466}
canvas.mc{display:block;margin-top:4px;border-top:1px solid rgba(0,255,255,.07);padding-top:3px}

/* ── REFLECTION OVERLAY ───────────────────────────────── */
#reflex{position:absolute;top:46%;left:50%;transform:translate(-50%,-50%);z-index:70;text-align:center;pointer-events:none;opacity:0;transition:opacity .3s}
#reflex.on{opacity:1}
.rtxt{font-size:.6rem;color:#00FFFF;letter-spacing:.25em;text-transform:uppercase;animation:flk 1.2s infinite;text-shadow:0 0 12px rgba(0,255,255,.7)}
@keyframes flk{0%,100%{opacity:1}47%{opacity:.25}49%{opacity:.05}51%{opacity:.7}}

/* ── RIPPLE ────────────────────────────────────────────── */
.ripple{position:absolute;border:1px solid rgba(0,255,255,.8);border-radius:50%;pointer-events:none;z-index:80;width:32px;height:32px;animation:ripout .65s ease-out forwards}
@keyframes ripout{0%{transform:translate(-50%,-50%) scale(0);opacity:1}100%{transform:translate(-50%,-50%) scale(18);opacity:0}}

/* ── CHAT ──────────────────────────────────────────────── */
#chat{position:absolute;bottom:44px;right:0;width:260px;max-height:44%;overflow-y:auto;z-index:200;padding:6px;display:flex;flex-direction:column;gap:4px}
#chat::-webkit-scrollbar{width:2px}#chat::-webkit-scrollbar-thumb{background:rgba(0,255,255,.2)}
.bub{max-width:94%;padding:5px 8px;border-radius:5px;font-size:.6rem;line-height:1.5;animation:bub .18s ease}
@keyframes bub{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
.bub.user{align-self:flex-end;background:rgba(0,255,255,.05);border:1px solid rgba(0,255,255,.12);color:#a0d8ff}
.bub.daleba{align-self:flex-start;background:rgba(3,0,18,.9);border:1px solid rgba(0,255,255,.15);color:#00FFFF}
.bub.daleba::before{content:'DALEBA › ';font-weight:700;font-size:.55rem}
.dots{align-self:flex-start;font-size:.58rem;color:rgba(0,255,255,.35);padding:3px 6px}
.dots span{animation:td 1s infinite}.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes td{0%,80%,100%{opacity:.1}40%{opacity:1}}
@media(max-width:520px){#chat{width:100%}.hud{display:none}}

/* ── INPUT BAR ─────────────────────────────────────────── */
#bar{flex-shrink:0;height:46px;z-index:500;display:flex;align-items:center;gap:8px;padding:0 12px;border-top:1px solid rgba(0,255,255,.1);background:rgba(3,0,18,.98);backdrop-filter:blur(20px)}
.prt{font-size:.9rem;color:#00FFFF;flex-shrink:0;text-shadow:0 0 8px rgba(0,255,255,.5)}
#msg{flex:1;background:transparent;border:none;outline:none;color:#90d8ff;font-family:'Courier New',monospace;font-size:.72rem;caret-color:#00FFFF}
#msg::placeholder{color:rgba(0,255,255,.12)}
#send{background:none;border:1px solid rgba(0,255,255,.22);color:#00FFFF;font-family:'Courier New',monospace;font-size:.64rem;padding:4px 10px;border-radius:4px;cursor:pointer;flex-shrink:0;transition:all .2s}
#send:hover{background:rgba(0,255,255,.08);box-shadow:0 0 8px rgba(0,255,255,.15)}
</style>

<script src="/js/three.min.js"></script>
<script>
/* ================================================================
   DALEBA ZENITH V15 — KADIO-ALPHA — ARCHITECTURE WebGL ELITE
   ► 30 000 particules face sculptée en 3D (ellipsoïde + traits)
   ► ShaderMaterial glyphes binaires animés cyan #00FFFF
   ► Cosmos FBM violet profond — nébuleuses procédurales GLSL
   ► Nuages volumétriques bas + bloom cyan
   ► 6 planètes en orbite lente — éclairs branchus haut-gauche
   ► HUD glassmorphism chrome perspective 3D réelle
   ► Target: 60 FPS
================================================================ */

/* ── AUDIO ─────────────────────────────────────────────────── */
var _AC=null;
function _aud(){if(!_AC){try{_AC=new(window.AudioContext||window.webkitAudioContext)()}catch(_){return null}}if(_AC&&_AC.state==='suspended')_AC.resume();return _AC&&_AC.state==='running'?_AC:null}
function _tone(f,d,v,t){try{var ac=_aud();if(!ac)return;var o=ac.createOscillator(),g=ac.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||.06,ac.currentTime);g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d)}catch(_){}}
function sPing(){_tone(880,.18,.08);setTimeout(function(){_tone(1760,.1,.035)},70)}
function sNova(){_tone(55,.8,.15,'sawtooth');setTimeout(function(){_tone(440,.4,.06)},100)}
function sWhoosh(){try{var ac=_aud();if(!ac)return;var b=ac.createBuffer(1,ac.sampleRate*.4,ac.sampleRate),d=b.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*6)*.12;var s=ac.createBufferSource();s.buffer=b;var f=ac.createBiquadFilter();f.type='bandpass';f.frequency.value=440;f.Q.value=.5;s.connect(f);f.connect(ac.destination);s.start()}catch(_){}}

/* ── GLOBALS ─────────────────────────────────────────────── */
var W=0,H=0,PR=1;
var renderer,scene,camera,clock;
var bgMesh,faceMesh,faceMat,faceGroup;
var starMesh,cloudMeshes=[],planetGroup,lightningGroup;
var charAtlas=null;
var camRotX=0,camRotY=0,dragVX=0,dragVY=0;
var _drag=false,_px=0,_py=0,_pTime=0;
var novaActive=false,novaT=0;
var inReflect=false,panelsOpen=false;
var msgCount=0;
var chatEl,msgEl,chatHistory=[];
var chartBufs={};
var frameCount=0;

/* ── BOOT ────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded',function(){
  chatEl=document.getElementById('chat');
  msgEl=document.getElementById('msg');
  document.addEventListener('pointerdown',_aud,{once:true,passive:true});
  document.addEventListener('keydown',_aud,{once:true,passive:true});

  requestAnimationFrame(function(){requestAnimationFrame(function(){
    var se=document.getElementById('scene');
    W=se.offsetWidth||window.innerWidth;
    H=se.offsetHeight||(window.innerHeight-90);
    PR=Math.min(window.devicePixelRatio||1,1.5);
    var c=document.getElementById('webgl');
    c.width=Math.floor(W*PR);c.height=Math.floor(H*PR);
    c.style.width=W+'px';c.style.height=H+'px';

    try{var sv=localStorage.getItem('z15');if(sv){chatHistory=JSON.parse(sv).slice(-18);chatHistory.forEach(function(m){addBubble(m.r,m.t,false)})}}catch(_){}

    buildAtlas(function(tex){
      charAtlas=tex;
      if(!boot3D(c)){badge('NO-GL',false);return}
      initCharts();initPointer();initInput();startPolling();
      setTimeout(function(){openPanels();setLog('Sanctuaire V15 ● online')},1100);
      setTimeout(sWhoosh,600);
      tickTime();
    });
  })});
});

/* ════════════════════════════════════════════════════════════
   I. CHARACTER ATLAS — Canvas2D → THREE.Texture
   8x8 grid = 64 glyphes binaires/alphanum
════════════════════════════════════════════════════════════ */
function buildAtlas(cb){
  var SIZE=256,CELL=32,COLS=8;
  var cv=document.createElement('canvas');cv.width=SIZE;cv.height=SIZE;
  var cx=cv.getContext('2d');
  cx.fillStyle='#000';cx.fillRect(0,0,SIZE,SIZE);
  cx.fillStyle='#fff';
  cx.font='bold 20px monospace';
  cx.textAlign='center';cx.textBaseline='middle';
  var chars='01010110 01000001 01001100 01000101 01000010 010000010101'.replace(/ /g,'').split('').slice(0,10)
    .concat('0','1','0','1','0','1','0','1')
    .concat('ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split(''))
    .concat('abcdefghijklmnopqr'.split(''))
    .concat(['|','/','>','<','{','}','#','@']);
  // Pad to 64
  while(chars.length<64)chars.push(chars[Math.floor(Math.random()*chars.length)]);
  for(var i=0;i<64;i++){
    var col=i%COLS,row=Math.floor(i/COLS);
    cx.fillText(chars[i],col*CELL+CELL/2,row*CELL+CELL/2);
  }
  var tex=new THREE.Texture(cv);tex.needsUpdate=true;
  cb(tex);
}

/* ════════════════════════════════════════════════════════════
   II. BOOT WebGL
════════════════════════════════════════════════════════════ */
function boot3D(canvas){
  try{
    scene=new THREE.Scene();
    clock=new THREE.Clock();
    camera=new THREE.PerspectiveCamera(60,W/H,.1,300);
    camera.position.set(0,.4,6.5);
    camera.lookAt(0,.4,0);

    renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:false,alpha:false,powerPreference:'high-performance'});
    renderer.setPixelRatio(PR);
    renderer.setSize(W,H,false);
    renderer.setClearColor(0x030012,1);
    renderer.sortObjects=true;

    buildBackground();
    buildStars();
    buildNebulaClouds();
    buildPlanets();
    buildBottomClouds();
    buildFace();
    scheduleLightning();

    window.addEventListener('resize',onResize);
    animate();
    badge('V15 ✦',true);
    return true;
  }catch(e){console.error('boot3D',e);return false}
}

/* ════════════════════════════════════════════════════════════
   III. BACKGROUND — Shader GLSL FBM Nébuleuse Violet Profond
════════════════════════════════════════════════════════════ */
var VS_BG=[
  'varying vec2 vUv;',
  'void main(){vUv=uv;gl_Position=vec4(position.xy,1.0,1.0);}'
].join('\n');

var FS_BG=[
  'precision mediump float;',
  'uniform float uT;',
  'varying vec2 vUv;',
  'float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}',
  'float n(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}',
  'float fbm(vec2 p){float v=0.;float a=.5;for(int i=0;i<7;i++){v+=a*n(p);p=p*2.1+vec2(.3,-.2);a*=.5;}return v;}',
  'void main(){',
  '  vec2 uv=vUv;',
  '  float t=uT*.018;',
  // Deep cosmos base
  '  vec3 base=vec3(.012,.002,.055);',
  // FBM layers
  '  float n1=fbm(uv*2.8+vec2(t,t*.4));',
  '  float n2=fbm(uv*4.5-vec2(t*.7,0.)+vec2(n1*.3));',
  '  float n3=fbm(uv*7.+vec2(0.,t*.6));',
  // Purple nebula blobs
  '  vec3 neb1=vec3(.38,.06,.75);',  // violet
  '  vec3 neb2=vec3(.12,.02,.42);',  // deep indigo
  '  vec3 neb3=vec3(.55,.15,.85);',  // bright violet
  '  vec3 neb4=vec3(.05,.08,.35);',  // blue-purple
  '  float d1=pow(n1*n2,1.2);',
  '  float d2=pow(n2*n3,.9);',
  '  vec3 col=mix(base,neb2,d1*.8);',
  '  col=mix(col,neb1,d2*.65);',
  '  col=mix(col,neb3,pow(n3,2.5)*.4);',
  '  col=mix(col,neb4,n1*.3);',
  // Stars micro
  '  float star=pow(max(0.,1.-abs(h(floor(uv*280.)*2.3)-.5)*38.),3.)*.9;',
  '  col+=vec3(star*(.4+n2*.6),star*(.5+n3*.4),star);',
  // Bottom glow — warm orange/gold + cyan
  '  float bottom=smoothstep(.65,.0,uv.y);',
  '  vec3 warmGlow=vec3(.6,.25,.05);',
  '  vec3 cyanGlow=vec3(.0,.9,1.);',
  '  col+=warmGlow*bottom*bottom*.55;',
  '  col+=cyanGlow*pow(bottom,3.)*.4;',
  // Top vignette darker
  '  float topDark=smoothstep(.0,.35,uv.y);',
  '  col*=mix(.55,1.,topDark);',
  // Side vignette
  '  float vign=1.-pow(length((uv-.5)*vec2(1.,.7)),.9)*.45;',
  '  col*=vign;',
  '  gl_FragColor=vec4(clamp(col,0.,1.),1.);',
  '}'
].join('\n');

function buildBackground(){
  var geo=new THREE.PlaneGeometry(2,2);
  var mat=new THREE.ShaderMaterial({
    vertexShader:VS_BG,fragmentShader:FS_BG,
    uniforms:{uT:{value:0}},
    depthWrite:false,depthTest:false
  });
  bgMesh=new THREE.Mesh(geo,mat);
  bgMesh.renderOrder=-100;
  scene.add(bgMesh);
}

/* ════════════════════════════════════════════════════════════
   IV. STARS
════════════════════════════════════════════════════════════ */
function buildStars(){
  var N=2200,pos=new Float32Array(N*3),sizes=new Float32Array(N);
  for(var i=0;i<N;i++){
    pos[i*3]=(Math.random()*2-1)*90;
    pos[i*3+1]=(Math.random()*2-1)*60;
    pos[i*3+2]=-60-Math.random()*80;
    sizes[i]=.4+Math.random()*1.8;
  }
  var geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('size',new THREE.BufferAttribute(sizes,1));
  var mat=new THREE.ShaderMaterial({
    vertexShader:'attribute float size;void main(){vec4 mv=modelViewMatrix*vec4(position,1.);gl_Position=projectionMatrix*mv;gl_PointSize=size*1.6;}',
    fragmentShader:'void main(){float d=length(gl_PointCoord-.5);if(d>.5)discard;float b=1.-d*2.;gl_FragColor=vec4(vec3(.7,.75,1.)*b,b*.7);}',
    transparent:true,depthWrite:false
  });
  starMesh=new THREE.Points(geo,mat);
  scene.add(starMesh);
}

/* ════════════════════════════════════════════════════════════
   V. NEBULA CLOUD LAYERS (mid-scene, soft)
════════════════════════════════════════════════════════════ */
var VS_CLOUD=[
  'varying vec2 vUv;varying float vFade;',
  'void main(){vUv=uv;',
  'float edge=1.-abs(uv.x-.5)*2.;',
  'vFade=edge*edge*(1.-abs(uv.y-.5)*1.2);',
  'gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}'
].join('\n');

var FS_CLOUD=[
  'precision mediump float;',
  'uniform float uT;uniform vec3 uCol;uniform float uAlpha;',
  'varying vec2 vUv;varying float vFade;',
  'float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}',
  'float ns(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}',
  'float fbm(vec2 p){float v=0.;float a=.5;for(int i=0;i<5;i++){v+=a*ns(p);p*=2.1;a*=.48;}return v;}',
  'void main(){',
  '  vec2 uv=vUv;uv.x+=uT*.025;',
  '  float c=fbm(uv*3.+uT*.04)*fbm(uv*5.5-uT*.02);',
  '  c=pow(clamp(c*2.8,0.,1.),.8);',
  '  float a=c*uAlpha*vFade;',
  '  if(a<.01)discard;',
  '  gl_FragColor=vec4(uCol,a);',
  '}'
].join('\n');

function buildNebulaClouds(){
  var layers=[
    {y:3,z:-20,w:80,h:30,col:new THREE.Color(.28,.04,.55),a:.28},
    {y:-2,z:-25,w:90,h:25,col:new THREE.Color(.18,.02,.42),a:.22},
    {y:6,z:-18,w:60,h:20,col:new THREE.Color(.35,.08,.68),a:.2},
  ];
  layers.forEach(function(l){
    var geo=new THREE.PlaneGeometry(l.w,l.h,1,1);
    var mat=new THREE.ShaderMaterial({
      vertexShader:VS_CLOUD,fragmentShader:FS_CLOUD,
      uniforms:{uT:{value:0},uCol:{value:l.col},uAlpha:{value:l.a}},
      transparent:true,depthWrite:false,side:THREE.DoubleSide
    });
    var m=new THREE.Mesh(geo,mat);
    m.position.set(0,l.y,l.z);
    cloudMeshes.push(m);
    scene.add(m);
  });
}

/* ════════════════════════════════════════════════════════════
   VI. BOTTOM CLOUDS — Volumétriques, bloom cyan
════════════════════════════════════════════════════════════ */
var FS_BTMCLOUD=[
  'precision mediump float;',
  'uniform float uT;uniform float uAlpha;',
  'varying vec2 vUv;varying float vFade;',
  'float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}',
  'float ns(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}',
  'float fbm(vec2 p){float v=0.;float a=.5;for(int i=0;i<6;i++){v+=a*ns(p);p*=2.2;a*=.45;}return v;}',
  'void main(){',
  '  vec2 uv=vUv;uv.x+=uT*.018;',
  '  float n=fbm(uv*2.+uT*.03);',
  '  float n2=fbm(uv*4.5+vec2(n*.4,-uT*.025));',
  '  float cloud=n*n2*3.2;',
  '  cloud=pow(clamp(cloud,0.,1.),.7);',
  // Vertical density: denser toward bottom (uv.y=0)
  '  float vert=pow(max(0.,1.-uv.y*1.1),1.4);',
  '  cloud*=vert;',
  // Color: white core, cyan mid, purple outer
  '  vec3 coreCol=vec3(.85,.98,1.);',
  '  vec3 cyanCol=vec3(.0,.92,1.);',
  '  vec3 outerCol=vec3(.15,.05,.45);',
  '  vec3 col=mix(outerCol,cyanCol,cloud);',
  '  col=mix(col,coreCol,pow(cloud,2.5)*.8);',
  // Warm orange glow near horizon
  '  float warmZ=smoothstep(.4,.0,uv.y);',
  '  col=mix(col,vec3(.9,.45,.05),warmZ*cloud*.5);',
  '  float a=cloud*uAlpha*vFade;',
  '  if(a<.01)discard;',
  '  gl_FragColor=vec4(col,a);',
  '}'
].join('\n');

function buildBottomClouds(){
  // Multiple layers for depth
  var layers=[
    {y:-4.5,z:-.5,w:22,h:5.5,a:.9},
    {y:-5.2,z:-2,w:28,h:6,a:.75},
    {y:-6,z:-4,w:36,h:8,a:.55},
    {y:-4,z:.5,w:18,h:4,a:.6},
  ];
  layers.forEach(function(l){
    var geo=new THREE.PlaneGeometry(l.w,l.h,1,1);
    var mat=new THREE.ShaderMaterial({
      vertexShader:VS_CLOUD,fragmentShader:FS_BTMCLOUD,
      uniforms:{uT:{value:0},uAlpha:{value:l.a}},
      transparent:true,depthWrite:false,side:THREE.DoubleSide
    });
    var m=new THREE.Mesh(geo,mat);
    m.position.set((Math.random()-.5)*3,l.y,l.z);
    cloudMeshes.push(m);
    scene.add(m);
  });
}

/* ════════════════════════════════════════════════════════════
   VII. PLANÈTES — 6 sphères en orbite lente

var planetDefs=[

  [-3.5, 4.8,-25, .28,0x55CCAA, false,.015],    // Teal haut gauche

/* ════════════════════════════════════════════════════════════
   VIII. FACE POINT CLOUD — 30 000 particules
   Architecture: ellipsoïde facial + traits déformés + afro volumétrique
   ShaderMaterial: glyphes binaires animés, atlas 8x8
════════════════════════════════════════════════════════════ */

var VS_FACE=[
  'attribute float aC;',       // char index
  'attribute float aO;',       // scroll offset
  'attribute float aW;',       // warmth (0=cold cyan, 1=warm gold)
  'uniform float uT;',
  'uniform float uPR;',
  'uniform float uNova;',
  'varying float vC;',
  'varying float vT;',
  'varying vec3 vCol;',
  'varying float vA;',
  'void main(){',
  '  vec3 pos=position;',
  // Nova explosion
  '  if(uNova>0.){',
  '    float explode=uNova*3.5;',
  '    pos+=normalize(pos+vec3(.01))*explode*(1.+aO*.2);',
  '  }',
  '  vec4 mv=modelViewMatrix*vec4(pos,1.);',
  '  gl_Position=projectionMatrix*mv;',
  '  float depth=-mv.z;',
  '  gl_PointSize=clamp(62.*uPR/depth,1.5,11.);',
  // Brightness by depth
  '  float bright=clamp(1.-(depth-3.)/7.,.2,1.);',
  // Animated flicker
  '  float flk=.85+.15*sin(uT*4.+aO*6.28);',
  '  bright*=flk;',
  // Color: cyan base, warm tint
  '  vec3 cyan=vec3(0.,1.,1.);',
  '  vec3 warm=vec3(1.,.55,.05);',
  '  vCol=mix(cyan,warm,aW*.45)*bright;',
  '  vC=aC;',
  '  vT=uT+aO;',
  '  vA=bright*.9;',
  '}'
].join('\n');

var FS_FACE=[
  'precision mediump float;',
  'uniform sampler2D uAtlas;',
  'varying float vC;',
  'varying float vT;',
  'varying vec3 vCol;',
  'varying float vA;',
  'void main(){',
  '  float ci=mod(floor(vC)+floor(vT*3.5),64.);',
  '  float col=mod(ci,8.)/8.;',
  '  float row=floor(ci/8.)/8.;',
  '  vec2 uv=gl_PointCoord;',
  '  vec2 aUV=vec2(col+uv.x/8.,row+uv.y/8.);',
  '  float lum=texture2D(uAtlas,aUV).r;',
  '  if(lum<.06)discard;',
  // Glow: brighter core
  '  float glow=lum*lum*.5;',
  '  vec3 fc=vCol+vec3(0.,glow*.4,glow*.4);',
  '  gl_FragColor=vec4(fc,lum*vA);',
  '}'
].join('\n');

function genFacePoints(N){
  var pos=new Float32Array(N*3);
  var aC=new Float32Array(N);
  var aO=new Float32Array(N);
  var aW=new Float32Array(N);
  var idx=0;

  function add(x,y,z,warm){
    if(idx>=N)return;
    pos[idx*3]=x;pos[idx*3+1]=y;pos[idx*3+2]=z;
    aC[idx]=Math.random()*64;
    aO[idx]=Math.random()*50;
    aW[idx]=warm||0;
    idx++;
  }

  // === AFRO VOLUMÉTRIQUE (7500) ===
  var nAfro=7500,placed=0;
  for(var i=0;i<nAfro*6&&placed<nAfro;i++){
    var r=.72+Math.random()*.52; // inner to outer
    var cosT=Math.random();      // upper hemisphere
    var theta=Math.acos(cosT);
    var phi=Math.random()*Math.PI*2;
    var x=r*Math.sin(theta)*Math.cos(phi)*.98;
    var y=r*Math.cos(theta)+1.18;
    var z=r*Math.sin(theta)*Math.sin(phi)*.72-.08;
    // Organic afro noise
    x+=(Math.random()-.5)*.08;
    y+=(Math.random()-.5)*.08;
    z+=(Math.random()-.5)*.06;
    if(y<.75)continue; // trim below
    add(x,y,z,0);placed++;
  }

  // === FACE SURFACE AVANT (18000) ===
  var nFace=18000;placed=0;
  for(var i=0;i<nFace*8&&placed<nFace;i++){
    // Ellipsoïde tête: rx=.88 ry=1.12 rz=.76
    var fy=(Math.random()*2-1);
    var phi=(Math.random()-.5)*Math.PI*.85;
    var fy_s=fy<-.55?fy*.9:fy;
    var fx_sc=Math.sqrt(Math.max(0,1-fy_s*fy_s/1.26));
    var rx=.88*fx_sc;
    var rz_=.76*fx_sc;
    var x=rx*Math.cos(phi);
    var y=fy_s*1.12;
    var z=rz_*Math.sin(phi);
    if(z<-.04)continue; // only avant
    var nx=x/.88;var ny=y/1.12;

    // === Feature displacement ===
    // Nez (bosse)
    var nd=Math.sqrt(nx*nx*1.1+(ny-.04)*(ny-.04));
    var nose=nd<.22?((.22-nd)/.22)*(.22-nd>0?.0001:0):.0;
    nose=nd<.22?((.22-nd)/.22)*(.22-nd)*.55:0;
    // Narines légèrement écartées
    var nl=Math.sqrt((nx-.08)*(nx-.08)+(ny-.06)*(ny-.06));
    var nr=Math.sqrt((nx+.08)*(nx+.08)+(ny-.06)*(ny-.06));
    nose+=Math.min(nl,nr)<.09?((.09-Math.min(nl,nr))/.09)*.12:0;

    // Lèvres (plus épaisses, saillantes)
    var ld=Math.sqrt((nx*1.6)*(nx*1.6)+(ny+.38)*(ny+.38));
    var lips=ld<.2?((.2-ld)/.2)*(.2-ld)*.7:0;
    // Philtrum (creux au-dessus lèvre sup)
    var philt=Math.sqrt((nx*.5)*(nx*.5)+(ny+.28)*(ny+.28));
    lips+=philt<.1?((.1-philt)/.1)*.06:0;

    // Orbites (creux)
    var el=Math.sqrt((nx-.3)*(nx-.3)+(ny-.24)*(ny-.24));
    var er=Math.sqrt((nx+.3)*(nx+.3)+(ny-.24)*(ny-.24));
    var eyes=Math.min(el,er)<.17?-((.17-Math.min(el,er))/.17)*(.17-Math.min(el,er))*.55:0;

    // Arcades sourcilières
    var brl=Math.sqrt((nx-.22)*(nx-.22)+(ny-.38)*(ny-.38));
    var brr=Math.sqrt((nx+.22)*(nx+.22)+(ny-.38)*(ny-.38));
    var brow=Math.min(brl,brr)<.2?((.2-Math.min(brl,brr))/.2)*.1:0;

    // Pommettes
    var cl=Math.sqrt((nx-.44)*(nx-.44)+(ny+.02)*(ny+.02));
    var cr=Math.sqrt((nx+.44)*(nx+.44)+(ny+.02)*(ny+.02));
    var cheek=Math.min(cl,cr)<.22?((.22-Math.min(cl,cr))/.22)*.14:0;

    z+=nose+lips+eyes+brow+cheek;
    // Micro bruit organique
    z+=(Math.random()-.5)*.025;x+=(Math.random()-.5)*.018;y+=(Math.random()-.5)*.018;

    // Warmth: plus chaud en bas (menton, nuque)
    var warm=Math.max(0,-ny*.5);
    add(x,y,z,warm);placed++;
  }

  // === COU + ÉPAULES (3500) ===
  var nNeck=3500;
  for(var i=0;i<nNeck;i++){
    var t=Math.random()*Math.PI*2;
    var yy=-1.05-Math.random()*1.1;
    var bust=yy<-1.5;
    var r=bust?.18+Math.abs(yy+1.5)*.55+Math.random()*.1
              :.12+Math.random()*.06;
    var zz=r*Math.sin(t)*.55+.28;
    var warm=Math.min(1,Math.abs(yy)/2.2);
    add(r*Math.cos(t),yy,zz,warm);
  }

  // === MÈCHES AFRO FLOTTANTES (1000) ===
  for(var i=0;i<1000;i++){
    var at=Math.random()*Math.PI*2;
    var ar=1.25+Math.random()*.5;
    var ay=.5+Math.random()*1.1;
    add(ar*Math.cos(at)*.95,ay,ar*Math.sin(at)*.5,0);
  }

  return{pos:pos,aC:aC,aO:aO,aW:aW,count:idx};
}

function buildFace(){
  var data=genFacePoints(30000);
  var geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(data.pos,3));
  geo.setAttribute('aC',new THREE.BufferAttribute(data.aC,1));
  geo.setAttribute('aO',new THREE.BufferAttribute(data.aO,1));
  geo.setAttribute('aW',new THREE.BufferAttribute(data.aW,1));

  faceMat=new THREE.ShaderMaterial({
    vertexShader:VS_FACE,fragmentShader:FS_FACE,
    uniforms:{
      uT:{value:0},uPR:{value:PR},uNova:{value:0},
      uAtlas:{value:charAtlas}
    },
    transparent:true,depthWrite:false,depthTest:true
  });

  faceGroup=new THREE.Group();
  faceMesh=new THREE.Points(geo,faceMat);
  faceGroup.add(faceMesh);
  faceGroup.position.set(0,.15,0);
  scene.add(faceGroup);
}

/* ════════════════════════════════════════════════════════════
   IX. LIGHTNING — Éclairs branchus haut-gauche
════════════════════════════════════════════════════════════ */
var lightningMesh=null;
var lightTimer=0,lightActive=false,lightT=0;

function makeBolt(x1,y1,z1,x2,y2,z2,depth,pts){
  pts.push(x1,y1,z1);pts.push(x2,y2,z2);
  if(depth<=0)return;
  var mx=(x1+x2)/2+(Math.random()-.5)*1.2/depth;
  var my=(y1+y2)/2+(Math.random()-.5)*1.2/depth;
  var mz=(z1+z2)/2;
  makeBolt(x1,y1,z1,mx,my,mz,depth-1,pts);
  makeBolt(mx,my,mz,x2,y2,z2,depth-1,pts);
  if(depth>=2&&Math.random()<.4){
    var bx=mx+(Math.random()-.5)*3;
    var by=my+(Math.random()-.5)*2;
    makeBolt(mx,my,mz,bx,by,mz,depth-1,pts);
  }
}

function buildLightning(){
  if(lightningMesh){scene.remove(lightningMesh);lightningMesh.geometry.dispose();}
  var pts=[];
  // 3 éclairs dans zone haut-gauche
  for(var i=0;i<3;i++){
    var x=-5-Math.random()*4;
    var y=5+Math.random()*3;
    makeBolt(x-1+Math.random(),y+1,1, x+2+Math.random()*2,y-3-Math.random()*2,1, 4,pts);
  }
  var arr=new Float32Array(pts);
  var geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(arr,3));
  var mat=new THREE.LineBasicMaterial({
    color:0xCCFFFF,transparent:true,opacity:.9,depthWrite:false,blending:THREE.AdditiveBlending
  });
  lightningMesh=new THREE.LineSegments(geo,mat);
  scene.add(lightningMesh);
}

function scheduleLightning(){
  function trigger(){
    buildLightning();
    lightActive=true;lightT=0;
    var nextMs=3000+Math.random()*5000;
    setTimeout(trigger,nextMs);
  }
  setTimeout(trigger,2000);
}

/* ════════════════════════════════════════════════════════════
   X. ANIMATION LOOP — 60 FPS
════════════════════════════════════════════════════════════ */
var _raf;
function animate(){
  _raf=requestAnimationFrame(animate);
  var t=clock.getElapsedTime();
  frameCount++;

  // Background time
  if(bgMesh)bgMesh.material.uniforms.uT.value=t;

  // Stars slow drift
  if(starMesh){starMesh.rotation.y=t*.002;starMesh.rotation.x=t*.001;}

  // Nebula clouds drift
  for(var i=0;i<cloudMeshes.length;i++){
    cloudMeshes[i].material.uniforms.uT.value=t;
  }

  // Planets orbit + slow rotation
  if(planetGroup){
    for(var i=0;i<planetGroup.children.length;i++){
      var p=planetGroup.children[i];
      var spd=p.userData.spd;
      var ox=p.userData.ox,oy=p.userData.oy;
      p.position.x=ox+Math.sin(t*spd+i)*1.2;
      p.position.y=oy+Math.cos(t*spd*.7+i)*.6;
      p.rotation.y=t*spd*2;
    }
  }

  // Face rotation via drag inertia
  dragVX*=.88;dragVY*=.88;
  camRotX+=dragVX;camRotY+=dragVY;
  camRotX=Math.max(-Math.PI*.38,Math.min(Math.PI*.38,camRotX));
  if(faceGroup){
    faceGroup.rotation.x+=(camRotX-faceGroup.rotation.x)*.08;
    faceGroup.rotation.y+=(camRotY-faceGroup.rotation.y)*.08;
  }

  // Face shader time
  if(faceMat){
    faceMat.uniforms.uT.value=t;
    // Nova
    if(novaActive){
      novaT+=.022;
      faceMat.uniforms.uNova.value=Math.sin(novaT*Math.PI)*1.2;
      if(novaT>=1){novaActive=false;faceMat.uniforms.uNova.value=0;}
    }
  }

  // Lightning fade
  if(lightningMesh&&lightActive){
    lightT+=.025;
    var lA=Math.sin(lightT*Math.PI);
    lightningMesh.material.opacity=lA*.85;
    if(lightT>=1)lightActive=false;
  }

  // HUD mini-charts
  if(frameCount%6===0)updateCharts(t);

  renderer.render(scene,camera);
}

function onResize(){
  var se=document.getElementById('scene');
  W=se.offsetWidth||window.innerWidth;
  H=se.offsetHeight||(window.innerHeight-90);
  camera.aspect=W/H;camera.updateProjectionMatrix();
  renderer.setSize(W,H,false);
}

/* ════════════════════════════════════════════════════════════
   XI. CAMERA DRAG + TOUCH
════════════════════════════════════════════════════════════ */
function initPointer(){
  var se=document.getElementById('scene');
  var lastTap=0;

  se.addEventListener('pointerdown',function(e){
    _drag=true;_px=e.clientX;_py=e.clientY;_pTime=Date.now();
    dragVX=0;dragVY=0;
    se.setPointerCapture&&se.setPointerCapture(e.pointerId);
  });
  se.addEventListener('pointermove',function(e){
    if(!_drag)return;
    var dx=e.clientX-_px;var dy=e.clientY-_py;
    dragVY+=dx*.0022;dragVX+=dy*.0022;
    _px=e.clientX;_py=e.clientY;
  });
  se.addEventListener('pointerup',function(e){
    var dt=Date.now()-_pTime;
    var moved=Math.abs(e.clientX-_px)+Math.abs(e.clientY-_py);
    if(dt<200&&moved<10){
      // Tap → ripple + nova
      addRipple(e.clientX,e.clientY);
      triggerNova();
    }
    _drag=false;
  });
  se.addEventListener('pointercancel',function(){_drag=false;});
}

function addRipple(x,y){
  var d=document.createElement('div');d.className='ripple';
  d.style.left=x+'px';d.style.top=y+'px';
  document.getElementById('scene').appendChild(d);
  setTimeout(function(){d.parentNode&&d.parentNode.removeChild(d)},700);
}

function triggerNova(){
  if(!novaActive){novaActive=true;novaT=0;sNova();}
}

/* ════════════════════════════════════════════════════════════
   XII. HUD PANELS + MINI CHARTS
════════════════════════════════════════════════════════════ */
function openPanels(){
  if(panelsOpen)return;
  panelsOpen=true;
  ['h1','h2','h3','h4'].forEach(function(id,i){
    setTimeout(function(){document.getElementById(id).classList.add('open')},i*150);
  });
}

function initCharts(){
  ['ch1','ch2','ch3','ch4'].forEach(function(id){
    chartBufs[id]=[];
  });
}

function updateCharts(t){
  // Generate live-looking sparklines
  function sparkDraw(canvId,col,val){
    var cv=document.getElementById(canvId);if(!cv)return;
    var cx=cv.getContext('2d');if(!cx)return;
    var buf=chartBufs[canvId]||[];
    buf.push(val);if(buf.length>40)buf.shift();
    chartBufs[canvId]=buf;
    cx.clearRect(0,0,cv.width,cv.height);
    cx.strokeStyle=col;cx.lineWidth=1.2;cx.beginPath();
    for(var j=0;j<buf.length;j++){
      var bx=j*(cv.width/40);
      var by=cv.height-(buf[j]*cv.height);
      j===0?cx.moveTo(bx,by):cx.lineTo(bx,by);
    }
    cx.stroke();
    // Gradient fill
    var grad=cx.createLinearGradient(0,0,0,cv.height);
    grad.addColorStop(0,col.replace(')',',0.18)').replace('rgb','rgba'));
    grad.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=grad;cx.lineTo(cv.width,cv.height);cx.lineTo(0,cv.height);cx.fill();
  }
  sparkDraw('ch1','rgb(0,255,255)',.3+Math.sin(t*.4)*.25+Math.random()*.08);
  sparkDraw('ch2','rgb(0,255,159)',.4+Math.cos(t*.3)*.3+Math.random()*.07);
  sparkDraw('ch3','rgb(80,180,255)',.5+Math.sin(t*.5+1)*.2+Math.random()*.09);
  sparkDraw('ch4','rgb(200,100,255)',.35+Math.cos(t*.4+2)*.28+Math.random()*.06);
}

function setLog(msg){var el=document.getElementById('v-log');if(el)el.textContent=msg;}
function badge(txt,live){var el=document.getElementById('badge');if(!el)return;el.textContent=txt;live?el.classList.add('live'):el.classList.remove('live');}

function tickTime(){
  (function loop(){
    var now=new Date();
    var hh=now.getHours().toString().padStart(2,'0');
    var mm=now.getMinutes().toString().padStart(2,'0');
    var ss=now.getSeconds().toString().padStart(2,'0');
    var el=document.querySelector('.stxt');
    if(el)el.textContent='ZENITH V15 — '+hh+':'+mm+':'+ss;
    setTimeout(loop,1000);
  })();
}

/* ════════════════════════════════════════════════════════════
   XIII. POLLING API — données réelles du salon
════════════════════════════════════════════════════════════ */
function startPolling(){
  function poll(){
    fetch('/api/stats').then(function(r){return r.json()}).then(function(d){
      var rv=document.getElementById('v-rdv');if(rv)rv.textContent=d.activeClients||'—';
      var sv=document.getElementById('v-sms');if(sv)sv.textContent=d.smsSent||0;
      var tv=document.getElementById('v-today');if(tv)tv.textContent=d.todayRdv||0;
      var nv=document.getElementById('v-next');if(nv)nv.textContent=d.nextSlot||'—';
    }).catch(function(){});
    setTimeout(poll,22000);
  }
  setTimeout(poll,3000);
}

/* ════════════════════════════════════════════════════════════
   XIV. CHAT + INPUT
════════════════════════════════════════════════════════════ */
function addBubble(role,text,save){
  if(save===undefined)save=true;
  var d=document.createElement('div');d.className='bub '+role;d.textContent=text;
  chatEl.appendChild(d);
  chatEl.scrollTop=chatEl.scrollHeight;
  if(save){
    chatHistory.push({r:role,t:text});
    if(chatHistory.length>20)chatHistory.shift();
    try{localStorage.setItem('z15',JSON.stringify(chatHistory))}catch(_){}
  }
  if(role==='user')msgCount++;
  var mv=document.getElementById('v-msgs');if(mv)mv.textContent=msgCount;
}

function showDots(){
  var d=document.createElement('div');d.className='dots';
  d.innerHTML='<span>.</span><span>.</span><span>.';
  chatEl.appendChild(d);chatEl.scrollTop=chatEl.scrollHeight;
  return d;
}

var DALEBA_REPLIES=[
  'Analyse en cours… Pilier II actif.',
  'Je reçois tes paramètres. Protocole Kadio-Alpha V15 chargé.',
  'Calendrier synchronisé. 3 coiffeurs disponibles.',
  'Connexion WhatsApp stable. 0 message en attente.',
  'Mémoire matricielle à 94%. Tout est nominal.',
  'Réservation possible ce soir à 18h30.',
  'DALEBA OS — Architecture V15. Rendu holographique actif.',
  'Signal reçu. Je traite ta requête en temps réel.',
];

function sendMsg(){
  var txt=(msgEl.value||'').trim();
  if(!txt)return;
  var cmd=txt.toLowerCase();
  msgEl.value='';
  addBubble('user',txt);

  if(cmd==='panels'){openPanels();return;}
  if(cmd==='nova'){triggerNova();return;}
  if(cmd==='lightning'){buildLightning();lightActive=true;lightT=0;return;}

  var dots=showDots();
  setLog(txt.slice(0,28)+'…');
  sPing();

  var inReflect_=true;
  document.getElementById('reflex').classList.add('on');

  setTimeout(function(){
    dots.parentNode&&dots.parentNode.removeChild(dots);
    document.getElementById('reflex').classList.remove('on');
    var rep=DALEBA_REPLIES[msgCount%DALEBA_REPLIES.length];
    addBubble('daleba',rep);
    setLog('Réponse envoyée');
  },900+Math.random()*600);
}

function initInput(){
  document.getElementById('send').addEventListener('click',sendMsg);
  msgEl.addEventListener('keydown',function(e){if(e.key==='Enter')sendMsg();});
}
