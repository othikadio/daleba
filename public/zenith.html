<!-- ERREUR FATALE : affichée au milieu de l'écran en gros si quoi que ce soit crash -->
<script>
window.onerror = function(msg, src, line, col, err) {
  var d = document.getElementById('fatal-error');
  if (!d) {
    d = document.createElement('div');
    d.id = 'fatal-error';
    d.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;background:rgba(0,0,0,.92);border:2px solid #ff4444;border-radius:8px;padding:24px 32px;max-width:90vw;font-family:monospace;text-align:center';
    document.body ? document.body.appendChild(d) : document.addEventListener('DOMContentLoaded',function(){ document.body.appendChild(d); });
  }
  d.innerHTML = '<div style="color:#ff6666;font-size:1.1rem;font-weight:700;margin-bottom:10px">⚠ ERREUR FATALE ZENITH</div>'
    + '<div style="color:#ffaaaa;font-size:.85rem;word-break:break-all">' + String(msg) + '</div>'
    + '<div style="color:#888;font-size:.7rem;margin-top:8px">' + src + ':' + line + ':' + col + '</div>';
  return false;
};
window.addEventListener('unhandledrejection', function(e) {
  window.onerror('Promise rejetée: ' + (e.reason && e.reason.message || e.reason), 'async', 0, 0, e.reason);
});
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --em:#00FF9F;--em2:#50C878;--cy:#00D4FF;--terra:#C4622D;
  --bg:#000010;--txt:#C8F0DC;--dim:rgba(0,255,159,.3);--border:rgba(0,255,159,.15);
  --mono:'Courier New',monospace;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:Arial,sans-serif}

/* SHELL */
#shell{display:flex;flex-direction:column;width:100vw;height:100vh}

/* HEADER */
#hdr{
  flex-shrink:0;height:50px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
  border-bottom:1px solid var(--border);
  background:rgba(0,0,10,.8);
  position:relative;z-index:100;
}
.logo{font-family:var(--mono);font-size:.95rem;font-weight:700;color:var(--em);letter-spacing:.2em}
.dot{width:7px;height:7px;border-radius:50%;background:var(--em);box-shadow:0 0 8px var(--em);display:inline-block;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.status-txt{font-family:var(--mono);font-size:.65rem;color:var(--em);margin-left:7px;letter-spacing:.1em}
.nav a{font-family:var(--mono);font-size:.62rem;color:rgba(0,255,159,.45);text-decoration:none;margin-left:14px;transition:color .2s}
.nav a:hover{color:var(--em)}
#wsbadge{font-family:var(--mono);font-size:.6rem;color:var(--em);padding:3px 10px;border:1px solid var(--dim);border-radius:20px;margin-left:14px}

/* SCENE */
#scene{flex:1;position:relative;overflow:hidden;width:100%}

/* CANVAS — FORÇAGE ABSOLU */
#planet{
  position:absolute;top:0;left:0;
  display:block;
  /* width/height forcés par JS */
}

/* WIDGETS */
.w{position:absolute;z-index:40;width:178px;padding:11px 13px;
   background:rgba(0,0,20,.6);border:1px solid var(--border);border-radius:5px;
   backdrop-filter:blur(10px);animation:wfade .8s ease forwards;opacity:0}
@keyframes wfade{to{opacity:1}}
#w1{top:14px;left:14px;animation-delay:.5s}
#w2{top:14px;right:14px;animation-delay:.7s}
#w3{bottom:64px;left:14px;animation-delay:.9s}
#w4{bottom:64px;right:14px;animation-delay:1.1s}
.wt{font-family:var(--mono);font-size:.58rem;font-weight:700;color:var(--em);letter-spacing:.15em;text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:5px;margin-bottom:7px}
.wr{display:flex;justify-content:space-between;margin-bottom:3px}
.wl{font-family:var(--mono);font-size:.56rem;color:rgba(255,255,255,.35)}
.wv{font-family:var(--mono);font-size:.58rem;color:var(--em)}
@media(max-width:600px){.w{display:none}}

/* REFLEX OVERLAY */
#reflex{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:60;text-align:center;pointer-events:none;opacity:0;transition:opacity .3s}
#reflex.on{opacity:1}
.rtxt{font-family:var(--mono);font-size:.75rem;color:var(--em);letter-spacing:.25em;text-transform:uppercase;animation:flk 1.3s infinite}
@keyframes flk{0%,100%{opacity:1}48%{opacity:.3}50%{opacity:.1}52%{opacity:.8}}

/* CHAT */
#chat{position:absolute;bottom:58px;right:0;width:320px;max-height:60%;overflow-y:auto;z-index:80;padding:10px;display:flex;flex-direction:column;gap:7px}
#chat::-webkit-scrollbar{width:3px}
#chat::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
.bubble{max-width:92%;padding:7px 11px;border-radius:5px;font-family:var(--mono);font-size:.7rem;line-height:1.5;animation:bub .25s ease}
@keyframes bub{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.bubble.user{align-self:flex-end;background:rgba(0,255,159,.07);border:1px solid rgba(0,255,159,.18);color:#e0ffe0}
.bubble.daleba{align-self:flex-start;background:rgba(0,0,30,.7);border:1px solid var(--border);color:var(--em)}
.bubble.daleba::before{content:'DALEBA › ';font-weight:700}
.typing-dots{align-self:flex-start;font-family:var(--mono);font-size:.68rem;color:var(--dim);padding:4px 8px}
.typing-dots span{animation:tdot 1s infinite}.typing-dots span:nth-child(2){animation-delay:.2s}.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{opacity:.15}40%{opacity:1}}
@media(max-width:600px){#chat{width:100%}}

/* INPUT */
#bar{flex-shrink:0;height:52px;display:flex;align-items:center;gap:9px;padding:0 18px;border-top:1px solid var(--border);background:rgba(0,0,15,.85);position:relative;z-index:100}
.prompt{font-family:var(--mono);font-size:1.1rem;color:var(--em);flex-shrink:0}
#msg{flex:1;background:transparent;border:none;outline:none;color:#e0ffe0;font-family:var(--mono);font-size:.82rem;caret-color:var(--em)}
#msg::placeholder{color:rgba(0,255,159,.2)}
#send{background:none;border:1px solid var(--dim);color:var(--em);font-family:var(--mono);font-size:.75rem;padding:5px 13px;border-radius:4px;cursor:pointer;flex-shrink:0;transition:background .2s}
#send:hover{background:rgba(0,255,159,.1)}
</style>

<!-- THREE.JS LOCAL — zéro CDN externe, zéro blocage CSP -->
<script src="/js/three.min.js"></script>

<script>
/* ================================================================
   DALEBA ZENITH — Moteur 3D
   Stratégie :
   1. TEST CANVAS (fond émeraude visible dès le premier frame)
   2. WebGL check explicite
   3. initThree() avec lumières + sphère de particules
   4. Fallback Canvas 2D si WebGL absent
   5. Chat → /api/chat
================================================================ */

// ── GLOBALS ──────────────────────────────────────────────
var scene, camera, renderer, clock;
var particleSystem, lineSegs, ring;
var rotSpeed = 0.0012, targetRot = 0.0012;
var waveActive = false, waveT = 0;
var inReflection = false;
var msgCount = 0;
var sessionId = 'z' + Date.now().toString(36);
var chatHistory = [];
var chatEl, msgEl;

// ── BOOT ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  chatEl = document.getElementById('chat');
  msgEl  = document.getElementById('msg');

  setLog('DOM prêt');
  setBadge('INIT', false);

  // Restore chat
  try {
    var saved = localStorage.getItem('z-chat');
    if (saved) {
      chatHistory = JSON.parse(saved).slice(-20);
      chatHistory.forEach(function(m) { addBubble(m.role, m.text, false); });
    }
  } catch(_) {}

  // Lancer 3D après layout settling (2 frames)
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      startPlanet();
      initInput();
      startPolling();
    });
  });
});

// ── PLANET BOOTSTRAP ──────────────────────────────────────
function startPlanet() {
  var canvas = document.getElementById('planet');
  var scene_el = document.getElementById('scene');

  // Lire les dimensions du conteneur — après 2 rAF le layout est calculé
  var W = scene_el.getBoundingClientRect().width  || window.innerWidth;
  var H = scene_el.getBoundingClientRect().height || (window.innerHeight - 102);

  // Forcer canvas en pixels absolus
  canvas.width  = Math.floor(W);
  canvas.height = Math.floor(H);
  canvas.style.width  = Math.floor(W) + 'px';
  canvas.style.height = Math.floor(H) + 'px';

  setLog('Canvas: ' + Math.floor(W) + 'x' + Math.floor(H));

  // ÉTAPE 1 — PROOF OF LIFE : peindre fond émeraude immédiatement
  // Si ce rectangle est visible → le canvas est bien instancié
  var probe = canvas.getContext('2d');
  if (probe) {
    probe.fillStyle = 'rgba(0,255,159,0.06)';
    probe.fillRect(0, 0, W, H);
    probe.clearRect(0, 0, W, H); // effacer aussitôt pour ne pas gêner WebGL
  }

  // ÉTAPE 2 — Test WebGL
  var webglOk = false;
  try {
    var testCtx = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
    if (testCtx) {
      webglOk = true;
      // Libérer le contexte 2d (un canvas ne peut avoir qu'un seul contexte actif)
      // On recrée le canvas pour repartir propre
      var fresh = document.createElement('canvas');
      fresh.id = 'planet';
      fresh.width  = Math.floor(W);
      fresh.height = Math.floor(H);
      fresh.style.cssText = 'position:absolute;top:0;left:0;width:' + Math.floor(W) + 'px;height:' + Math.floor(H) + 'px;display:block';
      canvas.parentNode.replaceChild(fresh, canvas);
      canvas = fresh;
    }
  } catch(e) { webglOk = false; }

  if (!webglOk || typeof THREE === 'undefined') {
    setLog('WebGL absent → fallback 2D');
    canvas2D(canvas, W, H);
    return;
  }

  // ÉTAPE 3 — Three.js
  try {
    initThree(canvas, W, H);
    setLog('THREE.js ● actif');
    setBadge('3D LIVE ●', true);
  } catch(e) {
    setLog('THREE err: ' + e.message);
    canvas2D(canvas, W, H);
  }
}

// ── INIT THREE.JS ─────────────────────────────────────────
function initThree(canvas, W, H) {
  scene  = new THREE.Scene();
  clock  = new THREE.Clock();
  camera = new THREE.PerspectiveCamera(52, W / H, 0.1, 100);
  camera.position.set(0, 0, 5.5);

  renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
  renderer.setSize(W, H, false);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setClearColor(0x000010, 1); // fond quasi-noir (pas transparent pour s'assurer qu'il rend)

  // ── LUMIÈRES ──────────────────────────────────────
  scene.add(new THREE.AmbientLight(0x00ff9f, 0.4));
  var dl = new THREE.DirectionalLight(0x00ffbf, 1.8);
  dl.position.set(4, 6, 4);
  scene.add(dl);
  var pl = new THREE.PointLight(0x00d4ff, 3.0, 18);
  pl.position.set(-3, 2, 3);
  scene.add(pl);
  var pl2 = new THREE.PointLight(0x50c878, 2.0, 18);
  pl2.position.set(2, -3, -2);
  scene.add(pl2);

  // ── SPHÈRE DE PARTICULES ──────────────────────────
  var N = 850;
  var R = 1.85;
  var pos  = new Float32Array(N * 3);
  var col  = new Float32Array(N * 3);
  var orig = new Float32Array(N * 3);

  for (var i = 0; i < N; i++) {
    var phi   = Math.acos(1 - 2 * (i + 0.5) / N);
    var theta = Math.PI * (1 + Math.sqrt(5)) * i;
    var x = R * Math.sin(phi) * Math.cos(theta);
    var y = R * Math.sin(phi) * Math.sin(theta);
    var z = R * Math.cos(phi);
    pos[i*3]   = orig[i*3]   = x;
    pos[i*3+1] = orig[i*3+1] = y;
    pos[i*3+2] = orig[i*3+2] = z;
    // Émeraude (#50C878) → cyan (#00D4FF)
    var t = (y / R + 1) / 2;
    col[i*3]   = (1-t)*0.313 + t*0.0;
    col[i*3+1] = (1-t)*0.784 + t*0.831;
    col[i*3+2] = (1-t)*0.471 + t*1.0;
  }

  var geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  geo._orig = orig;

  particleSystem = new THREE.Points(geo,
    new THREE.PointsMaterial({ size: 0.06, vertexColors: true, sizeAttenuation: true, transparent: true, opacity: 1.0 })
  );
  scene.add(particleSystem);

  // ── LIGNES ──────────────────────────────────────────
  buildLines(pos, N);

  // ── ANNEAU ORBITAL ──────────────────────────────────
  ring = new THREE.Mesh(
    new THREE.TorusGeometry(R * 1.3, 0.007, 6, 100),
    new THREE.MeshBasicMaterial({ color: 0x00ff9f, transparent: true, opacity: 0.2 })
  );
  ring.rotation.x = Math.PI / 2.6;
  scene.add(ring);

  // ── HALO ────────────────────────────────────────────
  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(R * 1.12, 32, 32),
    new THREE.MeshBasicMaterial({ color: 0x00ff9f, transparent: true, opacity: 0.035, side: THREE.BackSide })
  ));

  // ── RESIZE ──────────────────────────────────────────
  window.addEventListener('resize', onResize);

  // ── DRAG ────────────────────────────────────────────
  setupDrag(canvas);

  // ── BOUCLE ──────────────────────────────────────────
  animate();

  // Son
  playWhoosh();
}

// ── LIGNES DE CONNEXION ───────────────────────────────────
function buildLines(pos, N) {
  if (lineSegs) { scene.remove(lineSegs); lineSegs.geometry.dispose(); }
  var verts = [];
  var D2 = 0.72 * 0.72;
  for (var i = 0; i < N; i++) {
    for (var j = i+1; j < N; j++) {
      var dx=pos[i*3]-pos[j*3], dy=pos[i*3+1]-pos[j*3+1], dz=pos[i*3+2]-pos[j*3+2];
      if (dx*dx+dy*dy+dz*dz < D2) {
        verts.push(pos[i*3],pos[i*3+1],pos[i*3+2],pos[j*3],pos[j*3+1],pos[j*3+2]);
      }
    }
  }
  var lg = new THREE.BufferGeometry();
  lg.setAttribute('position', new THREE.BufferAttribute(new Float32Array(verts), 3));
  lineSegs = new THREE.LineSegments(lg, new THREE.LineBasicMaterial({ color: 0x00ff9f, transparent: true, opacity: 0.1 }));
  scene.add(lineSegs);
}

// ── BOUCLE D'ANIMATION ────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  if (!renderer || !particleSystem) return;

  var dt = clock.getDelta();
  var t  = clock.getElapsedTime();

  // Rotation fluide
  rotSpeed += (targetRot - rotSpeed) * 0.06;
  particleSystem.rotation.y += rotSpeed;
  if (ring) ring.rotation.z += rotSpeed * 0.35;

  // Pulsation douce
  var geo = particleSystem.geometry;
  var p   = geo.attributes.position.array;
  var o   = geo._orig;
  if (o) {
    var pulse = 1 + Math.sin(t * 1.1) * 0.018;

    if (waveActive) {
      waveT += dt * 3.5;
      for (var i = 0; i < p.length/3; i++) {
        var d = Math.sqrt(o[i*3]*o[i*3]+o[i*3+1]*o[i*3+1]+o[i*3+2]*o[i*3+2]);
        var w = Math.sin(d*3.5 - waveT) * 0.1;
        p[i*3]   = o[i*3]   * (pulse + w);
        p[i*3+1] = o[i*3+1] * (pulse + w);
        p[i*3+2] = o[i*3+2] * (pulse + w);
      }
      if (waveT > Math.PI * 2) { waveActive = false; waveT = 0; }
    } else {
      for (var j = 0; j < p.length; j++) p[j] = o[j] * pulse;
    }
    geo.attributes.position.needsUpdate = true;
  }

  // Opacité mode réflexion
  particleSystem.material.opacity = inReflection ? 0.4 + Math.abs(Math.sin(t*5))*0.5 : 1.0;

  renderer.render(scene, camera);
}

// ── RESIZE ────────────────────────────────────────────────
function onResize() {
  var se = document.getElementById('scene');
  var W  = se.getBoundingClientRect().width  || window.innerWidth;
  var H  = se.getBoundingClientRect().height || (window.innerHeight - 102);
  if (renderer) {
    var c = renderer.domElement;
    c.width = W; c.height = H;
    c.style.width = W+'px'; c.style.height = H+'px';
    camera.aspect = W / H;
    camera.updateProjectionMatrix();
    renderer.setSize(W, H, false);
  }
}

// ── DRAG ORBIT ────────────────────────────────────────────
function setupDrag(canvas) {
  var drag = false, lx = 0, ly = 0;
  canvas.addEventListener('mousedown',  function(e){ drag=true; lx=e.clientX; ly=e.clientY; });
  window.addEventListener('mouseup',    function(){ drag=false; });
  window.addEventListener('mousemove',  function(e){
    if (!drag||!particleSystem) return;
    particleSystem.rotation.y += (e.clientX-lx)*0.007;
    particleSystem.rotation.x += (e.clientY-ly)*0.007;
    if(ring) ring.rotation.y  += (e.clientX-lx)*0.003;
    lx=e.clientX; ly=e.clientY;
  });
  canvas.addEventListener('touchstart', function(e){ drag=true; lx=e.touches[0].clientX; },{passive:true});
  window.addEventListener('touchend',   function(){ drag=false; });
  window.addEventListener('touchmove',  function(e){
    if(!drag||!particleSystem) return;
    particleSystem.rotation.y += (e.touches[0].clientX-lx)*0.007;
    if(ring) ring.rotation.y  += (e.touches[0].clientX-lx)*0.003;
    lx=e.touches[0].clientX;
  },{passive:true});
}

// ── FALLBACK CANVAS 2D ────────────────────────────────────
function canvas2D(canvas, W, H) {
  setBadge('2D ●', true);
  canvas.width = W; canvas.height = H;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  var ctx = canvas.getContext('2d');
  if (!ctx) { setLog('Pas de contexte 2D non plus'); return; }

  var N = 180, R = Math.min(W,H)*0.28, cx=W/2, cy=H/2, angle=0;
  var pts = [];
  for (var i=0; i<N; i++) {
    var phi=Math.acos(1-2*(i+.5)/N), theta=Math.PI*(1+Math.sqrt(5))*i;
    pts.push({ox:Math.sin(phi)*Math.cos(theta),oy:Math.sin(phi)*Math.sin(theta),oz:Math.cos(phi)});
  }

  function draw() {
    requestAnimationFrame(draw);
    ctx.clearRect(0,0,W,H);
    angle += 0.009;
    var ca=Math.cos(angle), sa=Math.sin(angle);
    var proj = pts.map(function(p){
      var rx=p.ox*ca-p.oz*sa, rz=p.ox*sa+p.oz*ca;
      var sc=(rz+2)/3;
      return {sx:cx+rx*R*sc, sy:cy+p.oy*R*sc, z:rz, sc:sc};
    }).sort(function(a,b){return a.z-b.z});

    // Fond radial
    var g=ctx.createRadialGradient(cx,cy,0,cx,cy,R*1.4);
    g.addColorStop(0,'rgba(0,255,159,.07)'); g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    // Lignes
    ctx.lineWidth=.8;
    for(var i=0;i<proj.length;i++) for(var j=i+1;j<proj.length;j++){
      var dx=proj[i].sx-proj[j].sx,dy=proj[i].sy-proj[j].sy;
      if(dx*dx+dy*dy<(R*.38)*(R*.38)){
        ctx.strokeStyle='rgba(0,255,159,'+(.05+proj[i].sc*.1)+')';
        ctx.beginPath(); ctx.moveTo(proj[i].sx,proj[i].sy); ctx.lineTo(proj[j].sx,proj[j].sy); ctx.stroke();
      }
    }

    // Points
    ctx.shadowBlur=8; ctx.shadowColor='#00FF9F';
    proj.forEach(function(p){
      ctx.beginPath(); ctx.arc(p.sx,p.sy,1.5+p.sc*2.2,0,Math.PI*2);
      ctx.fillStyle='rgba(0,255,159,'+(0.35+p.sc*.65)+')'; ctx.fill();
    });
    ctx.shadowBlur=0;

    // Halo central
    var g2=ctx.createRadialGradient(cx,cy,0,cx,cy,R*.45);
    g2.addColorStop(0,'rgba(0,255,159,.18)'); g2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g2; ctx.beginPath(); ctx.arc(cx,cy,R*.45,0,Math.PI*2); ctx.fill();
  }
  draw();
}

// ── REFLECTION MODE ───────────────────────────────────────
function enterReflect() {
  inReflection=true; targetRot=0.005;
  document.getElementById('reflex').classList.add('on');
}
function exitReflect() {
  inReflection=false; targetRot=0.0012;
  document.getElementById('reflex').classList.remove('on');
}

// ── CHAT ──────────────────────────────────────────────────
function initInput() {
  var btn = document.getElementById('send');
  if (msgEl) msgEl.addEventListener('keydown', function(e){ if(e.key==='Enter') sendMsg(); });
  if (btn)   btn.addEventListener('click', sendMsg);
}

function sendMsg() {
  var txt = (msgEl ? msgEl.value : '').trim();
  if (!txt) return;
  if (msgEl) msgEl.value='';
  msgCount++;
  var wm=document.getElementById('w-msgs'); if(wm) wm.textContent=msgCount;

  addBubble('user', txt, true);
  triggerWave(); enterReflect();

  var typing=document.createElement('div');
  typing.className='typing-dots';
  typing.innerHTML='<span>●</span><span>●</span><span>●</span>';
  if(chatEl){ chatEl.appendChild(typing); scrollChat(); }

  fetch('/api/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({message:txt,sessionId:sessionId})
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(chatEl&&typing.parentNode) chatEl.removeChild(typing);
    exitReflect();
    addBubble('daleba', d.response||d.message||'Je suis là.', true);
    setLog('Réponse reçue ✓');
  })
  .catch(function(e){
    if(chatEl&&typing.parentNode) chatEl.removeChild(typing);
    exitReflect();
    addBubble('daleba','Recalibration… Réessaie. 🔄',true);
  });
}

function addBubble(role, text, save) {
  if(!chatEl) return;
  var b=document.createElement('div');
  b.className='bubble '+role; b.textContent=text;
  chatEl.appendChild(b); scrollChat();
  if(save){
    chatHistory.push({role:role,text:text});
    if(chatHistory.length>30) chatHistory=chatHistory.slice(-30);
    try{localStorage.setItem('z-chat',JSON.stringify(chatHistory));}catch(_){}
  }
}
function scrollChat(){ if(chatEl) chatEl.scrollTop=chatEl.scrollHeight; }
function triggerWave(){ waveActive=true; waveT=0; if(particleSystem){targetRot=0.004;setTimeout(function(){targetRot=0.0012;},1600);} }

// ── POLLING HTTP ──────────────────────────────────────────
function startPolling() {
  setBadge('HTTP ●', true);
  fetch('/health').then(function(r){return r.json();}).then(function(d){
    if(d.status==='online') setLog('Serveur ● en ligne');
  }).catch(function(){});
  setInterval(function(){
    fetch('/health').then(function(r){return r.json();}).then(function(d){
      setBadge(d.status==='online'?'HTTP ●':'ERR', d.status==='online');
    }).catch(function(){ setBadge('OFFLINE',false); });
  }, 30000);
}

// ── UTILS ─────────────────────────────────────────────────
function setLog(msg){
  var el=document.getElementById('w-log');
  if(el) el.textContent=msg;
  // Mettre à jour l'heure w4
  var wt=document.getElementById('w4');
  if(wt){
    var rows=wt.querySelectorAll('.wr');
    if(rows[1]) rows[1].innerHTML='<span class="wl" style="font-size:.5rem">'+new Date().toLocaleTimeString('fr-CA')+'</span>';
  }
}
function setBadge(txt,live){
  var b=document.getElementById('wsbadge');
  if(b){ b.textContent=txt; b.style.color=live?'#00FF9F':'rgba(0,255,159,.4)'; b.style.borderColor=live?'rgba(0,255,159,.4)':'rgba(0,255,159,.15)'; }
}

// ── SON ───────────────────────────────────────────────────
function playWhoosh(){
  try{
    var ac=new(window.AudioContext||window.webkitAudioContext)();
    var b=ac.createBuffer(1,ac.sampleRate*.35,ac.sampleRate);
    var d=b.getChannelData(0);
    for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*7)*.12;
    var s=ac.createBufferSource(); s.buffer=b;
    var f=ac.createBiquadFilter(); f.type='bandpass'; f.frequency.value=350; f.Q.value=.4;
    s.connect(f); f.connect(ac.destination); s.start();
  }catch(_){}
}
