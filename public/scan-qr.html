<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kadio Coiffure — Scanner Abonnement</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --terracotta: #C4622D;
      --sage:       #7A9E6E;
      --cream:      #FAF6F0;
      --dark:       #2D1B0E;
      --muted:      #8C7B6B;
      --border:     #E2D8CE;
      --green:      #22C55E;
      --red:        #EF4444;
    }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--dark);
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    .logo-title {
      font-size: 1.2rem;
      letter-spacing: 0.12em;
      color: var(--terracotta);
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }

    .logo-sub {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .divider {
      width: 30px;
      height: 1px;
      background: var(--terracotta);
      margin: 0.8rem auto;
    }

    h1 {
      font-size: 1rem;
      font-weight: normal;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    p.desc {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    #scannerWrapper {
      width: 100%;
      max-width: 320px;
      margin: 0 auto 1.5rem;
      display: none;
    }

    #scannerWrapper video {
      width: 100%;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    canvas#qrCanvas { display: none; }

    .btn-scan {
      padding: 0.9rem 2rem;
      background: var(--terracotta);
      color: #fff;
      border: none;
      border-radius: 3px;
      font-family: inherit;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-scan:hover { background: #a84f24; }

    /* Overlay résultat */
    #resultOverlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    #resultOverlay.active { display: flex; }
    #resultOverlay.valid { background: var(--green); }
    #resultOverlay.invalid { background: var(--red); }

    .result-status {
      font-size: 1.5rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #fff;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .result-name {
      font-size: 1.8rem;
      color: #fff;
      text-align: center;
      margin-bottom: 0.3rem;
    }

    .result-type {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.85);
      text-align: center;
      letter-spacing: 0.05em;
    }

    .result-expiry {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.7);
      margin-top: 0.3rem;
    }

    #scanStatus {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 1rem;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="logo-title">Kadio Coiffure</div>
  <div class="divider"></div>
  <div class="logo-sub">Portail Staff</div>

  <br>
  <h1>Scanner un abonnement</h1>
  <p class="desc">Pointez la caméra vers le QR code du client pour valider son abonnement.</p>

  <div id="scannerWrapper">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="qrCanvas"></canvas>
  </div>

  <button class="btn-scan" id="btnScan" onclick="startScan()">Scanner</button>

  <div id="scanStatus"></div>
</div>

<!-- Overlay résultat -->
<div id="resultOverlay">
  <div class="result-status" id="resultStatus"></div>
  <div class="result-name" id="resultName"></div>
  <div class="result-type" id="resultType"></div>
  <div class="result-expiry" id="resultExpiry"></div>
</div>

<!-- jsQR via CDN -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script>
  const API     = '';
  const TOKEN   = localStorage.getItem('daleba_token') || '';
  let scanning  = false;
  let scanTimer = null;

  function setStatus(msg) {
    document.getElementById('scanStatus').textContent = msg;
  }

  async function startScan() {
    if (scanning) return;
    scanning = true;
    document.getElementById('btnScan').style.display = 'none';

    const wrapper = document.getElementById('scannerWrapper');
    const video   = document.getElementById('video');
    wrapper.style.display = 'block';

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' }
      });
      video.srcObject = stream;
      video.play();
      setStatus('Pointez vers le QR code...');
      requestAnimationFrame(scanFrame);
    } catch (e) {
      setStatus('Impossible d\'accéder à la caméra.');
      stopScan();
    }
  }

  function scanFrame() {
    const video  = document.getElementById('video');
    const canvas = document.getElementById('qrCanvas');

    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height, {
        inversionAttempts: 'dontInvert',
      });
      if (code) {
        handleQR(code.data);
        return;
      }
    }

    if (scanning) requestAnimationFrame(scanFrame);
  }

  function stopScan() {
    scanning = false;
    const video = document.getElementById('video');
    if (video.srcObject) {
      video.srcObject.getTracks().forEach(t => t.stop());
      video.srcObject = null;
    }
    document.getElementById('scannerWrapper').style.display = 'none';
    document.getElementById('btnScan').style.display = 'inline-block';
  }

  async function handleQR(payload) {
    scanning = false;
    stopScan();
    setStatus('Vérification...');

    if (!TOKEN) {
      showResult(false, 'Non connecté', null, null, null);
      return;
    }

    try {
      const r = await fetch(API + '/api/staff/scan', {
        method:  'POST',
        headers: {
          'Content-Type':  'application/json',
          'Authorization': 'Bearer ' + TOKEN,
        },
        body: JSON.stringify({ qrPayload: payload }),
      });
      const data = await r.json();
      showResult(data.valid, data.subscriberName, data.subscriptionType, data.expiresAt, data.status);
    } catch (e) {
      showResult(false, 'Erreur réseau', null, null, 'INVALID');
    }
  }

  function showResult(valid, name, type, expiresAt, status) {
    const overlay = document.getElementById('resultOverlay');
    overlay.classList.remove('valid', 'invalid');
    overlay.classList.add(valid ? 'valid' : 'invalid');

    document.getElementById('resultStatus').textContent = valid
      ? 'Abonnement actif'
      : (status === 'EXPIRED' ? 'Abonnement expiré' : 'Abonnement invalide');

    document.getElementById('resultName').textContent   = name || '';
    document.getElementById('resultType').textContent   = type || '';
    document.getElementById('resultExpiry').textContent = expiresAt
      ? 'Valide jusqu\'au ' + new Date(expiresAt).toLocaleDateString('fr-CA')
      : '';

    overlay.classList.add('active');
    setStatus('');

    // Reset automatique après 3 secondes
    clearTimeout(scanTimer);
    scanTimer = setTimeout(() => {
      overlay.classList.remove('active');
    }, 3000);
  }

  // Retour si pas connecté
  if (!TOKEN) {
    setStatus('Vous devez être connecté.');
    document.getElementById('btnScan').disabled = true;
  }
</script>
</body>
</html>
