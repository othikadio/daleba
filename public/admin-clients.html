<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clients — Kadio Coiffure</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .client-row { transition: background .1s; }
    .client-row:hover { background: #fffbeb; }
    .badge-square { background:#d1fae5; color:#065f46; }
    .badge-sms    { background:#dbeafe; color:#1e40af; }
    .badge-both   { background:#ede9fe; color:#4c1d95; }
    .skeleton { animation: pulse 1.5s infinite; background:#e5e7eb; border-radius:4px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

<!-- TOPBAR -->
<div class="bg-white border-b border-gray-100 px-5 py-3 flex items-center justify-between sticky top-0 z-30 shadow-sm">
  <div class="flex items-center gap-3">
    <div class="font-black text-sm tracking-widest text-gray-900 uppercase">👥 Clients</div>
    <span class="text-xs text-gray-400">Square + SMS Campaign</span>
  </div>
  <div class="flex items-center gap-2">
    <input id="search-input" type="text" placeholder="Rechercher nom, téléphone, email…"
      class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm w-52 focus:outline-none focus:ring-2 focus:ring-amber-300"
      oninput="filterClients(this.value)">
    <button onclick="loadClients()" title="Actualiser"
      class="text-xs px-3 py-1.5 border border-gray-200 rounded-lg hover:bg-gray-50 font-semibold">⟳</button>
    <button onclick="exportCSV()"
      class="text-xs px-3 py-1.5 bg-amber-500 hover:bg-amber-600 text-white rounded-lg font-semibold transition">
      ↓ Export CSV
    </button>
  </div>
</div>

<!-- FILTRES SOURCE -->
<div class="bg-white border-b border-gray-100 px-5 py-2 flex items-center gap-3">
  <button id="filter-all" onclick="setSourceFilter('all')"
    class="text-xs px-3 py-1 rounded-full bg-amber-100 text-amber-800 font-semibold">Tous</button>
  <button id="filter-square" onclick="setSourceFilter('square')"
    class="text-xs px-3 py-1 rounded-full bg-gray-100 text-gray-600 font-semibold">Square uniquement</button>
  <button id="filter-sms" onclick="setSourceFilter('sms')"
    class="text-xs px-3 py-1 rounded-full bg-gray-100 text-gray-600 font-semibold">SMS Campaign</button>
  <span class="ml-auto text-xs text-gray-400" id="count-label">—</span>
</div>

<!-- TABLEAU -->
<main class="p-4">
  <!-- Loader -->
  <div id="loader" class="space-y-2">
    <div class="skeleton h-10 rounded-lg w-full"></div>
    <div class="skeleton h-10 rounded-lg w-full"></div>
    <div class="skeleton h-10 rounded-lg w-4/5"></div>
    <div class="skeleton h-10 rounded-lg w-full"></div>
    <div class="skeleton h-10 rounded-lg w-3/4"></div>
  </div>

  <div id="table-wrap" class="hidden bg-white border border-gray-200 rounded-xl overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 border-b border-gray-200">
        <tr>
          <th class="text-left px-4 py-3 text-xs font-bold uppercase tracking-wider text-gray-500">Nom</th>
          <th class="text-left px-4 py-3 text-xs font-bold uppercase tracking-wider text-gray-500 hidden sm:table-cell">Téléphone</th>
          <th class="text-left px-4 py-3 text-xs font-bold uppercase tracking-wider text-gray-500 hidden md:table-cell">Email</th>
          <th class="text-left px-4 py-3 text-xs font-bold uppercase tracking-wider text-gray-500">Source</th>
          <th class="text-left px-4 py-3 text-xs font-bold uppercase tracking-wider text-gray-500 hidden lg:table-cell">Dernière visite</th>
          <th class="px-4 py-3"></th>
        </tr>
      </thead>
      <tbody id="client-tbody">
        <!-- injecté par JS -->
      </tbody>
    </table>
  </div>

  <div id="empty-state" class="hidden flex flex-col items-center py-16 text-center">
    <div class="text-5xl mb-4">👥</div>
    <p class="text-gray-500 font-semibold">Aucun client trouvé</p>
    <p class="text-gray-400 text-sm mt-1">Essayez un autre terme de recherche.</p>
  </div>
</main>

<!-- MODAL SMS rapide -->
<div id="modal-overlay" class="fixed inset-0 bg-black/40 z-50 hidden" onclick="closeModal()"></div>
<div id="modal" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-50
     bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 hidden">
  <div class="flex justify-between items-center mb-4">
    <h3 class="font-bold text-base text-gray-900">Envoyer un SMS</h3>
    <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 font-bold text-xl">×</button>
  </div>
  <div class="mb-2 text-sm text-gray-600">Destinataire : <strong id="sms-to-name"></strong></div>
  <div class="mb-2 text-xs text-gray-400" id="sms-to-phone"></div>
  <textarea id="sms-body" rows="4"
    class="w-full border border-gray-200 rounded-lg p-3 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-amber-300"
    placeholder="Votre message…"></textarea>
  <div class="flex gap-2 mt-3">
    <button onclick="closeModal()"
      class="flex-1 border border-gray-200 rounded-lg py-2 text-sm text-gray-600 hover:bg-gray-50 font-semibold">Annuler</button>
    <button onclick="sendQuickSMS()"
      class="flex-1 bg-amber-500 hover:bg-amber-600 text-white rounded-lg py-2 text-sm font-semibold transition">
      Envoyer
    </button>
  </div>
</div>

<script>
  const API = 'https://daleba-api-production.up.railway.app';
  let allClients = [];
  let sourceFilter = 'all';
  let searchText = '';
  let smsTarget = null;

  async function loadClients() {
    document.getElementById('loader').classList.remove('hidden');
    document.getElementById('table-wrap').classList.add('hidden');
    document.getElementById('empty-state').classList.add('hidden');

    try {
      const data = await fetch(`${API}/api/sq-calendar/clients-sync`).then(r => r.json());
      allClients = data.clients || [];
      renderClients();
    } catch(e) {
      document.getElementById('loader').innerHTML =
        `<div class="text-center py-10 text-red-400 text-sm">Erreur: ${e.message}</div>`;
    }
    document.getElementById('loader').classList.add('hidden');
  }

  function setSourceFilter(f) {
    sourceFilter = f;
    ['all','square','sms'].forEach(id => {
      const b = document.getElementById(`filter-${id}`);
      const active = id === f;
      b.classList.toggle('bg-amber-100', active);
      b.classList.toggle('text-amber-800', active);
      b.classList.toggle('bg-gray-100', !active);
      b.classList.toggle('text-gray-600', !active);
    });
    renderClients();
  }

  function filterClients(q) { searchText = q.toLowerCase(); renderClients(); }

  function renderClients() {
    let clients = allClients;

    // Filtre source
    if (sourceFilter === 'square') clients = clients.filter(c => c.squareId);
    if (sourceFilter === 'sms')    clients = clients.filter(c => c.smsSource || c.source?.startsWith('sms'));

    // Filtre texte
    if (searchText) {
      clients = clients.filter(c =>
        (c.name  || '').toLowerCase().includes(searchText) ||
        (c.phone || '').includes(searchText) ||
        (c.email || '').toLowerCase().includes(searchText)
      );
    }

    document.getElementById('count-label').textContent = `${clients.length} client${clients.length > 1 ? 's' : ''}`;

    if (!clients.length) {
      document.getElementById('table-wrap').classList.add('hidden');
      document.getElementById('empty-state').classList.remove('hidden');
      return;
    }

    document.getElementById('empty-state').classList.add('hidden');
    document.getElementById('table-wrap').classList.remove('hidden');

    document.getElementById('client-tbody').innerHTML = clients.map(c => {
      const sourceBadge = c.squareId && c.smsSource ? 'badge-both' :
                          c.squareId ? 'badge-square' : 'badge-sms';
      const sourceLabel = c.squareId && c.smsSource ? '⚡ Square + SMS' :
                          c.squareId ? '◼ Square' : '📱 SMS Campaign';
      const dateStr = c.createdAt
        ? new Date(c.createdAt).toLocaleDateString('fr-CA', { day:'numeric', month:'short', year:'numeric' })
        : '—';

      return `
        <tr class="client-row border-b border-gray-100 last:border-0">
          <td class="px-4 py-3">
            <div class="font-semibold text-gray-900">${escHtml(c.name || 'Client')}</div>
            ${c.lastService ? `<div class="text-xs text-gray-400">${escHtml(c.lastService)}</div>` : ''}
          </td>
          <td class="px-4 py-3 hidden sm:table-cell text-sm text-gray-600">
            ${c.phone ? `<a href="tel:${c.phone}" class="hover:text-amber-600">${escHtml(c.phone)}</a>` : '—'}
          </td>
          <td class="px-4 py-3 hidden md:table-cell text-sm text-gray-500 max-w-[160px] truncate">
            ${c.email ? escHtml(c.email) : '—'}
          </td>
          <td class="px-4 py-3">
            <span class="text-[10px] font-bold px-2 py-0.5 rounded-full ${sourceBadge}">${sourceLabel}</span>
          </td>
          <td class="px-4 py-3 hidden lg:table-cell text-xs text-gray-400">${dateStr}</td>
          <td class="px-4 py-3 text-right">
            ${c.phone ? `
              <button onclick='openSMSModal(${JSON.stringify({ name: c.name, phone: c.phone })})'
                class="text-xs border border-gray-200 hover:border-amber-300 hover:bg-amber-50 rounded-lg px-2 py-1 font-semibold text-gray-600 transition">
                SMS
              </button>` : ''}
          </td>
        </tr>`;
    }).join('');
  }

  // ── SMS rapide ──────────────────────────────────────────────────────────────
  function openSMSModal(client) {
    smsTarget = client;
    document.getElementById('sms-to-name').textContent = client.name;
    document.getElementById('sms-to-phone').textContent = client.phone;
    document.getElementById('sms-body').value =
      `Bonjour ${client.name?.split(' ')[0] || ''} ! 💇 On vous attend chez Kadio Coiffure. Réservez en ligne : https://kadiocoiffure.vercel.app/hub`;
    document.getElementById('modal-overlay').classList.remove('hidden');
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('sms-body').focus();
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.add('hidden');
    document.getElementById('modal').classList.add('hidden');
    smsTarget = null;
  }

  async function sendQuickSMS() {
    if (!smsTarget?.phone) return;
    const body = document.getElementById('sms-body').value.trim();
    if (!body) return;
    try {
      const r = await fetch(`${API}/api/sms/send`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ to: smsTarget.phone, message: body })
      });
      const d = await r.json();
      if (d.success || d.sid) {
        closeModal();
        showToast(`✅ SMS envoyé à ${smsTarget.name}`);
      } else {
        alert(d.error || 'Erreur envoi SMS');
      }
    } catch(e) { alert('Erreur: ' + e.message); }
  }

  // ── Export CSV ──────────────────────────────────────────────────────────────
  function exportCSV() {
    const rows = [['Nom','Téléphone','Email','Source','Date']];
    allClients.forEach(c => {
      const src = c.squareId && c.smsSource ? 'Square+SMS' : c.squareId ? 'Square' : 'SMS';
      rows.push([c.name||'', c.phone||'', c.email||'', src,
        c.createdAt ? new Date(c.createdAt).toLocaleDateString('fr-CA') : '']);
    });
    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv], { type:'text/csv;charset=utf-8;' }));
    a.download = `clients-kadio-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  }

  function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'fixed bottom-4 right-4 bg-gray-900 text-white text-sm px-4 py-2 rounded-lg shadow-lg z-50';
    t.textContent = msg; document.body.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  loadClients();
</script>
</body>
</html>
