<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda — Kadio Coiffure</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .slot-card { transition: box-shadow .15s, transform .15s; }
    .slot-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.10); transform: translateY(-1px); }
    .status-ACCEPTED  { background:#d1fae5; color:#065f46; }
    .status-PENDING   { background:#fef3c7; color:#92400e; }
    .status-CANCELLED { background:#fee2e2; color:#991b1b; }
    .status-COMPLETED { background:#ede9fe; color:#4c1d95; }
    .status-NO_SHOW   { background:#f3f4f6; color:#6b7280; }
    .skeleton { animation: pulse 1.5s infinite; background:#e5e7eb; border-radius:4px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    #nav-day.active, #nav-week.active { background:#fffbeb; color:#92400e; font-weight:700; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

<!-- ── TOPBAR ── -->
<div class="bg-white border-b border-gray-100 px-5 py-3 flex items-center justify-between sticky top-0 z-30 shadow-sm">
  <div class="flex items-center gap-3">
    <div class="font-black text-sm tracking-widest text-gray-900 uppercase">✂️ Agenda</div>
    <span class="text-xs text-gray-400">Square Live</span>
  </div>
  <div class="flex items-center gap-2">
    <button id="nav-day" onclick="setView('day')"
      class="active text-xs px-3 py-1.5 rounded-lg border border-gray-200 font-semibold transition">Jour</button>
    <button id="nav-week" onclick="setView('week')"
      class="text-xs px-3 py-1.5 rounded-lg border border-gray-200 font-semibold transition text-gray-600">Semaine</button>
    <button onclick="changeDate(-1)"
      class="text-xs px-3 py-1.5 rounded-lg border border-gray-200 hover:bg-gray-50 font-bold">‹</button>
    <span id="date-label" class="text-sm font-bold text-gray-700 min-w-[140px] text-center">—</span>
    <button onclick="changeDate(1)"
      class="text-xs px-3 py-1.5 rounded-lg border border-gray-200 hover:bg-gray-50 font-bold">›</button>
    <button onclick="goToday()"
      class="text-xs px-3 py-1.5 rounded-lg bg-amber-500 hover:bg-amber-600 text-white font-semibold transition">Aujourd'hui</button>
  </div>
</div>

<!-- ── FILTRES STAFF ── -->
<div class="bg-white border-b border-gray-100 px-5 py-2 flex items-center gap-2 overflow-x-auto" id="staff-filter-bar">
  <button id="staff-all" onclick="filterStaff('all')"
    class="flex-shrink-0 text-xs px-3 py-1 rounded-full bg-amber-100 text-amber-800 font-semibold">Tous</button>
  <!-- staff dynamique injecté par JS -->
</div>

<!-- ── STATS BAR ── -->
<div class="bg-white border-b border-gray-100 px-5 py-2 flex items-center gap-5 text-xs text-gray-500">
  <span>Total : <strong id="stat-total" class="text-gray-800">—</strong></span>
  <span>Confirmés : <strong id="stat-accepted" class="text-emerald-600">—</strong></span>
  <span>En attente : <strong id="stat-pending" class="text-amber-600">—</strong></span>
  <span>Annulés : <strong id="stat-cancelled" class="text-red-500">—</strong></span>
  <span class="ml-auto" id="last-update"></span>
</div>

<!-- ── CALENDRIER ── -->
<main class="p-4 max-w-5xl mx-auto">
  <!-- Loader -->
  <div id="loader" class="grid gap-3">
    <div class="skeleton h-16 rounded-xl w-full"></div>
    <div class="skeleton h-16 rounded-xl w-full"></div>
    <div class="skeleton h-16 rounded-xl w-5/6"></div>
  </div>

  <!-- Liste RDV -->
  <div id="agenda-content" class="hidden"></div>

  <!-- Vide -->
  <div id="empty-state" class="hidden flex flex-col items-center py-16 text-center">
    <div class="text-5xl mb-4">📅</div>
    <p class="text-gray-500 font-semibold">Aucun rendez-vous</p>
    <p class="text-gray-400 text-sm mt-1">Pas de RDV Square pour cette période.</p>
    <a href="https://squareup.com/appointments/book/LTDE9RP9PSHX7" target="_blank"
      class="mt-4 bg-amber-500 hover:bg-amber-600 text-white rounded-lg px-5 py-2 text-sm font-semibold transition">
      Prendre un RDV →
    </a>
  </div>
</main>

<!-- ── MODAL DÉTAIL ── -->
<div id="modal-overlay" class="fixed inset-0 bg-black/40 z-50 hidden" onclick="closeModal()"></div>
<div id="modal" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-50
     bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 hidden">
  <div class="flex justify-between items-start mb-4">
    <h3 class="font-bold text-lg text-gray-900" id="modal-title">Détail RDV</h3>
    <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl font-bold">×</button>
  </div>
  <div id="modal-body" class="space-y-3 text-sm text-gray-700"></div>
  <div class="flex gap-2 mt-5" id="modal-actions"></div>
</div>

<script>
  const API = 'https://daleba-api-production.up.railway.app';
  let currentDate = new Date();
  let viewMode = 'day';
  let activeStaff = 'all';
  let allBookings = [];
  let staffMap = {};

  // ── Navigation ──────────────────────────────────────────────────────────────
  function setView(mode) {
    viewMode = mode;
    document.getElementById('nav-day').classList.toggle('active', mode === 'day');
    document.getElementById('nav-week').classList.toggle('active', mode === 'week');
    loadAgenda();
  }

  function changeDate(delta) {
    if (viewMode === 'day') currentDate.setDate(currentDate.getDate() + delta);
    else currentDate.setDate(currentDate.getDate() + delta * 7);
    loadAgenda();
  }

  function goToday() { currentDate = new Date(); loadAgenda(); }

  function filterStaff(staffId) {
    activeStaff = staffId;
    document.querySelectorAll('[id^="staff-"]').forEach(b => {
      b.classList.toggle('bg-amber-100', b.id === `staff-${staffId}`);
      b.classList.toggle('text-amber-800', b.id === `staff-${staffId}`);
      b.classList.toggle('bg-gray-100', b.id !== `staff-${staffId}`);
      b.classList.toggle('text-gray-600', b.id !== `staff-${staffId}`);
    });
    renderBookings();
  }

  // ── Load from Square via Railway ─────────────────────────────────────────────
  async function loadAgenda() {
    document.getElementById('loader').classList.remove('hidden');
    document.getElementById('agenda-content').classList.add('hidden');
    document.getElementById('empty-state').classList.add('hidden');

    // Calculer la plage de dates
    const start = new Date(currentDate);
    const end   = new Date(currentDate);
    if (viewMode === 'day') {
      start.setHours(0, 0, 0, 0); end.setHours(23, 59, 59, 999);
    } else {
      const dow = start.getDay();
      start.setDate(start.getDate() - dow + (dow === 0 ? -6 : 1));
      start.setHours(0, 0, 0, 0);
      end.setDate(start.getDate() + 6); end.setHours(23, 59, 59, 999);
    }

    updateDateLabel(start, end);

    try {
      const url = `${API}/api/sq-calendar/appointments?startAt=${start.toISOString()}&endAt=${end.toISOString()}&limit=50`;
      const data = await fetch(url).then(r => r.json());
      allBookings = data.bookings || [];

      // Charger le staff si pas encore fait
      if (!Object.keys(staffMap).length) await loadStaff();

      // Mettre à jour les stats
      updateStats(allBookings);
      renderBookings();

      document.getElementById('last-update').textContent =
        'Actualisé ' + new Date().toLocaleTimeString('fr-CA', { hour: '2-digit', minute: '2-digit' });
    } catch(e) {
      document.getElementById('agenda-content').innerHTML =
        `<div class="text-center py-10 text-red-400 text-sm">Erreur connexion Railway: ${e.message}</div>`;
      document.getElementById('agenda-content').classList.remove('hidden');
    }
    document.getElementById('loader').classList.add('hidden');
  }

  async function loadStaff() {
    try {
      const data = await fetch(`${API}/api/sq-calendar/staff`).then(r => r.json());
      const members = data.team_members || data.teamMembers || data.staff || [];
      staffMap = {};
      const bar = document.getElementById('staff-filter-bar');
      members.forEach(m => {
        const id = m.id || m.teamMemberId;
        const name = m.display_name || m.displayName || m.given_name || 'Coiffeur';
        staffMap[id] = name;
        const btn = document.createElement('button');
        btn.id = `staff-${id}`;
        btn.className = 'flex-shrink-0 text-xs px-3 py-1 rounded-full bg-gray-100 text-gray-600 font-semibold';
        btn.textContent = name;
        btn.onclick = () => filterStaff(id);
        bar.appendChild(btn);
      });
    } catch(_) {}
  }

  // ── Render ──────────────────────────────────────────────────────────────────
  function renderBookings() {
    let bookings = allBookings;
    if (activeStaff !== 'all') {
      bookings = bookings.filter(b =>
        (b.appointmentSegments || b.appointment_segments || [])
          .some(s => (s.teamMemberId || s.team_member_id) === activeStaff)
      );
    }

    const el = document.getElementById('agenda-content');
    if (!bookings.length) {
      document.getElementById('empty-state').classList.remove('hidden');
      return;
    }
    document.getElementById('agenda-content').classList.remove('hidden');

    if (viewMode === 'day') {
      el.innerHTML = renderDayView(bookings);
    } else {
      el.innerHTML = renderWeekView(bookings);
    }
  }

  function renderDayView(bookings) {
    const sorted = [...bookings].sort((a, b) =>
      new Date(a.startAt || a.start_at) - new Date(b.startAt || b.start_at)
    );
    return sorted.map(b => renderCard(b)).join('');
  }

  function renderWeekView(bookings) {
    const days = {};
    bookings.forEach(b => {
      const dt = new Date(b.startAt || b.start_at);
      const key = dt.toLocaleDateString('fr-CA');
      if (!days[key]) days[key] = [];
      days[key].push(b);
    });
    return Object.entries(days).sort(([a],[b]) => a.localeCompare(b)).map(([day, bks]) => `
      <div class="mb-4">
        <h3 class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-2 px-1">
          ${new Date(day + 'T12:00:00').toLocaleDateString('fr-CA', { weekday:'long', day:'numeric', month:'long' })}
        </h3>
        ${bks.sort((a,b) => new Date(a.startAt||a.start_at)-new Date(b.startAt||b.start_at)).map(renderCard).join('')}
      </div>`).join('');
  }

  function renderCard(b) {
    const dt     = new Date(b.startAt || b.start_at);
    const hour   = dt.toLocaleTimeString('fr-CA', { hour:'2-digit', minute:'2-digit', timeZone:'America/Toronto' });
    const status = b.status || 'PENDING';
    const segs   = b.appointmentSegments || b.appointment_segments || [];
    const staff  = staffMap[segs[0]?.teamMemberId || segs[0]?.team_member_id] || 'Staff';
    const client = b.customerName || b.customer_note?.split('—')[0]?.trim() || 'Client';
    const svc    = b.serviceName || segs[0]?.serviceVariationId?.slice(-6) || '';
    const dur    = segs[0]?.durationMinutes || Math.round((segs[0]?.duration_minutes || 60));

    return `
      <div class="slot-card bg-white border border-gray-200 rounded-xl p-4 mb-2 cursor-pointer flex items-start gap-4"
           onclick='openModal(${JSON.stringify(b).replace(/'/g,"\\'")})'> 
        <div class="text-center flex-shrink-0 w-14">
          <div class="text-lg font-black text-gray-900">${hour}</div>
          <div class="text-xs text-gray-400">${dur} min</div>
        </div>
        <div class="flex-1 min-w-0">
          <div class="font-semibold text-gray-900 truncate">${client}</div>
          <div class="text-xs text-gray-500 mt-0.5 truncate">${svc} · ${staff}</div>
        </div>
        <span class="text-[10px] font-bold px-2 py-1 rounded-full flex-shrink-0 status-${status}">
          ${statusLabel(status)}
        </span>
      </div>`;
  }

  function statusLabel(s) {
    return { ACCEPTED:'Confirmé', PENDING:'En attente', CANCELLED:'Annulé', COMPLETED:'Terminé', NO_SHOW:'Absent' }[s] || s;
  }

  // ── Stats ───────────────────────────────────────────────────────────────────
  function updateStats(bookings) {
    document.getElementById('stat-total').textContent     = bookings.length;
    document.getElementById('stat-accepted').textContent  = bookings.filter(b => b.status==='ACCEPTED').length;
    document.getElementById('stat-pending').textContent   = bookings.filter(b => b.status==='PENDING').length;
    document.getElementById('stat-cancelled').textContent = bookings.filter(b => b.status==='CANCELLED').length;
  }

  // ── Date label ──────────────────────────────────────────────────────────────
  function updateDateLabel(start, end) {
    const opts = { weekday:'long', day:'numeric', month:'long', timeZone:'America/Toronto' };
    if (viewMode === 'day') {
      document.getElementById('date-label').textContent =
        start.toLocaleDateString('fr-CA', opts);
    } else {
      const s = start.toLocaleDateString('fr-CA', { day:'numeric', month:'short' });
      const e = end.toLocaleDateString('fr-CA', { day:'numeric', month:'short' });
      document.getElementById('date-label').textContent = `${s} – ${e}`;
    }
  }

  // ── Modal ───────────────────────────────────────────────────────────────────
  function openModal(booking) {
    const b    = typeof booking === 'string' ? JSON.parse(booking) : booking;
    const dt   = new Date(b.startAt || b.start_at);
    const segs = b.appointmentSegments || b.appointment_segments || [];
    const staff = staffMap[segs[0]?.teamMemberId || segs[0]?.team_member_id] || 'Staff';

    document.getElementById('modal-title').textContent = b.customerName || 'Rendez-vous';
    document.getElementById('modal-body').innerHTML = `
      <div class="flex gap-3 items-center p-3 bg-gray-50 rounded-lg">
        <span class="text-2xl">📅</span>
        <div>
          <div class="font-bold">${dt.toLocaleDateString('fr-CA', { weekday:'long', day:'numeric', month:'long', timeZone:'America/Toronto' })}</div>
          <div class="text-gray-500">${dt.toLocaleTimeString('fr-CA', { hour:'2-digit', minute:'2-digit', timeZone:'America/Toronto' })}</div>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-2 text-xs">
        <div class="bg-gray-50 rounded-lg p-3"><div class="text-gray-400 mb-1">Coiffeur·se</div><div class="font-semibold">${staff}</div></div>
        <div class="bg-gray-50 rounded-lg p-3"><div class="text-gray-400 mb-1">Statut</div>
          <span class="font-bold status-${b.status} px-2 py-0.5 rounded-full text-xs">${statusLabel(b.status)}</span>
        </div>
      </div>
      ${b.customer_note ? `<div class="p-3 bg-amber-50 border border-amber-100 rounded-lg text-xs">${b.customer_note}</div>` : ''}
      <div class="text-xs text-gray-400">ID: ${b.id || '—'}</div>`;

    const actions = document.getElementById('modal-actions');
    if (b.status === 'ACCEPTED' || b.status === 'PENDING') {
      actions.innerHTML = `
        <button onclick="cancelBooking('${b.id}','${b.version||0}')"
          class="flex-1 border border-red-200 text-red-600 hover:bg-red-50 rounded-lg py-2 text-xs font-semibold transition">
          Annuler le RDV
        </button>`;
    } else { actions.innerHTML = ''; }

    document.getElementById('modal-overlay').classList.remove('hidden');
    document.getElementById('modal').classList.remove('hidden');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.add('hidden');
    document.getElementById('modal').classList.add('hidden');
  }

  async function cancelBooking(id, version) {
    if (!confirm('Annuler ce rendez-vous ?')) return;
    try {
      const r = await fetch(`${API}/api/sq-calendar/appointments/${id}/cancel`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ version: parseInt(version) || 0 })
      });
      const d = await r.json();
      if (d.ok || d.booking) { closeModal(); loadAgenda(); }
      else alert(d.error || 'Erreur annulation');
    } catch(e) { alert('Erreur: ' + e.message); }
  }

  // ── Init ────────────────────────────────────────────────────────────────────
  loadAgenda();
  setInterval(loadAgenda, 3 * 60 * 1000); // auto-refresh 3 min
</script>
</body>
</html>
