<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kadio Coiffure — Agenda</title>
  <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
  <style>
    :root {
      --terracotta: #C4622D;
      --terracotta-light: #E8956D;
      --terracotta-bg: #FDF0E8;
      --sage: #7A9E6E;
      --sage-light: #A5C499;
      --sage-bg: #EFF5ED;
      --grey: #9CA3AF;
      --grey-bg: #F3F4F6;
      --bg: #FAF7F4;
      --surface: #FFFFFF;
      --border: #E8E0D5;
      --text: #1C1917;
      --text-muted: #78716C;
      --text-light: #A8A29E;
      --font-serif: 'Georgia', 'Times New Roman', serif;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --radius: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 6px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.04);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
      font-size: 14px;
    }

    /* ── Header ─────────────────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--terracotta);
    }

    .brand-name {
      font-family: var(--font-serif);
      font-size: 17px;
      letter-spacing: 0.03em;
      color: var(--text);
    }

    .header-nav {
      display: flex;
      gap: 8px;
    }

    .nav-link {
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: var(--radius);
      transition: background 0.15s;
    }

    .nav-link:hover { background: var(--border); }

    /* ── Auth wall ────────────────────────────────────────────────────────────── */
    #auth-wall {
      max-width: 400px;
      margin: 80px auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      text-align: center;
    }

    #auth-wall h2 {
      font-family: var(--font-serif);
      font-size: 22px;
      margin-bottom: 8px;
    }

    #auth-wall p {
      color: var(--text-muted);
      margin-bottom: 24px;
      font-size: 13px;
    }

    #auth-wall input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      margin-bottom: 12px;
      background: var(--bg);
      outline: none;
    }

    #auth-wall input:focus { border-color: var(--terracotta); }

    #auth-wall button {
      width: 100%;
      padding: 10px;
      background: var(--terracotta);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      cursor: pointer;
    }

    #auth-wall button:hover { background: var(--terracotta-light); }

    .auth-error {
      color: #DC2626;
      font-size: 12px;
      margin-top: 8px;
    }

    /* ── Main ─────────────────────────────────────────────────────────────── */
    #app { display: none; }

    .toolbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
      gap: 16px;
    }

    /* ── Tab navigation ─────────────────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 2px;
      background: var(--bg);
      padding: 3px;
      border-radius: var(--radius);
    }

    .tab {
      padding: 6px 18px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
    }

    .tab.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: var(--shadow);
    }

    .tab:hover:not(.active) { color: var(--text); }

    /* ── Date nav ─────────────────────────────────────────────────────────── */
    .date-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .date-nav button {
      width: 30px;
      height: 30px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      color: var(--text-muted);
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .date-nav button:hover { background: var(--bg); color: var(--text); }

    .date-label {
      font-size: 14px;
      font-weight: 500;
      min-width: 160px;
      text-align: center;
    }

    .today-btn {
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      font-size: 12px;
      color: var(--text-muted);
      transition: all 0.15s;
    }

    .today-btn:hover { background: var(--bg); color: var(--text); }

    .refresh-btn {
      width: 30px;
      height: 30px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      transition: all 0.15s;
    }

    .refresh-btn:hover { background: var(--bg); color: var(--text); }
    .refresh-btn.spinning { animation: spin 1s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Legend ─────────────────────────────────────────────────────────────── */
    .legend {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
    }

    /* ── Content ─────────────────────────────────────────────────────────────── */
    #view-container {
      padding: 20px 24px;
      min-height: calc(100vh - 108px);
    }

    /* ─────────────────────────────────────────────────────────────────────────
       VUE JOURNALIÈRE
    ───────────────────────────────────────────────────────────────────────── */
    .day-view {
      display: flex;
      gap: 16px;
    }

    .time-gutter {
      width: 52px;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .time-label {
      height: 60px;
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      padding-right: 10px;
      font-size: 11px;
      color: var(--text-light);
      font-variant-numeric: tabular-nums;
    }

    .day-grid {
      flex: 1;
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .hour-row {
      height: 60px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .hour-row:last-child { border-bottom: none; }

    .half-line {
      position: absolute;
      top: 30px;
      left: 0;
      right: 0;
      border-top: 1px dashed var(--border);
    }

    .event-block {
      position: absolute;
      left: 4px;
      right: 4px;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: grab;
      overflow: hidden;
      transition: box-shadow 0.15s;
      z-index: 10;
    }

    .event-block:active { cursor: grabbing; }
    .event-block:hover { box-shadow: var(--shadow-md); }

    .event-block.confirmed {
      background: var(--terracotta-bg);
      border-left: 3px solid var(--terracotta);
      color: #7C2D12;
    }

    .event-block.pending {
      background: var(--sage-bg);
      border-left: 3px solid var(--sage);
      color: #1A4014;
    }

    .event-block.cancelled {
      background: var(--grey-bg);
      border-left: 3px solid var(--grey);
      color: var(--text-muted);
      text-decoration: line-through;
    }

    .event-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .event-sub { font-size: 11px; opacity: 0.75; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .current-time-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--terracotta);
      z-index: 20;
    }

    .current-time-dot {
      position: absolute;
      left: -4px;
      top: -4px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--terracotta);
    }

    /* ─────────────────────────────────────────────────────────────────────────
       VUE HEBDOMADAIRE
    ───────────────────────────────────────────────────────────────────────── */
    .week-view {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .week-header {
      display: grid;
      grid-template-columns: 52px repeat(7, 1fr);
      border-bottom: 1px solid var(--border);
    }

    .week-gutter { border-right: 1px solid var(--border); }

    .week-day-header {
      padding: 10px 8px;
      text-align: center;
      font-size: 12px;
      border-right: 1px solid var(--border);
    }

    .week-day-header.today {
      background: var(--terracotta-bg);
    }

    .week-day-name { color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-size: 10px; }
    .week-day-num {
      font-size: 18px;
      font-family: var(--font-serif);
      margin-top: 2px;
    }

    .week-day-header.today .week-day-num { color: var(--terracotta); }

    .week-body {
      display: grid;
      grid-template-columns: 52px repeat(7, 1fr);
      max-height: calc(100vh - 200px);
      overflow-y: auto;
    }

    .week-time-col {
      border-right: 1px solid var(--border);
    }

    .week-time-cell {
      height: 48px;
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 4px 8px 0;
      font-size: 10px;
      color: var(--text-light);
      border-bottom: 1px solid var(--border);
    }

    .week-col {
      border-right: 1px solid var(--border);
      position: relative;
    }

    .week-col:last-child { border-right: none; }

    .week-cell {
      height: 48px;
      border-bottom: 1px solid var(--border);
    }

    .week-event {
      font-size: 11px;
      padding: 2px 5px;
      border-radius: 4px;
      margin: 1px 2px;
      overflow: hidden;
      cursor: pointer;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .week-event.confirmed { background: var(--terracotta-bg); color: #7C2D12; border-left: 2px solid var(--terracotta); }
    .week-event.pending   { background: var(--sage-bg); color: #1A4014; border-left: 2px solid var(--sage); }
    .week-event.cancelled { background: var(--grey-bg); color: var(--text-muted); border-left: 2px solid var(--grey); }

    /* ─────────────────────────────────────────────────────────────────────────
       VUE MENSUELLE
    ───────────────────────────────────────────────────────────────────────── */
    .month-view {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .month-header-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .month-day-name {
      text-align: center;
      padding: 10px 4px;
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }

    .month-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .month-cell {
      min-height: 90px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 6px;
      cursor: pointer;
      transition: background 0.12s;
    }

    .month-cell:nth-child(7n) { border-right: none; }
    .month-cell:hover { background: var(--bg); }

    .month-cell.today { background: var(--terracotta-bg); }
    .month-cell.other-month .month-date { color: var(--text-light); }

    .month-date {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .month-cell.today .month-date {
      color: var(--terracotta);
      font-weight: 700;
    }

    .month-dots {
      display: flex;
      gap: 3px;
      flex-wrap: wrap;
    }

    .month-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }

    .month-dot.confirmed { background: var(--terracotta); }
    .month-dot.pending   { background: var(--sage); }
    .month-dot.cancelled { background: var(--grey); }

    .month-count {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ── Empty state ─────────────────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state h3 {
      font-family: var(--font-serif);
      font-size: 18px;
      margin-bottom: 8px;
      color: var(--text);
    }

    .empty-state p { font-size: 13px; }

    /* ── Loading ─────────────────────────────────────────────────────────────── */
    .loading-bar {
      height: 2px;
      background: var(--border);
      overflow: hidden;
      position: relative;
    }

    .loading-bar::after {
      content: '';
      position: absolute;
      height: 100%;
      width: 30%;
      background: var(--terracotta);
      animation: slide 1.2s ease-in-out infinite;
    }

    @keyframes slide {
      0%  { left: -30%; }
      100% { left: 100%; }
    }

    /* ── Reschedule modal ────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 28px;
      width: 360px;
      box-shadow: var(--shadow-md);
    }

    .modal h3 {
      font-family: var(--font-serif);
      font-size: 18px;
      margin-bottom: 16px;
    }

    .modal label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 4px;
      margin-top: 12px;
    }

    .modal input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      background: var(--bg);
      outline: none;
    }

    .modal input:focus { border-color: var(--terracotta); }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .btn {
      padding: 8px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }

    .btn-primary { background: var(--terracotta); color: white; }
    .btn-primary:hover { background: var(--terracotta-light); }
    .btn-secondary { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }

    /* ── Toast ─────────────────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--text);
      color: white;
      padding: 10px 18px;
      border-radius: var(--radius);
      font-size: 13px;
      z-index: 300;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.2s;
    }

    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: var(--sage); }
    .toast.error { background: #DC2626; }

    /* ── Staff View ───────────────────────────────────────────────────────────── */
    .staff-view {
      display: flex;
      gap: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .staff-time-gutter {
      width: 52px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
    }

    .staff-time-gutter .time-label {
      border-bottom: 1px solid var(--border);
    }

    .staff-time-gutter .time-label:first-child {
      height: 56px; /* align with staff header */
      border-bottom: 2px solid var(--border);
    }

    .staff-columns {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      flex: 1;
      overflow-x: auto;
    }

    .staff-col {
      border-right: 1px solid var(--border);
      min-width: 140px;
    }

    .staff-col:last-child { border-right: none; }

    .staff-col-header {
      height: 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-bottom: 2px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .staff-col-name {
      font-family: var(--font-serif);
      font-size: 14px;
      font-weight: 600;
      color: var(--terracotta);
      letter-spacing: 0.03em;
    }

    .staff-col-role {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .staff-hour-row {
      height: 60px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .staff-hour-row:last-child { border-bottom: none; }

    .staff-event-block {
      position: absolute;
      left: 2px;
      right: 2px;
      border-radius: 5px;
      padding: 4px 6px;
      font-size: 11px;
      overflow: hidden;
      z-index: 10;
      cursor: grab;
      border-left: 3px solid var(--terracotta);
      background: var(--terracotta-bg);
      color: #7C2D12;
    }

    .staff-event-block:active { cursor: grabbing; }

    .staff-event-block.pending {
      border-left-color: var(--sage);
      background: var(--sage-bg);
      color: #1A4014;
    }

    .staff-event-name {
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .staff-event-time {
      font-size: 10px;
      opacity: 0.8;
    }

    .staff-event-actions {
      display: flex;
      gap: 3px;
      margin-top: 4px;
    }

    .btn-vip {
      background: var(--sage);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 10px;
      padding: 2px 6px;
      cursor: pointer;
      flex: 1;
      white-space: nowrap;
    }

    .btn-vip:hover { background: var(--sage-dark); }

    .btn-close-appt {
      background: var(--terracotta);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 10px;
      padding: 2px 6px;
      cursor: pointer;
      flex: 1;
      white-space: nowrap;
    }

    .btn-close-appt:hover { background: var(--terracotta-light); }

    /* ── Walk-in button ──────────────────────────────────────────────────────── */
    .btn-walkin {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--terracotta);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .btn-walkin:hover { background: var(--terracotta-light); }

    .btn-walkin-icon {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Action modal ─────────────────────────────────────────────────────────── */
    .action-modal-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .badge-confirmed { background: var(--terracotta-bg); color: var(--terracotta); }
    .badge-pending   { background: var(--sage-bg);       color: var(--sage-dark);  }

    .action-btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 20px;
    }

    .action-btn-full {
      grid-column: 1 / -1;
    }

    .btn-action-vip {
      padding: 12px;
      background: var(--sage);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
    }
    .btn-action-vip:hover { background: var(--sage-dark); }

    .btn-action-close {
      padding: 12px;
      background: var(--terracotta);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
    }
    .btn-action-close:hover { background: var(--terracotta-light); }

    .btn-action-reschedule {
      padding: 10px;
      background: var(--bg);
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 12px;
      cursor: pointer;
      text-align: center;
    }

    @media (max-width: 640px) {
      .toolbar { flex-wrap: wrap; height: auto; padding: 8px 16px; gap: 8px; }

      .week-view { font-size: 10px; }

    }
  </style>
</head>

      </button>

        Déplacer / Reporter
      </button>

<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
let currentView = 'day';
let currentDate = new Date();
let appointments = [];
let authToken = null;
let activeBooking = null;
let activeAction  = null; // for action modal

const STAFF_MEMBERS = [
  { name: 'Maya',    role: 'Coiffure' },
  { name: 'Mariel',  role: 'Barbier'  },
  { name: 'Mariane', role: 'Coiffure' },
  { name: 'Raquel',  role: 'Coiffure' },
  { name: 'Brenda',  role: 'Coiffure' },
  { name: 'Ange',    role: 'Coiffure' },
];

const BASE = '';
const HOURS_START = 8;
const HOURS_END   = 21;
const HOURS_COUNT = HOURS_END - HOURS_START;

const DAYS_FR = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const DAYS_SHORT = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

// ── Auth ───────────────────────────────────────────────────────────────────────
function doLogin() {
  const user = document.getElementById('auth-user').value.trim();
  const pass = document.getElementById('auth-pass').value.trim();
  if (!user || !pass) { document.getElementById('auth-error').textContent = 'Identifiant et mot de passe requis.'; return; }

  fetch(`${BASE}/api/auth/login`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: user, password: pass }),
  })
  .then(r => r.json())
  .then(data => {
    if (data.token || data.accessToken) {
      authToken = data.token || data.accessToken;
      localStorage.setItem('kc_token', authToken);
      startApp();
    } else {
      // Try staff login
      return fetch(`${BASE}/api/auth/staff/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone: user, password: pass }),
      }).then(r => r.json());
    }
  })
  .then(data => {
    if (data && (data.token || data.accessToken)) {
      authToken = data.token || data.accessToken;
      localStorage.setItem('kc_token', authToken);
      startApp();
    } else if (data && data.error) {
      document.getElementById('auth-error').textContent = data.error;
    }
  })
  .catch(() => {
    // Demo mode: allow access without real auth
    authToken = localStorage.getItem('kc_token') || 'demo';
    startApp();
  });
}

function startApp() {
  document.getElementById('auth-wall').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadData();
}

// Auto-login from stored token
window.addEventListener('DOMContentLoaded', () => {
  const stored = localStorage.getItem('kc_token');
  if (stored) { authToken = stored; startApp(); }

  // Enter key on auth
  document.getElementById('auth-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
});

// ── Data loading ───────────────────────────────────────────────────────────────
async function loadData() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  document.getElementById('loading-bar').style.display = 'block';

  const { start, end } = getDateRange();

  try {
    // Try Square calendar endpoint first
    const headers = { 'Content-Type': 'application/json' };
    if (authToken && authToken !== 'demo') headers['Authorization'] = `Bearer ${authToken}`;

    const r = await fetch(`${BASE}/api/calendar/appointments?start=${start}&end=${end}`, { headers });
    if (r.ok) {
      const d = await r.json();
      appointments = d.appointments || d || [];
    } else {
      // Fallback: daleba_bookings
      await loadFromDB(start, end, headers);
    }
  } catch (e) {
    await loadFromDB(start, end, {});
  }

  btn.classList.remove('spinning');
  document.getElementById('loading-bar').style.display = 'none';
  render();
  updateDateLabel();
}

async function loadFromDB(start, end, headers) {
  try {
    // Try Square appointments sync
    const r = await fetch(`${BASE}/api/square-calendar/list?start=${start}&end=${end}`, { headers });
    if (r.ok) {
      const d = await r.json();
      appointments = d.bookings || d.appointments || [];
      return;
    }
  } catch (_) {}

  // Last resort: public booking list from daleba_bookings
  try {
    const r = await fetch(`${BASE}/api/booking/list?start=${start}&end=${end}`, { headers });
    if (r.ok) {
      const d = await r.json();
      appointments = d.bookings || [];
    }
  } catch (_) {
    appointments = [];
  }
}

function getDateRange() {
  const d = new Date(currentDate);
  if (currentView === 'day') {
    const s = formatDate(d);
    const e = new Date(d); e.setDate(e.getDate() + 1);
    return { start: s, end: formatDate(e) };
  }
  if (currentView === 'week') {
    const mon = new Date(d);
    mon.setDate(d.getDate() - ((d.getDay() + 6) % 7));
    const sun = new Date(mon); sun.setDate(mon.getDate() + 7);
    return { start: formatDate(mon), end: formatDate(sun) };
  }
  // month
  const first = new Date(d.getFullYear(), d.getMonth(), 1);
  const last  = new Date(d.getFullYear(), d.getMonth() + 1, 1);
  return { start: formatDate(first), end: formatDate(last) };
}

// ── Navigation ──────────────────────────────────────────────────────────────────
function switchView(v) {
  currentView = v;
  const tabMap = { day: 'tab-day', week: 'tab-week', month: 'tab-month', staff: 'tab-staff' };
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const activeTab = document.getElementById(tabMap[v]);
  if (activeTab) activeTab.classList.add('active');
  loadData();
}

function navigate(dir) {
  if (currentView === 'day')   currentDate.setDate(currentDate.getDate() + dir);
  if (currentView === 'week')  currentDate.setDate(currentDate.getDate() + 7 * dir);
  if (currentView === 'month') currentDate.setMonth(currentDate.getMonth() + dir);
  loadData();
}

function goToday() {
  currentDate = new Date();
  loadData();
}

function updateDateLabel() {
  const d = currentDate;
  let label = '';
  if (currentView === 'day') {
    label = `${DAYS_FR[d.getDay()]} ${d.getDate()} ${MONTHS_FR[d.getMonth()]} ${d.getFullYear()}`;
  } else if (currentView === 'week') {
    const mon = new Date(d);
    mon.setDate(d.getDate() - ((d.getDay() + 6) % 7));
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    label = `${mon.getDate()} ${MONTHS_FR[mon.getMonth()]} — ${sun.getDate()} ${MONTHS_FR[sun.getMonth()]} ${sun.getFullYear()}`;
  } else {
    label = `${MONTHS_FR[d.getMonth()]} ${d.getFullYear()}`;
  }
  document.getElementById('date-label').textContent = label;
}

// ── Rendering ──────────────────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('view-content');
  if (currentView === 'day')   container.innerHTML = renderDay();
  if (currentView === 'week')  container.innerHTML = renderWeek();
  if (currentView === 'month') container.innerHTML = renderMonth();

  if (currentView === 'staff') container.innerHTML = renderStaff();

  if (currentView === 'day') {
    renderCurrentTimeLine();
    initDragDrop();
  }
  if (currentView === 'staff') {
    initStaffDragDrop();
  }
}

// Normalize appointment status
function getStatus(appt) {
  const s = (appt.status || '').toLowerCase();
  if (s.includes('cancel') || s.includes('annul')) return 'cancelled';
  if (s.includes('pend') || s.includes('attente') || s.includes('created')) return 'pending';
  return 'confirmed';
}

// ── DAY VIEW ──────────────────────────────────────────────────────────────────
function renderDay() {
  const dateStr = formatDate(currentDate);
  const dayAppts = appointments.filter(a => {
    const d = new Date(a.start_at || a.startAt || a.start_time);
    return formatDate(d) === dateStr;
  });

  let rows = '';
  for (let h = HOURS_START; h < HOURS_END; h++) {
    const label = `${String(h).padStart(2,'0')}:00`;
    const apptInHour = dayAppts.filter(a => {
      const d = new Date(a.start_at || a.startAt || a.start_time);
      return d.getHours() === h;
    });
    let eventHtml = '';
    for (const a of apptInHour) {
      const d = new Date(a.start_at || a.startAt || a.start_time);
      const mins = d.getMinutes();
      const dur  = a.duration_min || a.durationMinutes || 60;
      const top  = (mins / 60) * 60;
      const height = Math.max(22, (dur / 60) * 60 - 2);
      const status = getStatus(a);
      const client = a.client_name || a.clientName || a.customer_name || 'Client';
      const service = a.service_name || a.serviceName || a.service || 'Service';
      const staff = a.staff_name || a.staffName || '';
      const timeStr = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      const bookingId = a.id || a.booking_id || a.square_booking_id || '';
      eventHtml += `
        <div class="event-block ${status}" 
             style="top:${top}px;height:${height}px;"
             data-id="${bookingId}"
             data-start="${a.start_at || a.startAt || a.start_time}"
             data-duration="${dur}"
             data-client="${client}"
             data-service="${service}"
             onclick="openReschedule('${bookingId}','${client}','${service}','${a.start_at || a.startAt || a.start_time}')">
          <div class="event-name">${client}</div>
          <div class="event-sub">${timeStr} &middot; ${service}${staff ? ' &middot; ' + staff : ''}</div>
        </div>`;
    }
    rows += `<div class="hour-row" data-hour="${h}">${eventHtml}<div class="half-line"></div></div>`;
  }

  const timeLabels = Array.from({length: HOURS_COUNT}, (_,i) => {
    return `<div class="time-label">${String(HOURS_START + i).padStart(2,'0')}:00</div>`;
  }).join('');

  if (dayAppts.length === 0) {
    return `<div class="day-view">
      <div class="time-gutter">${timeLabels}</div>
      <div class="day-grid" id="day-grid">
        ${rows}
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;">
          <div style="text-align:center;color:var(--text-light);font-size:13px;">Aucun rendez-vous ce jour</div>
        </div>
      </div>
    </div>`;
  }

  return `<div class="day-view">
    <div class="time-gutter">${timeLabels}</div>
    <div class="day-grid" id="day-grid">${rows}</div>
  </div>`;
}

function renderCurrentTimeLine() {
  const grid = document.getElementById('day-grid');
  if (!grid) return;
  const now = new Date();
  const dateStr = formatDate(currentDate);
  const todayStr = formatDate(now);
  if (dateStr !== todayStr) return;

  const h = now.getHours();
  const m = now.getMinutes();
  if (h < HOURS_START || h >= HOURS_END) return;

  const top = (h - HOURS_START) * 60 + m;
  const line = document.createElement('div');
  line.className = 'current-time-line';
  line.style.top = top + 'px';
  const dot = document.createElement('div');
  dot.className = 'current-time-dot';
  line.appendChild(dot);
  grid.appendChild(line);
  setTimeout(() => grid.scrollTo(0, Math.max(0, top - 120)), 100);
}

// ── WEEK VIEW ─────────────────────────────────────────────────────────────────
function renderWeek() {
  const today = formatDate(new Date());
  const mon = new Date(currentDate);
  mon.setDate(currentDate.getDate() - ((currentDate.getDay() + 6) % 7));

  const days = Array.from({length: 7}, (_,i) => {
    const d = new Date(mon); d.setDate(mon.getDate() + i);
    return d;
  });

  const headerCols = days.map(d => {
    const isToday = formatDate(d) === today;
    return `<div class="week-day-header${isToday ? ' today' : ''}">
      <div class="week-day-name">${DAYS_SHORT[d.getDay()]}</div>
      <div class="week-day-num">${d.getDate()}</div>
    </div>`;
  }).join('');

  let timeRows = '';
  let dayCols = days.map(() => '').fill('');

  for (let h = HOURS_START; h < HOURS_END; h++) {
    const label = `${String(h).padStart(2,'0')}:00`;
    timeRows += `<div class="week-time-cell">${label}</div>`;
    days.forEach((d, i) => {
      const dateStr = formatDate(d);
      const appts = appointments.filter(a => {
        const ad = new Date(a.start_at || a.startAt || a.start_time);
        return formatDate(ad) === dateStr && ad.getHours() === h;
      });
      let evHtml = '';
      for (const a of appts) {
        const status = getStatus(a);
        const client = a.client_name || a.clientName || 'Client';
        const service = a.service_name || a.serviceName || 'Service';
        const ad = new Date(a.start_at || a.startAt || a.start_time);
        const t = `${String(ad.getHours()).padStart(2,'0')}:${String(ad.getMinutes()).padStart(2,'0')}`;
        const id = a.id || a.booking_id || '';
        evHtml += `<div class="week-event ${status}" onclick="openReschedule('${id}','${client}','${service}','${a.start_at || a.startAt || a.start_time}')" title="${client} — ${service}">${t} ${client}</div>`;
      }
      dayCols[i] += `<div class="week-cell">${evHtml}</div>`;
    });
  }

  const bodyDayCols = dayCols.map(c => `<div class="week-col">${c}</div>`).join('');

  return `<div class="week-view">
    <div class="week-header">
      <div class="week-gutter"></div>
      ${headerCols}
    </div>
    <div class="week-body">
      <div class="week-time-col">${timeRows}</div>
      ${bodyDayCols}
    </div>
  </div>`;
}

// ── MONTH VIEW ────────────────────────────────────────────────────────────────
function renderMonth() {
  const today = formatDate(new Date());
  const year  = currentDate.getFullYear();
  const month = currentDate.getMonth();

  const firstDay = new Date(year, month, 1);
  const lastDay  = new Date(year, month + 1, 0);

  // Start from Monday of the first week
  let start = new Date(firstDay);
  start.setDate(start.getDate() - ((start.getDay() + 6) % 7));

  const headerDays = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  const headerHtml = headerDays.map(d => `<div class="month-day-name">${d}</div>`).join('');

  let cells = '';
  let cur = new Date(start);

  while (cur <= lastDay || cur.getDay() !== 1) {
    const dateStr = formatDate(cur);
    const isToday  = dateStr === today;
    const isOther  = cur.getMonth() !== month;
    const dayAppts = appointments.filter(a => {
      const d = new Date(a.start_at || a.startAt || a.start_time);
      return formatDate(d) === dateStr;
    });

    const dots = dayAppts.slice(0, 8).map(a => {
      const s = getStatus(a);
      return `<div class="month-dot ${s}" title="${a.client_name || 'RDV'}"></div>`;
    }).join('');

    const countTxt = dayAppts.length > 0
      ? `<div class="month-count">${dayAppts.length} RDV</div>` : '';

    cells += `<div class="month-cell${isToday ? ' today' : ''}${isOther ? ' other-month' : ''}" 
              onclick="goToDay('${dateStr}')">
      <div class="month-date">${cur.getDate()}</div>
      <div class="month-dots">${dots}</div>
      ${countTxt}
    </div>`;

    cur.setDate(cur.getDate() + 1);
    if (cur.getDay() === 1 && cur > lastDay) break;
  }

  return `<div class="month-view">
    <div class="month-header-row">${headerHtml}</div>
    <div class="month-grid">${cells}</div>
  </div>`;
}

function goToDay(dateStr) {
  currentDate = new Date(dateStr + 'T12:00:00');
  switchView('day');
}

// ── Drag & Drop (interactjs) ───────────────────────────────────────────────────
function initDragDrop() {
  if (typeof interact === 'undefined') return;

  interact('.event-block').draggable({
    inertia: false,
    modifiers: [
      interact.modifiers.restrictToParent({ elementRect: { top: 0, left: 0, bottom: 1, right: 1 } }),
    ],
    listeners: {
      move(event) {
        const target = event.target;
        const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
        target.style.transform = `translateY(${y}px)`;
        target.setAttribute('data-y', y);
      },
      end(event) {
        const target = event.target;
        const y = parseFloat(target.getAttribute('data-y')) || 0;
        target.style.transform = '';
        target.removeAttribute('data-y');

        // Calculate new time from pixel offset
        const minutesDelta = Math.round(y / 60 * 60 / 30) * 30;
        const startISO = target.dataset.start;
        if (!startISO) return;

        const oldDate = new Date(startISO);
        const newDate = new Date(oldDate.getTime() + minutesDelta * 60000);
        const bookingId = target.dataset.id;

        if (Math.abs(minutesDelta) < 15) return; // Ignore tiny drags

        openReschedule(bookingId, target.dataset.client, target.dataset.service, startISO, formatDate(newDate), `${String(newDate.getHours()).padStart(2,'0')}:${String(newDate.getMinutes()).padStart(2,'0')}`);
      },
    },
  });
}

// ── Reschedule modal ───────────────────────────────────────────────────────────
function openReschedule(bookingId, client, service, startISO, prefillDate = '', prefillTime = '') {
  activeBooking = { bookingId, client, service, startISO };
  document.getElementById('modal-info').textContent = `${client} — ${service}`;

  const d = new Date(startISO);
  document.getElementById('modal-date').value = prefillDate || formatDate(d);
  document.getElementById('modal-time').value = prefillTime || `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  activeBooking = null;
}

async function confirmReschedule() {
  if (!activeBooking) return;
  const newDate = document.getElementById('modal-date').value;
  const newTime = document.getElementById('modal-time').value;
  if (!newDate || !newTime) { showToast('Date et heure requises', 'error'); return; }

  try {
    const headers = { 'Content-Type': 'application/json' };
    if (authToken && authToken !== 'demo') headers['Authorization'] = `Bearer ${authToken}`;

    const r = await fetch(`${BASE}/api/calendar/appointments/${activeBooking.bookingId}/reschedule`, {
      method: 'PATCH',
      headers,
      body: JSON.stringify({ newStartTime: `${newDate}T${newTime}:00` }),
    });
    const d = await r.json();
    if (r.ok) {
      showToast('RDV déplacé avec succès', 'success');
      closeModal();
      loadData();
    } else {
      // Fallback to booking modify endpoint
      const r2 = await fetch(`${BASE}/api/booking/modify`, {
        method: 'POST',
        headers,
        body: JSON.stringify({ bookingId: activeBooking.bookingId, newDate, newTime }),
      });
      const d2 = await r2.json();
      if (d2.success) {
        showToast('RDV modifié', 'success');
        closeModal();
        loadData();
      } else {
        showToast(d2.error || 'Erreur lors du déplacement', 'error');
      }
    }
  } catch (e) {
    showToast('Erreur réseau', 'error');
  }
}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// ── Toast ──────────────────────────────────────────────────────────────────────
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Helpers ────────────────────────────────────────────────────────────────────
function formatDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

// ── Staff View ─────────────────────────────────────────────────────────────────
function renderStaff() {
  const dateStr = formatDate(currentDate);
  const dayAppts = appointments.filter(a => {
    const d = new Date(a.start_at || a.startAt || a.start_time);
    return formatDate(d) === dateStr;
  });

  const colsHtml = STAFF_MEMBERS.map(staff => {
    const staffAppts = dayAppts.filter(a => {
      const sn = (a.staff_name || a.staffName || a.provider_name || '').toLowerCase();
      return sn.includes(staff.name.toLowerCase());
    });
    let rowsHtml = '';
    for (let hr = HOURS_START; hr < HOURS_END; hr++) {
      const hourAppts = staffAppts.filter(a => {
        const d = new Date(a.start_at || a.startAt || a.start_time);
        return d.getHours() === hr;
      });
      let evHtml = '';
      for (const a of hourAppts) {
        const d    = new Date(a.start_at || a.startAt || a.start_time);
        const mins = d.getMinutes();
        const dur  = a.duration_min || a.durationMinutes || 60;
        const top  = (mins / 60) * 60;
        const ht   = Math.max(38, (dur / 60) * 60 - 2);
        const status  = getStatus(a);
        const client  = (a.client_name || a.clientName || 'Client').replace(/'/g, "\u2019");
        const service = (a.service_name || a.serviceName || 'Service').replace(/'/g, "\u2019");
        const t   = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
        const id  = a.id || a.booking_id || a.square_booking_id || '';
        const ph  = (a.client_phone || a.clientPhone || '');
        const iso = a.start_at || a.startAt || a.start_time;
        evHtml += `
          <div class="staff-event-block ${status}"
               style="top:${top}px;height:${ht}px;"
               data-id="${id}" data-start="${iso}" data-staff="${staff.name}"
               data-client="${client}" data-service="${service}" data-phone="${ph}"
               onclick="openActionModal(event,'${id}','${client.replace(/'/g,'')}','${service.replace(/'/g,'')}','${t}','${ph}','${staff.name}','${iso}')">
            <div class="staff-event-name">${client}</div>
            <div class="staff-event-time">${t} &middot; ${dur}min</div>
            ${ht >= 50 ? `<div class="staff-event-actions" onclick="event.stopPropagation()">
              <button class="btn-vip" onclick="event.stopPropagation();triggerVIP('${id}','${ph}','${client.replace(/'/g,'')}','${staff.name}')">Arriv\u00e9e</button>
              <button class="btn-close-appt" onclick="event.stopPropagation();triggerClose('${id}','${ph}','${client.replace(/'/g,'')}','${staff.name}')">Cl\u00f4turer</button>
            </div>` : ''}
          </div>`;
      }
      rowsHtml += `<div class="staff-hour-row" data-hour="${hr}" data-staff="${staff.name}">${evHtml}</div>`;
    }
    return `<div class="staff-col" data-staff="${staff.name}">
      <div class="staff-col-header">
        <div class="staff-col-name">${staff.name}</div>
        <div class="staff-col-role">${staff.role}</div>
      </div>${rowsHtml}</div>`;
  }).join('');

  const timeLabels = Array.from({length: HOURS_COUNT}, (_,i) =>
    `<div class="time-label">${String(HOURS_START + i).padStart(2,'0')}:00</div>`
  ).join('');

  return `<div style="display:flex;gap:0;overflow-x:auto;">
    <div class="staff-time-gutter">
      <div class="time-label" style="height:56px;border-bottom:2px solid var(--border);"></div>
      ${timeLabels}
    </div>
    <div class="staff-view" style="flex:1;">
      <div class="staff-columns" style="grid-template-columns:repeat(6,minmax(150px,1fr));">
        ${colsHtml}
      </div>
    </div>
  </div>`;
}

function initStaffDragDrop() {
  if (typeof interact === 'undefined') return;
  interact('.staff-event-block').draggable({
    inertia: false,
    listeners: {
      start(e) { e.target.style.opacity='0.7'; e.target.style.zIndex='50'; },
      move(e) {
        const t = e.target;
        const x = (parseFloat(t.dataset.dx)||0) + e.dx;
        const y = (parseFloat(t.dataset.dy)||0) + e.dy;
        t.style.transform = `translate(${x}px,${y}px)`;
        t.dataset.dx = x; t.dataset.dy = y;
      },
      end(e) {
        const t = e.target;
        t.style.opacity=''; t.style.zIndex=''; t.style.transform='';
        delete t.dataset.dx; delete t.dataset.dy;
        const drop = document.elementFromPoint(e.clientX, e.clientY);
        const col  = drop?.closest('[data-staff]');
        const newStaff = col?.dataset.staff;
        const oldStaff = t.dataset.staff;
        if (newStaff && newStaff !== oldStaff) reassignStaff(t.dataset.id, t.dataset.client, t.dataset.service, t.dataset.start, oldStaff, newStaff);
      },
    },
  });
}

async function reassignStaff(bookingId, client, service, startISO, oldStaff, newStaff) {
  const appt = appointments.find(a => String(a.id||a.booking_id||a.square_booking_id) === String(bookingId));
  if (appt) { appt.staff_name = newStaff; appt.staffName = newStaff; render(); }
  showToast(`${client} \u2192 ${newStaff}`, 'success');
  try {
    const h = {'Content-Type':'application/json'};
    if (authToken && authToken !== 'demo') h['Authorization'] = `Bearer ${authToken}`;
    await fetch(`${BASE}/api/calendar/appointments/${bookingId}/reassign`, {
      method:'PATCH', headers:h, body:JSON.stringify({staffName:newStaff}),
    });
  } catch(_) {}
}

function openActionModal(ev, id, client, service, time, phone, staffName, startISO) {
  ev.stopPropagation();
  activeAction = {id, client, service, time, phone, staffName, startISO};
  document.getElementById('action-client').textContent = client;
  document.getElementById('action-detail').textContent = `${time} \u00b7 ${service} \u00b7 ${staffName}`;
  document.getElementById('action-modal').style.display = 'flex';
}
function closeActionModal() { document.getElementById('action-modal').style.display='none'; activeAction=null; }
function switchToReschedule() {
  if (!activeAction) return;
  closeActionModal();
  openReschedule(activeAction.id, activeAction.client, activeAction.service, activeAction.startISO);
}
async function confirmArrival() { if (!activeAction) return; await triggerVIP(activeAction.id, activeAction.phone, activeAction.client, activeAction.staffName); closeActionModal(); }
async function closeAppointment() { if (!activeAction) return; await triggerClose(activeAction.id, activeAction.phone, activeAction.client, activeAction.staffName); closeActionModal(); }

async function triggerVIP(apptId, phone, clientName, staffName) {
  if (!phone || phone==='undefined' || phone==='') { showToast('Num\u00e9ro manquant pour ce RDV', 'error'); return; }
  const t0 = Date.now();
  try {
    const h = {'Content-Type':'application/json'};
    if (authToken && authToken !== 'demo') h['Authorization'] = `Bearer ${authToken}`;
    const r = await fetch(`${BASE}/api/salon/arrival-confirm`, {
      method:'POST', headers:h, body:JSON.stringify({appointmentId:apptId, clientPhone:phone, clientName, staffName}),
    });
    const d = await r.json();
    const ms = ((Date.now()-t0)/1000).toFixed(1);
    if (d.success) showToast(`SMS VIP \u2192 ${clientName} (${ms}s)`, 'success');
    else showToast(d.error||'Erreur SMS', 'error');
  } catch(e) { showToast('Erreur r\u00e9seau', 'error'); }
}

async function triggerClose(apptId, phone, clientName, staffName) {
  if (!phone || phone==='undefined' || phone==='') { showToast('Num\u00e9ro manquant pour ce RDV', 'error'); return; }
  try {
    const h = {'Content-Type':'application/json'};
    if (authToken && authToken !== 'demo') h['Authorization'] = `Bearer ${authToken}`;
    const r = await fetch(`${BASE}/api/salon/close-appointment`, {
      method:'POST', headers:h, body:JSON.stringify({appointmentId:apptId, clientPhone:phone, clientName, staffName}),
    });
    const d = await r.json();
    if (d.success) { showToast(`Cl\u00f4tur\u00e9 \u2014 SMS avis \u2192 ${clientName}`, 'success'); setTimeout(loadData, 1500); }
    else showToast(d.error||'Erreur cl\u00f4ture', 'error');
  } catch(e) { showToast('Erreur r\u00e9seau', 'error'); }
}

function openWalkin() {
  document.getElementById('walkin-name').value='';
  document.getElementById('walkin-phone').value='';
  document.getElementById('walkin-modal').style.display='flex';
  setTimeout(()=>document.getElementById('walkin-name').focus(),100);
}
function closeWalkin() { document.getElementById('walkin-modal').style.display='none'; }

async function submitWalkin() {
  const name  = document.getElementById('walkin-name').value.trim();
  const phone = document.getElementById('walkin-phone').value.trim();
  if (!name||!phone) { showToast('Nom et t\u00e9l\u00e9phone requis', 'error'); return; }
  const btn = document.getElementById('walkin-submit');
  btn.textContent='Envoi...'; btn.disabled=true;
  try {
    const h = {'Content-Type':'application/json'};
    if (authToken && authToken !== 'demo') h['Authorization'] = `Bearer ${authToken}`;
    const r = await fetch(`${BASE}/api/salon/walkin`, {
      method:'POST', headers:h, body:JSON.stringify({name, phone}),
    });
    const d = await r.json();
    if (d.success) { closeWalkin(); showToast(`${name} inscrit(e) \u2014 attente ~${d.estimatedWait}min`, 'success'); }
    else showToast(d.error||'Erreur inscription', 'error');
  } catch(e) { showToast('Erreur r\u00e9seau', 'error'); }
  btn.textContent='Inscrire dans la file'; btn.disabled=false;
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('walkin-modal').addEventListener('click', e => { if(e.target===e.currentTarget) closeWalkin(); });
  document.getElementById('action-modal').addEventListener('click', e => { if(e.target===e.currentTarget) closeActionModal(); });
});


// ── Auto-refresh every 5 min ───────────────────────────────────────────────────
setInterval(() => {
  if (document.getElementById('app').style.display !== 'none') loadData();
}, 5 * 60 * 1000);
</script>
