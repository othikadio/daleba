<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kadio — Agenda</title>
  <style>
    :root {
      --primary: #C4622D;
      --secondary: #7A9E6E;
      --bg: #FAF6F0;
      --card: #fff;
      --text: #2C2C2C;
      --muted: #888;
      --border: #E2D9CF;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Georgia', serif; min-height: 100vh; }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .logo { font-size: 1.2rem; font-weight: 700; color: var(--primary); letter-spacing: 2px; }
    .header-date { font-size: 0.82rem; color: var(--muted); }

    /* ── View toggle ─────────────────────────────────────────────────────── */
    .view-bar {
      display: flex;
      justify-content: center;
      gap: 0;
      padding: 12px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .view-btn {
      flex: 1;
      max-width: 120px;
      padding: 9px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--muted);
      font-family: inherit;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: 0.5px;
    }
    .view-btn:first-child { border-radius: 8px 0 0 8px; }
    .view-btn:last-child  { border-radius: 0 8px 8px 0; }
    .view-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); font-weight: 600; }

    /* ── Week nav ─────────────────────────────────────────────────────────── */
    .week-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .nav-btn {
      width: 36px; height: 36px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
      color: var(--text);
    }
    .nav-btn:hover { background: var(--border); }
    .week-label { font-size: 0.88rem; font-weight: 600; color: var(--text); }

    /* ── Day strip ────────────────────────────────────────────────────────── */
    .day-strip {
      display: flex;
      overflow-x: auto;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 8px;
      scrollbar-width: none;
    }
    .day-strip::-webkit-scrollbar { display: none; }
    .day-cell {
      flex: 0 0 auto;
      width: 52px;
      padding: 8px 0;
      text-align: center;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all .15s;
    }
    .day-cell:hover .day-num { background: var(--bg); }
    .day-cell.active .day-num { background: var(--primary); color: #fff; }
    .day-cell.active { border-bottom-color: var(--primary); }
    .day-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 4px; }
    .day-num { display: inline-block; width: 30px; height: 30px; line-height: 30px; font-size: 0.9rem; font-weight: 600; border-radius: 50%; color: var(--text); transition: all .15s; }
    .day-dot { width: 5px; height: 5px; background: var(--primary); border-radius: 50%; margin: 3px auto 0; }

    /* ── Staff filter ───────────────────────────────────────────────────── */
    .staff-filter {
      padding: 8px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .staff-chip {
      flex: 0 0 auto;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      font-size: 0.78rem;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .staff-chip.active { background: var(--secondary); color: #fff; border-color: var(--secondary); }

    /* ── Main content ──────────────────────────────────────────────────── */
    main { padding: 16px; max-width: 800px; margin: 0 auto; padding-bottom: 40px; }

    /* ── Day view ──────────────────────────────────────────────────────── */
    .time-grid { display: flex; flex-direction: column; gap: 2px; }
    .time-slot {
      display: flex;
      gap: 0;
      min-height: 52px;
      position: relative;
    }
    .time-label {
      width: 52px;
      flex-shrink: 0;
      font-size: 0.72rem;
      color: var(--muted);
      padding-top: 2px;
      text-align: right;
      padding-right: 8px;
    }
    .slot-area {
      flex: 1;
      border-top: 1px solid var(--border);
      padding: 2px 0;
      position: relative;
      min-height: 52px;
    }
    .appt-block {
      background: var(--primary);
      color: #fff;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.82rem;
      margin-bottom: 2px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: filter .15s;
    }
    .appt-block:hover { filter: brightness(1.1); }
    .appt-block.done  { background: #9E9E9E; }
    .appt-block.upcoming { background: var(--primary); }
    .appt-client  { font-weight: 600; }
    .appt-service { font-size: 0.75rem; opacity: 0.85; }

    /* ── Week view ──────────────────────────────────────────────────────── */
    .week-grid {
      display: grid;
      grid-template-columns: 50px repeat(7, 1fr);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .wg-head {
      background: var(--card);
      padding: 8px 4px;
      text-align: center;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .wg-head.today-col { color: var(--primary); }
    .wg-time {
      font-size: 0.65rem;
      color: var(--muted);
      text-align: right;
      padding: 2px 4px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }
    .wg-cell {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 2px;
      min-height: 32px;
      background: var(--card);
      position: relative;
    }
    .wg-cell.today-col { background: #FFF7F4; }
    .wg-appt {
      background: var(--primary);
      color: #fff;
      border-radius: 3px;
      padding: 2px 4px;
      font-size: 0.65rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 1px;
    }
    .wg-appt.done { background: #9E9E9E; }

    /* ── List view ──────────────────────────────────────────────────────── */
    .list-group { margin-bottom: 20px; }
    .list-date {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .list-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 8px;
      box-shadow: 0 1px 6px rgba(196,98,45,0.06);
      border-left: 4px solid var(--border);
    }
    .list-item.upcoming { border-left-color: var(--primary); }
    .list-item.done     { border-left-color: #ccc; opacity: 0.7; }
    .list-time { font-size: 0.85rem; font-weight: 700; color: var(--primary); min-width: 50px; }
    .list-info { flex: 1; }
    .list-client  { font-weight: 600; font-size: 0.9rem; }
    .list-service { font-size: 0.78rem; color: var(--muted); }
    .list-staff   { font-size: 0.75rem; color: var(--secondary); margin-top: 2px; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
    .badge-ok { background: #EAF4E8; color: #388E3C; }
    .badge-up { background: #FFF0EA; color: var(--primary); }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 0.9rem; }
    .empty-icon  { font-size: 3rem; margin-bottom: 12px; }

    .skeleton {
      background: linear-gradient(90deg, #f0ebe5 25%, #e8e1d9 50%, #f0ebe5 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
      height: 60px;
      margin-bottom: 8px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body>
  <header>
    <div class="logo">KADIO</div>
    <div class="header-date" id="hdrDate"></div>
  </header>

  <div class="view-bar">
    <button class="view-btn active" data-view="day">Jour</button>
    <button class="view-btn" data-view="week">Semaine</button>
    <button class="view-btn" data-view="list">Liste</button>
  </div>

  <div class="week-nav">
    <button class="nav-btn" id="btnPrev">‹</button>
    <span class="week-label" id="weekLabel"></span>
    <button class="nav-btn" id="btnNext">›</button>
  </div>

  <div class="day-strip" id="dayStrip"></div>

  <div class="staff-filter" id="staffFilter">
    <span class="staff-chip active" data-staff="">Tous</span>
  </div>

  <main id="mainContent">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </main>

  <script>
    const token = localStorage.getItem('kc_token') || '';
    const authH = token ? { 'Authorization': `Bearer ${token}` } : {};

    let currentView = 'day';
    let currentDate = new Date();
    currentDate.setHours(0,0,0,0);
    let currentStaff = '';
    let allAppts = [];

    const DAYS_FR  = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];
    const MONTHS_FR = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

    function fmt(d) { return d.toISOString().slice(0,10); }
    function fmtFr(d) {
      return `${DAYS_FR[d.getDay()]} ${d.getDate()} ${MONTHS_FR[d.getMonth()]} ${d.getFullYear()}`;
    }
    function fmtTime(dt) {
      return new Date(dt).toLocaleTimeString('fr-CA',{hour:'2-digit',minute:'2-digit'});
    }

    document.getElementById('hdrDate').textContent = fmtFr(new Date());

    // ── Week boundaries ──────────────────────────────────────────────────────
    function weekStart(d) {
      const c = new Date(d); c.setHours(0,0,0,0);
      const day = c.getDay(); // 0=Sun
      c.setDate(c.getDate() - day + (day === 0 ? -6 : 1)); // Mon
      return c;
    }
    function addDays(d, n) { const c = new Date(d); c.setDate(c.getDate() + n); return c; }

    function updateWeekLabel() {
      if (currentView === 'day') {
        document.getElementById('weekLabel').textContent = fmtFr(currentDate);
      } else {
        const ws = weekStart(currentDate);
        const we = addDays(ws, 6);
        document.getElementById('weekLabel').textContent =
          `${ws.getDate()} ${MONTHS_FR[ws.getMonth()]} — ${we.getDate()} ${MONTHS_FR[we.getMonth()]}`;
      }
    }

    // ── Day strip ─────────────────────────────────────────────────────────────
    function renderDayStrip() {
      const strip = document.getElementById('dayStrip');
      const ws = weekStart(currentDate);
      strip.innerHTML = '';
      for (let i = 0; i < 7; i++) {
        const d = addDays(ws, i);
        const isActive = fmt(d) === fmt(currentDate);
        const hasAppts = allAppts.some(a => {
          const ad = new Date(a.appointment_datetime || a.startTime || a.start_time);
          return fmt(ad) === fmt(d);
        });
        const cell = document.createElement('div');
        cell.className = 'day-cell' + (isActive ? ' active' : '');
        cell.innerHTML = `
          <div class="day-label">${DAYS_FR[d.getDay()]}</div>
          <div class="day-num">${d.getDate()}</div>
          ${hasAppts ? '<div class="day-dot"></div>' : '<div style="height:8px"></div>'}
        `;
        cell.addEventListener('click', () => {
          currentDate = new Date(d);
          renderAll();
        });
        strip.appendChild(cell);
      }
    }

    // ── Staff chips ─────────────────────────────────────────────────────────
    function renderStaffChips() {
      const staffSet = new Set(allAppts.map(a => a.staffName || a.staff_name).filter(Boolean));
      const filter = document.getElementById('staffFilter');
      filter.innerHTML = '<span class="staff-chip active" data-staff="">Tous</span>';
      staffSet.forEach(name => {
        const chip = document.createElement('span');
        chip.className = 'staff-chip';
        chip.dataset.staff = name;
        chip.textContent = name;
        filter.appendChild(chip);
      });
      filter.querySelectorAll('.staff-chip').forEach(c => {
        c.addEventListener('click', () => {
          filter.querySelectorAll('.staff-chip').forEach(x => x.classList.remove('active'));
          c.classList.add('active');
          currentStaff = c.dataset.staff;
          renderContent();
        });
      });
    }

    // ── Filter appointments ─────────────────────────────────────────────────
    function filteredAppts() {
      return allAppts.filter(a => {
        if (currentStaff && (a.staffName || a.staff_name) !== currentStaff) return false;
        return true;
      });
    }

    // ── Day view ─────────────────────────────────────────────────────────────
    function renderDayView() {
      const dateStr = fmt(currentDate);
      const dayAppts = filteredAppts().filter(a => {
        const dt = new Date(a.appointment_datetime || a.startTime || a.start_time);
        return fmt(dt) === dateStr;
      }).sort((a, b) => new Date(a.appointment_datetime||a.startTime) - new Date(b.appointment_datetime||b.startTime));

      if (!dayAppts.length) {
        return '<div class="empty-state"><div class="empty-icon">📅</div>Aucun rendez-vous ce jour.</div>';
      }

      const hours = Array.from({length: 14}, (_, i) => i + 7); // 7h→20h
      let html = '<div class="time-grid">';
      hours.forEach(h => {
        const slotAppts = dayAppts.filter(a => {
          const dt = new Date(a.appointment_datetime || a.startTime || a.start_time);
          return dt.getHours() === h;
        });
        const done = (a) => (a.status === 'done' || a.status === 'completed') ? 'done' : 'upcoming';
        html += `
          <div class="time-slot">
            <div class="time-label">${h}:00</div>
            <div class="slot-area">
              ${slotAppts.map(a => `
                <div class="appt-block ${done(a)}">
                  <div class="appt-client">${a.clientName||a.client_name||'Client'}</div>
                  <div class="appt-service">${a.serviceName||a.service_name||''} · ${a.staffName||a.staff_name||''}</div>
                </div>
              `).join('')}
            </div>
          </div>`;
      });
      html += '</div>';
      return html;
    }

    // ── Week view ─────────────────────────────────────────────────────────────
    function renderWeekView() {
      const ws = weekStart(currentDate);
      const days = Array.from({length: 7}, (_, i) => addDays(ws, i));
      const todayStr = fmt(new Date());
      const hours = Array.from({length: 14}, (_, i) => i + 7);

      let html = '<div class="week-grid">';
      // Header
      html += '<div class="wg-head"></div>';
      days.forEach(d => {
        const isToday = fmt(d) === todayStr;
        html += `<div class="wg-head ${isToday?'today-col':''}">${DAYS_FR[d.getDay()]}<br>${d.getDate()}</div>`;
      });

      // Rows
      hours.forEach(h => {
        html += `<div class="wg-time">${h}h</div>`;
        days.forEach(d => {
          const isToday = fmt(d) === todayStr;
          const dateStr = fmt(d);
          const cellAppts = filteredAppts().filter(a => {
            const dt = new Date(a.appointment_datetime || a.startTime || a.start_time);
            return fmt(dt) === dateStr && dt.getHours() === h;
          });
          html += `<div class="wg-cell ${isToday?'today-col':''}">
            ${cellAppts.map(a =>
              `<div class="wg-appt ${a.status==='done'?'done':''}" title="${a.clientName||a.client_name||''}">${a.clientName||a.client_name||'RDV'}</div>`
            ).join('')}
          </div>`;
        });
      });
      html += '</div>';
      return html;
    }

    // ── List view ─────────────────────────────────────────────────────────────
    function renderListView() {
      const ws = weekStart(currentDate);
      const appts = filteredAppts()
        .filter(a => {
          const dt = new Date(a.appointment_datetime || a.startTime || a.start_time);
          return dt >= ws && dt < addDays(ws, 7);
        })
        .sort((a,b) => new Date(a.appointment_datetime||a.startTime) - new Date(b.appointment_datetime||b.startTime));

      if (!appts.length) {
        return '<div class="empty-state"><div class="empty-icon">📋</div>Aucun rendez-vous cette semaine.</div>';
      }

      const grouped = {};
      appts.forEach(a => {
        const dt = new Date(a.appointment_datetime || a.startTime || a.start_time);
        const key = fmt(dt);
        if (!grouped[key]) grouped[key] = { label: fmtFr(dt), items: [] };
        grouped[key].items.push(a);
      });

      return Object.values(grouped).map(g => `
        <div class="list-group">
          <div class="list-date">${g.label}</div>
          ${g.items.map(a => {
            const dt = new Date(a.appointment_datetime || a.startTime || a.start_time);
            const done = a.status === 'done' || a.status === 'completed';
            return `
              <div class="list-item ${done?'done':'upcoming'}">
                <div class="list-time">${fmtTime(dt)}</div>
                <div class="list-info">
                  <div class="list-client">${a.clientName||a.client_name||'Client'}</div>
                  <div class="list-service">${a.serviceName||a.service_name||''}</div>
                  <div class="list-staff">${a.staffName||a.staff_name||''}</div>
                </div>
                <span class="badge ${done?'badge-ok':'badge-up'}">${done?'Terminé':'À venir'}</span>
              </div>`;
          }).join('')}
        </div>
      `).join('');
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function renderContent() {
      const el = document.getElementById('mainContent');
      if (currentView === 'day')  el.innerHTML = renderDayView();
      if (currentView === 'week') el.innerHTML = renderWeekView();
      if (currentView === 'list') el.innerHTML = renderListView();
    }

    function renderAll() {
      updateWeekLabel();
      renderDayStrip();
      renderContent();
    }

    // ── Load data ─────────────────────────────────────────────────────────────
    async function loadAppts() {
      try {
        const ws = weekStart(currentDate);
        const we = addDays(ws, 6);
        const url = `/api/calendar?start=${fmt(addDays(ws,-7))}&end=${fmt(addDays(we,7))}`;
        const r = await fetch(url, { headers: authH });
        if (r.ok) {
          const d = await r.json();
          allAppts = d.appointments || [];
        }
      } catch(e) { allAppts = []; }
      renderStaffChips();
      renderAll();
    }

    // ── Events ────────────────────────────────────────────────────────────────
    document.querySelectorAll('.view-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentView = btn.dataset.view;
        updateWeekLabel();
        renderContent();
        document.getElementById('dayStrip').style.display = currentView === 'list' ? 'none' : '';
      });
    });

    document.getElementById('btnPrev').addEventListener('click', () => {
      if (currentView === 'day') { currentDate = addDays(currentDate, -1); }
      else { currentDate = addDays(weekStart(currentDate), -7); }
      renderAll(); loadAppts();
    });
    document.getElementById('btnNext').addEventListener('click', () => {
      if (currentView === 'day') { currentDate = addDays(currentDate, 1); }
      else { currentDate = addDays(weekStart(currentDate), 7); }
      renderAll(); loadAppts();
    });

    updateWeekLabel();
    loadAppts();
  </script>
</body>
</html>
