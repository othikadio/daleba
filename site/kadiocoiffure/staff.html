<!DOCTYPE html>
<html lang="fr-CA">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Portail Staff — Kadio Coiffure</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
:root{
  --bg:#0d0b08;--surface:#141009;--card:rgba(255,255,255,.04);--border:rgba(255,255,255,.09);
  --gold:#b8965a;--gold-light:#d4af7a;--muted:rgba(255,255,255,.35);
  --green:#2ecc71;--green-bg:rgba(46,204,113,.1);--green-border:rgba(46,204,113,.3);
  --red:#e74c3c;--red-bg:rgba(231,76,60,.1);--red-border:rgba(231,76,60,.3);
  --maya:#b8965a;--mariel:#7a9e72;
  --serif:'Cormorant Garamond',Georgia,serif;--sans:'Jost',system-ui,sans-serif;
  --nav:58px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:#fff;font-family:var(--sans);font-weight:300;overflow-x:hidden}
input,select,button{font-family:var(--sans)}
a{color:inherit;text-decoration:none}
button{cursor:pointer}

/* ══ LOGIN ══════════════════════════════════════════════ */
#loginScreen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{width:100%;max-width:340px;text-align:center}
.login-logo{font-family:var(--serif);font-size:20px;letter-spacing:3px;text-transform:uppercase;margin-bottom:3px}
.login-logo em{color:var(--gold);font-style:normal}
.login-role{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:32px}
.login-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:8px;text-align:left}
.login-select{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);color:#fff;padding:12px 16px;font-size:14px;margin-bottom:16px;outline:none;appearance:none;-webkit-appearance:none;transition:border-color .2s}
.login-select:focus{border-color:var(--gold)}
.login-select option{background:#1a1308}
/* PIN pad */
.pin-display{display:flex;gap:10px;justify-content:center;margin-bottom:14px}
.pin-dot{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.12);transition:background .15s}
.pin-dot.on{background:var(--gold)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.pin-key{background:rgba(255,255,255,.06);border:1px solid var(--border);color:#fff;padding:16px;font-size:18px;font-weight:300;transition:all .15s;border-radius:0;-webkit-appearance:none;appearance:none;user-select:none}
.pin-key:hover,.pin-key:active{background:rgba(184,150,90,.2);border-color:var(--gold)}
.pin-key.del{font-size:14px;color:var(--muted)}
.pin-key.confirm{background:var(--gold);color:#1a1308;border-color:var(--gold);font-weight:500;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;grid-column:1/-1}
.pin-key.confirm:hover{background:var(--gold-light)}
.login-error{font-size:12px;color:var(--red);margin-top:6px;min-height:18px;transition:opacity .2s}

/* ══ SHELL ══════════════════════════════════════════════ */
#app{display:none;flex-direction:column;height:100vh;overflow:hidden}
#app.on{display:flex}

/* TOP BAR */
.topbar{height:var(--nav);background:rgba(255,255,255,.03);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;position:relative;z-index:50}
.topbar-logo{font-family:var(--serif);font-size:15px;letter-spacing:2px}
.topbar-logo em{color:var(--gold);font-style:normal}
.topbar-staff{display:flex;align-items:center;gap:8px}
.staff-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#1a1308;flex-shrink:0}
.staff-label{font-size:12px;color:var(--muted)}
.logout-btn{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;background:none;border:1px solid rgba(255,255,255,.1);color:var(--muted);padding:5px 10px;transition:all .2s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

/* BOTTOM NAV */
.bottom-nav{height:56px;background:rgba(255,255,255,.03);border-top:1px solid var(--border);display:flex;flex-shrink:0}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:var(--muted);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;transition:color .2s}
.bnav-btn .icon{font-size:20px;line-height:1}
.bnav-btn.active{color:var(--gold)}
.bnav-btn:active{opacity:.7}

/* PANES */
.panes{flex:1;overflow:hidden;position:relative}
.pane{position:absolute;inset:0;overflow-y:auto;display:none;padding:16px}
.pane.active{display:block}

/* ══ SCAN PANE ══════════════════════════════════════════ */
.scan-title{font-family:var(--serif);font-size:20px;font-weight:300;margin-bottom:3px}
.scan-sub{font-size:11px;color:var(--muted);letter-spacing:.5px;margin-bottom:20px}

/* Camera container */
#qr-reader{width:100%;max-width:360px;border:2px solid var(--gold);border-radius:4px;overflow:hidden;background:#000;margin:0 auto 12px;position:relative}
#qr-reader video{width:100%!important;height:auto!important;display:block}
/* Override html5-qrcode UI */
#qr-reader__scan_region{position:relative}
#qr-reader__header_message,#qr-reader__status_span,#qr-reader__camera_permission_button{font-family:var(--sans)!important;font-size:11px!important;color:rgba(255,255,255,.5)!important;background:none!important;border:none!important}
#qr-reader__dashboard_section_csr button{background:var(--gold)!important;color:#1a1308!important;border:none!important;padding:8px 18px!important;font-family:var(--sans)!important;font-size:11px!important;letter-spacing:1.5px!important;text-transform:uppercase!important;margin:8px auto!important;display:block!important}
#qr-reader__dashboard_section_swaplink{color:var(--gold)!important;font-size:11px!important}
#qr-reader__camera_selection{background:rgba(255,255,255,.05)!important;border:1px solid var(--border)!important;color:#fff!important;padding:6px 10px!important;font-family:var(--sans)!important;font-size:12px!important;width:100%!important;margin-bottom:8px!important}
.cam-toggle{width:100%;max-width:360px;margin:0 auto 12px;display:flex;gap:8px}
.cam-btn{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border);color:rgba(255,255,255,.6);padding:9px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;transition:all .2s}
.cam-btn.active{background:rgba(184,150,90,.12);border-color:var(--gold);color:var(--gold)}
.cam-btn:active{opacity:.7}

/* Manual input fallback */
.scan-manual{max-width:360px;margin:0 auto 20px;display:flex;gap:8px}
.scan-input{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--border);color:#fff;padding:10px 14px;font-size:16px;letter-spacing:3px;text-transform:uppercase;outline:none;transition:border-color .2s;-webkit-appearance:none}
.scan-input:focus{border-color:var(--gold)}
.scan-input::placeholder{font-size:11px;letter-spacing:1px;opacity:.3}
.scan-go{background:var(--gold);color:#1a1308;border:none;padding:10px 18px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;transition:background .2s;flex-shrink:0}
.scan-go:active{background:var(--gold-light)}

/* RESULT — big green/red */
#scanResult{max-width:360px;margin:0 auto 20px;display:none;border-radius:6px;padding:28px 20px;text-align:center}
#scanResult.ok{background:var(--green-bg);border:2px solid var(--green-border);display:block}
#scanResult.blocked{background:var(--red-bg);border:2px solid var(--red-border);display:block}
.result-icon{font-size:64px;line-height:1;margin-bottom:10px}
.result-status{font-size:18px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px}
#scanResult.ok .result-status{color:var(--green)}
#scanResult.blocked .result-status{color:var(--red)}
.result-name{font-family:var(--serif);font-size:22px;font-weight:400;margin-bottom:4px}
.result-plan{font-size:12px;letter-spacing:1px;color:rgba(255,255,255,.5);margin-bottom:16px}
/* NO PRICE EVER */
.result-wash{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:500;padding:7px 16px;border-radius:20px;margin-bottom:14px}
.wash-ok{background:rgba(46,204,113,.12);color:var(--green);border:1px solid rgba(46,204,113,.25)}
.wash-used{background:rgba(231,76,60,.1);color:#ff8a7a;border:1px solid rgba(231,76,60,.2)}
.result-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.result-btn{font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:8px 16px;border:1px solid rgba(255,255,255,.15);background:none;color:rgba(255,255,255,.6);transition:all .2s}
.result-btn.wash-btn{border-color:rgba(46,204,113,.4);color:var(--green)}
.result-btn:active{opacity:.7}

/* Scan log */
.scan-log-wrap{max-width:360px;margin:0 auto}
.scan-log-title{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.scan-log-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px}
.log-name{color:rgba(255,255,255,.65)}
.log-time{font-size:10px;color:var(--muted)}
.log-tag{font-size:9px;padding:2px 7px;border-radius:10px}
.log-ok{background:rgba(46,204,113,.12);color:var(--green)}
.log-blocked{background:rgba(231,76,60,.1);color:#ff8a7a}

/* ══ CALENDRIER PANE ════════════════════════════════════ */
.cal-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.week-nav{display:flex;align-items:center;gap:6px}
.cal-btn{background:rgba(255,255,255,.05);border:1px solid var(--border);color:rgba(255,255,255,.6);padding:6px 12px;font-size:12px;transition:all .2s}
.cal-btn:hover,.cal-btn:active{border-color:var(--gold);color:var(--gold)}
.week-label{font-family:var(--serif);font-size:15px;min-width:170px;text-align:center}
.add-rdv{background:var(--gold);color:#1a1308;border:none;padding:8px 16px;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:500;margin-left:auto;transition:background .2s}
.add-rdv:active{background:var(--gold-light)}

/* Calendar grid */
.cal-grid-wrap{overflow-x:auto;border:1px solid var(--border)}
.cal-grid{min-width:620px}
.cal-head-row{display:grid;grid-template-columns:52px repeat(7,1fr);background:rgba(255,255,255,.03);border-bottom:1px solid var(--border)}
.cal-hcell{padding:8px 4px;text-align:center;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);border-right:1px solid rgba(255,255,255,.05)}
.cal-hcell:last-child{border-right:none}
.cal-hcell.today{color:var(--gold)}
.cal-hdate{font-family:var(--serif);font-size:16px;display:block;color:rgba(255,255,255,.7);line-height:1.2}
.cal-hcell.today .cal-hdate{color:var(--gold)}
.cal-row{display:grid;grid-template-columns:52px repeat(7,1fr);min-height:48px;border-bottom:1px solid rgba(255,255,255,.04)}
.cal-time{font-size:9px;color:var(--muted);padding:3px 6px;border-right:1px solid rgba(255,255,255,.06);display:flex;align-items:flex-start;justify-content:flex-end;letter-spacing:.5px}
.cal-cell{border-right:1px solid rgba(255,255,255,.04);position:relative;transition:background .1s;cursor:pointer}
.cal-cell:last-child{border-right:none}
.cal-cell:hover{background:rgba(255,255,255,.025)}
/* GRISED = congé ou hors plage */
.cal-cell.grised{background:repeating-linear-gradient(45deg,rgba(255,255,255,.015) 0,rgba(255,255,255,.015) 4px,transparent 4px,transparent 8px);cursor:not-allowed;pointer-events:none}
.cal-cell.grised::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.15)}

/* Appointment blocks — READ: no edit/cancel */
.cal-appt{position:absolute;left:2px;right:2px;border-radius:2px;padding:3px 6px;font-size:10px;overflow:hidden;z-index:5;border-left:3px solid;cursor:default}
.cal-appt.maya{background:rgba(184,150,90,.18);border-color:var(--maya)}
.cal-appt.mariel{background:rgba(122,158,114,.18);border-color:var(--mariel)}
.cal-appt-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-appt-svc{font-size:9px;opacity:.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* Deposit badge */
.cal-appt-deposit{font-size:8px;color:var(--gold-light);margin-top:1px}

/* ══ MODAL NOUVEAU RDV ══════════════════════════════════ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:flex-end;justify-content:center;padding:0}
.modal-overlay.open{display:flex}
.modal{background:#161008;border-top:2px solid var(--gold);width:100%;max-width:480px;padding:24px 20px 36px;max-height:92vh;overflow-y:auto;border-radius:12px 12px 0 0}
.modal-handle{width:36px;height:3px;background:rgba(255,255,255,.15);border-radius:2px;margin:0 auto 18px}
.modal-title{font-family:var(--serif);font-size:20px;font-weight:400;margin-bottom:18px}
.form-group{margin-bottom:13px}
.form-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px}
.form-input,.form-select,.form-textarea{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);color:#fff;padding:10px 14px;font-family:var(--sans);font-size:14px;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none;border-radius:0}
.form-select option{background:#161008}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--gold)}
.form-textarea{min-height:70px;resize:vertical;font-size:13px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-note-required{font-size:10px;color:rgba(184,150,90,.6);margin-top:3px}
.checkbox-label{display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,.6);cursor:pointer}
.checkbox-label input{accent-color:var(--gold);width:auto}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.btn-cancel{flex:1;background:none;border:1px solid var(--border);color:var(--muted);padding:11px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;transition:all .2s}
.btn-cancel:active{border-color:rgba(255,255,255,.3)}
.btn-save{flex:2;background:var(--gold);color:#1a1308;border:none;padding:11px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;transition:background .2s}
.btn-save:active{background:var(--gold-light)}
/* READ-ONLY notice */
.readonly-notice{font-size:10px;color:var(--red);background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.2);padding:6px 12px;text-align:center;letter-spacing:.5px;margin-bottom:16px;display:none}

/* ══ TOAST ══════════════════════════════════════════════ */
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(60px);background:rgba(20,16,9,.97);border:1px solid rgba(184,150,90,.3);color:#fff;padding:10px 18px;font-size:12px;letter-spacing:.5px;z-index:1000;white-space:nowrap;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ══ MOBILE optimisations ═══════════════════════════════ */
@media(max-width:400px){
  .week-label{min-width:130px;font-size:13px}
  .result-name{font-size:18px}
  .result-icon{font-size:52px}
}
</style>
</head>
<body>

<!-- ══ LOGIN ══════════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">KADIO <em>·</em> COIFFURE</div>
    <div class="login-role">Portail Employé</div>

    <label class="login-label">Votre nom</label>
    <select class="login-select" id="staffSelect">
      <option value="">— Sélectionner —</option>
    </select>

    <div class="pin-display" id="pinDots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>

    <div class="pin-pad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key del" onclick="pinDel()">⌫</button>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key confirm" onclick="doLogin()">Entrer →</button>
    </div>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ══ APP ══════════════════════════════════════════════ -->
<div id="app">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-logo">KADIO <em>·</em> STAFF</div>
    <div class="topbar-staff">
      <div class="staff-dot" id="staffDot">?</div>
      <span class="staff-label" id="staffLabel">—</span>
    </div>
    <button class="logout-btn" onclick="doLogout()">Sortir</button>
  </div>

  <!-- PANES -->
  <div class="panes">

    <!-- ── SCAN QR ──────────────────────────────────── -->
    <div class="pane active" id="pane-scan">
      <div class="scan-title">Scanner un client</div>
      <div class="scan-sub">Pointez la caméra vers le code QR</div>

      <!-- Camera QR -->
      <div id="qr-reader"></div>

      <!-- Camera switch -->
      <div class="cam-toggle">
        <button class="cam-btn active" id="btnStart" onclick="startCamera()">▶ Activer caméra</button>
        <button class="cam-btn" id="btnStop" onclick="stopCamera()">◼ Arrêter</button>
      </div>

      <!-- Manual fallback -->
      <div class="scan-manual">
        <input class="scan-input" id="manualCode" type="text" maxlength="8"
          placeholder="Code manuel…" autocomplete="off"
          oninput="this.value=this.value.toUpperCase()"
          onkeydown="if(event.key==='Enter')manualScan()" />
        <button class="scan-go" onclick="manualScan()">OK</button>
      </div>

      <!-- RESULT -->
      <div id="scanResult">
        <div class="result-icon" id="resIcon"></div>
        <div class="result-status" id="resStatus"></div>
        <div class="result-name" id="resName"></div>
        <div class="result-plan" id="resPlan"></div>
        <div class="result-wash" id="resWash"></div>
        <div class="result-actions" id="resActions"></div>
      </div>

      <!-- Scan log -->
      <div class="scan-log-wrap">
        <div class="scan-log-title">Historique scans</div>
        <div id="scanLog"></div>
      </div>
    </div>

    <!-- ── CALENDRIER ───────────────────────────────── -->
    <div class="pane" id="pane-cal">
      <div class="cal-toolbar">
        <div class="week-nav">
          <button class="cal-btn" onclick="prevWeek()">←</button>
          <div class="week-label" id="weekLabel">—</div>
          <button class="cal-btn" onclick="nextWeek()">→</button>
          <button class="cal-btn" onclick="goToday()">Auj.</button>
        </div>
        <button class="add-rdv" onclick="openNewRdv()">+ RDV</button>
      </div>

      <div class="cal-grid-wrap">
        <div class="cal-grid" id="calGrid"></div>
      </div>
    </div>

  </div><!-- /panes -->

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="bnav-btn active" id="bnav-scan" onclick="switchPane('scan',this)">
      <span class="icon">📲</span>Scanner
    </button>
    <button class="bnav-btn" id="bnav-cal" onclick="switchPane('cal',this)">
      <span class="icon">📅</span>Agenda
    </button>
  </div>
</div>

<!-- ══ MODAL NOUVEAU RDV ══════════════════════════════ -->
<div class="modal-overlay" id="rdvModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Nouveau rendez-vous</div>
    <!-- Staff ne peut que CRÉER — pas modifier ni annuler -->
    <div class="readonly-notice" id="readonlyNotice">
      ⚠️ Lecture seule — modification/annulation : admin uniquement
    </div>
    <div class="form-group">
      <label class="form-label">Nom du client *</label>
      <input class="form-input" id="rdvClient" type="text" placeholder="Prénom Nom" />
    </div>
    <div class="form-group">
      <label class="form-label">Téléphone</label>
      <input class="form-input" id="rdvPhone" type="tel" placeholder="+1 514 XXX-XXXX" inputmode="tel" />
    </div>
    <div class="form-group">
      <label class="form-label">Service *</label>
      <select class="form-select" id="rdvService">
        <option>Knotless braids</option>
        <option>Retwist tête complète</option>
        <option>Interlock crochet tête complète</option>
        <option>Interlock crochet demi-tête</option>
        <option>Nattes américaines</option>
        <option>Twist tête complète</option>
        <option>Crochet braids</option>
        <option>Coupe homme + barbe</option>
        <option>Coupe homme sans barbe</option>
        <option>Coupe enfant</option>
        <option>Tissage</option>
        <option>Pose lace frontale</option>
        <option>Pose perruque closure</option>
        <option>Laver séché</option>
        <option>Mise en pli</option>
        <option>Soin hydratation profonde</option>
        <option>Autre…</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Date *</label>
        <input class="form-input" id="rdvDate" type="date" />
      </div>
      <div class="form-group">
        <label class="form-label">Heure *</label>
        <input class="form-input" id="rdvTime" type="time" value="10:00" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Durée (min)</label>
        <input class="form-input" id="rdvDuration" type="number" value="60" min="15" step="15" inputmode="numeric" />
      </div>
      <div class="form-group">
        <label class="form-label">Coiffeur·se</label>
        <select class="form-select" id="rdvStaff"></select>
      </div>
    </div>
    <!-- CHAMP OBLIGATOIRE : NOTES & DÉPÔTS -->
    <div class="form-group">
      <label class="form-label">📝 Notes & Dépôts</label>
      <textarea class="form-textarea" id="rdvNotes" placeholder="Ex: Dépôt 20$ payé en cash • Extensions fournies par la cliente • Allergie produits chimiques…"></textarea>
      <div class="form-note-required">Indiquer tout acompte reçu ou consigne importante pour l'équipe</div>
    </div>
    <div class="form-group">
      <label class="checkbox-label">
        <input type="checkbox" id="rdvSMS" checked />
        Envoyer SMS (confirmation + 2 rappels auto)
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeRdv()">Annuler</button>
      <button class="btn-save" onclick="saveRdv()">Enregistrer →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://daleba-api-production.up.railway.app';

// ══ STAFF CONFIG (chargée depuis localStorage + défaut) ══════════════════
// L'admin peut ajouter/supprimer via admin-dashboard.html
const DEFAULT_STAFF = [
  { id:'maya',   name:'Maya',   pin:'2847', color:'#b8965a', schedule:{0:null,1:{o:'12:00',c:'19:00'},2:null,3:{o:'10:00',c:'19:00'},4:{o:'10:00',c:'21:00'},5:{o:'10:00',c:'21:00'},6:{o:'10:00',c:'21:00'}} },
  { id:'mariel', name:'Mariel', pin:'3956', color:'#7a9e72', schedule:{0:null,1:{o:'12:00',c:'19:00'},2:null,3:{o:'10:00',c:'19:00'},4:{o:'10:00',c:'21:00'},5:{o:'10:00',c:'21:00'},6:{o:'10:00',c:'21:00'}} },
];

function loadStaff() {
  try { return JSON.parse(localStorage.getItem('kc_staff') || 'null') || DEFAULT_STAFF; }
  catch(e) { return DEFAULT_STAFF; }
}

let STAFF_LIST = loadStaff();
let currentStaff = null;
let pinBuffer = '';
let html5QrScanner = null;
let scanLog = [];
let weekStart = getWeekStart(new Date());
let appointments = [];

// ══ POPULATE LOGIN SELECT ═══════════════════════════════════════════════
function populateSelect() {
  const sel = document.getElementById('staffSelect');
  sel.innerHTML = '<option value="">— Sélectionner —</option>';
  STAFF_LIST.forEach(s => {
    const o = document.createElement('option');
    o.value = s.id; o.textContent = s.name;
    sel.appendChild(o);
  });
}
populateSelect();

// ══ PIN PAD ══════════════════════════════════════════════════════════════
function pinKey(k) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += k;
  updatePinDots();
  if (pinBuffer.length === 4) setTimeout(doLogin, 150);
}
function pinDel() { pinBuffer = pinBuffer.slice(0,-1); updatePinDots(); }
function updatePinDots() {
  for(let i=0;i<4;i++) document.getElementById('pd'+i).classList.toggle('on', i < pinBuffer.length);
}

function doLogin() {
  const staffId = document.getElementById('staffSelect').value;
  if (!staffId) { showLoginErr('Sélectionnez votre nom.'); return; }
  const s = STAFF_LIST.find(x => x.id === staffId);
  if (!s || pinBuffer !== s.pin) { showLoginErr('Code incorrect.'); pinBuffer=''; updatePinDots(); return; }
  currentStaff = s;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').classList.add('on');
  document.getElementById('staffDot').textContent = s.name[0];
  document.getElementById('staffDot').style.background = s.color;
  document.getElementById('staffLabel').textContent = s.name;
  // Populate rdvStaff select
  const sel = document.getElementById('rdvStaff');
  sel.innerHTML = STAFF_LIST.map(x=>`<option value="${x.id}"${x.id===s.id?' selected':''}>${x.name}</option>`).join('');
  loadAppointments();
  // Auto-start camera on scan pane
  setTimeout(startCamera, 500);
}

function showLoginErr(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  setTimeout(()=>el.textContent='', 2500);
}

function doLogout() {
  stopCamera();
  currentStaff = null; pinBuffer = '';
  document.getElementById('app').classList.remove('on');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('staffSelect').value = '';
  updatePinDots();
}

// ══ TABS ═════════════════════════════════════════════════════════════════
function switchPane(id, btn) {
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pane-'+id).classList.add('active');
  btn.classList.add('active');
  if (id === 'scan') setTimeout(startCamera, 300);
  if (id === 'cal') buildCalendar();
}

// ══ QR SCANNER (html5-qrcode) ════════════════════════════════════════════
function startCamera() {
  if (html5QrScanner) return; // already running
  document.getElementById('btnStart').classList.add('active');
  document.getElementById('btnStop').classList.remove('active');
  html5QrScanner = new Html5Qrcode('qr-reader');
  Html5Qrcode.getCameras().then(cameras => {
    if (!cameras.length) { showToast('Aucune caméra détectée'); html5QrScanner=null; return; }
    // Prefer back camera on mobile
    const cam = cameras.find(c=>c.label.toLowerCase().includes('back')||c.label.toLowerCase().includes('rear')||c.label.toLowerCase().includes('environment')) || cameras[cameras.length-1];
    html5QrScanner.start(
      cam.id,
      { fps:10, qrbox:{width:220,height:220}, aspectRatio:1.0 },
      (decodedText) => { processCode(decodedText); },
      () => {}
    ).catch(err => { showToast('Accès caméra refusé — utilise le code manuel'); html5QrScanner=null; });
  }).catch(()=>{ showToast('Caméra non disponible'); html5QrScanner=null; });
}

function stopCamera() {
  if (!html5QrScanner) return;
  html5QrScanner.stop().then(()=>{ html5QrScanner=null; }).catch(()=>{ html5QrScanner=null; });
  document.getElementById('btnStart').classList.remove('active');
  document.getElementById('btnStop').classList.add('active');
}

function manualScan() {
  const code = document.getElementById('manualCode').value.trim().toUpperCase();
  if (!code) { showToast('Entrez un code'); return; }
  processCode(code);
  document.getElementById('manualCode').value = '';
}

// Demo subscriber data
const DEMO = {
  'KCAT5R':{name:'Sophie Beaumont',plan:'Knotless & Tresses Signature',status:'active',washUsed:false},
  'KCBM2X':{name:'Marc Théodore',plan:'Barbier Coupe & Barbe',status:'active',washUsed:true},
  'KCAJ9P':{name:'Aisha Konaté',plan:'Locs Illimité',status:'blocked',washUsed:false},
  'KCPN4W':{name:'Priscille Ndongo',plan:'Microlocks / Sisterlocks',status:'active',washUsed:false},
  'KCKV7L':{name:'Kevin Tremblay',plan:'Combo Locs + Barbier',status:'paused',washUsed:false},
};

let lastScanned = '';
async function processCode(code) {
  if (code === lastScanned) return; // debounce
  lastScanned = code;
  setTimeout(()=>lastScanned='', 3000);

  let sub = null;
  try {
    const r = await fetch(`${API}/api/subscription/scan/${code}/status`);
    if (r.ok) sub = await r.json();
  } catch(e) {}
  if (!sub) sub = DEMO[code] || null;

  const el = document.getElementById('scanResult');
  el.className = '';

  if (!sub) {
    el.className = 'blocked';
    document.getElementById('resIcon').textContent = '🔴';
    document.getElementById('resStatus').textContent = 'CODE INCONNU';
    document.getElementById('resName').textContent = code;
    document.getElementById('resPlan').textContent = 'Aucun abonnement trouvé';
    document.getElementById('resWash').innerHTML = '';
    document.getElementById('resWash').className = 'result-wash';
    document.getElementById('resActions').innerHTML = '';
    addLog(code, '—', 'blocked');
    // Vibrate red feedback
    if (navigator.vibrate) navigator.vibrate([200,100,200]);
    return;
  }

  const isActive = sub.status === 'active';
  el.className = isActive ? 'ok' : 'blocked';
  document.getElementById('resIcon').textContent = isActive ? '🟢' : '🔴';
  document.getElementById('resStatus').textContent = isActive ? 'ABONNEMENT ACTIF' : 'ACCÈS REFUSÉ';
  document.getElementById('resName').textContent = sub.name || sub.clientName;
  // ⚠️ NOM DU FORFAIT UNIQUEMENT — JAMAIS le prix
  document.getElementById('resPlan').textContent = sub.plan || sub.forfaitName || sub.forfaitId || '—';

  const washEl = document.getElementById('resWash');
  const washUsed = sub.washUsed || sub.weeklyWashUsed;
  if (isActive) {
    washEl.className = 'result-wash ' + (washUsed ? 'wash-used' : 'wash-ok');
    washEl.innerHTML = washUsed ? '🚿 Lavage semaine utilisé' : '🚿 Lavage semaine disponible';
  } else {
    washEl.innerHTML = '';
  }

  const actEl = document.getElementById('resActions');
  if (isActive && !washUsed) {
    actEl.innerHTML = `<button class="result-btn wash-btn" onclick="consumeWash('${code}','${sub.name||sub.clientName}')">✓ Utiliser le lavage</button>`;
  } else { actEl.innerHTML = ''; }

  addLog(sub.name || sub.clientName, sub.plan || '—', isActive ? 'ok' : 'blocked');
  if (navigator.vibrate) navigator.vibrate(isActive ? [80] : [200,100,200]);
}

async function consumeWash(code, name) {
  try { await fetch(`${API}/api/subscription/wash/consume`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({scanCode:code})}); } catch(e) {}
  document.getElementById('resWash').className = 'result-wash wash-used';
  document.getElementById('resWash').innerHTML = '🚿 Lavage semaine utilisé';
  document.getElementById('resActions').innerHTML = '';
  showToast(`Lavage enregistré — ${name}`);
}

function addLog(name, plan, status) {
  const t = new Date().toLocaleTimeString('fr-CA',{hour:'2-digit',minute:'2-digit'});
  scanLog.unshift({name,plan,status,t});
  if(scanLog.length > 12) scanLog.pop();
  document.getElementById('scanLog').innerHTML = scanLog.map(l=>`
    <div class="scan-log-item">
      <span class="log-name">${l.name}</span>
      <span class="log-time">${l.t}</span>
      <span class="log-tag ${l.status==='ok'?'log-ok':'log-blocked'}">${l.status==='ok'?'✓ Actif':'✗'}</span>
    </div>`).join('');
}

// ══ CALENDRIER ════════════════════════════════════════════════════════════
function getWeekStart(d){ const dt=new Date(d); dt.setDate(dt.getDate()-dt.getDay()+1); dt.setHours(0,0,0,0); return dt; }
function fmtISO(d){ return d.toISOString().split('T')[0]; }
function isToday(d){ return d.toDateString()===new Date().toDateString(); }
const DAYS=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const HOURS=Array.from({length:13},(_,i)=>i+8);

// Check if a cell is in staff working hours (Sunday=0)
function isInWorkHours(staffId, dayOfWeek, hour) {
  const s = STAFF_LIST.find(x=>x.id===staffId);
  if (!s || !s.schedule) return false;
  const sched = s.schedule[dayOfWeek];
  if (!sched) return false; // day off
  const open = parseInt(sched.o);
  const close = parseInt(sched.c);
  return hour >= open && hour < close;
}

async function loadAppointments() {
  try {
    const r = await fetch(`${API}/api/calendar/week?start=${fmtISO(weekStart)}`);
    if (r.ok) { appointments = await r.json(); buildCalendar(); return; }
  } catch(e) {}
  appointments = [
    {id:'1',client:'Sophie B.',service:'Knotless Moyen',staffId:'maya',date:fmtISO(new Date()),time:'10:00',duration:180,notes:'Dépôt 30$ payé'},
    {id:'2',client:'Priscille N.',service:'Retwist tête',staffId:'mariel',date:fmtISO(new Date()),time:'14:00',duration:90,notes:''},
  ];
  buildCalendar();
}

function buildCalendar() {
  const g = document.getElementById('calGrid');
  g.innerHTML = '';
  const hrow = document.createElement('div'); hrow.className='cal-head-row';
  hrow.innerHTML = '<div class="cal-hcell"></div>';
  for(let i=0;i<7;i++){
    const d=new Date(weekStart); d.setDate(d.getDate()+i);
    hrow.innerHTML += `<div class="cal-hcell${isToday(d)?' today':''}">${DAYS[d.getDay()]}<span class="cal-hdate">${d.getDate()}</span></div>`;
  }
  g.appendChild(hrow);
  HOURS.forEach(h=>{
    const row=document.createElement('div'); row.className='cal-row';
    row.innerHTML=`<div class="cal-time">${h}h</div>`;
    for(let i=0;i<7;i++){
      const d=new Date(weekStart); d.setDate(d.getDate()+i);
      const cell=document.createElement('div'); cell.className='cal-cell';
      // Check if this is a working hour for current staff
      const inHours = currentStaff ? isInWorkHours(currentStaff.id, d.getDay(), h) : true;
      if (!inHours) cell.classList.add('grised');
      else cell.addEventListener('click',()=>openNewRdv(fmtISO(d),h));
      // Place appointments (READ-ONLY display)
      appointments.filter(a=>a.date===fmtISO(d)&&parseInt(a.time)===h).forEach(a=>{
        const el=document.createElement('div');
        el.className=`cal-appt ${a.staffId||'maya'}`;
        const slotH=48; const m=parseInt((a.time.split(':')[1]||0));
        el.style.top=(m/60*slotH)+'px';
        el.style.height=Math.max((a.duration||60)/60*slotH-2,20)+'px';
        el.innerHTML=`<div class="cal-appt-name">${a.client}</div><div class="cal-appt-svc">${a.service}</div>${a.notes?`<div class="cal-appt-deposit">📝 ${a.notes.substring(0,20)}${a.notes.length>20?'…':''}</div>`:''}`;
        // READ-ONLY: click shows info, no edit
        el.addEventListener('click',e=>{e.stopPropagation();showToast(`${a.client} — ${a.service}${a.notes?' · '+a.notes.substring(0,30):''}`)});
        cell.style.position='relative'; cell.appendChild(el);
      });
      row.appendChild(cell);
    }
    g.appendChild(row);
  });
  const end=new Date(weekStart); end.setDate(end.getDate()+6);
  document.getElementById('weekLabel').textContent=
    `${weekStart.toLocaleDateString('fr-CA',{day:'numeric',month:'short'})}–${end.toLocaleDateString('fr-CA',{day:'numeric',month:'short'})}`;
}

function prevWeek(){weekStart.setDate(weekStart.getDate()-7);loadAppointments();}
function nextWeek(){weekStart.setDate(weekStart.getDate()+7);loadAppointments();}
function goToday(){weekStart=getWeekStart(new Date());loadAppointments();}

// ══ MODAL RDV ═════════════════════════════════════════════════════════════
function openNewRdv(date, hour) {
  document.getElementById('rdvDate').value = date||fmtISO(new Date());
  document.getElementById('rdvTime').value = hour?`${String(hour).padStart(2,'0')}:00`:'10:00';
  document.getElementById('rdvClient').value='';
  document.getElementById('rdvPhone').value='';
  document.getElementById('rdvNotes').value='';
  document.getElementById('rdvModal').classList.add('open');
}
function closeRdv(){ document.getElementById('rdvModal').classList.remove('open'); }

async function saveRdv() {
  const client = document.getElementById('rdvClient').value.trim();
  if (!client) { showToast('Nom du client requis'); return; }
  const appt = {
    id:'rdv-'+Date.now(), client,
    phone: document.getElementById('rdvPhone').value,
    service: document.getElementById('rdvService').value,
    staffId: document.getElementById('rdvStaff').value,
    date: document.getElementById('rdvDate').value,
    time: document.getElementById('rdvTime').value,
    duration: parseInt(document.getElementById('rdvDuration').value)||60,
    notes: document.getElementById('rdvNotes').value.trim(),
    createdBy: currentStaff?.id,
  };
  const sendSMS = document.getElementById('rdvSMS').checked;
  // POST to API
  try {
    await fetch(`${API}/api/calendar/create`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(appt)});
  } catch(e) {}
  // SMS: confirmation immédiate + planifier 24h + 2h
  if (sendSMS && appt.phone) {
    const staffName = STAFF_LIST.find(s=>s.id===appt.staffId)?.name||appt.staffId;
    try { await fetch(`${API}/api/sms/confirmation`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientPhone:appt.phone,clientName:appt.client,serviceName:appt.service,datetime:`${appt.date} ${appt.time}`,staffName})}); } catch(e){}
    try { await fetch(`${API}/api/sms/schedule-reminders`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientPhone:appt.phone,clientName:appt.client,serviceName:appt.service,datetime:`${appt.date} ${appt.time}`,staffName})}); } catch(e){}
  }
  appointments.push(appt);
  closeRdv();
  buildCalendar();
  showToast('RDV créé' + (sendSMS&&appt.phone?' · SMS + 2 rappels planifiés':'') + (appt.notes?' · Notes enregistrées':''));
}

// ══ TOAST ═════════════════════════════════════════════════════════════════
function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('show'),3200);
}
</script>
</body>
</html>
