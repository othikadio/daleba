<!DOCTYPE html>
<html lang="fr-CA">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Portail Staff — Kadio Coiffure</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#f5f0ea;--ivory:#faf7f4;--charcoal:#1a1a1a;--warm:#2c2520;
  --gold:#b8965a;--gold-light:#d4af7a;--muted:#7a6e65;--border:#e0d8d0;
  --green:#2ecc71;--green-dark:#27ae60;--red:#e74c3c;--red-dark:#c0392b;
  --maya:#b8965a;--mariel:#7a9e72;
  --serif:'Cormorant Garamond',Georgia,serif;--sans:'Jost',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--charcoal);color:var(--ivory);font-family:var(--sans);font-weight:300;min-height:100vh}
a{color:inherit;text-decoration:none}

/* ── LOGIN SCREEN ──────────────────────────────────── */
.login-screen{position:fixed;inset:0;background:var(--charcoal);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.login-box{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);padding:48px 40px;max-width:360px;width:100%;text-align:center}
.login-logo{font-family:var(--serif);font-size:22px;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px}
.login-logo span{color:var(--gold)}
.login-sub{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:36px}
.login-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.45);display:block;margin-bottom:8px;text-align:left}
.login-select,.login-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:var(--ivory);padding:12px 16px;font-family:var(--sans);font-size:14px;margin-bottom:14px;outline:none;transition:border-color .2s;appearance:none;-webkit-appearance:none}
.login-select option{background:var(--charcoal)}
.login-select:focus,.login-input:focus{border-color:var(--gold)}
.login-input{letter-spacing:4px;text-align:center;font-size:20px}
.login-btn{width:100%;background:var(--gold);color:var(--charcoal);border:none;padding:13px;font-family:var(--sans);font-size:11px;letter-spacing:3px;text-transform:uppercase;font-weight:500;cursor:pointer;transition:background .2s;margin-top:6px}
.login-btn:hover{background:var(--gold-light)}
.login-error{font-size:12px;color:#e74c3c;margin-top:12px;display:none}
.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:16px}
.pin-dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.15);transition:background .2s}
.pin-dot.filled{background:var(--gold)}

/* ── APP SHELL ─────────────────────────────────────── */
.app{display:none;flex-direction:column;min-height:100vh}
.app.visible{display:flex}

/* TOP BAR */
.topbar{background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.08);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-logo{font-family:var(--serif);font-size:16px;letter-spacing:2px}
.topbar-logo span{color:var(--gold)}
.topbar-staff{display:flex;align-items:center;gap:10px;font-size:12px;color:rgba(255,255,255,.5)}
.staff-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:var(--charcoal)}
.topbar-right{display:flex;gap:12px;align-items:center}
.tab-btn{font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:6px 16px;border:1px solid rgba(255,255,255,.15);background:none;color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;font-family:var(--sans)}
.tab-btn.active,.tab-btn:hover{border-color:var(--gold);color:var(--gold)}
.btn-logout{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3);background:none;border:none;cursor:pointer;font-family:var(--sans);padding:4px 8px;transition:color .2s}
.btn-logout:hover{color:var(--red)}

/* TABS */
.tab-pane{display:none;padding:24px;flex:1}
.tab-pane.active{display:block}

/* ── SCAN QR PANEL ─────────────────────────────────── */
.scan-panel{max-width:480px;margin:0 auto}
.scan-title{font-family:var(--serif);font-size:26px;font-weight:300;margin-bottom:6px}
.scan-sub{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:.5px;margin-bottom:28px}
.scan-input-wrap{position:relative;margin-bottom:16px}
.scan-input{width:100%;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);color:var(--ivory);padding:16px 50px 16px 20px;font-family:var(--sans);font-size:18px;letter-spacing:4px;text-transform:uppercase;outline:none;transition:border-color .2s;text-align:center}
.scan-input:focus{border-color:var(--gold)}
.scan-input::placeholder{letter-spacing:2px;font-size:13px;text-transform:uppercase;opacity:.3}
.scan-btn{width:100%;background:var(--gold);color:var(--charcoal);border:none;padding:14px;font-family:var(--sans);font-size:11px;letter-spacing:3px;text-transform:uppercase;font-weight:500;cursor:pointer;transition:background .2s;margin-bottom:24px}
.scan-btn:hover{background:var(--gold-light)}

/* RESULT CARD */
.scan-result{border-radius:4px;padding:28px;text-align:center;display:none;margin-bottom:20px}
.scan-result.active{display:block;background:rgba(46,204,113,0.12);border:2px solid var(--green)}
.scan-result.blocked{display:block;background:rgba(231,76,60,0.12);border:2px solid var(--red)}
.scan-status-icon{font-size:52px;margin-bottom:12px;line-height:1}
.scan-status-text{font-size:22px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
.scan-result.active .scan-status-text{color:var(--green)}
.scan-result.blocked .scan-status-text{color:var(--red)}
.scan-client-name{font-family:var(--serif);font-size:22px;font-weight:400;margin-bottom:4px}
.scan-forfait{font-size:13px;letter-spacing:1px;margin-bottom:16px;color:rgba(255,255,255,.6)}
.scan-wash{display:inline-flex;align-items:center;gap:8px;font-size:12px;padding:6px 16px;border-radius:20px;font-weight:500}
.scan-wash.ok{background:rgba(46,204,113,.15);color:var(--green);border:1px solid rgba(46,204,113,.3)}
.scan-wash.used{background:rgba(231,76,60,.12);color:#ff8a7a;border:1px solid rgba(231,76,60,.25)}
.scan-actions{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.scan-action-btn{font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:8px 18px;border:1px solid rgba(255,255,255,.15);background:none;color:rgba(255,255,255,.6);cursor:pointer;transition:all .2s;font-family:var(--sans)}
.scan-action-btn:hover{border-color:var(--gold);color:var(--gold)}
.scan-action-btn.wash-btn:hover{border-color:var(--green);color:var(--green)}
.scan-history{margin-top:32px}
.scan-history h3{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:14px}
.scan-log-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:12px}
.scan-log-name{color:rgba(255,255,255,.7)}
.scan-log-time{color:rgba(255,255,255,.3)}
.scan-log-badge{font-size:10px;padding:2px 8px;border-radius:10px}
.badge-ok{background:rgba(46,204,113,.15);color:var(--green)}
.badge-blocked{background:rgba(231,76,60,.12);color:#ff8a7a}

/* ── CALENDRIER STAFF ──────────────────────────────── */
.cal-toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.cal-week-nav{display:flex;align-items:center;gap:8px}
.cal-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.7);padding:6px 14px;font-family:var(--sans);font-size:12px;cursor:pointer;transition:all .2s}
.cal-btn:hover{border-color:var(--gold);color:var(--gold)}
.cal-week-label{font-family:var(--serif);font-size:16px;min-width:180px;text-align:center}
.cal-staff-filter{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
.staff-tag{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:5px 12px;border:1px solid rgba(255,255,255,.1);background:none;cursor:pointer;transition:all .2s;font-family:var(--sans);color:rgba(255,255,255,.5)}
.staff-tag.active,.staff-tag:hover{color:var(--ivory)}
.staff-tag[data-s="maya"].active{border-color:var(--maya);background:rgba(184,150,90,.15)}
.staff-tag[data-s="mariel"].active{border-color:var(--mariel);background:rgba(122,158,114,.15)}

.cal-grid{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);overflow-x:auto}
.cal-header-row{display:grid;grid-template-columns:60px repeat(7,1fr);border-bottom:1px solid rgba(255,255,255,.07)}
.cal-hcell{padding:10px 6px;text-align:center;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.35);border-right:1px solid rgba(255,255,255,.05)}
.cal-hcell:last-child{border-right:none}
.cal-hcell.today{color:var(--gold)}
.cal-hcell-date{font-family:var(--serif);font-size:18px;display:block;color:rgba(255,255,255,.7)}
.cal-hcell.today .cal-hcell-date{color:var(--gold)}
.cal-body-row{display:grid;grid-template-columns:60px repeat(7,1fr);min-height:52px;border-bottom:1px solid rgba(255,255,255,.04)}
.cal-time{font-size:10px;color:rgba(255,255,255,.25);padding:4px 8px;border-right:1px solid rgba(255,255,255,.06);display:flex;align-items:flex-start;justify-content:flex-end;letter-spacing:.5px}
.cal-cell{border-right:1px solid rgba(255,255,255,.04);position:relative;cursor:pointer;transition:background .15s}
.cal-cell:hover{background:rgba(255,255,255,.03)}
.cal-cell:last-child{border-right:none}
.cal-appt{position:absolute;left:2px;right:2px;border-radius:2px;padding:4px 7px;font-size:11px;overflow:hidden;cursor:grab;z-index:5;border-left:3px solid}
.cal-appt:hover{z-index:10;box-shadow:0 4px 14px rgba(0,0,0,.4)}
.cal-appt.maya{background:rgba(184,150,90,.2);border-color:var(--maya);color:rgba(255,255,255,.85)}
.cal-appt.mariel{background:rgba(122,158,114,.2);border-color:var(--mariel);color:rgba(255,255,255,.85)}
.cal-appt-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-appt-svc{font-size:10px;opacity:.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.add-rdv-btn{background:rgba(184,150,90,.12);border:1px dashed rgba(184,150,90,.3);color:rgba(184,150,90,.7);padding:10px 20px;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:var(--sans);transition:all .2s;margin-top:16px}
.add-rdv-btn:hover{background:rgba(184,150,90,.2);color:var(--gold)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(10,8,6,.75);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#1c1410;border:1px solid rgba(255,255,255,.1);max-width:440px;width:100%;padding:32px;position:relative}
.modal-title{font-family:var(--serif);font-size:20px;margin-bottom:18px}
.modal-close{position:absolute;top:14px;right:18px;background:none;border:none;color:rgba(255,255,255,.4);font-size:18px;cursor:pointer}
.form-group{margin-bottom:13px}
.form-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);display:block;margin-bottom:5px}
.form-input,.form-select{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--ivory);padding:9px 14px;font-family:var(--sans);font-size:13px;outline:none;transition:border-color .2s;appearance:none}
.form-select option{background:#1c1410}
.form-input:focus,.form-select:focus{border-color:var(--gold)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.btn-cancel{background:none;border:1px solid rgba(255,255,255,.12);padding:8px 18px;font-family:var(--sans);font-size:11px;cursor:pointer;letter-spacing:1px;color:rgba(255,255,255,.5);transition:all .2s}
.btn-cancel:hover{border-color:rgba(255,255,255,.3);color:var(--ivory)}
.btn-save{background:var(--gold);color:var(--charcoal);border:none;padding:8px 22px;font-family:var(--sans);font-size:11px;cursor:pointer;letter-spacing:1px;font-weight:500;transition:background .2s}
.btn-save:hover{background:var(--gold-light)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:rgba(26,20,14,.95);border:1px solid rgba(184,150,90,.3);color:var(--ivory);padding:12px 20px;font-size:12px;letter-spacing:.5px;z-index:1000;transform:translateY(80px);opacity:0;transition:all .3s;max-width:320px}
.toast.show{transform:translateY(0);opacity:1}
</style>
</head>
<body>

<!-- ── LOGIN ──────────────────────────────────────────── -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">KADIO <span>·</span> COIFFURE</div>
    <div class="login-sub">Portail Employé</div>
    <label class="login-label">Votre nom</label>
    <select class="login-select" id="staffSelect">
      <option value="">— Sélectionner —</option>
      <option value="maya">Maya</option>
      <option value="mariel">Mariel</option>
    </select>
    <label class="login-label">Code d'accès</label>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <input class="login-input" id="pinInput" type="password" maxlength="4" placeholder="• • • •" autocomplete="off" oninput="onPin()" />
    <button class="login-btn" onclick="doLogin()">Accéder au portail →</button>
    <div class="login-error" id="loginError">Code incorrect. Réessayez.</div>
  </div>
</div>

<!-- ── APP ──────────────────────────────────────────── -->
<div class="app" id="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-logo">KADIO <span>·</span> STAFF</div>
    <div class="topbar-right">
      <button class="tab-btn active" onclick="switchTab('scan',this)">📲 Scanner</button>
      <button class="tab-btn" onclick="switchTab('cal',this)">📅 Calendrier</button>
      <div class="topbar-staff">
        <div class="staff-avatar" id="staffAvatar" style="background:var(--maya)">M</div>
        <span id="staffName">—</span>
      </div>
      <button class="btn-logout" onclick="doLogout()">Déconnexion</button>
    </div>
  </div>

  <!-- ── TAB : SCAN QR ──────────────────────────────── -->
  <div class="tab-pane active" id="tab-scan">
    <div class="scan-panel">
      <div class="scan-title">Vérification abonnement</div>
      <div class="scan-sub">Saisissez ou scannez le code QR du client</div>

      <div class="scan-input-wrap">
        <input class="scan-input" id="scanCode" type="text" maxlength="8" placeholder="Code KC…" autocomplete="off"
          oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')doScan()" />
      </div>
      <button class="scan-btn" onclick="doScan()">Vérifier →</button>

      <!-- RÉSULTAT -->
      <div class="scan-result" id="scanResult">
        <div class="scan-status-icon" id="scanIcon"></div>
        <div class="scan-status-text" id="scanStatusText"></div>
        <div class="scan-client-name" id="scanClientName"></div>
        <div class="scan-forfait" id="scanForfait"></div>
        <div class="scan-wash" id="scanWash"></div>
        <div class="scan-actions" id="scanActions"></div>
      </div>

      <!-- HISTORIQUE -->
      <div class="scan-history">
        <h3>Derniers scans</h3>
        <div id="scanLog"></div>
      </div>
    </div>
  </div>

  <!-- ── TAB : CALENDRIER ───────────────────────────── -->
  <div class="tab-pane" id="tab-cal">
    <div class="cal-toolbar">
      <div class="cal-week-nav">
        <button class="cal-btn" onclick="prevWeek()">←</button>
        <div class="cal-week-label" id="calWeekLabel">—</div>
        <button class="cal-btn" onclick="nextWeek()">→</button>
        <button class="cal-btn" onclick="goToday()">Aujourd'hui</button>
      </div>
      <div class="cal-staff-filter">
        <button class="staff-tag active" data-s="maya" onclick="toggleStaffFilter('maya',this)">● Maya</button>
        <button class="staff-tag active" data-s="mariel" onclick="toggleStaffFilter('mariel',this)">● Mariel</button>
      </div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <button class="add-rdv-btn" onclick="openNewRdv()">+ Nouveau rendez-vous</button>
  </div>

</div><!-- /app -->

<!-- MODAL NOUVEAU RDV -->
<div class="modal-overlay" id="rdvModal">
  <div class="modal">
    <button class="modal-close" onclick="closeRdv()">✕</button>
    <div class="modal-title">Nouveau rendez-vous</div>
    <div class="form-group">
      <label class="form-label">Nom du client</label>
      <input class="form-input" id="rdvClient" type="text" placeholder="Prénom Nom" />
    </div>
    <div class="form-group">
      <label class="form-label">Téléphone</label>
      <input class="form-input" id="rdvPhone" type="tel" placeholder="+1 514 XXX-XXXX" />
    </div>
    <div class="form-group">
      <label class="form-label">Service</label>
      <select class="form-select" id="rdvService">
        <option>Knotless braids</option>
        <option>Retwist tête complète</option>
        <option>Interlock crochet</option>
        <option>Coupe homme + barbe</option>
        <option>Tissage</option>
        <option>Pose lace frontale</option>
        <option>Tresses rapides</option>
        <option>Lavage + séchage</option>
        <option>Nattes américaines</option>
        <option>Coupe enfant</option>
        <option>Autre…</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Date</label>
        <input class="form-input" id="rdvDate" type="date" />
      </div>
      <div class="form-group">
        <label class="form-label">Heure</label>
        <input class="form-input" id="rdvTime" type="time" value="10:00" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Durée (min)</label>
        <input class="form-input" id="rdvDuration" type="number" value="60" min="15" step="15" />
      </div>
      <div class="form-group">
        <label class="form-label">Coiffeur·se</label>
        <select class="form-select" id="rdvStaff">
          <option value="maya">Maya</option>
          <option value="mariel">Mariel</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" id="rdvSMS" checked style="width:auto;accent-color:var(--gold)" />
        Envoyer SMS de confirmation (3 rappels automatiques)
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeRdv()">Annuler</button>
      <button class="btn-save" onclick="saveRdv()">Enregistrer →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://daleba-api-production.up.railway.app';

// ── PINS (simples, côté client — la sécurité réelle est sur l'API) ──
const PINS = { maya:'2847', mariel:'3956' };
const STAFF_COLORS = { maya:'var(--maya)', mariel:'var(--mariel)' };
const STAFF_LABELS = { maya:'Maya', mariel:'Mariel' };

let currentStaff = null;
let weekStart = getWeekStart(new Date());
let appointments = [];
let activeStaffFilters = new Set(['maya','mariel']);
let scanHistory = [];

// ── LOGIN ──
function onPin(){
  const v = document.getElementById('pinInput').value;
  for(let i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('filled',i<v.length);
}

function doLogin(){
  const staff = document.getElementById('staffSelect').value;
  const pin = document.getElementById('pinInput').value;
  if(!staff){ showLoginError('Sélectionnez votre nom.'); return; }
  if(PINS[staff] && pin !== PINS[staff]){ showLoginError('Code incorrect. Réessayez.'); return; }
  currentStaff = staff;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('staffName').textContent = STAFF_LABELS[staff];
  document.getElementById('staffAvatar').textContent = STAFF_LABELS[staff][0];
  document.getElementById('staffAvatar').style.background = STAFF_COLORS[staff];
  document.getElementById('rdvStaff').value = staff;
  loadAppointments();
  buildCalendar();
}

function showLoginError(msg){
  const el = document.getElementById('loginError');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('pinInput').value = '';
  for(let i=0;i<4;i++) document.getElementById('d'+i).classList.remove('filled');
  setTimeout(()=>el.style.display='none',3000);
}

function doLogout(){
  currentStaff = null;
  document.getElementById('app').classList.remove('visible');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('pinInput').value = '';
  document.getElementById('staffSelect').value = '';
  for(let i=0;i<4;i++) document.getElementById('d'+i).classList.remove('filled');
}

// ── TABS ──
function switchTab(id, btn){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='cal') buildCalendar();
}

// ── SCAN ──
async function doScan(){
  const code = document.getElementById('scanCode').value.trim().toUpperCase();
  if(!code){ showToast('Entrez un code de scan'); return; }

  // Demo data + API call
  const demoSubs = {
    'KCAT5R':{clientName:'Sophie Beaumont',forfaitId:'knotless-tresses-signature',forfaitName:'Knotless & Tresses Signature',status:'active',weeklyWashUsed:false},
    'KCBM2X':{clientName:'Marc Théodore',forfaitId:'barbier-coupe-barbe',forfaitName:'Barbier Coupe & Barbe',status:'active',weeklyWashUsed:true},
    'KCAJ9P':{clientName:'Aisha Konaté',forfaitId:'locs-illimite',forfaitName:'Locs Illimité',status:'blocked',weeklyWashUsed:false},
    'KCPN4W':{clientName:'Priscille Ndongo',forfaitId:'microlocks-sisterlocks',forfaitName:'Microlocks / Sisterlocks',status:'active',weeklyWashUsed:false},
  };

  let sub = null;
  try{
    const r = await fetch(`${API}/api/subscription/scan/${code}/status`);
    if(r.ok) sub = await r.json();
  }catch(e){}
  if(!sub) sub = demoSubs[code]||null;

  const res = document.getElementById('scanResult');
  res.className = 'scan-result';

  if(!sub){
    res.className = 'scan-result blocked';
    document.getElementById('scanIcon').textContent = '🔴';
    document.getElementById('scanStatusText').textContent = 'CODE INCONNU';
    document.getElementById('scanClientName').textContent = code;
    document.getElementById('scanForfait').textContent = 'Aucun abonnement trouvé pour ce code';
    document.getElementById('scanWash').innerHTML = '';
    document.getElementById('scanActions').innerHTML = '';
    addScanLog(code,'?','blocked');
    return;
  }

  const isActive = sub.status==='active';
  res.className = `scan-result ${isActive?'active':'blocked'}`;
  document.getElementById('scanIcon').textContent = isActive?'🟢':'🔴';
  document.getElementById('scanStatusText').textContent = isActive?'ABONNEMENT ACTIF':'ACCÈS REFUSÉ';
  document.getElementById('scanClientName').textContent = sub.clientName;
  // ⚠️ Afficher UNIQUEMENT le nom du forfait — jamais le prix
  document.getElementById('scanForfait').textContent = sub.forfaitName || sub.forfaitId;

  const washEl = document.getElementById('scanWash');
  if(isActive){
    washEl.className = sub.weeklyWashUsed ? 'scan-wash used' : 'scan-wash ok';
    washEl.innerHTML = sub.weeklyWashUsed
      ? '🚿 Lavage semaine déjà utilisé'
      : '🚿 Lavage semaine disponible';
  } else {
    washEl.innerHTML = '';
  }

  const actEl = document.getElementById('scanActions');
  if(isActive && !sub.weeklyWashUsed){
    actEl.innerHTML = `<button class="scan-action-btn wash-btn" onclick="consumeWash('${code}','${sub.clientName}')">✓ Utiliser le lavage</button>`;
  } else {
    actEl.innerHTML = '';
  }

  addScanLog(sub.clientName, sub.forfaitName, isActive?'ok':'blocked');
  document.getElementById('scanCode').value = '';
}

async function consumeWash(code, clientName){
  try{
    await fetch(`${API}/api/subscription/wash/consume`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({scanCode:code})});
  }catch(e){}
  document.getElementById('scanWash').className = 'scan-wash used';
  document.getElementById('scanWash').innerHTML = '🚿 Lavage semaine déjà utilisé';
  document.getElementById('scanActions').innerHTML = '';
  showToast(`Lavage enregistré pour ${clientName}`);
}

function addScanLog(name, forfait, status){
  const now = new Date().toLocaleTimeString('fr-CA',{hour:'2-digit',minute:'2-digit'});
  scanHistory.unshift({name,forfait,status,time:now});
  if(scanHistory.length>10) scanHistory.pop();
  const el = document.getElementById('scanLog');
  el.innerHTML = scanHistory.map(s=>`
    <div class="scan-log-item">
      <span class="scan-log-name">${s.name}</span>
      <span class="scan-log-time">${s.time}</span>
      <span class="scan-log-badge ${s.status==='ok'?'badge-ok':'badge-blocked'}">${s.status==='ok'?'✓ Actif':'✗ Bloqué'}</span>
    </div>`).join('');
}

// ── CALENDRIER ──
function getWeekStart(d){ const dt=new Date(d); dt.setDate(dt.getDate()-dt.getDay()+1); dt.setHours(0,0,0,0); return dt; }
function fmtISO(d){ return d.toISOString().split('T')[0]; }
function isToday(d){ return d.toDateString()===new Date().toDateString(); }
const DAYS=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const HOURS=Array.from({length:13},(_,i)=>i+8);

async function loadAppointments(){
  try{
    const r = await fetch(`${API}/api/calendar/week?start=${fmtISO(weekStart)}&staffId=${currentStaff}`);
    if(r.ok) appointments = await r.json();
  }catch(e){
    appointments=[
      {id:'1',client:'Sophie B.',service:'Knotless Moyen',staffId:'maya',date:fmtISO(new Date()),time:'10:00',duration:180},
      {id:'2',client:'Priscille N.',service:'Retwist tête',staffId:'mariel',date:fmtISO(new Date()),time:'14:00',duration:90},
    ];
  }
}

function buildCalendar(){
  const grid = document.getElementById('calGrid');
  grid.innerHTML='';
  // Header
  const hrow=document.createElement('div'); hrow.className='cal-header-row';
  hrow.innerHTML='<div class="cal-hcell"></div>';
  for(let i=0;i<7;i++){
    const d=new Date(weekStart); d.setDate(d.getDate()+i);
    hrow.innerHTML+=`<div class="cal-hcell${isToday(d)?' today':''}">${DAYS[d.getDay()]}<span class="cal-hcell-date">${d.getDate()}</span></div>`;
  }
  grid.appendChild(hrow);
  // Rows
  HOURS.forEach(h=>{
    const row=document.createElement('div'); row.className='cal-body-row';
    row.innerHTML=`<div class="cal-time">${h}h</div>`;
    for(let i=0;i<7;i++){
      const d=new Date(weekStart); d.setDate(d.getDate()+i);
      const cell=document.createElement('div'); cell.className='cal-cell';
      cell.dataset.date=fmtISO(d); cell.dataset.hour=h;
      cell.addEventListener('click',()=>openNewRdv(fmtISO(d),h));
      // Place appts
      appointments.filter(a=>a.date===fmtISO(d)&&parseInt(a.time)===h&&activeStaffFilters.has(a.staffId)).forEach(a=>{
        const el=document.createElement('div');
        el.className=`cal-appt ${a.staffId}`;
        const slotH=52; const m=parseInt((a.time.split(':')[1]||0));
        el.style.top=(m/60*slotH)+'px';
        el.style.height=Math.max((a.duration||60)/60*slotH-3,24)+'px';
        el.innerHTML=`<div class="cal-appt-name">${a.client}</div><div class="cal-appt-svc">${a.service}</div>`;
        el.draggable=true;
        cell.style.position='relative';
        cell.appendChild(el);
      });
      row.appendChild(cell);
    }
    grid.appendChild(row);
  });
  // Week label
  const end=new Date(weekStart); end.setDate(end.getDate()+6);
  document.getElementById('calWeekLabel').textContent=
    `${weekStart.toLocaleDateString('fr-CA',{day:'numeric',month:'short'})} – ${end.toLocaleDateString('fr-CA',{day:'numeric',month:'short',year:'numeric'})}`;
}

function prevWeek(){ weekStart.setDate(weekStart.getDate()-7); buildCalendar(); }
function nextWeek(){ weekStart.setDate(weekStart.getDate()+7); buildCalendar(); }
function goToday(){ weekStart=getWeekStart(new Date()); buildCalendar(); }

function toggleStaffFilter(s,btn){
  if(activeStaffFilters.has(s)){ if(activeStaffFilters.size>1){activeStaffFilters.delete(s);btn.classList.remove('active');} }
  else{ activeStaffFilters.add(s);btn.classList.add('active'); }
  buildCalendar();
}

function openNewRdv(date,hour){
  document.getElementById('rdvDate').value=date||fmtISO(new Date());
  document.getElementById('rdvTime').value=hour?`${String(hour).padStart(2,'0')}:00`:'10:00';
  document.getElementById('rdvStaff').value=currentStaff||'maya';
  document.getElementById('rdvModal').classList.add('open');
}
function closeRdv(){ document.getElementById('rdvModal').classList.remove('open'); }

async function saveRdv(){
  const appt={
    id:'rdv-'+Date.now(),
    client:document.getElementById('rdvClient').value||'Client',
    phone:document.getElementById('rdvPhone').value,
    service:document.getElementById('rdvService').value,
    staffId:document.getElementById('rdvStaff').value,
    date:document.getElementById('rdvDate').value,
    time:document.getElementById('rdvTime').value,
    duration:parseInt(document.getElementById('rdvDuration').value)||60,
  };
  const sendSMS=document.getElementById('rdvSMS').checked;
  appointments.push(appt);

  if(sendSMS && appt.phone){
    // SMS 1 — confirmation immédiate
    try{ await fetch(`${API}/api/sms/confirmation`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({clientPhone:appt.phone,clientName:appt.client,serviceName:appt.service,datetime:`${appt.date} ${appt.time}`,staffName:STAFF_LABELS[appt.staffId]||appt.staffId})}); }catch(e){}
    // SMS 2 & 3 (24h + 2h) — planifiés côté API
    try{ await fetch(`${API}/api/sms/schedule-reminders`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({clientPhone:appt.phone,clientName:appt.client,serviceName:appt.service,datetime:`${appt.date} ${appt.time}`,staffName:STAFF_LABELS[appt.staffId]||appt.staffId})}); }catch(e){}
  }
  closeRdv();
  buildCalendar();
  showToast('RDV enregistré' + (sendSMS && appt.phone ? ' · SMS confirmé + 2 rappels planifiés' : ''));
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3500);
}

// Auto-focus scan input quand onglet actif
document.addEventListener('keydown',e=>{
  const scanInput=document.getElementById('scanCode');
  if(document.getElementById('tab-scan').classList.contains('active')&&e.key!=='Tab'&&!['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName)){
    scanInput.focus();
  }
});
</script>
