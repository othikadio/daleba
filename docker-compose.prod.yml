# ═══════════════════════════════════════════════════════════════
# DALEBA — Stack Production Résiliente (Instance A — Principale)
# Déployer sur VPS A (OVH / DigitalOcean zone 1)
# Commande: docker compose -f docker-compose.prod.yml up -d
# ═══════════════════════════════════════════════════════════════

x-app-common: &app-common
  image: daleba-core:latest
  build:
    context: .
    dockerfile: Dockerfile
    target: production
  env_file: .env.production
  restart: unless-stopped
  networks:
    - daleba-net
  depends_on:
    postgres-master:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/status"]
    interval: 15s
    timeout: 5s
    retries: 3
    start_period: 20s
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "5"

services:

  # ── PostgreSQL Master (écriture + lecture) ──────────────────
  postgres-master:
    image: postgres:16-alpine
    container_name: daleba-postgres-master
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-railway}
      POSTGRES_USER: ${POSTGRES_USER:-daleba}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Réplication streaming
      POSTGRES_REPLICATION_USER: replicator
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
    volumes:
      - postgres-master-data:/var/lib/postgresql/data
      - ./infra/postgres/master-init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    command: >
      postgres
        -c wal_level=replica
        -c max_wal_senders=5
        -c max_replication_slots=5
        -c wal_keep_size=256MB
        -c synchronous_commit=on
        -c listen_addresses='*'
    ports:
      - "5432:5432"
    networks:
      - daleba-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-daleba} -d ${POSTGRES_DB:-railway}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── App Instance A (principale) ─────────────────────────────
  app-a:
    <<: *app-common
    container_name: daleba-app-a
    environment:
      INSTANCE_ID: "A"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-daleba}:${POSTGRES_PASSWORD}@postgres-master:5432/${POSTGRES_DB:-railway}"
    ports:
      - "3000:3000"

  # ── App Instance B (hot standby local — anti-crash) ─────────
  app-b:
    <<: *app-common
    container_name: daleba-app-b
    environment:
      INSTANCE_ID: "B"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-daleba}:${POSTGRES_PASSWORD}@postgres-master:5432/${POSTGRES_DB:-railway}"
    ports:
      - "3001:3000"

  # ── Nginx — Load Balancer interne A↔B ───────────────────────
  nginx:
    image: nginx:alpine
    container_name: daleba-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - app-a
      - app-b
    networks:
      - daleba-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/status"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres-master-data:
    driver: local
  nginx-logs:
    driver: local

networks:
  daleba-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
